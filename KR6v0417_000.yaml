人無量無邊何況一切聖人乃至一切三善道衆生等所以一切肉眼凡夫乃至未得法忍已來常須最大深敬一切六道衆生常須最大輕治罰一切六道衆生所以説之耳準依大方廣十輪經第五第六卷菩薩地持論第七卷等説亦名準經義推説又肉眼凡夫空見有見衆生唯得以一切經文攝一切經義設錯無罪何以故準依大般涅槃經第七卷邪正品説九部經中不説有佛性若有説言九部經中無佛性者亦復無罪驗之所以得知又一切真聖真善諸佛菩薩聖人正見成就凡夫返上即是易解不須廣説又肉眼凡夫唯得驗經文若與一乘佛法相當判屬一乘若與三乘佛法相當判屬三乘若與空見有見衆生佛法相當判屬空見有見衆生又大般涅槃經十號三乘十號廣説一乘十號略説何以故於十號內唯説生老病死調伏衆生不噵打不噵殺驗之所以得知唯是廣明三乘十號於餘經論等十號內若有噵得打得殺者即是當廣説一乘十號大般涅槃四種近因三乘一乘近因俱廣説何以故初諸佛菩薩聲聞緣覺人中信方等者唯得説一種語義當即是説三乘根機衆生是大般涅槃近因後唯就諸佛菩薩説得具説三種語義當即是説一乘根機衆生是大般涅槃近因又此段引佛作有德國王時不聽斷命即與三乘大乘菩薩大乘佛相當下引佛作仙與國王時但使為住持佛法乃至凡夫無惡心亦得斷命即與一乘大乘菩薩大乘佛相當何以故準經驗之由一切十二種遍偏病其心顛倒常錯謬等一切顛倒少分可轉故爾準依第三卷第三大段第三段第三子段十三子句內第七子句所引經等以邪驗正説所以得知又何以故此段喻如迷悟並有噎病大小便不通病不定孝子賢臣君子不定鐵礦入火不入火不定石山谷別高下不定作屋又一切三乘根機衆生懺悔法內從得一見佛一聞大乘經已後即得戒見俱不破莫問凡聖俱得永不生四惡趣俱得永不作邪魔六師外道唯除得聖道果已去為衆生不在其限準經驗之唯有一種人於一日一夜七日草五日八十七日九十七日一形懺悔即得罪滅準經驗之戒見俱不破正見成就凡夫破戒不破見破見不破戒亦正亦邪凡夫兩種人並有從墮惡道已下驗之破戒不破見破見不破戒亦正亦邪凡夫一種人何以故唯由利根自執己見少分可轉故爾準依此句下十子句末所引經等説驗之所以得知又一切三乘根機衆生懺悔法內三乘凡夫有兩種不同一者有三乘戒見俱不破正見成就凡夫一見佛等即得永不生四惡趣二者有三乘破戒不破見破見不破戒亦正亦邪凡夫一見佛等即得永不生四惡趣不定準依此第二子段上第一子段懺悔法內一乘凡夫常有兩種所引經等説又此第二子段一切三乘根機凡夫唯認學正善佛法不認學邪善佛法不定十子句與此第二子段下第三子段末十子句文義俱同一種相似唯有可轉不可轉為異耳何以故準依增一阿含經第草六卷説釋種女寧被打被殺不肯與王作婦準依律文第二卷説比丘作不淨觀成就厭身不淨寧人自殺驗之所以得知三乘根機衆生唯能受好不能受惡準依第四卷第三大段第三段第三子段阿難比丘聞佛説法生於疑心得七佛呵勸即捨疑心等驗之所以得知不定第三一切利根邪見成就常沒顛倒空見有見衆生乃至未得法忍已來常不得驅出家人還俗不得打出家人不得殺出家人何以故準經驗之由一切十二種偏病其心顛倒常錯謬等一切顛倒常畢竟永不可轉故爾準依此第二卷第二大段第二段第三子段所引經等説驗之所以得知又何以故此段喻如常迷噎病大小便不通病不孝反逆作賊鐵礦不入火金剛山谷別高下作屋唯除隨宜唯除劫火又一切空見有見衆生道俗一切為求名利徒衆多聞勢力勝他等故學持戒修福德邪善持戒比丘準依大方廣十輪經第三卷末第四卷初大集經第草七第草九卷兩段護法品像法決疑經與多部經義同卷初最妙勝定經與多部經義同文當佛滅度一千年已後兩段大般涅槃經第九卷兩段佛藏經與多部經義同第二第三卷不定兩段等説乃至一切經律論説亦如是類以可知又學行不輕行法常唯禮拜四衆身內如來藏佛性當來佛佛想佛常不禮拜四衆現在身所以莫問道俗大乘小乘俱得學行盡不同大般涅槃經四依品維摩經第一卷等説不禮拜道俗身內如來藏佛性當來佛佛想佛唯禮拜道俗現在身內行德過己堪能得與己作出世間菩提涅槃導師者禮拜之所以唯有大乘得學小乘不得學此句準經義推説又一切經律論內能起教諸佛菩薩若為一乘世界佛在世一乘衆生最大好世界好時好衆生起教即常樂我淨諸佛菩薩盧舍那佛釋迦牟尼佛毗盧遮那佛普賢菩薩摩訶薩為上首等合學之準依大方廣佛華嚴經一部等通上及下第一第二卷楞伽經第一卷等説若為五濁諸惡世界佛滅度後空見有見衆生最大惡世界惡時惡衆生起教即苦無常無我不淨諸佛菩薩釋迦牟尼佛地藏菩薩摩訶薩為上首等合學之準依大方廣十輪經兼準依大集經訖盡大集月藏分經四阿含經諸部戒律諸部阿毗曇論等説又大般涅槃經第十八卷文當於減草種顛倒衆生時説大般涅槃經一者學直心菩薩不説他惡唯説他佛性善不自説作善唯説止惡唯自説犯戒惡已上人語引經説已下唯是經文説少有隔越不次第抄盡菩薩摩訶薩雖見衆生諸惡過咎終不説之何以故恐生煩惱若生煩惱則墮惡趣如是菩薩若見衆生有少善事則讚嘆之云何為善所謂佛性讚佛性故令諸衆生發阿耨多羅三藐三菩提心以是義故菩薩摩訶薩常讚人善不訟彼缺名質直心復次善男子云何菩薩質直心也菩薩摩訶薩常不犯惡設有過失即時懺悔於師同學終不覆藏慚愧自責不敢復作於輕罪中生極重想若人詰問答言實犯復問是罪為好不好答言不好復問是罪為善不善答言不善復問是罪是善果耶不善果于耶答言是罪實非善果又問是罪誰之所造將非諸佛法僧所作答言非佛法僧我所作也乃是煩惱之所構集以直心故信有佛性信佛性故則不得名一闡提也以直心故名佛弟子若受衆生衣服飲食臥具醫藥種各十万不足為多是名菩薩質直心也已下人語引經説直心準依大般涅槃經第草六卷説何以故由直心於入佛法行中最是初行故爾準依維摩經第一卷説二者學八法菩薩文當於此世界義當於五濁諸惡世界唯純學善不作惡唯自見惡不自見善不見他惡唯見他善準依維摩經第三卷説三者學入如來大慈悲室著如來柔和忍辱衣坐如來一切法空坐菩薩文當破三乘歸一乘後説準依法華經法師品説四者學四安樂行菩薩文當破三乘歸一乘後説文當於後惡世如來滅後於末法中法欲滅時義當三乘菩薩摩訶薩猶不得親近諸貴等何況空見有見衆生已上人語引經説已下唯是經文説云何名菩薩摩訶薩親近處菩薩摩訶薩不親近國王王子大臣官長不親近外道梵志尼揵子等及造世俗文筆讚詠外書已下人語引經説文當若口宣説若讀經時不樂説人及經典過亦不輕慢諸餘法師不説他人好惡長短於聲聞人亦不稱名説其過惡亦不稱名讚嘆其美又亦不生怨嫌之心善修如是安樂心故諸有聽者不逆其意準依法華經四安樂行品説五者學不輕行菩薩文當佛滅度後正法滅後像法中增上慢比丘有大勢力時唯一人一行莫問道俗四衆違順善惡唯純禮敬作學菩薩行想當來佛想善乃至不見其一分一豪毫惡準依法華經不輕菩薩品説六者學無名相法亦名學三空門亦名學第一義空坐禪菩薩文當佛滅度五百年已後於惡賊狗菩薩道俗時四天下一切俗人一切皆悉普出家盡俱唯純遍學深忍悉行少欲知足之行不供養佛舍利不禮佛塔乃至一拜唯除在家人不在其限準依迦葉經一部第一第二卷兼準依餘部經等説又一切三階佛法對根就教雖有常無常別一切能起教人皆悉普是一乘根機諸佛菩薩準經驗之唯除一乘根機諸佛菩薩已外終無有能得一人獨自學出世間一人一行無人無行五種不忓盡八種佛法徹到成就者準依大般涅槃經通上及下第卅二卷六住諸菩薩通凡及聖俱不假人法自能得度勝鬘經過半卷已後菩薩不因他能自得度大方廣佛華嚴經地前凡夫菩薩十住品即自開解不由他悟準依第一卷第一大段第三段第一子段就佛明能説盡文當善男子所有種種異論呪術言語文字皆是佛説非外道説就菩薩明能學盡地前凡夫菩薩以後驗前一切善惡果俱發願受盡等説驗之所以得知又一人一行者準經驗之莫問人之多少各各學一人一行無人無行五種不忓盡八種佛法亦與一人一行無人無行相似已上準經義推説何以故準依大方廣十輪經第六卷説從今身乃至未得法忍已來於其中間願不受身驗之莫問受身多少各各學一人一行無人無行五種不忓盡八種佛法亦與不受身相似又不得噵莫問學行多少亦與一行相似何以故人人各別人人各各息亂所以得莫問人之多少俱得與一人相似行在一人由凡夫從無始世界已來心常散亂若學一行能得相續若學多行不能得相續所以人行不得相並此何以故準經以人驗法説又不輕菩薩法華經不輕菩薩品説名為比丘唯敢將作剃頭著袈裟出家比丘淨行優婆塞經第十卷説噵不輕菩薩是俗人縈髮比丘唯敢仰信何以故於一切經律論皆悉普唯見將剃頭著袈裟出家人作比丘不見有多部大部經律論將俗人作比丘者所以肉眼凡夫唯敢依一切多部經律論説於一部經説唯敢仰信不在其限此句準經義推説又法華經不輕菩薩品於中有兩義一者嘆學法利益此品略説餘品餘部廣説唯除不輕行成就亦名出不輕行功能利益從文當是比丘臨欲終時具聞威音王佛先所説法華經即得如上六根清淨更增壽命已去不在其限亦名從得證已去不在其限準經驗之唯為一切第一階佛法一乘根機菩薩摩訶薩説學法利益俱得出世正是其當根機對治藥唯為一切第二階佛法退菩提心菩薩摩訶薩聲聞緣覺三乘根機菩薩摩訶薩聲聞緣覺正見成就者説學法利益俱得出世非是其當根機正對治藥準依第三卷第三大段第三段第一第二子段所引經等説不為一切第三階佛法空見有見衆生説學法利益唯除為説世間之義不在其限何以故準依迦葉經第一卷已上人語引經説已下唯是經文説少有隔越不次第抄盡聲聞之人有四惡欲一者求見未來世佛二者求作轉輪聖王三者願生剎利大姓四者願生婆羅門大姓若有所求乃至涅槃亦名惡欲若有沙門婆羅門持淨戒者我為彼説阿耨多羅三藐三菩提終不為彼惡欲人説出家人微細煩惱復有四種具彼煩惱如負重擔入於地獄一者見他得利心生嫉妬二者聞經禁戒而反毀犯三者違反佛語覆藏不悔四者自知犯戒受他信施當來末世後五百歲有相似沙門身披袈裟毀滅如來無量阿僧祇劫所集阿耨多羅三藐三菩提以惡欲故其心妄執邪行諂曲一切魔事皆悉信受彼愚癡人實有過惡如來不説已下人語引經説此迦葉經兼準依餘部經等説求見未來世佛若有所求乃至涅槃亦名惡欲如不孝返逆惡賊所作惡常將諸佛菩薩正善佛法作非是佛法作邪善佛法唯瞋唯罵唯打唯殺常將空見有見衆生邪善佛法作是佛法作正善佛法而供養守護之與金剛波若經論若以色聲求佛是人行邪道唯由有有見病未除盡所以是邪道如孝子賢臣君子所作惡常不將諸佛菩薩正善佛法作非是佛法作邪善佛法常不將空見有見衆生邪善佛法作是佛法作正善佛法所以不得相比準依第三卷第三大段第三段第三子段十三子句內第七子句所引經等説於此句上及下準經驗之佛為説法者即是為一切第一階佛法常唯純正無邪者一切第二階佛法少分正見成就者及邪正並有者説惡説邪善與大般涅槃經第九卷文當如來於諸弟子教學九部經説大涅槃同第十二第十六卷五百婆羅門邪正並有同第草卷現在能得善根邪正並有一闡提同第卅三卷文當如十二部經修多羅中微細之義為諸菩薩説淺近之義為聲聞説同第卅五卷初入地獄即能得還生善根邪正並有一闡提同與大方廣十輪經一部通上及下第五卷四種僧前破戒不破見破見不破戒四種僧後依止第一義僧清淨僧邪正並有同以上此句常唯純正無邪以下此句常唯純邪無正驗之所以得知邪正並有準經驗之佛不為諸法者即是不為一切第三階佛法時節遠近易解不須説常唯純邪無正者説惡説邪善與大般涅槃經第九卷除一闡提常唯純邪無正一闡提同第草卷第卅三卷今雖無益作後世因常唯純邪無正一闡提同第卅五卷出地獄時還生善根常唯純邪無正一闡提同摩訶衍經埿黎品佛藏經與多部經義同往古品墮十方一切阿鼻地獄等遍盡罪猶不盡不得出常唯純邪無正有見衆生同以上此句常唯純正無邪正見成就邪正並有者驗之準依此第二卷第二大段第二段第三子段末十子句準依第三第四卷第三大段第二段第三子段最大多罪因最大多阿鼻地獄果四子句第三段第三子段前十三子句後六子句所引經等説驗之所以得知又彌勒菩薩摩訶薩復為當來世愚癡人輩自稱菩薩自稱沙門者請佛説其過惡下釋彌勒菩薩摩訶薩自噵已下唯是經文説何以故若世尊説其過惡我得聞已自攝心行彼愚癡人聞如來説或得信解如來知我如來覺我已下人語引經説此句為常唯純正無邪聖人及正見成就凡夫兩種人説乃至邪正並有惡賊狗菩薩等一種人説又已下出空見有見衆生作狗菩薩法已下唯是經文説少有隔越佛告彌勒當來末世後五百歲自稱菩薩行於狗法至他施主家中生己家想既起此想貪著前至他家見後比丘瞋目視之心生嫉恚而起鬪諍互相誹謗言某比丘有如是過某甲比丘有如是過汝莫親近某甲比丘汝若親近某甲比丘則為衆人之所輕賤增長罪垢為衣食故讚嘆如來智慧功德令餘衆生生於信仰已下人語引經説出空見有見衆生破狗法已下唯是經文説少有隔越彌勒彼佛出於五濁惡時佛法中有一菩薩比丘名樂精進彌勒樂精進菩薩所化衆生悉為比丘而作施主奉施衣食臥具湯藥更不重入已下人語引經説佛勸空見有見衆生學菩薩法莫學狗法已下唯是經文説彌勒是故菩薩若入村邑欲化衆生當學樂精進菩薩摩訶薩復應學餘大菩薩行莫學狗法已下狗法未盡復更出之唯是經文説佛告彌勒當來末世後五百歲有諸比丘自言菩薩為衣食故入於聚落不為教化衆生入於聚落唯為財物遞相誹謗自得便喜見他得利愁憂瞋恚自求不得便生憂愁見他不得便生歡喜已下人語引經説空見有見衆生略就施主家一處明作狗法於餘一切處作狗法亦如是類以可知略就施主家一處明破狗法於餘一切處破狗法亦如是類以可知二者讚學不輕行功能利益唯此法華經不輕菩薩品廣説餘品餘部不説準經驗之唯為一切第二階佛法先少有一乘根機衆生退一乘菩提心作三乘根機菩薩聲聞緣覺三乘根機戒見俱不破正見成就菩薩聲聞緣覺三乘根機破戒不破見破見不破戒邪正並有菩薩聲聞緣覺説學觀他一切如來藏佛性當來佛佛想佛普真普正八種佛法如似金剛與一切虛空大地等學觀自身一切十二種顛倒如似金剛與一切虛空大地等準依下此句所引經等説準依十卷楞伽經第四卷等説亦名準依多部經等以藥驗病説亦名由遇惡知識作增上慢衆生準依大方廣十輪經第五卷説真善剎利真善輔相真善沙門真善居士真善毗舍首陀真善男女由遇惡知識作旃陀羅趣阿鼻地獄驗之所以得知亦作增上慢衆生不為一切第三階佛法空見有見衆生説一切如來藏佛性當來佛佛想佛普真普正八種佛法如似金剛與一切虛空大地等一切十二種顛倒如似金剛與一切虛空大地等何以故空見有見衆生未墮十方一切阿鼻地獄等遍盡罪猶不盡不得出畏一切惡畏一切苦性未破已前常唯純是一切十二種顛倒如似金剛與一切虛空大地等常在心中一切佛一切經以前驗後以少驗多一切菩薩一切道俗一切解行等俱不能回得令其捨顛倒所以不得為説唯除為説世間之義不在其限準依此第二卷第二大段第二段第三子段末十子句第三第四卷第三大段第二段第三子段最大多罪因最大多阿鼻地獄果四子句第三段第三子段近初八種佛法前十三子句後六子句所引經世間之義準依上此句所引經等説驗之唯除從墮十方一切阿鼻地獄等遍盡罪猶不盡重入阿鼻地獄得出畏一切惡畏一切苦性破已後始得為空見有見衆生説常學觀他一切如來藏佛性當來佛佛想佛普真普正八種佛法如似金剛與一切虛空大地等常學觀自身一切十二種顛倒如似金剛與一切虛空大地等不在其限準依此第二卷第二大段第二段第三子段末十子句第十子句所引經等説驗之所以得知又準經驗之一切能起教諸佛菩薩莫問真應凡聖大菩薩小菩薩俱不為一切能起教人起教唯為一切教所為人起教何以故經論就喻説如百歲公不自為舞唯為教子孫故準依摩訶衍經論第十卷説驗之所以得知諸佛菩薩若為最大好世界好時好衆生起教即是一切第一階佛法一乘根機菩薩合學若為最大惡世界惡時好時不定衆生起教即是一切第二階佛法三乘根機衆生合學若為最大惡世界惡時惡衆生起教即是一切第三階佛法九十六種道亦名神亦名鬼亦名魔亦名六師外道惡賊狗菩薩空見有見衆生增上慢衆生旃陀羅無慚愧僧以驢準狗驢菩薩合學不輕菩薩既為佛滅度後正法滅後增上慢四衆起教驗之所以得知唯是一切十二種最大邪見顛倒道俗合學此句準經義推説又一切十二種最大邪見顛倒衆生者初五種準依九十六種道經一部通上及下等説次兩種準依迦葉經第一卷等説次一種準依大般涅槃經一部廣明空見衆生佛藏經與多部經義同一部廣明有見衆生大方廣十輪經一部廣明空見有見衆生等説次一種準依法華經不輕菩薩品不自知是增上慢迦葉經第一卷自知是增上慢佛藏經與多部經義同通上及下第二卷不自知是增上慢等説次三種準依大方廣十輪經第四第五第六卷等説又不輕菩薩等能起教人起教有多義一者不輕菩薩於佛滅度後起教亦名一切聖人隱不現時起教亦名佛滅度五百年後起教亦名正法滅後起教亦名一切十二種最大邪見顛倒衆生有大勢力時競興滅佛法時起教準依法華經不輕菩薩品佛滅度後正法滅後增上慢比丘有大勢力時準依大般涅槃經四依品佛滅度後聖人隱不現時邪正品佛滅度後七百年邪魔作佛作出家人準依迦葉經第一卷佛滅度五百年後惡賊狗菩薩準依摩訶摩耶經第二卷佛滅度五百年後九十六種道競興滅佛法準依大方廣十輪經第二第四第五第六卷五濁惡世界遠離於佛一切人民皆悉起於斷常旃陀羅無慚愧僧以驢準狗驢菩薩準依大薩遮尼揵子經第三卷於末世正法不行三種顛倒衆生競興等説驗之所以得知二者不輕菩薩唯禮拜增上慢四衆作學菩薩行想當來佛想驗之即是常唯純遍學觀他一切如來藏佛性當來佛佛想佛普真普正八種佛法如似金剛與一切虛空大地等常唯純遍學觀自身一切十二種顛倒如似金剛與一切虛空大地等準依法華經不輕菩薩品準依第三卷第三大段第三段第三子段近初八種佛法及十三子句內第七子句所引經等説亦名常唯純遍遍學觀一切八種普真普正佛法亦名一切八種根本佛法亦名一切八種義佛法亦名一切八種體佛法亦名一切八種條然相別佛法此五句準經義推説亦名一切八種正因佛性佛法準依大般涅槃經第草八卷説亦名準經義推説三者不輕菩薩更不行餘行一行亦不讀誦經典一偈一句一字驗之亦名常不學一切別真別正佛法亦名一切枝條佛法亦名一切名佛法亦名一切相佛法亦名一切同而異佛法此五句準經義推説亦名一切緣因佛性佛法準依大般涅槃經第草八卷説亦名準經義推説唯除不輕行成就得六根清淨更增壽命已去不在其限何以故已下所引經俱就最大惡世界佛滅度後正法滅後一切十二種最大邪見顛倒衆生有大勢力時競興滅佛法時所説經等説已下準依法華經不輕菩薩品一品於佛滅度後正法滅後增上慢比丘有大勢力時嘆法利益略説讚嘆學不輕行功能利益廣説已下準依迦葉經一部通上及下第一卷於佛滅度五百年後惡賊狗菩薩時求正善佛法有一種最大邪惡名字第一第二卷於出家人內前嘆法利益讀誦經典修禪智慧不噵五百比丘唯純遍學之唯噵五百比丘唯純遍學三空門等四天下一切俗人俱出家盡不噵四天下一切出家人俱唯純遍學之毀呰供養舍利塔廟與法華經不輕菩薩品嘆法利益略説所為人同一種相似後讚嘆三空門等四天下一切出家人皆住深忍悉行少欲知足之行俱不供養舍利不禮塔廟乃至一拜舍利塔廟過七日已後俱沒入於地盡唯除在家人供養舍利塔廟不在其限義具足文有具足不具足與法華經不輕菩薩品讚嘆學不輕行功能利益廣説所為人同一種相似已下準依佛藏經與多部經義同一部通上及下於佛滅度後六師外道增上慢邪魔惡賊時求正善佛法有十三種最大邪惡名字文當先明無明名相法次下經文説文當於聖法中拔斷一切諸見根本悉斷一切諸語言道如虛空中手無觸閡諸沙門法皆應如是次下經文説文當三空門第一義空以前迦葉經等驗之義當佛遣一切出家人皆應唯純遍學無名相法亦名三空門亦名第一義空坐禪與法華經不輕菩薩品讚嘆學不輕行功能利益廣説所為人同一種相似第四卷囑纍品前經文説已上人語引經説已下唯是經文説身證法者無有疑悔我聽是人高坐説法雖是凡夫清淨持戒心不貪著外道經義一心勤求沙門上果不貪利養善巧定説多聞廣喻猶如大海乃至失命猶不忌語不樂諍訟自利利他唯説清淨第一實義所説如是亦如是行舍利弗如是説者我聽説法已下人語引經説與法華經不輕菩薩品嘆法利益略説所為人同一種相似又上兩部經第三卷第三大段第三段第三子段十三子句內第七子句具足出之已下準依大方廣十輪經一部通上及下於五濁諸惡世界遠離於佛一切人民皆悉起於斷常心常遠離棄捨真實一切法味常為煩惱及諸邪見或細所覆歸依六師傷敗聖道趣向三惡常行誹謗語旃陀羅無慚愧僧以驢準狗驢菩薩時第三卷文當除其多聞及持戒者見破戒比丘得清淨智慧法眼況復為開示説種種法第四卷文當持戒清淨有功德者供養恭敬聽受言教住大乘者持戒多聞言辭清辨與如此人對相歡娛則心悅樂咨問義論敬受教誨遠離破戒非梵行者第五卷文當有戒壞見不壞有見壞戒不壞有內心修道戒見俱不壞第二凡夫清淨僧與法華經不輕菩薩品嘆法利益略説所為人同一種相似第六卷文當乃至未得法忍於其中間願莫受身乃至斷事處等與法華經不輕菩薩品讚嘆學不輕行功能利益廣説所為人同一種相似已下準依大薩遮尼揵子經卷有大小不定於末世正法不行唯有三種顛倒衆生時第三卷末已下唯是經文説有大沙門釋迦子有大名稱如來應供正遍知彼諸弟子比丘比丘尼於彼瞿曇法中住者是真沙門能行正道利益衆生是福田者能知正法是如法語者大王當知除彼沙門瞿曇法外餘諸一切娑婆羅門等是名邪道非實沙門非法語者不應取語何以故大王當知彼無正法云何能得如法之語已下人語引經説與法華經不輕菩薩品讚嘆學不輕行功能利益廣説所為人同一種相似已下唯是經文説少有隔越應於國內處處求推有大智慧沙門王應自往彼沙門所若不自往當遣大臣王子貴人人所重者詣彼沙門宣王渴仰尊重之心將至王所若彼來者王應迎逆禮拜問訊盡恭敬心盡尊重心已下人語引經説乃至下經文説出大智慧沙門大智慧分齊諸王論法分齊唯噵教行法行王學十善法斷十惡法更不説餘法與法華經不輕菩薩品嘆法利益略説所為人同一種相似等説驗之所以得知又最大惡世界惡時惡衆生內嘆法利益略説者或一部或一品或一卷或一段暫説少説所以名為略説讚嘆不輕行功能利益廣説者或盡一部或盡一品或盡一卷或盡一段唯純説惡説邪善唯純説當出世間根機正對治藥及出世間有緣根機所以名為廣説準依上下能起教人四子句所引經兼準依餘多部經等説又準依多部經論等説於最大好世界好時好衆生內讚嘆學法功能利益廣説嘆不輕行利益略説返上即是易解不須引證四者不輕菩薩由於最大惡世界惡時惡衆生內起教故又由常唯純遍學當一切十二種最大邪見顛倒衆生出世間根機正對治藥及出世間有緣根機行故文當義當現身即得聞法受持現身即得六根清淨現身即得更增壽命已後即得常值諸佛從一佛國至一佛國乃至成佛準依上能起教人三子句所引經等多部文義具足廣説又一切空見有見衆生在家人受五戒法須奏至尊乃至須語家人準依善生優婆塞經第三卷説父母不聽不得出家準依維摩經第一卷説又四分律第二分第八卷説佛本父母不聽出家至年十九不問父母暗自出家成佛驗之在家人若準依前經文説父母不聽不得出家若準依後律文説在家十九年學持戒不犯常求父母出家過十九年不得已後亦得同佛不問父母暗自出家乃至盡形持戒修道年年轉勝者準經律驗之亦應得出家無罪此句準經律義推説又一切空見有見衆生莫問出家在家但能依佛教者皆得出世何以故準依摩訶衍經論第十三卷內説寧出家犯戒後作出世因緣準依寶梁經第一卷迦葉經第一卷等説於一切出家人內有犯戒者畏受他一切信施和南禮拜等最大多罪故返戒還俗從此已後畢竟永得出世驗之所以得知唯除為修道難易不同故明勝劣不在其限出家修道易所以經律論等俱説出家勝在家修道難所以經律論等俱説在家不如又一切空見有見衆生道俗一者常唯認學一切諸佛菩薩等正善佛法金剛與一切虛空大地等常不認唯學一切空見有見衆生邪善佛法金剛與一切虛空大地等準依一切經律論説亦名準經以人驗法説二者常不認一切怨親金剛與一切虛空大地等從無始世界已來一切三界衆生俱作父母兄弟姊妹夫妻男女遍準依觀佛三昧海經第六卷等説三者常不認一切所犯戒惡亦準依下第六子句十惡四重五逆誹謗正法毀呰賢聖罪亦準依第三卷第三大段第二段第三子段最大多罪因最大多阿鼻地獄果不應食用而食用真善清淨持戒出家人現前僧常住僧飲食財物罪不治罰逮然相別破戒邪善持戒比丘而與之共住罪金剛與一切虛空大地等已上人語引經説已下唯是經文説十方虛空法界及大地土山河藂林盡未為籌大如最小下微塵尚可知數除諸佛等無能知我所犯戒十方無邊我所犯戒亦復無邊微塵無數我所犯戒亦復無數衆生無邊我所犯戒亦復無邊方便無邊我所犯戒亦復無邊法性無邊我所犯戒亦復無邊已下引經證準依大方等陀羅尼經與多部經義同第四卷等説四者常不認一切能犯戒人空見有見衆生金剛與一切虛空大地等準依大方廣十輪經一部通上及下第二卷説一切人民皆悉起於斷常準依大般涅槃經第卅四卷兼準依餘部經等説準經驗之不就一切不得聞佛法衆生説唯就一切得聞佛法衆生説以空見驗有見空見有見衆生莫問得受人天身多少以本收末以末收本未墮十方一切阿鼻地獄等遍盡罪猶不盡不得出畏一切惡畏一切苦性未破已前常不免善惡俱惡準上經文驗之與世間之義為一闡提五逆罪説同準下經文驗之與恆河第一人常行惡故同已下唯是經文説少有隔越佛觀衆生具足善法及不善法是人雖具如是二法不久能斷一切善根具不善根有人捨身還得人身捨三惡身得受人身諸根完具生於中國具足正信能修集道修集道已能修正道修正道已能得解脫得解脫已能入涅槃護持禁戒精勤不懈不犯四重不作五逆不用僧鬘物不作一闡提不斷善根信如是涅槃經典如扴上土捨人身已得三惡身捨三惡身得三惡身身根不具生於邊地信邪倒見修集邪道不得解脫常樂涅槃毀戒懈怠犯四重禁作五逆罪用僧鬘物作一闡提斷諸善根不信是經如十方界所有地土又有人言信大般涅槃經唯如抓上土即一切道俗等信者是不信大般涅槃經如十方世界所有地土即一切六道衆生中不得聞不得見及得聞得見不信者是乃至一切聖人中斷常未盡者俱是如十方世界所有地土此語不然何以故經文説作一闡提斷諸善根不信是經如十方世界所有地土人中鈍根者尚非是一闡提何況得就六道衆生説天中猶尚不斷善根何況得就聖人説文當斷善根者非是下劣愚鈍之人亦非天中及三惡道破僧亦爾驗之所以得知又經文噵信不具足名一闡提從年草得聞大乘經至年五十四唯見道俗利根解佛法者信大般涅槃經所説最大多善自言我信涅槃我信佛性故知非是一闡提不見有一箇道俗利根解佛法者信大般涅槃經所説最大多惡自言我是一闡提以一闡提多少分齊驗之即是信不具足故名為一闡提如十方世界所有地土又於佛法中或由信不具足故或由不合受好名利徒衆勝他而為求名利徒衆勝他等故學佛法或由不合分別解説佛法是非好惡長短而分別解説佛法是非好惡長短等者俱不免作佛法外邪魔六師外道空見一闡提不信大般涅槃經如十方世界所有地土準依此句上生於邊地如十方世界所有地土驗之準依第三卷第三大段第三段第三子段十三子句內第七子句所引十一部經等以因驗果説所以得知又一切空見有見輕重常不定準依佛藏經與多部經義同第三卷空見輕有見重文當斷滅見者多疾得道何以故是易捨故準依菩薩地持論第一卷空見重有見輕等説又準依大方廣十輪經一部通上及下第六卷説文當便起斷見言無因果以是因緣於多劫中常墮惡道受無量苦已下人語引經説以上經文驗之空見有見衆生從得免三惡道已後二俱於多諸佛菩薩所學捨邪歸正不能得徹到成就已下人語引經説已下唯是經文説雖復供養過去諸佛及大菩薩摩訶薩衆乃至懺悔受持禁戒得聞佛法自學教他但以誹謗餘業障故不能得趣寂滅涅槃及禪定樂已下人語引經説又一切空見有見衆生多少常不定何以故若值一國土一切道俗俱信空盡即學空滅却有盡若值一國土一切道俗俱信有盡即學有滅却空盡若值一國土一切道俗俱信大乘盡即學大乘滅却小乘盡若值一國土一切道俗俱信小乘盡即學小乘滅却大乘盡乃至餘一切佛法等亦如是類以可知何以故準依人相傳説蔥嶺已西同是佛弟子猶有國土唯信大乘不信小乘唯信小乘不信大乘等説驗之所以得知五者常不認學一切邪善佛法金剛與一切虛空大地等有見菩薩摩訶薩已能得見無量無邊百千萬億諸佛即於爾許諸佛所學布施持戒忍辱精進禪定智慧猶不信佛呰毀波若波羅蜜故即是毀訾過去未來現在諸佛一切智一切種智故則破佛寶破法寶破僧寶信邪魔不信不解波若不斷三毒自高輕他有見比丘已能度得六百萬億四萬億道俗猶不免誹謗正法毀訾賢聖墮十方一切阿鼻地獄等遍盡罪猶不盡不得出準依摩訶衍經泥黎品佛藏經與多部經義同往古品等説又從此已後由種種因緣具足故還於爾許諸佛所誹謗正法毀訾賢聖滅一切三寶殺一切衆生滅却爾許善盡始墮十方一切阿鼻地獄等遍盡罪猶不盡不得出何以故準依大集經第卅一卷説學出世間正解正行菩薩發菩提心見佛學六度及時節等多少俱與此泥黎品有見菩薩同由一度謗小乘經作邪魔法五萬七千億歲作邪魔誹謗正法毀訾賢聖猶未墮阿鼻地獄驗之所以得知又一切邪善雖不得受出世間果報得受世間人天果報若不滅却盡終不得墮十方一切阿鼻地獄等遍盡罪猶不盡不得出六者常唯認一切最大輕罪不認一切最大重罪金剛與一切虛空大地等若作十惡若驅破戒邪善持戒比丘還俗若瞋罵打破戒邪善持戒比丘若殺破戒邪善持戒比丘若犯四重五逆罪若食用三寶飲食財物若誹謗正法毀訾賢聖準依觀佛三昧海經第九卷罪輕重不相當由罪名相當故引之作證大般涅槃經第九卷大方廣十輪經第五卷等説俱得罪重準唯除懺悔得滅障不得受人天果報罪證驗時節分齊唯除神鬼魔與作滅罪證驗時節分齊與第三卷第三大段第二段第一第二兩子段一日一夜七日草五日八十七日九十七日一形懺悔即得滅罪證驗時節分齊同滅障人天罪準經以因驗果以果驗因説神鬼魔與作滅罪證驗準依九十六種道經一部灌頂經一部通上及下大般涅槃經邪正品佛藏經與多部經義同第二第三第四卷等説已外懺悔一切阿鼻地獄罪於佛所十萬億歲等晝夜六時如救頭然懺悔罪猶不得滅不免還墮阿鼻地獄準依月燈經第十卷於阿鼻地獄前説準依佛藏經與多部經義同第三卷於阿鼻地獄後説七者常不認從得免三惡道已後得見佛捨邪歸正及時節多少分齊金剛與一切虛空大地等若就斷正使説於無量無邊恆河沙諸佛所學捨邪歸正猶未能得徹到成就亦名未解佛法正義亦名未得佛授記亦名未得法忍從此已後復於不可計不可數恆河沙諸佛所學捨邪歸正始能得徹到成就亦名始得解佛法正義亦名始得佛授記亦名始得法忍準依佛藏經與多部經義同往古品思益經第二卷大雲經第五卷大方廣十輪經第六卷等説若就斷習氣説增上慢菩薩聲聞緣覺寂滅菩薩聲聞緣覺乃至得入八地猶未是學初地及與十地等亦未是學八地寂滅樂門亦未得佛勸何以故準經驗之若學如來藏佛性當來佛佛想佛普真普正八種佛法兼學一切別真別正佛法等自然不須佛勸由學一切別真別正乃至一切緣因佛性六種佛法習氣顛倒未斷所以噵乃至得入八地猶未是學初地及與十地等準依第一卷第一大段第三段第三子段所引經以前驗後以後驗前亦名以凡驗聖以聖驗凡亦名以因驗果以果驗因準依此第二卷第二大段第二段第三子段能起教八種六種佛法及十子句準依第三第四卷第三大段第二段第三子段最大多罪因最大多阿鼻地獄果四子句第三段第三子段前十三子句後六子句所引經等説驗之所以得知又於八地中準經驗之有四種人一者一乘根機菩薩不須佛勸準依大般涅槃經説第十一卷先明一闡提定不可救次明二乘不定後明菩薩莫問值佛聞法不值佛聞法俱得出世第草六卷先明二乘不定從須陀洹果已去説次明一闡提定不可救後明菩薩不須救第卅二卷明六住諸菩薩通凡及聖俱不假人法自能得度勝鬘經過半卷已後菩薩不因他自能得度大方廣佛華嚴經地前凡夫菩薩十住品即自開解不由他悟等説驗之於凡夫時猶尚不假人法自能得度何況八地二者先少有一乘根機衆生退入一切第二階佛法作三乘根機菩薩聲聞緣覺得佛勸三者增上慢菩薩聲聞緣覺不得佛勸四者寂滅菩薩聲聞緣覺不得佛勸準依十卷楞伽經第七卷兼準依餘部經等説準依摩訶衍經論第二卷説舍利弗等已能斷得正使已得出世間聖道果佛猶噵世世心䩕不可移轉驗之準依菩薩地持論第八卷住品説二障三處過未後一過煩惱障最上菩薩住過智障如來住過驗之準依十地論初地第一卷説是處有微智障故不自在對治此障故説佛地驗之準依法華經第二卷説舍利弗聖人猶噵將非魔作佛惱亂我心耶驗之準依大般涅槃經第卅卷説阿難比丘猶為魔或惑驗之準依付法藏經第三卷説憂波毱多阿羅漢聖人猶不免錯禮魔佛作真佛等説驗之所以得知一切第三階佛法空見有見增上慢菩薩聲聞緣覺寂滅菩薩聲聞緣覺若就一切正使説小乘從得須陀洹果已去大乘從得初地已去一者唯就一切內説始能斷得一切三毒如噎病及大小便不通病邪見顛倒二者唯就一切外説始能斷得一切神鬼魔邪見顛倒若就一切習氣説乃至成佛始能斷得一切內外四種邪見顛倒盡八者常唯認一乘破戒不破見正見成就凡夫三乘破戒不破見破見不破戒亦正亦邪凡夫由利根故設使不免墮三惡道暫入即得出於三惡道內亦得聞佛法亦得為他説佛法金剛與一切虛空大地等準依未曾有經第一卷大方廣佛華嚴經十地品初地等説常不認空見有見衆生由利根故但使不免墮三惡道即不免墮十方一切阿鼻地獄等遍盡罪猶不盡不得出準依此句上第五子句泥黎品往古品等説又明墮十方一切阿鼻地獄等遍盡於一一地獄內時節多少分齊準依第三卷第三大段第二段第三子段最大多罪燉煌所傳三階佛法卷三本寫本巴里國民圖書館藏氏搜集燉煌出土古寫本目録第二百五十九號屬首部破爛幸三階佛法第三尾題存四卷三階佛法中一殘卷標炳前出大英博物館藏氏搜集三階佛法卷二假題續篇示等三階佛法四卷題燉煌所傳本邦所傳全相異曩第一部四三階教籍性質一指摘如今試燉煌所傳三階佛法注釋三階佛法密記傳四卷三階佛法綱領對照本寫本卷末準依此第三子段十三子句初六子句所引經等説十一部經説邪盡顛倒四部經説出顛倒準依此第七子句末第四卷初所引中略純顛倒正密記第三大段第三段並卷三卷四分卷相當其他大段段子段子句引例亦悉四卷三階佛法科段一致乃知本殘卷要部三階佛法第三大段第三段第三階出世子段屬密記其略目舉於中初具明八種佛法次明學別十三子句初五子句即明五種不救等傳一一本殘卷文符合尚第一部五現存三階教籍斷片參照本寫本亦邪耶殺煞作等唐寫本常例今一一舉但本書著者筆寫本再校據以誤脫保難切來賢是正俟四卷説文當大慧如是等三阿僧祇百千名號不增不減此及餘世界皆悉知我如水中月不出不入彼諸愚夫不能知我墮二邊故然悉恭敬供養於我已下人語準經説於此句經文內所知之佛有兩種一者義當真佛以真攝應佛義具足盡文當如是等三阿僧祇百千名號不增不減我如水中月不出不入二者義當應佛以應攝真王宮生雙樹滅道俗凡聖俱定佛義不具足盡文當我墮二邊故然悉恭敬供養於我能知之人亦有兩種一者智人以真攝應真應發信文當此及餘世界皆悉知二者愚人以應攝真信應不信真文當彼諸愚夫人能知驗之已下準依法華經第二卷舍利弗聖人猶畏魔或大般涅槃經第卅卷阿難比丘猶為魔或付法藏經第三卷憂波毱多阿羅漢聖人猶不免錯禮魔佛作真佛等説驗之所以得知又何以故一切三乘根機衆生於十二部經等名法內唯以文攝義不以義攝文準依四卷楞伽經第四卷説聲聞緣覺隨文字驗之準依像法決疑經與多部經義同過半卷以前説文當諸惡比丘不解我意執己所見宣説十二部經隨文取義作決定説當知此人三世諸佛怨家速滅我法以邪驗正説所以得知又何以故準經以法驗人説一切三乘根機衆生於佛法僧衆生等相法內唯以相攝體不以體攝相準依此句上十二部經等名法以名驗相説又已下唯是經文説以此善根與我作於三菩提因我今憐愍諸衆生故以此報果分作三分留一分自受第二分者於我滅後與禪解脫三昧堅固相應聲聞令無所乏第三分者與彼破戒讀誦經典相應聲聞正法像剃頭著袈裟者令無所乏已下引經證準依大集月藏分經第十卷末説又一切第二階佛法一切經律論皆悉普見是噵出家人有作僧官都統法第三一切利根邪見成就常沒顛倒空見有見衆生近則乃至未斷正使盡未得法忍已來遠則乃至未斷習氣盡未得成佛已來準依第二卷第二大段第二段第三子段末十子句第七子句所引經等説若學一切名相別真別正佛讀經誦經講經講律講論歸僧度衆生斷惡修善解行求善知識與出家人作師僧上坐寺主法師律師論師禪主及章疏問答人俱名九十六種道亦名神亦名鬼亦名魔亦名六師外道惡賊狗菩薩空見有見衆生增上慢衆生旃陀羅無慚愧僧以驢準狗驢菩薩顛倒解義顛倒宣説準依第二卷第二大段第二段第三子段明能起教人所引經等説法俱名邪魔六師外道經法不依法唯依人不依義唯依語亦名綺飾文辭亦名莊嚴文飾準依大般涅槃經四依品第九卷等説亦名五種不淨説法亦名外道嚴飾文辭亦名外道語義亦名外道尼乾弟子非佛弟子亦名巧飾文辭亦名外道經法何以故經文自出人多少分齊文當或有比丘若二若三已讀佛經便使令求外道經法先自看者讚言善好驗之所以得知準依佛藏經與多部經義同卷有大小不定第三卷説亦名於諸外道非義論中起義相想生於信心薰修邪見以為福德準依大薩遮尼乾子經第三卷説亦名不依智唯依識亦名不依了義經唯依不了義經何以故準經驗之一者唯有於一切佛法內似佛法一切空見有見衆生道俗俱將作佛法而非佛法佛判屬邪魔六師外道法始能得滅佛法由一切肉眼凡夫俱不識是非故爾又於一切佛法內設有百千萬句周公孔子等外書方巧言語綺飾文辭及一切佛法已外六師外道綺飾文辭不淨説法乃至經書等俱不能得滅佛法由一切肉眼凡夫俱識是非故爾唯除少分污佛法不在其限準依仁王經説文當大王我滅度後未來世中四部弟子諸小國王太子王子乃是任持護三寶者轉更滅破三寶如師子身中蟲自食師子非外道也驗之二者一切佛一切經以前驗後以少驗多一切菩薩一切道俗一切解行俱不能回得唯有一切阿鼻地獄等始能回得驗之準依此第三子段十三子句初子子句所引經等説準依第二卷第二大段第二段第三子段末十子句第十子句所引經等説三者佛唯為佛弟子説九部經説大般涅槃經除一闡提驗之四者於十二部經內微細之義為諸菩薩説淺近之義為聲聞説世間之義為一闡提五逆罪説準依大般涅槃經第九第卅三卷等説驗之所以得知乃至與在家人作父母等俱非是當一切空見有見衆生出世間根機正對治藥及出世間有緣根機何以故由從無始世界乃至墮十方一切阿鼻地獄等遍盡罪猶不盡不得出畏一切惡畏一切苦性未破已來最略常唯純是一切文當其心顛倒常錯謬故文當常行誹謗語常唯純是一切善惡兩種顛倒常唯純是一切內外四種顛倒最廣一切經律論常説純説顛倒七種最大別惡顛倒六部經説最多顛倒十一部經説常顛倒四部經説出顛倒兩部經説純顛倒兩部經説常顛倒卅二種自他俱見真正住持佛法自利利他顛倒乃至滅破三寶法成三災盡顛倒如似金剛與一切虛空大地等常起不滅故準依第二卷第二大段第二段末十子句第十子句所引經準依此第三子段十三子句第七子句所引經及前十三子句後六子句所引經等説又於最大惡世界惡時一切空見有見衆生內學一切第三階佛法真善剎利輔相大臣真善沙門真善婆羅門真善居士亦名灌頂剎利王亦名行法行王等即是此第三子段上第一第二兩子段一切第一第二兩階佛法一乘三乘根機衆生攝非是一切第三階佛法空見有見衆生攝準依大方廣十輪經第二第四第六卷大薩遮尼乾子經第三第四卷大集月藏分經第八第十卷等説又準經驗之一切空見有見衆生從得法忍已去正學一切普真普正佛法兼學一切別真別正佛法不在其限準依大方廣十輪經第六卷從得法忍已去驗之準依法華經不輕菩薩品從得聞法受持六根清淨已去驗之準依佛藏經與多部經義同第四卷聖人真善正見成就凡夫佛俱聽高坐説法驗之所以得知又一切空見有見衆生乃至未得法忍已來常唯得純遍學一切如來藏佛性當來佛佛想佛亦名一切普真普正佛讀經誦經講經講律講論歸僧度衆生斷惡修善解行求善知識師僧上坐寺主法師律師論師禪主父母等乃至五種不忓盡佛法亦如是類以可知準依法華經不輕菩薩品説於最大惡時惡衆生內禮敬增上慢四衆作學菩薩行當來佛驗之準依大方廣十輪經通上及下説第二卷於最大惡世界惡時惡衆生內第三卷十種勝想敬出家人作佛想等驗之所以得知何以故釋如來藏佛性當來佛佛想佛一切八種佛法俱是普真普正所由義準依四卷楞伽經第四卷就如來藏説以伎兒身喻如來藏以伎兒伎量喻六道衆生以伎兒身作一切伎量盡喻如來藏作一切道衆生盡乃至以如來藏作一切聲聞緣覺菩薩如來盡亦如是類以可知準依大般涅槃經第卅六卷就佛性説佛性者不名一法不名十法不名百法不名千法不名萬法未得阿耨多羅三藐三菩提時一切善不善無記盡名佛性準依法華經不輕菩薩品就當來佛説一切佛不定一切僧一切衆生俱是當來佛準依大方廣十輪經第三卷大方廣佛華嚴經第八卷明法品等就説佛想佛説一切佛一切僧一切衆生俱是佛想佛大方廣十輪經文當觀出家人作佛想大方廣佛華嚴經文等視衆生上中下類悉如佛想恭敬供養和上諸師及善知識菩薩法師念念次第如一切智但使有心學者莫問凡聖邪正大乘小乘利根鈍根俱得常無一偈一句一字一分一豪毫顛倒錯謬俱得出世間一種相似釋上下七種佛法亦如是類以可知又一切八種佛法一者如來藏佛性當來佛佛想佛佛法準依上此句內所引經等説二者普真普正佛法準經義推説三者無名相佛法四者於聖法中拔斷一切諸見根本佛法五者悉斷一切諸語言道佛法準依佛藏經與多部經義同第一卷説六者一人一行佛法準依法華經不輕菩薩品説七者無人無行佛法八者五種不忓盡佛法準依大方廣十輪經第六卷説又何以故常唯得純遍學一切八種佛法即是佛讀經誦經講經講律講論歸僧度衆生斷惡修善解行求善知識師僧上坐寺主法師律師論師禪主父母等準經驗之一切八種佛法以本收末俱是如來藏佛性所作如來藏佛性即是佛體經律論義歸僧度衆生斷惡修善解行求善知識師僧上坐寺主法師律師論師禪主父母等體所以常唯得純遍學一切八種佛法即是佛乃至父母等此句準經義推説又一切如來藏佛性當來佛佛想佛亦名普真普正佛法亦名無名相佛法亦名於聖法中拔斷一切諸見根本佛法亦名悉斷一切諸語言道佛法亦名一人一行佛法亦名無人無行佛法亦名五種不忓盡佛法正是當一切空見有見衆生出世間根機正對治藥何以故由從無始世界乃至墮十方一切阿鼻地獄等遍盡罪猶不盡不得出畏一切惡畏一切苦性未破以來最略常唯純是一切文當其心顛倒常錯謬故文當常行誹謗語常唯純是一切善惡兩種顛倒常唯純是一切內外四種顛倒最廣一切經律論常説純説顛倒七種最大別惡顛倒六部經説最多顛倒十一部經説邪盡顛倒四部經説出顛倒兩部經説純顛倒兩部經説常顛倒卅二種自他俱見真正住持佛法自利利他顛倒乃至滅破三寶法成三災盡顛倒如似金剛與一切虛空大地等俱得常不起故準依此第三子段十三子句內第七子句所引經等説又一切如來藏佛性當來佛佛想佛亦名普真普正佛法亦名無名相佛法亦名於聖法中拔斷一切諸見根本佛法亦名悉斷一切諸語言道佛法亦名一人一行佛法亦名無人無行佛法亦名五種不忓盡佛法正是當一切空見有見衆生出世間有緣根機何以故由一切空見有見衆生道俗與一切三界衆生從無始世界已來俱作父母兄弟姊妹夫妻男女遍驗之所以得知準依觀佛三昧海經第六卷等説一者一切佛俱不能救得空見有見衆生何以故準依大方廣十輪經第四卷説一切佛不能救得準依摩訶衍經埿梨品等説有見菩薩摩訶薩已能得見無量無邊若百千萬億諸佛猶不信佛謗波若信邪魔不斷三毒墮十方一切阿鼻地獄等遍盡罪猶不盡不得出等驗之所以得知一切佛俱不能救得空見有見衆生二者一切經俱不能救得空見有見衆生何以故準依上經文説是大般涅槃微妙經典能除一切衆生惡業四波羅夷五無間罪唯不能令一闡提輩安止菩提下合喻而不能治必死之人次下經文説一切契經禪定三昧而不能治犯四重禁五無間罪下經文説大涅槃經亦復如是若有衆生犯四重禁五無間罪悉能消滅唯除大龍一闡提輩驗之復以空見驗有見即是莫問大乘小乘經俱不能除滅空見有見衆生四重五逆等罪驗之又佛唯噵為佛弟子説九部經説大般涅槃經除一闡提驗之準依大般涅槃經第九卷內説又佛噵我亦常為善星空見衆生説真實法者實不為一切第三階佛法內恆河第一人常沒顛倒空見衆生第二人常沒顛倒有見衆生説真實法唯為除衆生噵佛不平等誹謗故為一闡提説真實法而實不為一闡提説真實法已上人語引經説已下唯是經文説大王世尊亦爾一闡提輩善知根性而為説法何以故若不為説一切凡夫當言如來無大慈悲有慈悲者名一切智若無慈悲云何説言一切智人是故如來為一闡提而演説法已下人語引經説一闡提有兩種一者利根二者中根餘準依第二卷內説又經文噵於十二部經內微妙之義為諸菩薩説淺近之義為聲聞説世間之義為一闡提五逆罪説現在世中雖無利益以憐愍故為生後世諸善種子驗之又空見善星比丘已能讀得誦得十二部經分別解説十二部經已能斷得欲界煩惱獲得四禪猶不解一偈一句一字之義謗佛法現身即墮阿鼻地獄驗之準依大般涅槃經第卅三卷説又善星比丘莫問真應俱是為與空見有見衆生作軌則法故又學多聞求菩提者能滅四乘善根盡是世俗攝福德持戒禪定等莫問具足不具足俱是第一義攝何以故一切第一第二兩階佛法內莫問凡聖邪正讀經誦經講經講律講論俱得出世又復一切甚深大乘經等俱噵智慧勝福德不如驗之所以得知此經明智慧不如福德勝者即是為空見有見衆生説又已能誦得大乘法聚滿足八萬已能誦得小乘法聚滿足八萬由不斷三毒瞋他十二頭陀比丘經文但道墮地獄準經驗之即是墮阿鼻地獄從阿鼻地獄出復受惡羅剎身乃至賢劫千佛出世盡始得免墮三惡道準依大集月藏分經第一第六卷等説驗之所以得知莫問一切大乘小乘經俱不能救得空見有見衆生三者以前驗後以少一切驗多一切一切菩薩俱不能救得空見有見衆生何以故已上人語引經説已下唯是經文説彌勒為上首一切皆悉起欲有留難時我等不能遮已下人語引經説以此文驗所以得知一切菩薩俱不能救得空見有見衆生準依大集月藏分經第十卷説四者以前驗後以少驗多一切道俗俱不能救得空見有見衆生何以故有見比丘已能度得六百萬億四萬億道俗猶不免誹謗正法毀呰賢聖墮十方一切阿鼻地獄等遍盡罪猶不盡不得出等驗之準依佛藏經與多部經義同第三卷説又準依此句下第五子句內已能度得九十五種異學六師外道回心向於涅槃猶是無慚愧僧阿鼻地獄衆生攝驗之所以得知一切道俗俱不能救得空見有見衆生五者以前驗後以少驗多一切解行俱不能救得空見有見衆生何以故有見菩薩摩訶薩等於無量無邊若百千萬億諸佛所學布施持戒忍辱精進禪定智慧猶不信佛謗波若信邪魔不斷三毒墮十方一切阿鼻地獄等遍盡罪猶不盡不得出驗之準依摩訶衍經埿梨品説又大敬信三寶大持戒大無是非大有解行大發菩提心大懺悔大斷惡大度衆生已能度得九十五種異學六師外道回心向於涅槃非一轉輪聖王所有功德之所能及以度衆生多少分齊及喻説驗之四天下無與等者以上經文驗之猶是無慚愧僧攝非是佛弟子即是佛所不攝衆生以下經文驗之猶是阿鼻地獄衆生攝驗之所以得知一切解行俱不能救得空見有見衆生準依大方廣十輪經第五卷説又一切空見有見衆生出家人內唯除最大鈍根衆生兩種啞羊僧觀勸化斷理僧事及與佛法和上阿闍梨以上驗下及後經文説文當若有愚癡不知善不善教令誦習義當教啞羊僧學讀經誦經以三乘法自利利他下在其限準依大方廣十輪經第二第五第六卷等説又一切空見有見衆生出家人內若無啞羊僧可得於利根出家人內合作僧使者各各一年勸化斷理僧事及與佛法和上阿闍梨讀經誦經以三乘法自利利他然後學普真普正佛法唯純遍求出世亦不廢出世不在其限此句準經義推説六者通上及下一切空見衆生已上人語引經説已下唯是經文説爾時復有大士聰明智慧從坐而起合掌叉手而發誓言我等雖在生死不得法忍已來於其中間願莫受身莫作輔相大臣乃至令長村邑聚落等主不作國師軍幢將師長宿之處不作祠祀主俗客商人處不作居士處不住庶人處不作斷事處若不得法忍不於衆生居自在處若作是等則於佛法名重因緣必當墮於阿鼻地獄又一切空見有見衆生在家人內唯除行法行王等依一切第三階佛法最大輕治罰道俗最大深敬佛弟子出家人住持三寶住持國主利益衆生不在其限準依大方廣十輪經第六卷大集月藏分經第八第十卷大薩遮尼乾子經第三第四卷等説又一切空見有見衆生在家人內莫問貴賤俱開文當佛遣剎利婆羅門毗舍首陀乃至聚落主等學觀如來藏佛性當來佛亦名普真普正八種佛法最大深敬不得與共住簡最大輕治罰破戒邪善持戒比丘準依大集經第草七第草九卷兩段護法品大乘方等日藏經第一卷護正法品等説七者一切空見有見衆生已下文當求佛求世間果報乃至求涅槃一名惡欲準依迦葉經第一卷已下文當念佛念法念僧念戒念施念天斷惡修善乃至求寂滅涅槃二名邪教三名惡知識四名謗佛五名助於六師外道六名亦為他人説邪道法七名不聽受一飲水以自供養八名增上慢教九名順行魔教次下經文説十名文當乃至善不善法於聖法中名惡不善準經驗之即是有見衆生與大般涅槃經第卅四卷文當佛觀衆生具足善法及不善法是人雖具如是二法不久能斷一切善根具不善根準經驗之即是空見有見衆生文義具同一種相似次下經文説十一名文當舍利弗諸佛何故説諸語論皆名為邪不能通達一切法者是則皆為言説所覆是故如來知諸語言皆為是邪乃至少有言語不得其實已上十名準依佛藏經與多部經義同第一卷説次下經文説十二名文當讀經誦經亦名不淨説法讀經誦經前後不定準依佛藏經與多部經義同第一第二卷等説次下經文説十三名文當遇惡知識而墮其教不與佛衆而共和合於正見中生邪見想於邪見中生正見想覆藏瑕疵多欲多求以財自治惡魔知心為作方便一味僧寶分為五部既有五部則生諍訟互相是非論説過失已下人語引經説準上準下驗之增上慢人偏執文當利根喜藥樂難問推求佛法第一實義準經驗之即是有見衆生與大般涅槃經第卅五卷偏執一闡提文當聰明黠慧利根能善分別種種佛法準經驗之即是空見衆生文義俱同一種相似已上純邪無正已下邪正並有一切第二階佛法三乘根機衆生以前驗後若學別説五部戒律分別解説十二部經文當我涅槃後有弟子受持如來十二部經顛倒解義顛倒宣説覆隱法藏始從曇摩毱多乃至摩訶僧祇如是五部雖各別異而皆不妨諸佛法界及大涅槃等説驗之所以得知次下經文説但樂尊重和上阿闍梨讚其功德以求名利十四名準經驗之講經講律講論等亦名不淨説法即五種不淨説法乃至得罪過於殺三千大千世界滿中衆生等是已上二名準依佛藏經第二第三卷像法決疑經減半卷已前俱與多部經義同大集經第草五卷等説已上人語引經説已下唯除子注已外唯是經文説少有隔越不次第抄盡有三種人聞説是經心不喜樂一者破戒比丘二者增上慢人三者不淨説法及貪著我者是人遠離於此實相深經是經於如來滅後能令清淨持戒比丘心生喜樂常行攝持毀破戒者常所遠離所以者何癡人聞説真實正語則以為苦舍利弗破戒比丘所成相貌如來於此已具廣説破戒比丘不樂持戒增上慢者不欲聞此無憍慢法若聞驚畏如墮深坑好世利者貪著美味聞呵訾食心則憂惱若人好讀外經書者則於其中生堅實想貪著語者樂説散亂樂嚴飾辭巧美諸者於佛第一義則無淨心譬如不男之人至男子中生不男想是諸人等如我無異輕慢清淨持戒比丘何以故外道經書無真實語法應憍慢貢高自大於一切處又下經文道不信有功德有準經驗之不信一切道俗決定心常唯純遍求出世間功德不信有功德如不男人於諸人中皆謂如已是人入於邪際求外道論樂衆閙語增長煩惱惡性惡法破戒比丘增上慢比丘自以此事為上不淨説法者受尼揵子論若執一事堅持不捨貪貴著世利樂讀經書不能通達諸法實相若能信受無相法者有是處若有比丘耆年有德比丘中龍有深智慧是人能信無所有自相空法無我無人法何以故是人不樂衆閙雜語不樂讀經睡眠多事不為白衣營執事務不為使命持送文書不行醫術不讀醫方不為販賣不樂論説世間説言但樂欲説出世間語是人能信一切法空能證真實際則能如實正師子吼非野干吼若有比丘著外經義是人為捨微妙佛法誦持外道語言為大衆説但作野干吼如是惡人名為朽壞沙門何以故是外道義非佛法故若著外道法比丘不應自稱是佛弟子何以故沙門釋子不説尼揵子語於大衆中但説佛語若人著不淨語欲作師子吼但作野干鳴是人不能解佛法第一義舍利弗我今明了告汝若人具足持戒禪定智慧不慳不貪不染恚癡不懷諂曲有厭惡心言必真實常樂獨處不樂睡眠樂空無相無願無生無滅行生深欲心求解佛法第一義不好世語樂出世語盡持諸戒一切惡事及惡知識悉皆遠離住如是法則能解空無所有法或不見他過忘生是非或以濁恚嫉心説他惡名或不能知佛經義理謂非佛法如是重罪餘報因緣雖勤精進猶尚不能取所緣相何況繫心能得道果於未來世當有比丘善護二百五十戒是人懈慢心生而作是念我是持戒餘人不爾輕於他人心無恭敬我是多聞彼非多聞舍利弗爾時多有比丘但貴持戒多行阿蘭若行能善護戒亦隨所説行勤心讀經求通佛法如是人等生多聞慢阿蘭若慢互相出過謂彼破戒破見破命破威儀如是僧中有好比丘心無偏黨處在中間而亦謂之在彼惡中或相譏論諍訟不息爾時多有比丘一歲二歲三歲乃至九歲輕慢上坐無有恭敬是人出家受戒不如法習效和上阿闍梨亦無恭敬互相輕慢無有恭敬相違逆故我法則滅多起破法罪業當墮惡道舍利弗我今明了告汝求自利己善行比丘當爾之時不應入衆乃至一宿唯除阿羅漢及病比丘於中有緣當爾時人貪欲瞋恚愚癡毒盛不活畏常所逼切求利善人常應自處山林空靜乃至畢命如野獸死舍利弗我今明了告汝我此真法不久住世何以故衆生福德善根已盡濁世在近舍利弗汝今善聽我當語汝若有一心行道比丘千億天神皆共同心以諸樂具欲共供養舍利弗諸人供養坐禪比丘不及天神是故舍利弗汝勿憂念不得自供養真教化當隨順行莫以第一義空出人過惡何以故舍利弗大嶮難者所謂得空或有比丘因以我法出家受戒於此法中勤行精進雖諸天神諸人不念但能一心勤行道者終亦不念衣食所須所以者何如來福藏無量難盡舍利弗如來滅後白豪毫相中百千億分其中一分供養舍利弗及諸弟子舍利弗設使一切世間人皆共出家隨順法行於白豪毫相百千億分不盡其一舍利弗如來如是無量福德若諸比丘所得飲食及所須物趣得皆足舍利弗是諸比丘應如是念不應於所須物行諸邪命惡法已下人語引經説唯得學作不淨觀乃至得納衣乞食若覺有貪心亦不應食用之準依佛藏經與多部經義同第四卷説於中三空門第一義空並説已下準依餘部經説已上人語引經説已下唯是經文説迦葉時四天下一切衆生無有一人住在家者以淨信心離於欲火悉得出家彼諸衆生既出家已不須種殖其地自然生諸粳米諸樹自然生諸衣服一切諸天供侍給使已下人語引經説準依迦葉經第二卷説何以故空見有見衆生乃至未得法忍已來學上此句十四子句等別真別正佛法亦名枝條佛法亦名名佛法亦名相佛法亦名同而異佛法亦名緣因佛性佛法以本收末以末收本最略常唯純是一切文當其心顛倒常錯謬故準依下常顛倒所引經説文當常行誹謗語準依大方廣十輪經第四卷説常唯純是一切善惡兩種顛倒準依第二卷第二大段第二段第二子段所引大般涅槃經大方廣佛華嚴經等説常唯純是一切內外四種顛倒一切內三毒顛倒準依摩訶衍經論卷有大小不定第卅卷三毒如噎病及大小便不通病等説一切外神鬼魔顛倒準依九十六種道經一部灌頂經一部佛藏經與多部經義同通上及下第二第三卷大般涅槃經邪正品神鬼魔作佛作出家人等説最廣一切經律論常説純説顛倒七種最大別惡顛倒準依第一卷第一大段第三段第一第二第三子段已後所引經等説大部經説最多顛倒準依此第三子段十三子句初六子句所引經等説十一部經説邪盡顛倒四部經説出顛倒準依此第七子句末第四卷初所引十一部經四部經等説兩部經説純顛倒準依像法決疑經卷初佛藏經第三卷俱與多部經義同等説乃至無一念求出世求涅槃心兩部經説常顛倒準依大方廣十輪經第二第四卷於一切空見有見衆生有三箇常字文當一切人民皆悉起於斷常心遠離棄捨真實一切法味常為煩惱及諸邪見或惑網所覆歸依六師傷敗聖道趣向三惡常行誹謗語大般涅槃經第卅六卷恆河第一第二人有六箇常字文當常沒常行惡故常為無明所纏繞故其心顛倒常錯謬故常污身口故復有常沒卅二種自他俱見真正住持佛法自利利他顛倒準依第一第二第三第四卷等説於內亦有以人驗法義推説者乃至滅破三寶法成三災盡顛倒準依仁王經第二卷滅三寶長阿含經第六卷三災等説如金剛準依大集月藏分經第八卷初説與一切虛空大地等準依大方等陀羅尼經與多部經義同第四卷出所犯戒惡大般涅槃經第卅四卷大方廣十輪經第二卷出能犯戒人與一切虛空大地等説已上從第七子句初訖此顛倒如不孝反逆惡賊所作惡常將一將切諸佛菩薩聖人正見成就凡夫正善佛法作非是佛法作邪善佛法唯瞋唯罵唯打唯殺常將一切空見有見衆生邪魔六師外道邪善佛法作是佛法作正善佛法而供養守護之準依一切經律論説與金剛波若經論第三卷等説若以色見我以音聲求我是人行邪道不能見如來唯由有有見病未除盡所以是邪道如孝子賢臣君子所作惡常不將一切諸佛菩薩聖人正見成就凡夫正善佛法作非是佛法作邪善佛法常不將一切空見有見衆生邪魔六師外道邪善佛法作是佛法作正善佛法所以不得相比第十六斷片三階佛法密記卷上巴里國民圖書館藏氏搜集燉煌出土古寫本第二千四百十二號三階佛法密記卷上燉煌所傳三階佛法四卷注釋三階教教義研究重要缺教籍一本篇目録中收録龍録內無名經論律據本記元上中下三卷成今唯其上卷存開卷先一示名二舉數三釋義四指文四門三階佛法一部四卷三大段綱領提示略三階教要旨概説惜其細釋第一大段第三段第三子段以終文中三階學僧諗法師所説引用第一部二三階教三百年史中敘如一尚本書體裁內容關第二部二二三階佛法及對根起行法中三階佛法二九三三四其他第一部四三階教籍性質一一六一第一部五現存三階教籍斷片一八八參照用字凡唐寫本常例踏襲
