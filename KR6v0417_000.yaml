body:
  text: 一本邦所傳三階佛法四卷燉煌所傳對根起行法第一斷片無盡藏法略説第八斷片並七階佛名經第四斷片一部除他底本外全對校異本闕二句點返點只管通讀資為試編者加三語句通解難文辭接續闕脫衍覩易魯魚誤等及限補修改訂專文意通達期是等併切江湖是正俟四本編使用略符凡左例如堅説為一階破爛脫佚不明補修右側六號活字以之標入佛法已來脫字推定括弧內六號活字以之標第三段明修衍字推定右側點加即是如來藏異本依脫字補修右側點附恆沙河第七一人異本依語句訂正右側六號活字左側點附能徹倒到斷盡異本依編者私訂正右側六號活字以之標以上外主異本對校保存為冠注加大正新修大藏經例依下記略符使用一貪瞋不生貪瞋無故癡亦不生中略符號二貪瞋不生八字貪瞋無故癡亦不生八字無無字略符三十惡十惡有十惡下有十惡有三字有字略符四能種子能施種子能種子作能施種子作字略符五或惑或恐惑歟歟字略符小引藍吉富三階教是隋代僧人信行所創始的佛教修持團體也是我國第一個具有實踐意味與宗派意識的佛教教派然而由於該教的若干主張與其他佛教徒不合所以雖然具有崇高的宗教精神與宗教狂熱但是曾遭受到隋唐間的數次禁遏而終告滅亡有關該教的典籍在古代也被判為偽經而無法入藏關於該教的內容與歷史在近數百年來的我國佛教界也幾乎完全茫然無知然而五六十年前由於日本矢吹慶輝博士的研究終於使該教重新大白於世三階教典籍也再度為世人所注意矢吹博士曾先後兩次赴英法等國搜求敦煌古代佛教寫本並在該二地發現了三階教的殘卷透過他的研究與整理一部皇皇巨著三階教之研究乃告誕生該書內容主要包含兩大部份其一是研究論文其二是三階教籍的整理前者的中譯本即數十年前墨禪法師所譯的三階教研究一書後者即此處所收的敦煌三階教殘卷與本邦日本所傳三階佛法由於這是近數百年來國內三階教典籍的首度重現國人知道三階教為何物的恐怕不多茲將拙作三階教典籍略介及信行與三階教二文轉載於此以供有意研讀三階教籍者參考三階教典籍略介藍吉富三階教是我國佛教史上的奇特宗派創建於隋朝僧人信行五四五九四其教盛行於隋唐二代有狂熱的信徒及財源充足的經濟組織無盡藏院創始者信行具有頭陀苦行的精神與誓願頓捨身命財的布施情操而且精進忍辱熱心度世因此在隋代得到相當多信衆的支持三階教的主要教義主張時值末法時代即第三階時衆生倒見充斥此時如果研究各經各論往往無法如實得到正解甚至於念佛法門也不適用因為這些法門都是針對第二階衆生所施設的到第三階時代已經過時信行以為生值第三階時代的衆生最適當的修持法門是普敬衆生因為衆生皆本具如來藏在行為方面即須日日不斷地禮佛不是念佛供養衆生布施苦行等這種看法在隋唐二代曾引起佛教界的軒然大波不但義學諸家群起反對即使淨土系佛徒也對之大行口誅筆伐加上該派佛徒之組織較他派嚴密信徒狂熱經濟來源充足因此執政者對之亦甚為側目再經他派佛徒之建議終使該教在隋唐數百年間迭遭政府的禁斷這是我國佛教史上少見的教內宗派迫害事件之一已故日本學者矢吹慶輝為世界上研究該教成績最卓著的學者其三階教之研究日本岩波書店昭和二年版一書搜輯散佚在我國日本倫敦巴黎等地的三階教資料多為敦煌寫本考訂研究終成一劃時代的巨構此處擬就該書所收之三階教重要典籍擇要略作介紹以稍補今存大藏經未收三階教籍之缺憾一信行遺文這是信行所撰的幾段文字主要一段在敘述學習三階教常樂我淨行的方法亦即禮佛布施頭陀行等事此外並述及修持方式如謂坐禪者常坐莫問晝夜一向不得臥禮佛者各各須得淨衣一日一夜三時洗浴莫問晝夜常禮不息除半夜一時臥晝日一時食之多少坐禪禮佛一種唯得一食又信行有關布施之警句誓願頓捨身命財直到成佛亦收在此數段遺文之中原寫本收藏在大英博物館為斯坦因所收集二三階佛法卷二卷三三階佛法為研究該教教義的最根本典籍此二卷即該書殘本原寫本卷二為斯坦因所收集現藏於大英博物館卷三為伯希和所得現藏於巴黎國民圖書館三日本所傳三階佛法四卷此書為日本所流傳之三階教資料為研究該教教義之較完整典籍版本有法隆寺正倉院興聖寺三種茲摘引該書數段文字於此以供參考卷一佛滅一千年已後一切聖人一切利根真善正見成就凡夫悉普滅盡卷三一切第一第二兩階佛法內有一切戒見俱不破有一切破戒不破見兩種正見成就衆生一切第三階佛法內唯有一切行壞體壞戒見俱破顛倒一切一種衆生卷四佛滅度一千年已後一切比丘取我十二部經競共讀誦以上著中以中著下以下著上中著前後非義言義亦如六師外道各言我是當爾之時十二部經雖行於世無有威德四三階佛法密記卷上此書為三階佛法一書的注釋原有上中下三卷今僅存上卷原寫本為伯希和所得現藏巴黎國民圖書館關於該教所謂的三階本書即有注釋云佛在世佛自住持佛法位判是第一階時佛滅度後一千五百年以前由有聖人及利根正見成就凡夫住持佛法位判是第二階時從佛滅度一千五百年以後利根凡夫戒定慧別解別行皆悉邪盡當第三階時五對根起行法此書也是三階教教義典籍今存者不完全僅為殘卷原寫本為斯坦因所得現藏在大英博物館對根起行猶如通常所謂的對症下藥該教認為衆生的根性隨時代的變異而有所不同每一時代的衆生必須修行適合該時代的法門始有效果本書即説明此一原理及其方法者茲徵引該書數段於次別法就根者有二義一者對根明淳益無損二者不當根學別法淳損無益何以故由不當根下人行上人所行法故普法無病者如來藏佛性等體是普法一切凡聖一切邪正同是一體更無別法唯是如來藏一切凡夫莫問根基上下學之淳益無損六無盡藏法略説大乘法界無盡藏法釋此二寫本俱為斯坦因所得現藏大英博物館無盡藏法是三階教根據布施波羅密多所發展出來的法門主張衆生應行布施以了却前生的宿業信徒將財物布施到三階寺院三階寺院則將該等財物用來救濟天下貧苦百姓及補助其他貧窮寺院三階教寺院內有此類財政組織名為無盡藏院即專為處理此等事情的這二種寫本即係説明無盡藏法的文獻茲摘引大乘法界無盡藏法釋之一段文字於次以供參考若不因作無盡藏陪賠無始已來百千生百劫爾許債負何由得了行者今因無盡藏施無始宿債一時頓停不畏債主更為障道業障報障一時頓滅父母兄弟六親眷屬頓出三塗豈非大益七七階佛名經此寫本録三階教徒禮懺勸讀隨喜回向發願之文詞及稱禮之佛名等可供研究三階教儀式者參考原本為斯坦因所得現藏於大英博物館敦煌本三階佛法表解取自佛書解説大辭典卷第一第一大段就根行位分為三段第一段以根對法第二段就行通説此兩段俱文少不分子段第三段就位別説有三階三子段第一子段明第一階根機於中有三五本五末義第二子段明第二階根機於中有五子句前四子句明第二第三階同顯共第一階別第五子句明第二第三異顯下兩階別第三子段明第三階根機兼明最廣一切經律論常説純説顛倒次明所依甚深大乘機涅槃華嚴次後對諸門辦同異卷末因三階自相對辨同異即明七種最大別惡顛倒卷第二第二大段就現在人行賞罰出世分為三段第一段明三階人行邪正即分為三子段第二段明三階人賞罰行輕重不同復分為三子段第一子段明第一階人賞罰行於中具明三階能行賞罰人行位盡第二子段明第二階人賞罰行於中兼明諸佛菩薩真應兩身凡聖善惡邪正大小同異難識肉眼凡夫不別即明善惡兩種顛倒第三子段明第三階人賞罰行於中具明三階起教法及能知教人並所起教法同異及起行意別明不輕菩薩能起教人起教多義文有四子句後明第三階人十子句金剛惡即是五本五末中自他義第三段明三階人出世行淺深不同復分為三子段第一子段明第一階人出世行於中初明位上六住已去通凡及聖普別違順俱行盡次後明合學別所由略明八種佛法驗普習氣本末遠近普教別簡根機具足成根源由第二子段明第二階人出世於中具明普別兩種三乘根機次後廣説邪正四依第三子段明第三階人出世行於中明第三階人正合學普真普正八種佛法兼觀住持三寶是有緣根機當根破病次後對第二階明根機藥病四子句次後明三寶廢興末後廣明護法損益卷第三卷第四第三大段就三階佛法賞罰出世及所依境分為四段第一段明三階文教法有上中下分為三子段第二段明三階賞罰法輕重不同復分為三子段第一子段第二子段明第二階賞罰法於中具明三階人七種懺悔滅罪證驗同異難義第三子段明第三階賞罰法於中明最大多罪因最大多阿鼻地獄果學別上四子句即是五本五末中上下義第三段明三階出世法七別七普淺深不同又分為三子段第三子段半在第三卷末第三子段半在第四卷初合為第三階出世子段於中初具明八種佛法次明學別十三子句初五子句即明五種不救並第六子句即是六部經説最多顛倒第七子句廣明十二種顛倒所依經文並在第三卷末於第四卷初別明十一部經説邪盡顛倒次明四部經説出顛倒惣屬第七子句餘大子句明不合作人主法主所由即第十三子句盡即是五本五末中普別義後六子句明不合作僧官都統所由即是善惡義惣屬第三階出世子段竟第四段就悲敬二田明三階人依境起行損益多少所由法於中有三段第一段內段明悲敬二因厚薄第二段內段明能敬行心有淺深二俱文少不分子段第三段內段以聖人正人對第三階邪人明賞罰輕重損益不同分為四子段第一子段明聖人正人輕敬重治罰有七種益廣説第二子段明聖人正人重敬輕治罰有七種損略説第三子段明第三階邪人輕敬重治罰有七種損廣説第四子段明第三階邪人重敬輕治罰有七種益略説卷末引大集月藏分像法決疑經證悲敬二因為勝此是第三第四卷指文竟信行與三階教藍吉富有關三階教創始人信行的生平及三階教的詳細內容日人矢吹慶輝三階教之研究巨著中曾有詳細周密的研究而且其書附録也收有現存世界各國之三階教相關史料真可謂集三階教研究之大成所以雖然各種大藏經都不收三階教典然而現代人之有意探索該教內容者仍然可依矢吹氏之書而按圖索驥由於我國學術界對三階教未曾有人作過較詳細的專題研究因此乃使現代的中國佛教徒多半不知該教為何物即使對信行其人也多半未曾聞及以一個曾在隋唐民間佛教界流行數百年的佛教支派其在現代中國佛教界與學術界中竟然如此地乏人理睬無論如何這總是一件不算小的缺憾職是之故在本文中筆者擬對該教教義略作敘述並擬為信行其人的風格與應得的歷史地位略作描述與判定一信行其人之傳略與風格信行五四五九四俗姓王魏州衛國人少而落䰂博綜群經蘊獨見之明顯高蹈之迹與先舊德解行弗同不全聲聞兼菩薩行於相州法藏寺捨二百五十戒居大僧下在沙彌上門徒悉行方等結淨頭陀乞食日止一餐在道路行無問男女率皆禮拜欲似法華常不輕行誓願頓捨身命財直到成佛四遠英達皆造門而詰問之行隨事直陳曾無曲指開皇之初被召入京僕射高熲邀延住真寂寺立院處之乃撰對根起行三階集録及山東所制衆事諸法合四十餘卷又於京師置寺五所即化度光明慈門慧日宏善寺是也自爾餘寺贊承其度焉莫不六時禮旋乞食為業虛慕潔誠如不及也末病甚勉力佛堂日別觀像臥視至卒春秋五十有五以開皇十四年正月四日卒於真寂寺即以其月七日柩於雍州終南山鵄鳴埠尸陀林所捨身血肉求無上道生施死施大士有苦行之蹤於是法師淨名禪師僧雍徒衆等三百餘人夙以信行禪師為善知識三業追隨二十餘年遂依林葬之法敬收舍利起塔於尸陀林下從上面所徵引連綴的各種有關信行其人的史料原文可以看出這位三階教創始人的一生實已顯現出一種極為崇高難得的宗教風格而與一般純以義學名世的學僧迥然異趣自反而縮雖千萬人吾往矣的宗教意識與毫不懷疑的苦行行為是信行一生行事之最凸出的風格與先舊德解行弗同而受到衆多信衆的支持其必為一般沙門的反對自是可以逆料歷代三寶紀卷十二曾謂但人愛同惡異緣是信行時復致譏然而他並不因為受其他僧人之譏誚而氣餒仍然稟其所信而一往直前甚至為了兼菩薩行居然連比丘戒都加捨除這種宗教勇氣是其特徵之一信行在相州時有頭陀乞食日止一餐的苦行入京以後雖然受到僕射高熲的禮敬且其化大行然而他並不因此沉溺於名聞利養之中仍然六時禮旋乞食為業虔慕潔誠如不及也生前誓願頓捨身命財死後又捨身血肉這種苦行布施的宗教精神是其特徵之二信行不隱居深山不修小乘獨善之行而於京師置寺五所以弘闡其衷懷所信的思想續高僧傳卷十九僧雍傳曾載一事頗可見其大乘入世之風格其文云有魏州信行禪師深明佛法命世異人知雍遁世幽居遣人告曰修道立行宜以濟度為先獨善其身非所聞也宜盡弘益之方昭示流俗乃出山與行相遇同修正節像這種修道立行宜以濟度為先獨善其身非所聞也的態度實遠非那些故鳴清高不問外事的出家人所能企及這種入世度人的精神是信行行事的第三項特徵按道宣續高僧傳將信行傳收入習禪篇內實在不甚恰當元朝沙門曇噩的六學僧傳收之入弘法科似較道宣之分類為妥切以信行一生的行事看來習禪二字當然不足以總括其一生之行事特徵弘法二字雖屬平常字眼然而總較習禪為更適合用來形容信行之行事與為人二信行之三階教法的根本大義信行的一切學説有一最基本的立場即對根起行他認為衆生的根性隨時代而有不同所以每一時代就須有適合該一時代衆生的佛法而不能一成不變地代代沿用因此化度衆生時最重要的原則是依據各時代衆生之根性而教以適當的修行沙門唐懷感釋淨土群疑論卷四按信行禪師立教之意以當根佛法為宗所謂當根佛法亦即對根起行之法門與常人所謂的應病豫藥的寓意也大體相同信行認為從釋迦成佛以來到信行之時為止這一段期間可以分為三個階段亦即所謂的三階三階佛法密記卷上佛在世佛自住持佛法位判是第一階時佛滅度後一千五百年以前由有聖人及利根正見成就凡夫住持佛法位判是第二階時從佛滅度一千五百年以後利根凡夫戒定慧別解別行皆悉邪盡當第三階時關於第三階的年限問題該教內有兩種不同的説法依三階佛法與三階集録所載則謂是在佛滅一千年之後雖然有此異説但對三階教義並無妨礙因為該教最重要的前提是在承認信行之世已是第三階之末法時期至於千年或一千五百年的歷史問題對該教而言則並不重要信行以為在三階內的衆生由於時代環境之不同而根器亦各有異而當時正是佛滅千年以後之第三階時代善根普滅正見不存衆生行為俱告違反佛戒日本所傳三階佛法卷三一切第一第二兩階佛法內有一切戒見俱不破有一切破戒不破見兩種正見成就衆生一切第三階佛法內唯有一切行壞體壞戒見俱破顛倒一切一種衆生同書卷一佛滅一千年已後一切聖人一切利根真善正見成就凡夫悉普滅盡又於一切利根空見有見衆生內皆悉普名破戒在這種倒見充斥衆生破戒的第三階時代裏出家比丘縱然讀誦佛經也無濟於事非但不能受用而且還會執著經言淆亂經義日本所傳三階佛法卷四佛滅度一千年已後一切比丘取我十二部經競共讀誦以上著中以下著上中著前後非義言義義言非義亦如六師外道各言我是當爾之時十二部經雖行於世無有威德時代環境既然如此衆生如要修行則舊傳的佛法是不適宜的必須要選擇一種當根佛法修行者才有證果的可能冥報記卷上亦云信行以為佛所説經務於濟度或隨根性指人示道或隨時宜因事判法今去聖久遠根時久異若以下人修行上法法不當根容能錯倒既然前此之各種法門對當時之第三階衆生都不當根則信行所揭櫫者當然是他所認為最適合的法門這種法門信行及其教團稱之為普佛法普法或普真普正佛法其主要特徵是不去詳究經論的奧義只著重信仰並對一切聖凡衆生俱加禮敬具有這種低調信仰的衆生就像生為盲人之不辨景物一般所以這種佛法又稱為生盲衆生佛法釋淨土群疑論卷三如三階禪師等咸以信行禪師是四依菩薩於諸大乘經中撰集三階集録言今千年已後第三階衆生唯合行普真普正佛法得生十方佛國日本道忠之群疑論探要記卷六引三階集録云第三階若學普法不墮愛憎不謗三寶唯有純益無有損壞此普亦名生盲衆生佛法譬如生盲不分衆色普法亦爾於一佛乘及三乘法不論是非普能信故於諸賢聖及一切凡莫辨勝劣俱歸敬這真是一項大膽的宣布可以不問一乘三乘而俱加信仰可以不辨聖凡優劣而俱加禮敬並且公然宣稱所提倡的是生盲衆生佛法信行這種態度在佛教義學極為昌盛的隋唐二代當然要引起佛教界的排斥與騷動不祇此也信行甚至於認為生值第三階的衆生不但不能研讀大乘經典而且也不能行念佛三昧之易行法門因為這些法門對第三階衆生而言都是不當根法釋淨土群疑論卷三信行以為若行別真別正佛法及讀誦大乘經等即時不當根法墮於十方地獄今無量壽經等即是別真別正是第二階佛法千年已前合行此法千年已後既無此機斯教即廢同卷又載信行禪師及於三階集録之中言千年已後唯合行普不合行別遂將念佛三昧等法為不當根佛法提倡不研讀大乘經典是對其他義學名僧的挑戰主張不念佛又是對淨土宗人的挑戰信行這種革命性主張真是截斷衆流橫掃一切而其作風之如此違背傳統當然是難以見容於正統佛教界的依對根起行法所載學第三階佛法有三項主要內容即普敬認惡與空觀普敬是先禮敬衆生之本體如來藏從而普敬一切具有如來藏的衆生認惡是去體認第三階時代衆生之顛倒錯謬亦即去體認一切利根空見有見衆生行壞體壞戒見俱破空觀是體認所學一切解行之畢竟空寂又據現存的信行遺文可知第三階之道俗衆生其具體的修行方式有下列幾大類一行四種無盡行日日不斷地禮佛轉經供養衆生與供養衆僧二隨喜助施三依十二頭陀常行乞食四依法華經行不輕行此中所謂的十二頭陀是指修苦行者的十二種苦行方式亦即在日常生活中儘量刻苦自己例如穿著他人所委棄的衣服乞食為生日祇一食常坐不臥等皆是行不輕行是指效法法華經內常不輕菩薩的行為法華經常不輕菩薩品第二十常不輕菩薩不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛四衆之中有生嗔恚心不淨者惡口罵詈而常不輕菩薩仍不生嗔恚常作是言汝當作佛可見這是一種普敬與忍辱的修持態度依照信行遺文所載修行上述四大類事時必須日日不斷精進以赴即不斷地誦經布施苦行等直到成佛為止由此可見信行是要修行者將全副生命投擲入佛教大海之中而不徒務義理的解析與玄談因此精進忍辱苦行堅信等項正是信行教法的最主要特徵尤其對布施一道信行的實踐與提倡更是不遺餘力信行遺文中曾載其一封致某州知事的書信信內即有誓願頓捨身命財直到成佛的語句可見其願力之深宏與精進實遠超過一般沙門至於無盡藏法的實施尤可見信行教法對布施一事的重視其事在拙作隋代佛教史述論第三章第四節寺院的經濟基礎中已曾加以述論茲不復贅此上所述為信行所倡法門之基本要義其與一般傳統佛法確是大相徑庭而信行之所以力倡其法自是認為這種法門比其他法門更為優越關於三階佛法與傳統佛法的優劣比較信行也曾言及茲略述如次信行以為其所倡的普法最大特色是能普遍與衆生的根性配合而一般傳統或已過時的佛法是別法其弊病即是必須針對適當的根性始能奏效否則有損無益對根起行法別法就根者有二義一者對根明淳益無損唯是第一第二兩階一乘三乘人是別根當位學法由稱根故淳益無損二者不當根學別法淳損無益何以故由不當根下人行上人所行法故然而修習信行的普法則沒有這種危險因為普法的基本教理是普敬如來藏而如來藏則是一切衆生的本體因此修習這種法門時衆生的根性必定能與所修法門相配合而不會有不當根的弊病所以該法門是淳益無損的對根起行法普法無病者如來藏佛性等體是普法一切凡聖一切邪正同是一體更無別法唯是如來藏一切凡夫莫問根機上下學之淳益無損修習普法的正面效用是可以斷除貪嗔癡三毒從而斷絶一切邪惡善根乃不至為邪魔所破壞對根起行法問曰末世學道邪魔至多不畏壞其善根答曰不畏但此普法乃是出魔境界何以故由行法具足故敬他身上八種佛法自知己身有十二種顛倒嗔即不生作一切空觀不淨觀故貪即不起已貪嗔無故癡亦不生貪嗔癡無故一切惡自然息若三毒滅者一切諸惡亦隨滅若諸惡無者一切邪魔何能得便為作留難信行以為普法的這些優點正是其他法門所沒有的這也是他盛倡此道而貶抑其他法門的主要原因三信行之三階佛法的歷史意義儘管信行其人沒有較明顯的師承系統可尋然而其佛教思想也並非全無淵源關於三階佛法的思想背景問題湯用彤先生曾加論述並且明謂其為北朝流行之信仰所産生之結晶品因此此處不擬再作蛇足之論三階佛法在傳統中國佛教界並不受重視而且與中國民間佛教的主流淨土宗不能相容在隋唐二代曾屢受禁抑與排斥儘管如此其在歷史上實具有相當重要的地位矢吹慶輝在其三階教之研究一書自敘中即曾對該教的歷史地位作過多方面的肯定該文説三階教是大乘佛教之一歸趨佛教各派之一異彩日本新興諸宗之前鋒隋唐思想史上之一系無所有思想之極致無盡施一法之實踐的鼓吹末法佛教的首唱普法佛教的宣揚聖者同行之集團民間佛教之先驅他宗誹難之焦點筆禍禁斷之特例等矢吹氏這些評斷是客觀的描述對該教並未過份揄揚茲依信行之思想及三階教之發展略述其在歷史上所具之特殊意義如次一信行的佛教思想是中國佛教思想家對所有佛法的總批判其對前二階佛法及經典義理之效用的否定除了顯示末法思想之特徵外並且也象徵信行其人對經論義理的反動此從其一生之不曾對經論作注疏式的鑽研之風格亦可徵知二信行的當根佛法與生盲衆生佛法等觀點可代表中國民間佛教徒的一種信仰態度其學説也可被視為中國佛教徒自創的民間佛教思想體系其與淨土系教徒的衝突正顯示出印度易行道佛教思想與中國易行道佛教思想的對立三從信行教法之能盛行於隋唐民間佛教界一事可知吸引民間教徒的主要因素並不是教義的深奧或玄妙祇要創始者具有崇高的宗教精神與弘法熱忱以及教團具有較嚴密與實際效用的組織如無盡藏院則教義雖然簡單仍然能使所弘闡的法門盛行於世四信行弘法對僧俗不作嚴格的分別不像傳統佛教之以出家人為主以在家人輔據高僧傳信行本傳所載信行在相州法藏寺時即捨具足戒親執勞役禮通道俗可見其時即已略具居士佛教的傾向而信行有一弟子裴玄證在信行遷化後更自行結集一個居士佛教集團前引信行傳載裴玄證本出家住於化度信行至止固又師之末從俗服尚絶驕豪自結徒侶更立科綱從裴玄證之自結徒侶更立科綱可見這一居士教團頗有組織與法度可惜的是其後似乎未見有較為有力的後繼者因此該一教團也就未能發展成全國性的居士佛教組織按我國佛教每在極盛之時即易滋生流弊寺院的大量建造與國家經濟利益常生衝突僧徒的冒濫也常造成許多社會問題這種流弊正是歷代毀佛者所持的主要理由之一愚意以為在家佛教的提倡正是解決這種困局的最佳途徑如果還俗的裴玄證能將該一集團擴大發展並奠定堅固的理論基礎則其人未嘗不能成為中國佛教界的馬丁路德五信行的三階教團是我國第一個具有宗教意義的佛教宗派前此的攝論宗地論宗等祇不過是以研究佛教義理為主的學派而已並不能算是具有宗教意義的宗派愚意以為一個佛教宗派的形成至少須具足下列條件第一須有特屬於該宗的寺院第二在教義上須有不同於一般佛教徒的獨特體系第三該宗徒衆及一般佛徒對該宗派持有宗派及宗祖意識關於這三點信行的三階教團都已完全具備信行在京師所置的化度光明等五寺是特屬於該教團的寺院三階佛法與對根起行法正是該教團特有的思想體系而隋唐佛教界對信行的教團也都視之為不同於一般佛教的團體歷代三寶紀卷十二信行此途亦是萬衢之一術也但人愛同惡異緣是時復致譏可見在隋代一般佛教已視信行之教團為一自成一格的佛教團體而在唐人資料中修習三階佛法的僧人往往被稱為三階僧三階師或三階行者由此可知當時佛教界對三階教亦必存有宗派意識而信行之為該教教主亦為該教徒衆所承認開元釋教録卷十八而其徒衆即以信行為教主綜合上述各項條件可見信行的三階教團確是我國第一個道道地地的佛教宗派四從三階教團的發展看信行在佛教史上的地位信行生前信仰其三階教法的隋代百姓也已不少辨正論卷四高熲又延信行禪師別起禪院五衆雲聚三學星羅道俗歸依莫斯盛也而信行之僧界徒衆也有數百人故大信行禪師銘塔碑法師淨名禪師僧雍徒衆三百餘人夙以信行禪師為善知識三業追逐二十餘年可見在隋代信行逝世之前其教團勢力已不可謂其為小據現存史料所知信行門徒之著名於當世者有出家的僧雍本濟淨名慧知以及俗家弟子高顯裴玄證等人因此信行去世後其教團由於其徒衆的繼續發展乃更大盛於唐代三階教法盛行於唐代一事可由下列三事徵知其一唐代淨土宗著作中頗多闢斥三階教義的理論如窺基的西方要決釋疑通規第十一道鏡善道共集的念佛鏡末第十以及懷感的釋淨土群疑論等書中都有發揚彌陀淨土抑制三階教法的論調由此可見當時的三階教團必是一個已足以威脅到彌陀淨土信仰的教派其二三階教典籍在隋文帝開皇二十年曾遭敕禁斷然而並未妨礙該教的發展武則天證聖元年又敕禁三階教典草二部並直斥三階教法違背佛意別構異端然而該教勢力仍不稍衰玄宗開元十三年又禁斷三階寺院的無盡藏設施而該教也並未因此而滅絶從這種數度遭禁而不衰的現象可以證知該教在唐代基礎必甚穩固必定極獲民間百姓的支持其三唐代三階教興盛之景況可由其無盡藏內財物之貯積豐盈與信徒之踴躍布施窺見一斑唐初三階教的第一名剎化度寺即因信徒之爭相布施而成為天下聞名的全國佛教財務中心兩京新記卷三義寧坊條化度寺內有無盡藏院即信行所立京城施捨後漸崇盛貞觀之後錢帛積聚不可勝計常使名僧監藏供天下伽藍修理燕涼蜀趙咸來取給每日所出亦不勝數當時化度寺所受信徒布施之熱烈情景太平廣記曾録有一段生動的描述文字士女禮懺闐咽捨施爭次不得更有連車載錢絹捨而棄去不知姓名從上述諸文可見三階教法在隋唐二代之盛況盛行三四百年的三階教法溯本追源乃係因信行其人而有以有信行其人乃有上述隋唐數百年間的民間佛教狂熱乃使傳統佛教界産生無數法諍乃為佛教財政組織樹立一最佳典範無盡藏院凡此具體諸事都可見信行在歷史上應得的地位是相當崇高的而由此也可見其所受中國歷史學界的冷落是並不公平的燉煌出土三階教殘卷教籍一信行遺文一二燉煌所傳三階佛法卷二九三燉煌所傳三階佛法卷三四九四三階佛法密記卷上七一五對根起行法一九六無盡藏法略説一五三七大乘法界無盡藏法釋一六一八七階佛名經一