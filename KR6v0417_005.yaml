body:
  text: 將釋三階四門料簡一示名二舉數三釋義四指文示名有二一題名二文名題名有三一就法立名名三階佛法二就義立名名三階根機眾生邪正上中下下不同所由義三就意立名名第三階佛法空見有見眾生學認十二種顛倒文名有四三階一部文有四重有大段有段有子段有子句大段文中即道第一大段第二大段第三大段是也段文中即道第一段第二段第三段等是也子段文中无子段字但道第一第二第三等是也子句文中亦无子句字但道一者二者三者等是或言又已下亦是若委細論之文有六重或有段內段少故不說或有子子句多故不說此即第一門示名竟言舉數者三階一部大段有三段有十子段有廿五子句數多或大或小不可具說此即第二門舉數竟言釋義者三階一部文有四義一就過去習氣明三階根機義即第一大段是二就現在人行明三階邪正義即第二大段是三就所稟經教明三階法有上中下輕重淺深義即第三大段內初三段是四就悲敬二田明三階人依境起行損益多少所由義即第三大段內第四段是略明三階法義有二一明能行人亦名所詮法即第二大段是二明所行法亦名能詮教即第三大段是其第一大段雙明人法法有能依所依人有能證所證所依即甚深大乘經等能依即三階佛法所證即三階根機眾生能證即一切經律論此即略釋義竟廣釋三階以人對法能詮所詮各有七重能詮七者謂文法義根行解病所詮七者謂人法義根行解病第二大段正明人行解病法義根第三大段正明文行解病法義根第一大段雙明二七其文七是所依人七是能依是故一一子段之首舉法題宗依法立人又人七是所詮文七是能詮即是以根對法義通釋三階具有五義一明三階根機攝三階无始習氣行解病通名行以為三階本根成根行體即是三階行法攬三階行法成三階人說三階人行法為三階文教法又依三階文教法起三階新行解破三階病成三階受法根機是三階義此即四卷俱是第一大段三階根機不同所由義二明三階人行邪正攝三階現起行解病通名行以三階行法成三階人以三階人依三階根稟三階文教成三階人各各依根起行修斷趣證邪正不同是三階義此即四卷俱是第二大段三階人行邪正不同所由義三明詮三階人行為三階文教法由稟三階文教法起三階解行以三階解行破三階病成三階根以三階根法成三階人授三階人三階文教上中下法令修斷趣證是三階義此即四卷俱是第三大段法有上中下輕重淺深不同所由義四明三階位攬行解病以成三位第一階位六住已去是六住菩薩具三義一行深二解真三病輕即三賢十地通凡及聖是第二階位者從須陀洹已去是免三惡趣由於大乘有趣入義根機不定若遇大乘人法即得入大乘位若不遇大乘法即不得入大乘位故名不定第三階位者從邪見成就定不可轉五種不救已去是亦名邪解邪行成就已去是涅槃經說善星比丘讀得誦得講得十二部經坐得四禪佛道不解一句一字之義无毛髮善根不免謗佛等是大品經有見菩薩佛藏經有見比丘月藏經牛王目十輪經八大善人等是五明三階時處處別有二第一階處即一乘世界亦名淨土蓮華藏世界常唯純有諸佛菩薩无聲聞緣覺處是第二第三階處同即三乘世界亦名五濁諸惡世界娑婆世界盲闇世間三界火宅一切眾生起於斷常即是空見有見眾生亦名三乘眾生十惡世界是於惡處中時別有三佛在世佛自住持佛法位判是第一階時佛滅度後一千五百年已前由有聖人及利根正見成就凡夫住持佛法位判當第二階時從佛滅度一千五百年已後利根凡夫戒定惠別解別行皆悉邪盡當第三階時於第二階時三義不定一就行明時即如前說二就病明時即第二五百年後第三階惡賊狗菩薩病起屬第三階時三就法明時即千年已後應四聖諦法滅袈裟變白不受染色屬第三階時此即第五惣明三階時處竟上來位及時處兩義遍在一部三大段中第四指文者文有四卷題名遍在三卷之初唯第四卷屬第三大段文无別義故不別題但抄前題標於卷首其三大段遍該四卷第一卷即是第一大段第二卷即是第二大段第三第四卷合是第三大段段有十子段有廿五等者第一大段就根行位分為三段第一段以根對法第二段就行通說此兩段俱文少不分子段第三段就位別說有三階即分為三子段第一子段明第一階根機於中有三何以故第三何以故廣明五本五末義第二子段明第二階根機於中有五子句前四子句明第二第三階同顯共第一階別第五子句明第二第三階異顯下兩階別第三子段明第三階根機兼明最廣一切經律論常說純說顛倒次明所依甚深大乘經謂大般涅槃經大方廣佛華嚴經次復對諸門辯同異卷末因三階自相對辯同異即明七種最大別慈顛倒此是第一卷第一大段指文竟第二大段就現在人行賞罰出世分為三段第一段明三階人行邪正即分為三子段第二段明三階人賞罰行輕重不同復分為三子段第一子段明第一階人賞罰行於中具明三階能行賞罰人行位盡第二子段明第二階人賞罰行於中兼明諸佛菩薩真應兩身凡聖善惡邪正大小同異難識肉眼凡夫不別即明善惡兩種顛倒第三子段明第三階人賞罰行於中具明三階起教法及能起教人並所起教法同異及起教意別明不輕菩薩能起教人起教多義文有四子句後明第三階人十子句金剛惡即是五本五末中自他義第三段明三階人出世行淺深不同復分為三子段第一子段明第一階人出世行於中初明位上人六住已去通凡及聖普別違順俱行盡次復明合學別所由略明八種佛法驗普習氣本末遠近普敬別簡根機具足成根源由第二子段明第二階人出世行於中具明普別兩種三乘根機次復廣說邪正四依第三子段明第三階人出世行於中明第三階人正合學普真普正八種佛法兼觀住持三寶是有緣根機當根破病次復對第二階明根機藥病四子句次復明三寶廢興末後廣明護法損益合是第二卷第二大段指文竟第三大段就三階法賞罰出世及所依境分為四段第一段明三階文教法有上中下分為三子段第二段明三階賞罰法輕重不同復分為三子段第二子段明第二階賞罰法於中具明三階人七種懺悔滅罪證驗同異難識第三子段明第三階賞罰法於中明最大多罪因最大多阿鼻地獄果學別上四子句即是五本五末中上下義第三段明三階出世法七別七普淺深不同又分為三子段第三子段半在第三卷末半在第四卷初合為第三階出世子段於中初具明八種佛法次明學別十三子句初五子句即明五種不救並第六子句即是六部經說最多顛倒第七子句廣明十二種顛倒所依經文並在第三卷末於第四卷初別明十一部經說邪盡顛倒次明四部經說出顛倒惣屬第七子句餘六子句明不合作人主法主所由即十三子句盡即是五本五末中普別義後六子句明不合作僧官都統所由即是善惡義惣屬第三階出世子段竟第四段就悲敬二田明三階人依境起行損益多少所由法於中有三段內段第一段內段明悲敬二田厚薄第二段內段明能敬行心有淺深二俱文少不分子段第三段內段以聖人正人對第三階邪人明賞罰輕重損益不同分為四子段第一子段明聖人正人輕敬重治罰有七種益廣說第二子段明聖人正人重敬輕治罰有七種損略說第三子段明第三階邪人輕敬重治罰有七種損廣說第四子段明第三階邪人重敬輕治罰有七種益略說卷末引大集月藏分經像法決疑經證悲敬二田為勝此是第三第四卷指文竟釋文有四一明能起教人二明所起教法三明教所詮義四明教所為人第一明能起教人者即信行是謂當一乘菩薩六住已去通凡及聖俱是由能發願受善惡兩種身故能入六道隨類應生由不假人法即自開解故能為他起教故下文言唯除一乘根機諸佛菩薩已外終无有能得一人於佛滅度後獨自學出世間一人一行无人无行五種不忓盡八種佛法徹到成就者廣如後釋自道俗者依三部經一依法華經不輕菩薩起一乘教法白四眾故二依十輪經佛起三乘教法俗人為首道俗並說通為剎利沙門說故三依像法決疑經具說道俗名字經云未來世中一切道俗故第二明所起教法者即抄出三階佛法是問抄出三階佛法為經中有故抄出為无故抄出若爾何失若經已有何須抄出若經中无何得抄出答有同而異同故得抄出異故須抄出異有三義一者所為人不同二者所說法不同三者為人說法廣略兼正不同佛為第一第二階上根人說出世義微細淺近真身應身一乘三乘大乘小乘普別俱說為第三階位上邪見成就不可轉人說世間義不為說真實法出世義今正為第三階位前人說出世義兼為第一第二階下根人同說普真普正佛法又廣略不同佛廣說第一第二階略說第三階今廣說第三階略說第一第二階故須別為第三階人抄略為廣說普真普正出世義依諸甚深大乘經者謂大般涅槃經大方廣佛華嚴經此明所依甚深大乘大部廣教究竟了義顯非己見人語妄語此兩部經俱具足明三階佛法涅槃經中對三階根說三階法華嚴經中對第一階人說三階法諗法師云涅槃經中明第一階有十處說一如第二卷說純陀菩薩舉根興請一行深二解真三病輕者是二如第六卷說有知法者无問老少道俗持犯悉得為師戒為未來諸菩薩等學大乘者說如是偈不為聲聞弟子說也三如第七卷說實是凡夫得現聖人相利益眾生佛噵不墮過人法四如第十一卷說不假人法自能得度譬如病人莫問得醫不得醫俱差五如第十二卷說雖是凡夫為住持佛法得用重治罰法即仙與國王殺五百婆羅門等是六如第十八卷明具足能持三階佛法謂菩薩所持即无壞滅七如第廿六卷明不假緣伴自能起行如第九功德內具說八如第廿七卷說雖是凡夫得現聖人相處處求名求利佛噵是菩薩少欲知足九如第卅二卷出其位地謂六住諸菩薩通凡及聖俱不假人法自能得度是十如第卅三卷明文義俱解謂微妙之義為諸菩薩說是謂廣說第一階也二明第二階亦十處說一明為住持佛法不得打不得殺破戒邪見人如第三卷說護法之人雖持刀杖不應斷命引九部經持聲聞戒即如律文廣明不得打比丘二明佛為佛弟子說九部經除一闡提如第九卷說三明體性不定逢善緣即善逢惡緣即惡唯須多假純善人法始得出世如第十一卷就喻說名作死活不定四雖復謗人謗法墮地獄暫入即得出如第十二卷說五百婆羅門初謗法入地獄後信即便出第一階人不謗大乘是故得知第二階人不免謗大乘五不能具持第一階常樂我淨法唯能持當位一階苦空无常法如第十八卷說二乘所持即有壞滅亦噵阿羅漢滅六如第廿卷說一闡提有二種一者利根二者中根即是利根一闡提一闡提復有二種一者現在能生善根二者後世能生善根即是現在能生善根人七聞善知識說普敬認惡法即能如說修行如第廿六卷直心法內說八如第卅三卷說淺近之義為聲聞說九明唯能自利未能利他如第卅六卷恒河七種人內說第三人出已即住第四人住已觀方第五人觀已即去是故得知唯能自利未能利他十如第卅九卷四十卷內廣說十仙初時謗佛謗法後時廻心即得三乘道果是謂廣說第二階也三明第三階亦十處說一明第三階體是諱惡人故不受他治罰返更打他殺他持法人如第三卷說破戒比丘共覺德比丘有德國王鬪戰者是二明佛所不攝如第九卷說佛為弟子說九部經除一闡提者是三明五不救如第十一卷說名作定死眾生不中治四明分別一切人法長短悉皆顛倒盡如第十八卷說減廿種顛倒者是五明不免墮十方一切阿鼻地獄後始能生出世善根如第廿卷說出地獄後能生善根者是六明斷生得善根復不信佛性如第廿六卷說由不信佛性故不免墮地獄七如第卅三卷說世間之義為一闡提五逆罪說現在世中雖无利益為生未來諸善種子雖讀誦分別解說十二部經佛噵不解一句一偈一字之義八如第卅四卷說空見一闡提善不善俱名惡不善如是等人如十方大地微塵一種相似九如第卅五卷說利根之人能斷善根十如卅六卷恒河七種人一者常沒是空見一闡提二者暫出還沒是有見一闡提是謂廣說第三階也所以得知涅槃經一部對三階人廣說三階法又如下文正出經中具說三階處以為所依喻如三子法說於十二部經內微妙之義為諸菩薩說淺近之義為聲聞說世間之義為一闡提五逆罪說如三田三器三病三馬如大施時有三人來如大師子殺香象時皆盡其力殺兔亦爾不生輕想諸佛如來亦復如是為諸菩薩及一闡提演說法時功用无二驗之所以知華嚴經中對第一階人說真身諸佛應機度一切眾生三階法盡一部廣說正出所依經文即取第廿九卷如來性起品譬如日出先照一切諸大山王次照一切大山次照金剛寶山然後普照一切大地如來亦復如是成就无邊智慧日輪常放无量智慧光明先照菩薩摩訶薩等諸大山王次照緣覺次照聲聞次照決定善根眾生隨應受化然後悉照一切眾生乃至邪定為作未來饒益因緣經文雖无三字由與涅槃經喻說法說義同无別驗之所以得知一切同故一部中具說三階故抄出唯依兩部甚深大乘經有同有異故非一處具說故引證通一切經律論第三明教所詮義者即引一切經律論證一切眾生乃至俱有三階根機不同所由義是前就法立名即是依經以立教此就義立名即是依義而引文依經以立教是一部之惣名依義而引是一卷之別目未立三階已前眾生一揆既立三階已後根性區分於一切佛法乃至一一法即是五本五末同而異者同謂一境異謂解分廣如後釋此即第三所詮義竟第四明教所為人者即第三階空見有見眾生是亦是就意立名教雖具說三階根機然起教人意為第三雖明餘二為相顯發令識同異自住分齊故唯第三是教教所為文開為四一明能認惡人二明學認時位三明所認惡法四明引教證成第一能認惡人者如第二卷第二大段第二段第一子段引十輪經四種僧驗三階人相對廣釋第二學認時位者時謂无始乃至可轉位謂世間及入佛法如第二卷第二大段第二段第三子段末第十子句金剛廣釋第三所認惡法者即是十二種顛倒雖十二文有兩重初三略說後九廣說略說三者一自他相對就體學認其心顛倒欲使自認顛倒在己不在於他止誹謗故二將心對境就解學認善惡兩種顛倒欲使自知肉眼生盲息倒見故三因緣相對就病學認內外四種顛倒欲使善達因由緣成捨邪歸正求善知識學簡敬故倒雖塵沙略說唯是其心謂內心體迷取着顛倒倒心發語即成誹謗起自无始迄今不絕故名為常无一正念故名唯純經說其心或名自心或名己見或名我見空見有見或名斷常或名妄想然心不孤起必緣境生隨其自心所緣境界不過善惡人法迷名執法取相別人順情見善即生邪貪違情見惡即生邪瞋迷境增減即是邪癡內懷邪三毒外信神鬼魔是為內外四種顛倒此略說竟廣說有九文約為三初七就教次一就行後一就果就教七者一對第一階就法學認常說純說顛倒為知佛說一切經法說己顛倒不說於他正聞法故二對第二階就人學認最大別惡顛倒為欲知己顛倒病重不同於他正思義故三對第三階引昔勵今就位學認最多顛倒欲使自知邪見成就七別不救求普救攝正修行故四普別相對就時學認邪盡顛倒欲使捨他別邪人法依普人法正出世故五詮旨相對攝廣就略引義歸名會出顛倒名義學認今時自他學別謂求出世俱名顛倒體是顛倒審无疑故六橫觀善惡就己修道求心有无學認純顛倒謂莫問善惡多少盡顛倒故七竪望三際就己三業經歷遠近學認常顛倒謂從无始法外法內乃至法忍恒无間故次一邪正相對就行學認卅二種自他俱見真正住持佛法自利利他顛倒欲翻邪學正頓出世故是故第二大段明三階人行約此空見有見眾生卅二種偏病行明三階人有无不定以分邪正謂一五二六二四一七一五者謂五本五末自他上下普別善惡自利利他文在第一卷第一大段第三段第三子段中說二六者謂六種偏病邪貪邪瞋邪癡信神鬼魔空見有見是為一六惣名在第一卷別名在第二第三第四卷六種邪善謂名利徒眾多聞勢力勝他復為一六文在第二卷第二大段第二段第三子段初引經等說二四者謂邪四依一依人不依法二依語不依義三依識不依智四依不了義經不依了義經是為一四復有邪四法謂名相妄想不淨說法復為一四文在第三第四卷第三大段第三段第三子段廣說一七者謂七損七益中取七損為顛倒一可殺不可殺取可橫殺三寶眾生盡二識邪正不識邪正取邪正雜亂盡三有護无護取善神捨護惡鬼入國盡四滅惡增惡取增惡減善盡五有感无感取失所感三寶眾生盡六有緣无緣取失有緣三寶眾生盡七是當根對病藥非當根對病藥取失當根對病藥盡是為一七文在第四卷末廣說此卅二種就行明顛倒攝顛倒義最廣前第四一切經律論常說純說是文廣此卅二種是義廣遍該一部初一五兼六種偏病就過去未來行習以明根次二六就現在人邪正以明起行次二四就文教以明學法後一七就行所依境法通明前三義損益果此即廣說就行明顛倒竟末後一種損益相對就果學認乃至滅破三寶法成三災盡顛倒欲使厭果斷因捨損取益故如第三第四卷末所引經等說後明顛倒鞕耎寬狹多少遍通十二悉堅如金剛廣如虛空多如大地微塵數等問第三階人十二顛倒為當可轉為不可轉若爾何失若言可轉即无第三階同第二故若不可轉何須說顛倒說无益故答俱得可轉不可轉各有四義由緣有善惡位有上下法有普別行有過現故不可轉得有轉義初三因緣相對說若就因定則不可轉由无始體迷名相善惡凡夫性成故就緣不定則亦可轉由善知識隨彼微因為作強緣轉世間習得性出世正因緣故如金師浣衣等由遇佛勝緣故次四說位上下相對說亦就法普別相對說上位別病成別法不能救下位病未成學普法則救後五根行相對說就過去根則不可轉顛倒純常久習定故就現在行則亦可轉捨邪學正隨人修斷厭怖當果捨損取益故又問今時定者不疑不定者與第二階人何別答第二階人倒非常純根中病輕單行相普亦可轉故第三階人常純顛倒根中病重具體相普始可轉故問十二顛倒及八種佛法為名異體別為名異體同答就體不異就義名別十二顛倒略說唯是其他廣說一切經論若認一倒則攝十二但隨藥病是故廣說若謂隨名則體異者應第二階不具十二常純一切七種別惡唯第三階獨別有故故知十二即一顛倒如八種佛法即一佛法故下文言一切八種佛法俱是普真普正故所以八種佛法名數雖少能得對治十二顛倒第四引教證成者如第三卷末具說問何故八種佛法十二種顛倒不在初二大段中說答由第三大段明三階法故爾第一大段將欲釋義先牒義立宗後開文釋義此第一大段立宗偏明三階根機義由未立法已前惣名一切眾生立法已後始分三階根機是故下文就五本五末廣驗三種過去習氣根機不同故知第一大段偏明根機義四卷俱是者此就通釋義不相違正如第二大段由現在人行邪正不同即驗過去根機有異此即以果驗因成第一大段根機不同義由第三大段佛為三階眾生說三階教法有上中下不同即驗所為三階眾生根機有異此即以法驗人成第一大段根機不同義第一段以根對法或二或三謂隨根授法即有三階由別為說世間義故若依根學法但有兩階由經為說一乘三乘故此文即是與下兩段開章仍充第一大段中三段數者為令第三段中三階得成三子段類下餘段每三子段皆配三階文義相符分明易解第二段就行通說有兩階者謂說三乘應四諦行第三階人出地獄後畏苦性破終入此行故就行通說唯有兩階若就位別說即有三階一純正无邪位二邪正不定位三純邪无正位由第三階空見有見眾生從未墮十方一切阿毗地獄遍盡乃至畏苦畏惡性未破已來猶在純邪无正位未入三乘正行所以就位別說即有三階又九字是人語者謂立法字也以此九字釋一切經故唯九字是人語也第三段就位別說有三階即為三子段一部文中每三子段恒配三階第一子段明第一階第二子段明第二階第三子段明第三階第一子段明依第一階佛法證有一乘根機眾生文有五分一立宗有一子句文有四義一就法驗第一階人謂依第一階法立一乘根機眾生莫問凡聖即六住已去俱是二就緣驗第一階解謂莫問值佛不值佛俱即自開解是三就病驗第一階行謂常不起六種偏病即聞好聞惡心无憂喜是四對下兩階驗第一階佛法以為所依反驗可知二釋義又有三子句亦名立因亦名釋所以此三子句文即是三何以故一何以故就處解行驗二何以故對下兩階驗三何以故就本末習氣驗又釋一就位驗二就人驗三就行驗即通名行一又何以故就處解行驗於中有三句一者就處驗第一階法謂一乘世界中唯有一乘根機眾生見一佛乘聞一乘法餘三乘眾生不見不聞驗之二者就緣驗第一階解就教即自開解就境能自力知就果自能得度三者就病驗第一階行下註謂由无六種偏病故能發願受善惡兩種果以後驗前者謂以第六廻向捨身命財盡驗第一廻向願唯除已下釋疑謂能依教簡人擇法非謂愚鈍心无憂喜有說无喜顯離邪貪无憂顯離邪瞋簡人擇法顯離邪癡六住菩薩者一解行住二淨心住三行道迹住四決定住五決定行住六究竟住二又何以故對下兩階驗文有二義一牒疑雙立假不假義二引經雙釋假不假義此復為二初引勝鬘涅槃對下兩階釋成不假後引華嚴以因對果釋成假義又以上依經就位說以下立法者就病說三又何以故就本末習氣驗亦名就行驗即是行解病通名行故下文言從有心有識乃至成佛道說名為行也文有三節一本二末三普其文有註隔絕又五本明稟性異五末明聞法異普引明起行異一就五本驗文復有二初依五本習氣立義後引三部經文證成初依五本習氣立義下註就人明自他就法明上下普別就行明善惡自利利他上下是有緣根機法普別是藥病根機法善惡是行體自利利他是行用也謂自見短依自下普法斷好善內惡為他自受苦為自利見他長不敢學他上別法修苦惡內善捨自樂與他為利他又由自見短自受下不畏現在別苦惡始能永斷一切惡成自利由見他長廢己同他始能捨上別好樂與他廣修一切善成利他即依自他成餘四義又攝後四惣入初中謂在人則見他長善在行則捨上別好樂與他又由見自惡見他善則離偏空不見自善不見他惡則離偏有不貪上嫌下則離偏貪偏瞋成普解破別執廢己同他盡則離偏癡斷好內惡故不貪好學惡內善故不諱惡則免神鬼魔惑又由捨好樂即是現在利他受苦惡為未來自利是謂本末習氣不起六種偏病後引三部經文證成一引十輪經以畜生驗人且分上下兩階善惡邪正兩性別喻但明信善信惡法則兼攝邪正又准經下釋疑如第二卷起教中釋二引楞伽經以邪驗正具分三階習性別謂由經別說第三階眾生凡夫性純邪无正驗知第一階根機聖人性純正无邪以第一第三兩階根機純正純邪驗知第二階根機邪正普有下註迷惑法者非是實事不實事謂當儒教由說因果報應不盡故名迷惑如忠孝百行五明論皆說現益不盡三世前三惡道即當教外此迷惑法即當教內謂從惡道至人天位後從世間入出世間即是引俗入真至三乘位三引涅槃經以世間驗出世間謂由世間法中金師浣衣習性別能成出世法中數息骨觀兩行因故得以世間法中三階習性別成出世法中三階根機已下註有三對驗謂前後凡聖因果各通五本五末第三階以前後為位謂就佛法內明一闡提位第二階以凡聖為位謂就須陀洹已去明聖人趣入大乘始不定位第一階以因果為位就六住已去定不退轉為初因位成佛已後為究竟果位又第三階唯是凡夫无聖人故就入佛法以明位第二階凡聖俱因至聖不定故就聖明位第一階因果具足果至佛位究竟无對不可分階故但就因六住不退明位設使真佛應佛形像佛以分三階皆就所為人說一以前驗後等者謂以未聞佛法已前象王凡夫因時見他善驗得聞佛法已後乃至聖人果時得有見他善以後驗前等者謂以得聞佛法已後聖人果時自認惡驗未聞佛法已前凡夫因時亦得有自認惡苦樂亦爾二以凡驗聖者謂於凡位初入六住尚不假人法自能得度況入八地聖位始須佛勸反驗類知三以因驗果者謂因時行果時說在因時善畜生觀下僧果時佛說下人觀下佛如自他上下相驗既爾類餘三本末可解又釋就前後驗病輕重有无就凡聖驗解假教不假教就因果驗學行盡不盡此且就第一階說二就五驗文即為五從得聞佛法已來是初惣出分齊後一一別列自驗肉眼故信佛教依法四依自知生盲自住分齊息一切惡一已下准依大方廣十輪經等者此句明自他下註文有三義一就解明自他謂自見惡見他善二就行明自他謂捨自樂與他樂三就病明自他謂能廢己同他盡又先就善惡明自他次就苦樂明自他後就事業明自他又就因明自見惡見他善即知解真就果明自受苦與他樂即知行深就事明廢己同他即知病輕謂他人法勝己故能廢己同他又此文善畜生是以前驗後句末聖人自認惡是以後驗前前後各顯半邊始得合成一義已下准依迦葉經此就苦樂明自他亦成自利利他行即是以聖驗凡二已下准依為等者此句明上下即是以果驗因上來三驗是前凡因時見後聖位自行後聖果時為他說故依佛教仰信不違即是有緣根機依根起行義二已下准第三卷等者此句明普別即是藥病根機依法破病學行義由學普真普正佛法破別怨別親病得入菩薩六位已下違順並行就位上人說四已下准依第二卷等者此句明善惡下註明善內惡惡內善各有三種一就境明善內惡謂求見未來世佛及邪魔作佛等惡內善謂惡眾生中有佛性及應佛菩薩二就緣明善內惡謂信施等中有貪瞋等行惡內善謂麤衣惡食等中有正善行三就行體明善內惡謂邪善惡內善謂菩薩逆行十惡又說於他善不嫉即斷善內惡於他惡不嫌即斷惡內惡於他善隨喜即修善內善於他惡慈敬即修惡內善又持戒得名利即斷得好樂惡護法被毀害即斷得惡得苦惡修禪得名利即須得好得樂善頭陀麤衣食即須得得惡得苦善五已下准依大方廣佛華嚴經等者此句明自利利他下註問云何三義具足无違答菩薩修行必具三義謂寬長不退轉廣則以利他為心長時則以自勞成行不退則以同行取果願行相資自他並出即是行由生成生由行度行由願修願由行滿行現在未來互相資辨是故三義說不相違苦惡正行好樂兼學三已上別引經驗之已下普引經驗之別謂本末各引經驗普謂本末共引經驗於中有十一句有一准依十亦名義約為三初一句反驗第一階法次一句通驗三階人於中有三一以畜生驗人二以邪驗正三以世間驗出世間後九句別驗第一階成普敬認惡行義約為三一有五句成菩薩行具三義一寬二長三不退寬有二句一約修善行明寬謂違順並行能受善惡兩種果盡二約斷障行明寬謂雙除二障一煩惱障二智障長有二句一約前際明長謂无始五本習氣二約後際明長謂斷三世惡學三世善盡反舉十輪經等㫋陀羅不斷三世惡即是邪善一者惡欲謂求現在名利徒眾二者大欲謂欲他知我已得聖果三者欲欲謂自求未來人天勝報由此三欲增惡減善不退有一句謂不畏現在苦惡徹到成性盡此有二義一者心願二者起行行有三義一難作能作二難忍能忍三難施能施二有一句正出普敬認惡行體謂依時處人學八種佛法認十二顛倒三有三句明認惡所由一由畏罪徹到二由信用佛語三由解法檢驗畏罪徹到者謂畏未來最大多重惡果信用佛語者謂即能仰學先聖知己由認惡入道於中有七一唯由見佛自認己過去犯戒惡二唯由見佛為惡時惡人說惡法三唯由見佛訶末法法師不說惡四唯由見臨得聖出家人由認惡得道五唯由見直心菩薩自認犯戒惡六唯由見摩訶薩怕生死七唯由見怕罪是菩薩種姓相解法檢驗者謂現見末法第三階人㫋陀羅等不畏後世定墮地獄與經符同驗經中說今時怕罪決得出世故須認惡亦驗知有第一階根機三又一句又此段下喻說有五一喻斷惡修善普遍法界謂自見惡故能斷惡盡見他善故能修善盡善惡內惡俱斷名普斷惡善惡內善俱修名普修善問前法說具五本末此中何獨先明善惡答雖五相由斷惡修善正是行體故文特標惣指此段第四合喻偏合此義二喻不為邪魔之所傾動喻如一切大地已下是三喻煩惱輕微易可除斷喻如一切大地已下是四喻依時稱根善得調亭喻如一切夏天已下是五喻行德深勝堪為賞罰後亦名常善調亭已下是已前五名傳禪師解後諗法師兼取合喻釋為兩義前喻解行病同異後喻解行病多少前喻五本五末即為五義一陰陽喻喻无自他偏病謂見他善能成自善不見他惡能滅自惡二普高普下喻喻无貪上嫌下病三土地最耎喻喻无捨普學別怨親金剛病四夏天七種熱具足喻喻无偏斷惡修善病一患熱病二服熱藥三陽氣熱四日熱五火熱六着厚衣七喫熱食五善調亭三階根本法喻喻无自損損他病前亦名已下是有釋為七一行二解三病四根五法六義七文行謂斷惡修善普遍法界即是行深解謂大地良田平正即是解真病謂土地最耎除諸沙𠧸惡草株兀即是病輕根謂具七種熱正善解行邪惡緣不能壞唯增正善等如合喻釋法謂三階佛法依時稱根義謂正行賞罰自利利他文謂教是能詮引經成證惣喻金剛明第一階解行深勝捨身命財畢竟不退堅固難壞故喻金剛第三階人煩惱堅固如似金剛第二階人煩惱不定猶可琢磨故喻石山四又一句又此段下合喻文中唯合第四善根增減如七種熱具足眾生五又一句又此段下結下註文有二驗先順驗即以名驗義謂以一乘名驗一性義後反驗即以別驗普謂以下兩階根機性別驗第一階根機性大乘為自小乘為他相行四乘性恒一乘又於自及他眷屬徒眾常无彼此不偏親己不別疎他即是常无六種偏病第二子段明依第二階佛法證有三乘根機眾生文有五分一立宗先依第二階佛法立三階根機眾生為第二階根機次以本末相收由病行同故唯立一階對異上第一階後就位別說由邪正不同分為兩階對異下第三階問三階習氣各有本末何故就行唯說一階答若就正行以末收本則兩階俱得名為三乘未別立空見有見眾生為第三階若就病行以本收末則兩階俱得名為空見有見未別立三乘眾生為第二階今邪正通說皆名為行故云若就行通說由有六種偏病等同故唯說一階此中以畏苦性未破已前名為本畏苦性破已後名為末准下第三子句貪好嫌惡引十子句金剛皆名本正三乘根機成就名為末故若就位說邪正兩分第三階人則以邪見成就為位故名空見有見眾生為第三階第二階人則以正見成就為位故名三乘根機眾生為第二階若就行說各具本末皆從无始各至十地二又何以故下法說釋義先問後答問有二義何以得知三乘空見有見就行通說本末為異異上第一階就位別說邪正為異異下第三階答有八句五者三又義約為三一有五句上下相對立第二階取五者為五句前四子句對上分階答成同義後一子句對下分階答成異義下註一者釋宗中第一人法相成立第二階二者釋宗中本末相攝同名三乘空見有見三者釋宗中六種偏病同四者釋宗中等同所謂解同五者釋宗中邪正不同分為兩階一者就處同人同惡同驗之文約為四一引十輪大集驗三乘眾生同第三階文中有三一舉處人惡同標名立義前第一階根法相對立此第二階詮旨相對立二准依大方廣下引文驗義具顯三同下註三乘世界五濁世界是處同一切人民起於斷常於如是等眾生中是人同心常遠離棄捨真實極惡增長等是惡同又由誹謗正法毀訾賢聖是惡世界穢土正因不信凡中有別聖障別淨土不信相中普體障普淨土三又无量壽經下釋疑分階寄同顯異二又此句已下引法華經驗三乘菩薩同第二階文中有三一會同名義下註此中上下有兩種一就文明上下即方便品為上譬喻品等為下二就義明上下即一乘名上三乘名下三界眾生者即是具足煩惱火宅根機經云為說三乘知三界苦若心決定說一佛乘今起教者當遺法立因時為說兩種大乘佛法謂少分甚深一乘大乘為悟佛知見令發菩提心故少分小乘三乘大乘為厭三界苦解脫虛妄故此是凡夫依文驗義上下並說不同聖人論師說昔對根授法時所為根機或以上從下判屬三乘大乘謂為別教三乘凡夫論云求勢力人顛倒求諸功德增上慢心而求人天有漏果報對治此故說火宅譬此則攝真從應述昔因時為說三乘苦空淺行各趣涅槃或以下從上判屬一乘大乘謂為二乘聖人偏就佛果攝應從真為說常樂令入一乘大乘即是論師釋經十方世界中尚无二乘何況有三論云謂无二乘所得涅槃唯佛如來證大菩提究竟滿足一切智惠名大涅槃非諸聲聞辟支佛等有涅槃法唯一佛乘故或上下並說者藥草喻品為大乘凡夫一三並說究竟真實一因一果一乘菩薩是大小樹三乘菩薩是上藥草論云大乘人一向決定增上慢心如是倒取无別聲聞辟支佛乘對治此故說雲雨譬是故經云佛平等說如一味雨隨眾生性如彼草木所稟各異又云汝等所行是菩薩道漸漸修學悉當成佛二何以故下依文驗義文復分三何以故者責驗佛意所由一以一乘三乘相對驗三乘被破一乘不被破三乘是先心所好一乘非本所望二以喻說驗有三義別一三乘俱是无求出意眾生二俱是唯有一門狹小眾生三俱是三車誘出眾生俱從己見門中三車誘出三以法說驗略合二義謂三乘俱是雖遭大苦不以為患眾生次下經文乃至佛為於一佛乘分別說三三又窮子下類引經文火宅喻執教迷理窮子喻執應迷真藥草喻執根迷法化城喻執果迷因三又此第二已下引華嚴經等驗分下兩階異第一階文中有二一教說善惡異二教說開遮異又下四安樂行品已下是四又准依下引四阿含經等驗三乘菩薩同第二階謂同二乘行得三乘道二者就三乘空見有見名字同驗之前句驗名所目義此句驗義所得名文中先驗第二階有空有見有有見名後驗第三階有三乘名三者就求好厭惡深淺同驗之此句明第二階病同第三階即驗宗中六種偏病顛倒同故唯說一階文中以後驗前者經文以後惡魔發願教眾生破戒習誦驗前惡賊破戒比丘同諱惡故義當即是有見眾生准依已下貪好諱惡並說若非貪好為因豈得果時四天下无與等者四者就三乘俱不解法身如來藏同驗之此句明三乘菩薩解異第一階同第二階聲聞緣覺釋宗中等同字所謂解同已前四句對上分階竟五者就邪正有无驗之此第五句對下分階文開為二一就發心生善驗文有七節初兩節引十輪經唯驗第二階邪正並有後五節引涅槃經邪正相對說兼驗第三階純邪无正言三念者一念自來處從人道來二念生何處是阿鼻獄三念來何業謗大乘經國主所殺而來生此廻心信敬生甘露鼓如來世界壽命十刧二准依觀佛下就滅罪得道驗文有兩節邪正別說初說第二階滅罪得道後時節遠近已下說第三階受苦障道二又兩句又一切下以邪驗正具立三階此句人法雙立異前後故初句驗知有三階人後句驗知具三乘名三又一句又何以故下具驗本末成第二階下註此中五本五末通有五義異上下階一非常二非一切三自他信見不同用四長短善惡不相攝五不定於五本中上下及自利利他分同第三階餘翻上下階下註從他聞音名信自思生解名見又初心愚鈍名信後心決了名見又信則單於自他起見則兼於長短起上第一階能廢己同他盡下第三階能廢他同己盡二俱不被緣轉是故信見合說此第二階人信則於自他隨緣不盡見則於長短善惡稱實而知互不相攝是故別說又五本中普別及善惡不同第三階言好惡者由第二階本世間位有孝子賢臣君子等善爭名位惡故畏忠孝仁義善內惡少准除已下有四節驗三又一句又此段下喻說或五或七准第一階於中異者若就人則凌室冷喻二乘斷惡春秋陰氣冷喻大乘斷惡若就根則本來別教定性三乘根喻凌室通教三乘根及先少一乘根喻陰氣若就法則凌室冷喻斷少惡春秋陰氣冷喻遇緣不定不能捨身命財盡修善亦爾若就行則律儀戒斷惡四无量修善如陰陽氣若就位則廻心學一乘已去如陰陽氣其大地別高下喻三乘解石山谷別高下喻己見煩惱難廻草木喻三乘性別山谷草木出法華經四又二句又此段下合喻下註前句正合明遇緣不定所以唯得守節行順不得行違後句釋疑謂若就根機過習即善惡等一向不得雜亂若就位說得聖果廻心學一乘佛法即違順兼行然學法不盡異第一階五又一句又此段下結文亦有二一以名驗義二以普驗別唯第一階第三子段明依第三階佛法證有第三階根機眾生文有五句約為三分以立宗名第二階首合喻在喻說中故唯三分一法說釋義文有三句一就教驗人立第三階言利根者簡異瘂羊邪見成就簡異位前常沒顛倒簡第三階文有三分初牒宗標名名有通別別謂就位別說別名邪見成就空見有見眾生通謂就行通說通名三乘根機眾生略引三部經通證兩名次何以故下引經釋義下註有三者子句引三部經一者引摩訶衍經明見多佛具多解行下文結言文不具足者謂說出地獄後障道續善根文不具足二者引佛藏經明度多眾生三者引十輪經明多人錯學三部經俱道不免謗人謗法受苦障道後所以得知下會名歸宗下註體壞行壞非三乘器者舊十輪經舍有利根鈍根兩人其鈍根者即求善知識中所引者是其利根者即此第三階中所引者是是以新翻經開為二人一意樂加行俱壞非三乘器是利根人二戒見俱壞非三乘器是鈍根人二俱佛為說布施法舊經合說同行布施是故禪師玄會經文兩處別引何以故四子句者於第二階五者句中除第四一句非第三階二又一句又何以故下具驗本末成第三階下註本中未聞佛法未起行故以長短好惡為名末中已聞佛法已起行故以善惡為稱本中就情故說自利利他末中依法故成自損損他謂自不學當根佛法故成自損滅他學者故成損他以人驗法者由當佛滅度一千五百年後現有第三階人在故得以人驗法餘上兩階有无不定或隱有顯无人不可識故唯就教但三對驗三又一句又何以故已下以正驗邪別三階教下註前第一階引楞伽經以邪驗正別三階人此第三階引華嚴經以正驗邪別三階法何以故以楞伽經就凡夫性別說邪人就聖人性通含兩階是故以邪驗正別兩階根以華嚴經就處別說一乘佛法大集十輪共處同就三乘佛法是故以正驗邪兩階教即明最廣一切經律論常說純說顛倒下註謂一切經律論常唯純說惡及邪善誹謗正法毀呰賢聖雖有經說常正純正即顯常邪純邪謂說藥多明知病重二又一句又此段下喻說兼合准前兩階三又一句又以一乘名下結名驗義下註謂一向欲得攝他同下唯欲得己別好不用他好故唯性別不通自他不同一乘人廢己同他莫問自他俱欲得普好亦不同三乘眾生不能廢己同他不能攝他同己故莫問自他各欲得別都又一句又上來下惣結三階次又已下有五句明所依甚深大乘經謂涅槃經華嚴經就第一大段未明所依經者由佛具說三階根機不具對根說出世法故不就下第二第三大段未說涅槃經有句前句略說喻說但明三階根後句廣說法喻具明三階根法又前驗第一大段後驗四卷俱是通後兩大段所依法也初又一句就喻說明三階根機下註問經既就位何故立法者就病說邪答佛對根授法為根成者依根起行故就位說禪師遺法立因唯為下人破病學行捨邪歸正以立根故就病說又病則通三階有以人驗法根機易識正解正行或今時來具故立法者就病說也又第三階位前人不見佛故立法者就教起教對病說也後又一句說多喻說法說明三階法法謂甚深淺近世間三階法也又三田等喻所被根師子喻佛授三階法華嚴經有三句何以故者此舉所為難所詮也問華嚴經七處八會唯說一乘佛法聲聞緣覺不見不聞何以道言喻說法說廣明三階故初又一句都略抄出三階經文先以義摠釋後第一世間淨眼品下依文別解先以義惣釋有三一明對根授法時下註廣略兼正所為不同作四對說一真應二一乘三乘三三階四大乘小乘一為第一階人轉因成果故作真應說二為第二階人廻三入一破別成普故作一乘三乘說三為第三階人廻邪入正故作三階說四為第二階轉凡入聖未廻心人作大小乘說亦名作三乘說又亦為第三階位上不可廻入人作大小乘說由順病故是世間義若作一乘三乘說由破病故是出世義由法華經中簡機說故謂五千避席是二唯除以下明遺法立因時前對根授法時佛不為第三階說出世義此遺法立因時立法者正為第三階說出世義問云何為漸而言頓說答法有前中後際說有隱密顯了隱密者為漸說顯了者為頓說謂佛為第二第三階人說大乘小乘及世間義是隱密義說中際法說第三階不盡前際說彼无始非三乘種畢竟不得出世說第二階不盡後際說彼永入无餘涅槃身智俱滅畢竟不成佛故後雖為不定根者受記作佛猶聞定根二乘不為說究竟一性常樂我淨故是名為漸為第一階人翻此為頓三餘一切以下明所引一切經律論後第一世間淨眼品下依文別解二又一句又已下就喻說法說下正出所依三階經文三又一句釋今令得抄出所由先牒華嚴經對機授法為疑後唯除下引十輪經道法立因解難問經言不入餘人之手云何末法抄出答華嚴據對機故不入餘人手十輪據遺法故得今時抄出後又五句對諸門辯同異問答釋疑亦名不依餘經抄出所由一又一句對三聚辯同異雖邪定聚同第三階而正定聚含餘兩階不同而同此之謂也三聚有三重一有涅槃法无涅槃法三乘中一向定差別二善行惡行因差別三惡道善道因差別如文次第應知二又一句對四乘辯同異文含五者句一者人天乘佛法攝二者第三階佛不攝此中就第三階當位以明本末不同前對第二階正三乘位以明本末下引八句經文驗之三者第三階人出地獄後佛始攝四者鈍根瘂羊僧是四乘根佛現攝五者四乘中菩薩乘一乘三乘含說三又一句對四僧辯同異雖无慙僧同第三階餘三不同故不依說四又一句三階自相對辯同異亦以空見有見名對我見名辯同異即明七種最大別惡顛倒一於三階別作一階謂純邪无正第三階二就喻說別作一階謂定死不活眾生三就法說別作一階謂為一闡提說世間義四於恒河七種人別作兩種人謂空見常沒有見常沒合作一種常沒顛倒五於三聚別作一聚謂邪定聚六於四種僧別作一種僧謂无慙愧僧七於六道眾生別出其輕重分齊謂墮十方一切阿鼻地獄五又一句三階行位相對辯同異文有二義初就行位辯同異一乘三乘為正行六種偏病為邪行復以邪正為位前後行位為同為異後就體用辯同異此中水喻如來藏佛性池河喻三階根機行解病若以水攝池河則常同无別若以池河攝水則常別不同第一斷片對根起行法本寫本第一斷片大英博物館藏氏蒐集燉煌出土本第二千四百四十六號屬三階教籍中比較的教義組織具說簡明其體系知便首部破爛失題殘卷現存部一一乘三乘普別不同二對根起行法五段明義三發菩提心見法行法分齊等成此第二對根起行法五段開元釋教錄貞元新定釋教目錄所謂對根起行法一卷明一切眾生對根上下起行法於內有五段九紙或人集錄都目所謂明一切眾生對根上下起行法於內有五段一卷九紙傳相當如幸龍谷大學圖書館藏燉煌出土本中本殘卷後部本文二九四二當斷片龍谷大學論叢大正十三年四月號高雄義堅氏龍大圖書館所藏三階教資料就參照卷末人集錄於十二部經修多羅內驗出對根起行法一卷奧題有是由假題對根起行法但本寫本全長五十六呎卷子本以上記一卷九紙對根起行法知惟三階教籍題號中對根起行或對根淺深文字存數部又發菩提心關著述二三部本書是等關係如但本書數節偶華嚴宗第二祖智儼華嚴五十要問答中續藏二七四四九四五一本文二一以下引用以斷後期著作非本文中對校舉上述龍谷大學本華嚴五十要問答依本書要領第二部二二三階佛法對根起行三五三三五又體裁其他就第一部四三階教籍性質二十四及第一部五現存三階教籍斷片特附圖七參照禪師師律師亦如是類以可知一乘三乘普別不同者有二種一一乘二三乘第一段一乘眾生者從入佛法已來唯學第三階佛普普佛法不學第一第二兩階別佛法恒以普攝別別而常普何以故由畏罪小膽畏錯謬故於僧眾生斷惡修善求善知識具足行學盡第二段三乘眾生者從入佛法已來唯學第一第二兩階別佛法恒以別攝普普而常別何以故由大膽不畏罪不畏錯謬故於七法內唯偏行一行兩行即得出世未能具足行盡第二大段橫說為三階者一一乘根機凡夫菩薩常无六種徧偏病故竪說為一階二三乘及空見有見眾生等常有六種徧病竪說為一階以邪正不同故復分為兩階一三乘二空見有見眾生於上三階內明對根起行法者於內有五段一者明三階出世道不同所由義二者明三階出世處不同所由義三者明三階藉伴不藉伴不同所由義四者明三階斷鄣不同所由義五者明三階六法具不具所由義第一段明三階出世道不同所由義者於內有三段一者第一階於內有七段一者歸一切佛盡二者歸一切法盡三者歸一切僧盡四者度一切眾生盡五者斷一切惡盡六者脩一切善盡七者求一切善知識盡第一明歸一切佛盡者於內有三一者一乘真身佛二者一乘應身佛三者形像佛又明一乘應身佛者惣有兩義一能度一乘應身佛二一乘應身佛所度生一乘徒眾第一能度一乘應身佛者有二種一者淨度根熟菩薩摩訶薩或有語言說法令諸菩薩得入一乘或有用佛功德令諸菩薩得入一乘二者應身度三乘世界一乘菩薩摩訶薩在三乘世界同處而不同不同而同所言同者或一乘三乘並說一乘三乘菩薩摩訶薩聲聞緣覺乃至四果俱得道言不同者在蓮華藏世界七處八會說一乘佛法聲聞緣覺不見不聞者是二者一乘應身佛所度生徒眾者亦有二種一者淨土一乘眾生徒眾唯有淨土純善形菩薩摩訶薩无有雜類形二者三乘世界一乘徒眾者即七處八會種種雜類形者是第二明歸一切法盡者於內有二種一者頓教大乘法華嚴經諸大乘經等是二者普想大乘法莫問外經內經不作高下心為除分別病故普作大乘解第三明歸一切僧盡者於內有三種一者一切一乘聖菩薩僧二者正見成就戒見俱不破一乘凡夫菩薩僧三者正見成就破戒不破見凡夫菩薩僧第四明度一切眾生盡者於內有七種一者一乘聖菩薩二者正見成就戒見俱不破凡夫菩薩三者正見成就破戒不破見凡夫菩薩四者一切地獄眾生五者一切餓鬼眾生六者一切畜生眾生七者一切阿修羅眾生第五明斷一切惡盡者於內有二種一者斷善外惡二者斷善內惡第六明修一切善盡者於內有兩種一者修惡外善二者修惡內善第七求一切善知識盡者於內有三種一者一乘聖菩薩二者正見成就戒見見俱不破凡夫菩薩三者正見成就破戒不破見凡夫菩薩第二段明三乘根機對根起行出世道者於內有七段一者歸一切佛盡二者歸一切法盡三者歸一切僧盡四者度一切眾生盡五者斷一切惡盡六者修一切善盡七者求一切善知識盡第一歸一切佛盡者於內有二種一者三乘應佛二者形像佛又明三乘應身佛有二種一者能度三乘應身佛二者所度三乘生徒眾第一能度三乘應身佛者有二種一者三乘正見成就眾生及三乘聖人所感應身佛即釋迦牟尼佛王宮生從初長大乃至成佛說法度人捨凡成聖者是二者亦正亦邪三乘不定根眾生應身佛者或作天身人身乃至羅剎等善惡形令諸眾生得道者是第二明歸一切佛法盡者於內有一種三乘經律論等是第三明歸一切僧盡者於內有十二種一者一切三乘聖菩薩僧二者一切聖緣覺僧三者一切聖聲聞僧四者一切正見成就戒見俱不破三乘凡夫菩薩僧五者一切正見成就戒見俱不破凡夫緣覺僧六者一切正見成就戒見俱不破凡夫聲聞七者正見成就破戒不破見凡夫三乘菩薩僧八者正見成就破戒不破戒見凡夫緣覺僧九者正見成就破戒不破見凡夫聲聞僧十者亦正亦邪三乘菩薩僧十一者亦正亦邪凡夫緣覺僧十二者亦正亦邪凡夫聲聞僧第四明度一切眾生盡者於內有十六種一者聖菩薩二者聖緣覺三者聖聲聞四者正見成就戒見俱不破凡夫菩薩五者緣覺六者聲聞七者正見成就破戒不破見凡夫菩薩八者緣覺九者聲聞十者三乘亦正亦邪凡夫菩薩十一者緣覺十二者聲聞十三者地獄眾生十四者餓鬼眾生十五者畜生眾生十六者阿修羅眾生第五段明斷一切惡盡者唯斷一切善外惡第六段明修一切善盡者唯修一切惡外善第七明求一切善知識盡者於內有十二種上僧中廣說竟第三段明第三階空見有見顛倒邪見成就九種人第對根起行出世道者於內有七段一者歸一切佛盡二者歸一切法盡三者歸一切僧盡四者度一切眾生盡五者斷一切惡盡六者修一切善盡七者求一切善知識盡第一明歸一切佛盡者於內有五段一者形像佛唯就開眼得合眼已去邪正不別如觀佛三昧海經廣說二者十二種邪見成就眾生所歸一切邪魔佛如九十六種異學道經廣說及雜類神呪經等說三者明十二種正見成就眾生所歸真佛如大佛名經及諸大乘經等廣說四者明一切諸佛菩薩應作一切空見有見邪魔佛如諸大乘經內應身處廣說五者明歸普真普正佛於內有四段一者如來藏佛如楞伽經說勝鬘經涅槃經等廣說二者佛性佛如涅槃經說三者當來佛如法華經說四者佛想佛如華嚴經十輪經說第二明歸一切法盡者於內有八段一者經卷法二者極重惡法三者世間之法四者邪善佛法五者十二種邪見成就眾生所歸法六者十二種正見成就眾生所歸法七者一切諸佛菩薩應說空見有見法八者普想大乘法第三段明歸一切僧盡者於內有六種一者剃頭著袈裟僧二者明十二種顛倒邪見成就僧三者明十二種正見成就僧者四者明一切諸佛菩薩應作一切空見有見僧五者明普親僧六者明普想大乘僧第四明度一切眾生盡者於內有九段一者十二種邪見成就眾生二者十二種正見成就眾生三者一切諸佛菩薩應作空見有見眾生四者普親眾生五者普想大乘眾生六者地獄眾生七者餓鬼眾生八者畜生眾生九者阿修羅眾生第五明斷一切惡盡者於內有廿六段一者不淨說法得罪如殺三千大千世界滿中眾生二空見有見眾生雖得出家離出家法如𨽦十萬億三千大千世界此兩段佛藏經說三者讚毀三寶三乘長短得罪譬如日殺蟲五千萬㪶至滿千歲唯如一日一夜讚毀三寶三乘罪等如十輪經說四者打罵出家人如出一萬億佛身血如大集經月藏分經說五者若繫縛出家人得罪滅一切三寶盡令一切賢聖諸天善神出國盡而一切惡魔惡鬼惡神惡天龍八部競入其國如薩遮尼乾子經大集經等說六者與邪善道俗往來共住得罪喻如有人殺一切眾生命盡挑一切眾生眼目盡截一切眾生手足盡一種相似如大集月藏分經說七者八常一常沒二常行惡三常為无明所纏繞四其心顛倒常錯謬五常污身口六心常遠離棄捨真實一切法味七者常為煩惱及諸邪見或𠕀惑網所覆歸依六師傷敗聖道八常行誹謗語如大般涅槃經十輪經等說八者非時僧食賢刧千佛出世永不聞法常在三塗无懺悔處如像法決疑經說九者空見有見眾生如大地土空見如涅槃經說有見如佛藏經說十者五種不救一佛不救二法不救三僧不救四眾生不救五斷惡修善不救如摩訶衍經佛藏經如大集經涅槃經十輪經等說十一者從无始已來一切眾生皆作父母及六親眷屬等遍爾許時起貪瞋等一切惡與一切虛空大地等十二者從入佛法已來還用本貪瞋學一切佛法淳於好佛法內學上菩薩行行六波羅蜜由行六度徹倒到故得見佛復於无邊諸佛所種諸善根行六波羅蜜捨頭目手足十三者還於无量无邊諸佛所謗佛謗法由謗佛法滅爾許時行行善根盡墮十方一切阿鼻地獄一一方各有八大地獄一一地獄徑三千六百萬億歲受无間苦上火徹下下火徹上十四者從地獄出五百世中從生而盲後得值佛諸根具足十萬億歲如救頭燃晝夜六時懺悔罪由不滅還墮十方一切阿鼻地獄然後得出值九十九億佛始得免三惡道十五者免三惡已於无量无邊諸佛菩薩所斷惡修善學當根行不能徹倒成就更於无量无邊刧无量无邊諸佛菩薩所學當根出世法少分徹倒成就上來五段如摩訶衍佛藏思益像法決疑經等說十六者一切十惡於內有五段一自他俱知惡二自知他不知三者自他俱不知說竟乃識四者自他俱不識說竟亦不識五者於他善惡並有眾生唯見其惡不見其善十七者一切四重十八者一切五逆十九者誹謗正法廿者毀呰賢聖廿一者四念處惡於內有四段一身念處二受念處三心念處四法念處身念處者於內有兩段一生身二死屍生身者於內有五種一者行時知行坐時知坐臥時知臥住時知住行時雖作是觀而知從本來畢竟不可得二者被僧伽梨執持衣鉢視眴語默眼覺出息入息出禪入禪行者雖作是觀而知從本來畢竟不可得三者觀身四大皮宍觔肉筋骨髮毛抓爪齒等名為地大血汗等名為水大遍體和燸名為水火大出息入息等名為風大譬如屠兒若屠兒弟子既殺牛已分作四分行住坐臥見此宍肉分了了分明行者亦尒觀四大時行住坐臥見此四大了了分明雖作是觀而知從本來畢竟不可得四者觀身出入息出息長時知長短時知短入息亦如是譬如𢭀旋師若𢭀師弟子繩長時知長繩短時知短行者雖作是觀而知從本來畢竟不可得五者觀身不淨從頭至足其中唯有髮毛抓爪齒皮宍觔肉筋骨脾腎心肺肝膽膓胃生藏熟藏大小便利肪膏腦膜髓骸諸脈大膓小膓垢汗膿血涕唾目淚譬如𨽦倉盛物明眼之人開倉即見是稻是麥是麻是米觀此身倉亦復如是了了分明一種相似行者觀知此身不淨合成誰為是我我為屬誰作是觀時即得斷除一切色欲及以三欲一姿態欲二細滑欲三形狠欲雖作是觀而知從本來畢竟不可得第二死屍者有九復次一死屍經一七日膖脹清游膿汁流出想行者雖作是觀而知從本來畢竟不可得二死屍經二七日為蟲狼鵄鳥諸蟲獸等𭍲裂死屍血宍肉狼藉想行者雖作是觀而知從本來畢竟不可得三者死屍經三七日疽蟲遍出極大惡想行者雖作是觀而知從本來畢竟不可得四者觀死屍皮宍肉以盡血塗觔筋骨想行者雖行者雖作是觀而知從本來畢竟不可得五者白骨相連想行者雖作是觀而知從本來畢竟不可得六者白骨相離想七者白骨各在異處想八者骨白如貝想九者諸骨如鴿色及破壞如沙塵等想行者雖作是觀而知從本來畢竟不可得如涅槃經大品經等說第二受念處者於內念三種一者苦受二者樂受三者不苦不樂受樂受者飲食衣服名利等現在受用稱意名為樂受苦受者飢渴寒熱及苦行等名為苦受不樂受者飲食衣服名利等現在受用稱意樂未來世墮大地獄受大苦惱名為不樂受不苦受者飢渴寒熱及苦行等現在雖苦於未來世得出世道樂及人天中受諸快樂名為不苦受第三心念處者於內有兩段一邪貪二邪瞋邪貪者一切世間所有稱心之物悉皆有心著起心貪損益喻如一人為貪心故而求得一鉢飯共眾多人而食之人別皆得貪一鉢食罪墮地獄餓鬼畜生中二邪瞋者於一切三寶一切世間內所有一切違情之事莫問是佛法非佛法莫問是好是惡皆有心嫌有心欲滅却之由此惡業於未來世長養瞋心乃至諸佛菩薩正見成就凡夫所若不稱意亦欲滅却之由是惡業重墮十方一切阿鼻獄受无間苦第四法念處者於內有兩段一善法念二惡法念善法念者空无想无作惡法者我人眾生壽命見等第廿二者苦集二諦惡於內有兩段一者苦諦二者集諦苦諦者十方一切阿鼻地獄餓鬼畜生於六道內所有諸苦名為苦諦集諦者即是一切貪瞋讚毀三寶三乘如此惡業名為集諦廿三者十二因緣惡於內有十二一无明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死廿四者七漏惡一欲漏二有漏三无明漏四根漏行者觀一切眾生從无始已來根欲因緣作諸惡業墮大地獄受无間苦五受漏同前受說六親近漏好上上飲食衣服臥具房舍湯藥能生人著名為親近漏七惡漏惡人惡馬惡苟師子虎狼禽狩等名為惡漏復有四念漏念四大如毒蛇五陰如怨賊六入如空聚落第廿五者十想一无常想於內有兩段一者內二者外內无常者亦有二種一麁二細无常者始從嬰兒童子壯年衰老乃至身壞名麁无常細无常者從初入胎薄酪時凝蘇時宍肉揣時諸根成熟轉轉漸成名細无常外无常者亦有二種一見二聞見无常者亦有二種一者內二者外外无常者亦有二種一麁二細无常者春時一切樹木茂盛秋時彫落以是見故名麁无常細无常者春初百卉萌牙轉轉漸成名細无常內无常者或見盛年富貴煒燁後見散失知皆无常或見富貴庫藏盈溢後見貧賤知皆无常又見盛壯色力自在後見病瘦知皆无常聞无常者我聞初刧成時人皆項背光明不須日月又虛空中自然感得七寸粳米今悉滅盡知皆无常二者苦想以无常故失壞果時生大苦惱三者以其苦故知皆无常四者以无我故觀食厭想於內有四段一觸食二思食三識食四揣食觸食者譬如有人生剝牛皮諸蟲噉食極大苦想二思食者如大火燒心想三識食者如被三百鉾攢心想四揣食者應作是念若諸眾生回苦得食云何於食而生樂想我今出家受戒為欲捨身於食生著云何而得捨此身也雖然如似曠野食子宍肉想應作是觀如食蟲想隨諸不淨令與相似第五世間不可樂想譬如有人身殃重病設有音聲伎樂娛樂此人心无有悅是故名為世間不可樂想第六死想者譬如河岸臨峻大樹不久摩滅此身亦尒從其嬰兒乃至老年念念向死喻如屠兒𢫀牛羊至於屠所步步就死如囚向市步步近死此身亦尓是名死想第廿六者盜三寶財物悉墮十方一切阿鼻地獄第六段明修一切善盡者於內有二種一者惡內善二者得苦善惡內善者即如來藏佛性普真普正八種佛法是得苦善者於內有十二種一者常乞食於內八段一者法界檀二者法界忍三者法界慈四者法界悲五者少欲知足六者禪定七者多利多功德八者大解脫第一段檀波羅蜜者於內有四一者破病檀二者有作檀三者无作檀四者引導眾生檀第一破病檀者一切眾生從无始已來於食生貪貪一切好食唯欲自食由食好食增長煩惱无邊如經說為貪心得一鉢食眾多人而共食之人人皆得貪一鉢食罪具受地獄餓鬼畜生三塗之苦發心乞食即免此過一切好食悉皆頓捨次第而乞不簡貧富不擇麁細設有少貪即作不淨觀對治貪心不起何以故以著處輕故若於好食生貪病即難治何以故著處重故第二明有作檀者發心乞食即作三意一我今乞食若得食已悉共一切眾生而共食之所得之食分作四分一分自食一分與同梵行者一分與貧窮乞人一分與餓鬼畜生由發心大故得福盡虛空遍法界二我今乞食願令一切眾生以虛空為庫藏一切財法悉令滿足三我今乞食悉為成熟一切眾生皆令具足檀波羅蜜而行乞食第三段无作檀者於內有三種一者我今出家於一切世界寺舍僧伽藍內皆有二時食分我今乞食不食僧食一切伽藍二時食分悉為一切眾生供養一切三寶二者一切齋食皆有食分我今乞食不受三請以此三請為一切眾生供養一切三寶一切眾生三者我今出家於一切檀越家但到之處皆與我食悉皆不受我若不受悉施一切眾生此之三種雖不施物行者以智加法得福盡虛空遍法界第四段引導眾生檀者我今乞食為一切眾生若諸眾生應以乞食入聖道者我從今日乃至菩提導諸眾生常行乞食若有眾生應囙乞食而得益而不得者我不取正覺第二明忍者於內有二於好食生貪忍而不受不受好食者一切眾生從无始已來於好食生貪如今乞食於好食中忍而不受名為大忍飢渴寒熱風霜暴雨乞食比丘所得食分分作四分唯食一分極大飢苦觀察忍之是名忍辱第三明慈者一切眾生從无始已來所有好食唯欲自食若見飢渴眾生无心憐愍我今乞食所有好食並與一切眾生慈心憐愍救攝不捨故名為慈第四明悲者於內有二一者拔一切眾生現在飢苦二者復欲拔濟未來受苦眾生故名大悲第五明少欲知足者我今乞食次第而乞不擇麁細支身長道更不多求是名少欲身不積聚是名知足第六明禪定者一切眾生從無始已來為好食𢫀心隨緣散亂我今乞食不食好食但使支身不緣諸境心常寂靜无有覺觀是名禪定第七明多利多功德者若受他請即癈自業利生甚少我今乞食利生甚多若受齋食唯利一家我今乞食多人同眾又乞多家食利多眾生是名多利多功德者令諸眾生布施我食受多果報是名多功德第八明大解脫者若食好食為緣所縛不得自在我今乞食不食僧食及以齋食不食僧食僧事不忓不受請喚不與一切道俗親友往來不為世人所縛是名解脫二者次第乞食不超越隣比故名次第三者一坐食四者節量食於內有四種一者三分食二分二者中半食三者三分食一分四者四分食一分此裁食法如正法念經寶雲經律文等說五者過中不飲漿六者常坐不臥七者隨敷坐八者塚間坐九者樹下坐十者露坐十一者納衣十二者但三衣得惡善者即如來藏佛八眾佛法普真普正等是第七段明求一切善知識盡者於內有三一者文義俱不解瘂羊僧二者解文不解義瘂羊僧此二種瘂羊僧善知識云何可識必以法驗之可知是非於內有六階一者三業性濡從生已來於他一切眾生不敢共他相瞋相打乃至不敢嫌他二者性自縮頭在家不能作家長乃至不能作官識三者性自畏罪不作十惡亦不犯戒四者從出家已來性自持戒避罪五者從出家已來常縮頭不肯作人主法主等六者樂學十二頭陁常樂受下常樂受惡從生乃至出家已來具此六種堪共同聚依作善知識設有犯戒即多慚愧恒不覆藏雖犯禁戒終不重犯餘行與上同者亦得依作善知識三者利根人內有徹到學當根七法六法乃同上瘂羊僧畏罪等徹倒者亦得依作出世善知識又明學依善知識同行行能徹到者始得同聚相依修道第二段明三階出世處所不同所由義者於內有三段一者第一階一乘根機凡夫菩薩等入道處莫問聚落山林靜亂俱得道何以故由從无始已來學普行故二者第二階三乘根機眾生入道處者唯在靜處不得在聚落何以故由從入佛法以來常學禪定根機唯有靜處能長道故三者明第三階空見有見眾生出世處者唯得在聚落不合在山林閑靜何以故由從无始已來與如來藏佛佛性佛形像佛最有緣故唯得在聚落不得在山林修道第三段明三階藉伴不藉伴所由義者於內有三階一者第一階一乘根機凡夫菩薩有伴无伴皆得出世何以故由從无始已來所學一切行皆有心徹到行故莫問有伴无伴皆得出世二者第二階三乘根機眾生唯在靜處始得出世不得在聚落何以故由從入佛法已來唯學无相三昧坐禪故唯合在山林靜處得出世故三者第三階空見有見眾生學出世法唯在聚落不在山林唯藉多伴喻如破車藉多繩木須牢繫縛始可載物顛倒眾生亦復如是唯藉強伴始可入道何以故由空見有見眾生无始已來未學當根出世法志性未立數數進退唯須強伴始得成行第四段明三階斷鄣不同所由義者於內有三段一者第一階凡夫正見人等合學上法而行下法廢出世无障道罪二者第二階三乘正見人等唯合學當位法不學上一乘人所行法而行之者由下人學上法不當根錯故障道受苦三者第三階斷出障者唯得學一人一境一行一相續一身業一意業一口業若異是學行上兩階佛法不當根故雖行佛法念念之中唯長邪錯作无窮无盡阿鼻地獄等業受无間苦第五段明三階出世六法具不具所由義者於內有三一者第一階一乘凡夫菩薩學六法七法盡二者第二階三乘根機正見人等唯學七法不行六法三者空見有見眾生亦同上一乘人等行七法六法盡七法上來皆具明六法未說六法者一同行二寬三長四深五不退六相續又明就三階四卷內總有二義一者五名二者三字第一五名者復有二種一者經說有二二者義說有三經說有二者一一乘三乘空見有見眾生二菩薩聲聞緣覺一闡提義說有三者一三根就根機行位說二普真普正別真別正就體性解說三就處說三根第三三字者第一卷根機第二卷邪正第三卷輕重深淺淺深又明依修多羅內學發菩提心見法行法分齊義於內有兩段一者能行人二者所行法第一大段明能行人者於內有兩子段一者明驗能行人普別兩根分齊義二者明能行人見所行法及時節分齊義第一段明驗能行人普別兩根分齊義者有二種一者明普別兩根從緣轉不轉義有二種一者普根從強別緣出由弱普緣發一發已後唯進不退故知從本來是普根二者從強普緣出由弱別緣發一發後已已後唯進不退故知從本來是別根二者明驗能行人有病无病分齊義於內有二種一者明驗體別根機十二種顛倒眾生於內有兩段一者就病驗二者就行驗第一就病驗者於內有二一者就根本病驗二者就對緣長過驗就根本病驗者有三種一者因即內心貪瞋癡是二者緣即神鬼魔輔心者是三者果即空見有見是二者對緣長過驗者有二種一者內外相對驗二者違順相對驗一就內外相對驗者體別顛倒眾生從无始已來於自身惡不用他見不用他聞不用他知不用他說不用他治罸唯欲得見他惡聞他惡知他惡說他惡治罸他惡二就違順相對驗者於內有十六種一者順己情過己者信二者違己情過己者不信三者順己情過己者人前闇地道其好四者違己情過己者人前闇地道其惡五順己情過己者親近六違己情過己者不親近七順己情過己者承事八違己情過己者不承事九順己情過己者供養十違己情過己者不供養十一順己情過己者信受其言語及所說法十二違己情過己者不信其言語及所說法十三順己情過己者守護十四違己情過己者不守護十五順己情過己者欲使常存不滅十六違己情過己者欲使滅却之上未病相內就內外因果自他賞罸及違順等自驗自知是十二種顛倒眾生非十二種顛倒眾生二者就行驗知是顛倒眾生非顛倒眾生於內有十二種一者一闡提如涅槃經說信不具足名阿闡提二者賊如佛藏經說諸惡比丘所有過惡恒自覆藏不肯自言我是惡人譬如賊盜於王大臣前不肯自言我是賊一種相似三者苟狗如迦葉經說諸惡比丘與信心檀越親友往來不用餘者譬如偷苟狗先入他家作己家想不聽餘苟狗共入其中一種相似四者六師外道諸惡比丘所解佛法皆從他得而言自解譬如外道不師他人一種相似五者魔諸惡比丘自諱己惡不用他一切道俗見聞知說如惡魔一種相似六者增上慢一切空見有見道俗唯屬三塗若自言我是天是人是師是弟子是父母兒子是六親眷屬等皆是增上慢七者无慚愧僧諸惡比丘毀破楚禁戒覆藏詐作好人虛食信施无心慚愧八者㫋陀羅諸惡比丘樂見他過九者驢菩薩諸惡比丘被他一切好師僧檀越門徒眷屬譬如驢被師子皮詐現師子驢未鳴時一切鳥獸謂是師子若出聲已遠皆知非是師子皆悉唾言此弊惡驢非師子也諸惡比丘亦復如是認他好人愚人不識謂是好人智者所知乃是惡人與驢被師子皮一種相似如十倫輪經說十者名神諸惡比丘於佛法內實无所知於他行佛法人邊強作中正是名神十一者名鬼諸惡比丘難得心腹詐作親友與鬼相似十二者名九十五種外道第二段明能行人見所行法及時節分齊義者於內有七種一者於十二部經內驗取上下兩人出世時時有二一者佛在世及佛滅度後千五百年已前是正見人出世時二者千六百年後是邪見人出世時二者二種出世人三者二種出世境於內有二種一者體普即如來藏佛性八種佛法等是二者行普有七段一者普凡普聖莫問凡聖俱作聖解何以故一切一乘真佛及菩薩應作種種眾生一切一乘戒見俱不破正見成就凡夫發願作種種眾生一切一乘破戒不破見正見成就凡夫實作種種眾生一切三乘真佛聖菩薩聲聞緣覺應作種種眾生一切三乘凡夫正見成就破戒不破見菩薩聲聞緣覺實作種種眾生一切三乘根機眾生亦正亦邪菩薩聲聞緣覺實作種種眾生莫問凡聖俱作聖解故故名普聖普凡者一切邪魔變形作一切諸佛菩薩形像凡夫生盲不別唯敢同一切眾生等敬作如來藏佛性當來佛佛想佛等不敢別作真佛解何以故由凡夫無明不別得邪魔故故名普凡二者普善普惡普善者善惡俱善故名普善何以故一切顛倒眾生從无始已來於違情處莫問善惡俱作惡解從發初入佛法即須破此見於他一切善惡眾生唯作善解不見其惡若見一切破戒眾生亦不見其惡何以故由正見成就眾生雖亦遇緣作惡在惡人內一世二世即得出世聖道果故是故莫問善惡普作善解故名普善普惡者於自身內莫問善惡普作惡解何以故由顛倒眾生從无始已來於自身內唯見其好不見其惡今須頓破此見莫問善惡俱作惡解故名普惡三者普邪普正普邪者於自身內邪正俱作邪解普正者於他身內莫問邪正俱作正解四者普大普小普大者於他身內莫問大小俱作大乘菩薩解何以故如像法決疑經說制諸比丘不作諸惡唯除菩薩利益眾生是故於他身內莫問善惡俱作大乘解普小者於自身內莫問大小俱作小解五者普世間出世間普世間者於自身內莫問世間出世間俱作世間解普出世間者於他身內莫問世間出世間俱作出世間解何以故如方等經說制諸比丘不得與非法道俗往來不制出世人故是以於他身內莫問世間出世間俱作出世間解故名普出世間解六者於他身內唯作普正欲正多欲无邪少欲邪多欲七者於他身內俱作普真空妙有无邪空偽有四者二種人出即緣上出世境是五者二種人出世伴上七法內具說竟六者二種人出世難易下人若依上人所行法學即難成若依當位所行法學即易成七種者二種人出世障即不當根法等是一切道俗若於十二部經內自解能驗得二種七種者堪得自心依教修道有无无有邪錯若不驗得二種七種者用自心行佛法唯長邪錯第一大段明能行人分齊義已廣說竟第二段明所行法分齊義者於內有四段一者明所行法之次第二者明損益三者明淨土因果四者明三佛因果第一段明所行法行之次第者於內有八一者先學第三階佛法於內有三種一者普敬二者忍惡三者空觀第一段明普敬者於內有八段一者如來藏有二種一者法說如來藏是一切諸佛菩薩聲聞緣覺乃至六道眾生等體二者喻說者有五段一喻如阿䅶耨大池出大八八大河河雖差別水體无異一切凡聖雖差別不同藏體无異喻如伎兒作種種伎倆兩伎倆雖別身无有異无別異喻如一切瓦皆因泥泥作瓦雖差別土體无異生死依如來藏作如來藏作生死是名善說世間言說故有生死非如來藏體有生有死喻如波依水水作波風因緣故有波非水體有波喻如金莊嚴具眾具雖別金體无別皆一金一切凡聖差別不同皆是一藏二佛性者亦法喻並說佛性者是一切凡聖因一切凡聖皆從佛性而得生長喻說者喻如乳是酪因一切酪皆因於乳而得生長一種相似當來佛者一切惡四眾等現在雖行邪善行皆當作佛佛想佛者想一切眾生皆作佛想二者普真普正佛莫問邪人學亦得真正正人學亦得真正何以故如來藏佛性體唯是普法唯是真法於中无有邪魔得入其中是故不問邪人正人俱得真正三者无名想无相佛法有二種一者一切眾生體是如來藏未有真佛名故名无名未有真佛卅二相故故名无相二者一切六道眾生體唯是如來藏更无別名別相故名无名无相四者拔斷一切諸見根本佛法有二種一者一切如來藏體悉有聖性唯敬其體不見其惡善惡邪正故名拔斷一切諸見根本佛法二者一切六道眾生體是如來藏更无別法唯敬作四種佛等不見六道善惡等故故名拔斷諸見根本佛法五者悉斷一切諸語言道佛法一切眾生唯敬其體不說善惡六道等名故名悉斷一切諸言語道佛法六者一人一行佛法一人者自身唯是惡人一行者如法華經說常不輕菩薩唯行一行於自身已外唯有敬作如來藏佛性佛性佛當來佛佛想佛等故名一行七者无人无行佛法自身及他一切眾生皆同是一如來藏无有別體故名无人无行佛法八者五種不忓干盡佛法有二種一者欲行此五法唯須調亭一自他不忓不為自身不共邪善道俗往來二親疎不干不學當根佛法者不共往來三道俗不干一切邪善道俗不與親友往來四者貴賤不干一切貴賤不共往來五凡聖不干一切聖內多有邪魔一切凡內多有諸佛菩薩凡夫生盲不能別得是故凡聖不干唯除乞食難事因緣蹔共往來者不在其限二者自他俱是如來藏唯作一觀不作自他親疎道俗貴賤凡聖等解干心於此八段內更有二義一生盲生聾生瘂眾生佛法二者死人佛法第二段認惡者於內有十二種一其心顛倒常錯謬常行誹謗語心緣第三階佛法以去更作餘心即是顛倒常錯謬口唯得說如來藏佛法更作餘語即是常行誹謗語二者善惡兩種顛倒有二一者一切邪魔作諸佛菩薩形像顛倒眾生於內唯見其善不知是邪魔邪魔非是諸佛菩薩非善見善故名顛倒二者一切諸佛菩薩應作種種眾生顛倒眾生若違其心心必生瞋唯見其惡諸佛菩薩實非是惡非惡見惡故名顛倒三者內外四種顛倒有二一者邪貪於一切順情之處純見其善即善見善少善見多善以善攝惡俱作善解故名顛倒邪瞋者違情之處純見其惡无惡見惡少惡見多惡以惡攝善皆作惡解故名顛倒邪癡者善內得惡不覺惡內失善不知故名邪癡顛倒二者神鬼魔輔心但使一切諸佛菩薩及世間道俗稱其心者即是神鬼魔輔心四者一切經律論常說純說顛倒但使一切經文內唯說顛倒眾生是惡不說是善故名一切經律論常說純說顛倒五者七種別惡顛倒一者三階名第三階二者三聚正定聚不定聚邪定聚三者法說為諸菩薩說甚深大乘義為諸聲聞說淺近之義為一闡提說世間之義四者喻說一如定受不死二死活不定三定死醫藥所不能救五者无慚愧僧六者恒沙第七人名常沒七者最多阿鼻地獄果六者六部經說最名顛倒有五段一者一切佛不救空見有見顛倒眾生得值无量无邊諸佛於諸佛所行六波羅蜜由學佛法不當根謗佛法僧不免墮十方一切阿鼻地獄一切佛不能救二者一切法不能救有二種一者大乘小乘各各誦得八萬四千法聚由心一念嫌他學十二頭陁比丘即滅爾時許善根盡墮阿鼻地獄如大集經說二者讀誦十二部經不免謗佛現身墮十方一切阿鼻地獄如涅槃經說故名一切法不救三者一切僧不救四者一切眾生不救度得門徒弟子六百四萬億復度得九十六種異學外道廻心向涅槃不免墮十方一切阿鼻地獄五者一切斷惡修善不救大精進大持戒大懺悔大不自是非他不自高輕他非佛弟子是无慚愧僧攝七者十一部經說邪盡顛倒十一部經者一者迦葉經二者如大集月藏分經說明法滅盡品正法悉滅三者如阿含經說正法滅盡四者如大方廣十輪經說一切人民皆悉起於斷常五者如薩遮尼乹子經說一切眾生皆悉起於三種顛倒六者如摩訶摩耶經第二卷說文當佛滅度一千年已後唯有兩个比丘學作不淨觀正坐禪不起高下彼此是非心七者如大般涅槃經說末法世時一闡提及五逆罪如大地土八者如最妙勝定經九者大雲經十者佛藏經說正人唯有一人兩人十一人觀佛三昧海經八者四部經說出顛倒一者如摩訶衍經說三毒顛倒二者勝鬘經說二見顛倒三者薩遮尼乹子經說三種顛倒一非法貪心於十不善道生於樂心二者顛倒貪心由因自力得依時節得諸財物不生知足心更求他財是名顛倒貪心三者邪法羅網之所纏心於非法中生是法想於非義中生是義想於末世時非是智者所作言論作正論想是名邪法羅網之所纏心四者涅槃說種種顛倒九者兩部經說純顛倒一像法決疑經說過千年後像法之時諸比丘比丘尼優婆塞優婆夷所作眾善求名求利无有一念作出世心二如佛藏經說增上慢比丘无有一念求涅槃心但使无有一念出世心求涅槃心即是純顛倒十者兩部經說常顛倒一常沒二常行惡三常為无明所纏繞四其心顛倒常錯謬五常汙身口此五段如涅槃經說六心常遠離棄捨真實一切法味七常為煩惱及諸邪見或惑網所覆歸依六師傷罷聖道八常行誹謗語此三段如十輪說十一者卅二種徧病自他俱見真正住持佛法自利顛倒於內有卅二捴有二四一五二六一七一四者名想妄想不淨說法一四者依人依語依識依不了義經一五者一者自他自身唯見其好他身唯見其惡二者上下空見有見眾生唯欲得學上佛法不肯學下佛法三者普別唯學樂樂學別佛法不行普法四者善惡唯斷善外惡不斷善內惡唯修惡外善不修惡內善五者自利利他唯行自利他不行自利不行利他一六者一名聞二利養三徒眾四多聞五勢力六勝他二六者一貪二瞋三癡四神鬼魔五空見六有見一七者一深賞罸眾僧打罵繫縛及遣還俗滅一切三寶盡二者邪正雜亂盡三一切善天龍八部出國盡四一切惡天龍神鬼魔等競入其國而住滅三寶殺眾生令一切眾生悉作一切惡盡設有少分修善眾生惡魔入心為作留難破心而死五使一切有緣佛法不相當盡六一切根機不相當盡七一切藥病不相當盡十二者滅三寶成三災盡顛倒第三段明空觀者從上來所學解行皆從本來畢竟不可得此空觀上三階七法內廣已說第四段明七識八識於內有兩段一者性八識二者智八識性八識者本識幡真成妄對緣作六七於內有兩段一本識二對緣識本識者即如來藏佛性是對緣識者於內有二種一者對緣隨染識二者自心緣不覺識對緣隨染識者有六種一者眼識二者耳識三者鼻識四者舌識五者身識六者意識二者自心緣不覺識者癈緣談體名為七識第二智八識者本識覆妄成真名之為智於內有二種一者治或惑智二者對緣不染智治或惑智者起或惑幡愚成智對緣不染智者有二種一者對緣不染智二者癈緣談體智對緣不染識者於內有六種一者眼二者耳三者鼻四者舌五者身六者意此六者根對緣不染皆名之為智癈緣談體智者眠睡不覺由有智在名第七智上兩階佛法得聖已去具足行之第二段明先學普佛法後學別佛法先學普佛法者有兩段一者明上佛徹下佛二者明下佛徹上佛上佛徹下佛者有三種一者佛體二者名三者出果得第一段明佛體者報佛法界恒沙功德普皆滿足莫問淨土穢土皆是淨土據報身體都无上下對眾生故說有上下如華嚴經說第二段明名者同名異名佛多少與盡虛空遍法界微塵數一種相似第三段明佛果德者有九種一如寶雲經說九階德如來大慈等與一切眾生樂若於一眾生起慈心時乃至十方眾生亦復如是遍一切眾生界亦滿虛空界无有能知如來甚深境界邊際如來有大慈悲心不與聲聞辟支佛共如來於一切眾生起悲心時乃至一切眾生亦復如是為作利益如來大悲无有邊際非諸二乘所得究竟善男子如來說法不可窮盡能於一時普為十方眾生說法若一刧百千刧萬億刧无量阿僧祇刧作如是說一切眾生无有能知如來說法邊際本末假使无量眾生一時問難而於一念中各隨其類一音能答然如來辯才无有窮盡如來復有无量阿僧祇禪定三昧之所行處善男子假使一切眾生皆得十住各各皆入无量三昧於百千刧中各入異定如是經无量刧由不能盡知如來三昧境界如來有作无量阿僧祇應身令一切眾生應受化者悉見如來皆現其前於一念傾一一色相皆生信解各有差別如來又復一時皆現其前隨其所應而為說法令諸眾生悉皆受行善男子如來天眼所見境界无量无邊非宍肉眼境界所見是天眼境界如來於一念中悉皆見之如觀掌中菴摩勒菓如來天耳所聞境界无量無邊如上天耳一切眾生異類音聲隨其大小於一念傾悉分別知如來復有无量无邊无碍智慧无與等者不可為譬一切眾生若心所知隨其根性種種差別如來於一剎那傾悉分別知隨彼眾生各各所念各各所作隨造善惡所得業報如來能以三達无碍智慧剎那傾悉分別知善男子如來常作禪定何以故如來終不妄念如來諸根无有錯謬如來斷一切結使其心寂靜若雜結使其心散亂離清淨法如來以離一切業習塵垢永盡无漏无為於法自在一切三昧三摩拔提无量境界以度彼岸如來常在三昧常一威儀乃至涅槃如來无量百千億刧修集所得无有眾生能思惟分別知其量者二者如涅槃經十號十方一切佛階有十號一一號皆悉盡虛空遍法界三者觀佛三昧海經說如來真身非是凡夫心想境界但念如來大慈大悲生隨喜心得无量福第二段明下佛徹上佛者有三種一者如來藏佛性體恒沙功德與真佛無別二者當現雖未具恒沙功德當來具足恒沙功德與真无別三者佛想佛一切眾生雖非現佛想同真佛與真佛真身无別別佛法者得聖已去具足行之三者先學體佛法後學相佛法四者先學根本佛法後學枝條佛法五者先學生盲眾生佛法後學有眼眾生佛法六者先學世間菩薩所行佛法然後學出世間菩薩所行佛法七者先學自利行後學利他行八者先學得苦惡佛法後學得苦得樂佛法第二段明損益者有二種一者損顛倒眾生學上兩階佛法明損多少能滅一切邪善內正善盡能滅一切惡內善一切邪善內正善盡能成一切正內邪善內惡盡第三段明淨土因果於內有三段一者第一階淨土因果二者第二階淨土因果三者第三階淨土因果第一大段明第一階淨土因果者於內有二種一者因二者果因者有二種一者斷惡二者修善斷惡者有二種一者斷未入佛法以前惡二者斷入佛法已來惡斷未入佛法以前惡者有五種一者一乘根機凡夫菩薩從有心有識已來性自受惡二者性自捨好三者小瞻四者慈悲五者縮頭受惡者在家一切苦作恒欲自作不差餘人皆盡心盡力无有乖心一切惡衣惡食樂自受用樂自見己過不見他過者是一乘之人捨好者在家所有一切樂事一切好房舍臥具衣服飲食悉不自受悉捨與父母兄弟不見既好唯見他好者是一乘人乃至在畜生道中亦復捨好性分調善或作苟狗身與眾多苟狗共食好食不共餘苟狗爭使他食足離處然後乃食者是一乘根性眾生餘六道眾生內一乘根性亦如是類以可知三者小瞻在家不敢與他相瞋相打見他有短終不能道畏前人瞋俱如是者一乘人乃至在畜生道中小瞻畏人者亦是一乘根機眾生四慈悲者從无始已來恒怜愍一切眾生終不打罵殺害於一切眾生亦不生嫌好事樂事恒捨與眾生故名慈苦惡恒自受故名悲但如是者是一乘人縮頭者在家不敢作家長不能作官府乃至不作村邑聚落主斷事人等但使性如是者是一乘人斷入佛法內惡者有二種一者斷重惡二者斷輕惡重惡者有二種一者惡內惡二者善內惡惡內惡者有六種一者誹謗正法毀呰賢聖二者盜用三寶財物三者擧心疑他一事不着皆悉滅一切善根盡四者五逆五者四重六者十惡五重上以說竟善內惡者有四種一者學一切邪善佛法求名求利乃至求勝他障道等二者覆藏己過顯揚他惡三者起貪瞋六種等四者破滅三寶成三災盡七眾等二輕惡者一切大乘經律論說一切四威儀惡皆悉盡斷第二大段明修善者於內有二種一修普真普正善二修別真別正善修普真普正者即如來藏佛性八種佛法等是修別真別正者於法界行內二行皆捨身徹倒於內有九種一布施二持戒三忍辱四精進五禪定六智惠七慈悲八苦行九覆藏己善揚顯他善略擧九種餘法界亦如是類以可知果者有二種一法身淨土二應身淨土法身淨土者一方即是十方十方即是一方淨土即是穢土穢土即是淨土何以故由一乘根機凡夫菩薩從无始已來受一切內外惡盡捨一切內外好盡由受內外惡盡不與他故更无有惡由捨一切內外好盡不自受用故唯有善在莫問穢土俱是淨土淨土者即彌陁佛阿閦佛國等是第二大段明第二階淨土因果者於內有二種一者因二者果因者有二種一者斷惡二者修善斷惡者十惡五逆四重皆有心徹倒斷修善者於內有六段一者檀二者戒三者忍四者精進五者禪禪有三種一者觀佛二者四念處觀三者空觀觀佛者於內有兩段一者觀真身佛從應生王宮出胎行時童子成道說法度眾生入涅槃二者觀形像佛於內有二種一者在靜處觀形像佛從少至多乃至多乃至遍三千大千世界二者對形像佛觀形像佛亦從少至多乃至遍三千大千世界第一段觀真佛者是第二階上根佛判是性地菩薩第二段靜處觀者佛判同上性地菩薩對形像觀始得見者是第三階內下根眾生觀像法空觀四念處觀上已廣說第六智慧第三大段明第三階淨土因果者於內有二種一者因二者果因者有二種一斷惡二修善斷惡者於內有二種一者斷未入佛法已前惡二者斷入佛法已來惡未入佛法已前惡者於內有五段一者性樂受好在家一切好事一切好房舍臥具飲食衣服好名利等皆悉自受二者性不受惡一切苦作一切惡房舍及惡名利等皆悉推與他三者大膽胷揵性覔他惡樂相瞋相打樂作官府言他等四者性多瞋好瞋他殺他一切眾生五者樂出頭樂作種種人主法主等上來五段未入佛法已前惡但得入佛法已去能徹倒斷却上五階惡者即得生淨土入佛法已來惡者有二種一者非道惡二者似道惡非道惡者於內有三段一十惡有五重上已廣說二五逆殺父害母出佛身血殺真人羅漢破和合僧破塔壞寺焚燒經卷三者四重似道惡者於內有兩段一者似道惡二者增病惡似道惡者於內有五段一者從得入佛法已來恒順本貪瞋學一切佛法聞十二部經內說菩薩摩訶薩行不可思議諸佛所歎世人敬重多得名利復順本貪心即捨頭目手足於无量无邊諸佛菩薩所行六波羅蜜不免謗佛墮十方一切阿鼻地獄二者讀誦十二部經不免謗佛現身墮阿鼻地獄三者誦大乘小乘各八萬法聚由一念嫌他蘭若比丘尼墮大地獄從地獄出受惡羅剎身現身值佛懺悔罪由不滅未得出羅剎身復不得受記四者明講說大乘小乘法師攝師徒眾弟子度得六百四萬億由為求名利故嫌他謗真學佛法比丘由學不當根謗他真修道人故師及弟子及與檀越六百萬億人同墮十方一切阿鼻地獄出即隨出入即隨入五者明解行多少大精進大懺悔大不自是非他不自高輕他度得九十五種異學外道廻心向於涅槃四天下無伴非一轉輪聖王所有功德之所能及非佛弟子是无慚愧僧攝此五段雖學善法由所學解行不當根故善雖學道相似念念之中作阿鼻地獄等業二增病者於內有七段一者自用己見自心所見長已外於他所見長內无一分一毫可見可學二者自諱己惡反見他惡三者得他說己惡返更作惡四者於自身以善攝惡莫問善惡俱作善解五者於他身上以惡攝善莫問善惡俱作惡解六者於順情人法內唯見其好惡見无惡不善見善邪法見正短法見長七者於違情人法內无惡見惡善見不善正法見邪長法見短此見七種惡皆由學上不當根行增長七種惡此五種七種十二種廿六種能徹倒認盡能徹倒受盡能徹倒斷盡者得出世何以故由從无始已來唯受其好不受其惡故好業世間受盡唯有惡在從今已去一切好事悉皆與他喻世間人家家唯取好物內着家裏一切金銀財寶䅽米悉收取家內着一切惡物悉棄外相一切世界皆悉臰穢唯有惡在若使家家悉捨好一切金銀財物䅽米悉不受用盡棄外相一切惡物悉皆受用不與他人家家如是唯有善在清淨一種相似修善者於內有四段一者於他一切眾生唯見如來藏八種佛法等盡虛空遍法界善二者學十二頭陁三者觀形像佛四者空觀就十法明空一者佛二者法三者僧四者戒五者身六者口七者心八者身業九者口業十者意業佛者卅二相八十隨形好求佛不可得餘法亦如是及一切法分惜求不可得是名空觀果者即二種淨土是第四段明三佛因果者於內有三種一者法身因果有二種一者因二者果因者有二種一者正因二者緣因正因者即是如來藏佛性佛是因緣者即六波羅蜜行是果者即一切法界恒沙功德性出纏顯現者是二者報身因緣有二種一者因二者果因者有二種一者正因二者緣因正因者即是六波羅蜜是於內有六種一者明檀波羅蜜義於內有四種一者明田種差別二者明三因三果三者明自利利他四者明廢己成他滅病成德第一明田種差別者於內有兩段一者能種子二者所施之田第一種子者有二種一者內財二者外財內財者即身命外財者即金銀七寶田宅財物妻子奴婢等是第二段明施田有三種一者明破相平等田二者明憐愍度生田三明求福田第一明破相平等田者行布施時不見受者不見施者不見財物不見持戒不見破戒不問違順作平等觀普皆施與名為破相田二明度生田者行布施時見諸眾生貧窮孤獨飢饉困危以二種財救攝不捨名為度生田三者明求福田者於內有二種一者依田受施二者非田受施依田受施者實是持戒好人堪能利生依田受施自他長道二非田受施者實是破戒人等覆藏己過自稱持戒堪能利生若受信心少財得无量罪受信心檀越一口水得罪如殺三千大千世界滿中眾生第二段明三因三果者於內有二種一因二果因者有三種一者以內外二種財施與諸菩薩二者能受諸佛菩薩二種財三者同諸佛菩薩施受時同諸佛菩薩受生三種是時得道因果者行由三種施故得諸佛菩薩度故名之為果第三段明自利利他者於內有二種一者自利二者利他自利者於內有兩段一者一乘二者三乘一者上三種施與諸佛菩薩同行布施盡六法七法常同无別由布施行常同无別故得諸佛菩薩真身度之名為一乘是自利行三乘者上三種與諸佛菩薩同行布施時不盡六法七法少同別多得諸佛菩薩應身度之名為三乘是自利行利他者亦有二種一者一乘二者三乘一乘者一切眾生與己同行布施若盡六法七法常同无別得道以真身度之名為一乘是利他行三乘者一切眾生與己同行布施若不能盡六法七法少同別多得道以應身度之名為三乘是利他行第四段明滅病成德者於內有兩段一滅病二成德第一滅病者於內有兩段一者攝他同己二者以己同他攝他同己者一切眾生從无始已來所作功德於他一切人邊所有財物欲作功德者皆作心攝來向己成功德長貪無邊所求不得長瞋无邊以己同他者於他一切眾生所作功德皆有心助之由同他故貪即不生不攝他同己故瞋亦不起第二明成德者由同他一切眾生功德前眾生所作功德差別无邊財物雖少普助皆之境界寬故得福盡虛空遍法界是名成德二者持戒三者忍四者精進五者禪定六者智慧緣因者三寶眾生是果即十地滿足者是第三段明應身因果者於內有二種一者因二者果因者有二種一正因二緣因正因者即苦空无常行是緣因者三寶眾生及常樂我淨行佛性等是果者即應身佛是此三佛緣正義出涅槃經華嚴經等說又末世時邪多正少經文分齊道今時眾生皆悉生盲无有慧目不識邪正唯合行普不合行別但見經說學普者從凡至聖淳益无損學別法者從凡至聖損益並說是故生盲凡夫不解佛法不識邪正唯得學純益者未敢行別損益俱者問普別兩教俱是佛說若欲行學畏有捐者何經廣說答多經說若欲具足知者今具出之有六部經說行學別法損益者有二義一者學解二者學行第一解者有二種一損二益第一明損者有三如涅槃經說讀得十二部經誦得十二部經亦不免謗佛作一闡提業現身墮阿鼻地獄二者如大集經說大乘小乘各各誦得八萬四千法聚由嫌他學十二頭陁比丘即滅尒許時誦經善根盡墮阿鼻地獄具受諸苦出地獄已受羅剎身現身值佛亦不得授記即於佛前發大誓言寧受地獄苦不生人道我從无始已來生自在家聰慧利根自高輕他遏善揚惡以斯業障逕歷諸趣具受苦惱第二明益者亦有二種一者如勝鬘經說若人於恒沙刧修菩提行不如有人執持經卷何况有能具足受持廣為人說其福甚多不可思議二者如涅槃經說一聞大乘經永不生四惡趣第二段學行者有二種一者行二者度生第一行者有二種一者值佛於佛前无量无邊刧行六波羅蜜捨頭目髓不免謗佛墮阿鼻地鼻獄如摩訶衍經說二者坐得四禪斷欲界煩惱亦不免謗佛阿墮阿鼻地獄如涅槃經說三者大精進大懺悔大持戒大不自是非他不自高輕他有尒許解行佛猶不攝是无慚愧如十輪經說第二度生者有二種一者度得九十六種異學外道廻心向涅槃非佛弟子无慚愧僧攝二者門徒弟子檀越度得六百四萬億謗佛弟子學真法比丘與弟子及與檀越同墮十方一切阿鼻地獄出即隨出入即隨入如佛藏經說所學別解行損已廣說竟行學普法淳益无損者有三種一者自身見破戒惡他身見如來藏佛性善得受信心檀越飲食衣服臥具種各十萬不足為多如涅槃經說二者行不輕行增上慢四眾莫問善惡邪正俱敬作當來佛從是以後世世值佛乃至成佛淳有說益不說有損乃至打罵者損少益多後得入菩提道三者如維摩經說明八法淳說有益不說有損我見學此普法淳益无損淳善无惡故知生盲凡夫不識邪正喻唯合行普淳益无損法不合行別損益俱者問曰同是佛法何因普法學之淳益无損別法學之即損益俱有何義答因根別故有二義一普法无病二別法就根普法无病者如來藏佛性等體是普法一切凡聖一切邪正同是一體更无別法唯是如來藏一切凡夫莫問根機上下學之淳益无損不畏邪鎮錯別法就根者有二義一者對根明淳益无損但使一切經教內嘆學別法利益者唯是第一第二兩階一乘三乘人是別根當位學法由稱根故淳益无損二者不當根學別法淳損无益何以故由不當根下人行上人所行法故但使一切經教內明學別法損者皆是學法不當根此兩段義喻說顛倒眾生若別有損者喻如盲人射墮由不見故射物不着即射殺人淳損无益顛倒眾生若學普法淳益无損者喻如盲人射地放放皆着不射殺人淳益无損問曰末世學道邪魔至多不畏壞其善根答曰不畏但此普法乃是出魔境界何以故由行法具足故敬他身上八種佛法自知己身有十二種顛倒瞋即不生作一切空觀不淨觀故貪即不起已貪瞋无故癡亦不生貪瞋癡无故一切惡自然息喻如一切草木因地生長若地壞已一切草木亦皆墮壞一切諸惡亦復如是因三毒故能生諸惡若三毒滅者一切諸惡亦皆隨滅若諸惡无者一切邪魔何能得便為作留難喻如多人共殺一人以刀杖弓箭及以鉾𣔒不能殺得此人其力最大過一切人此人若欲東西无能制者隨意自在學當根佛法亦復如是諸惡不能害已慧心起出邪境若欲往生淨土无能制者問曰普別何解今更有疑但是一切佛法皆是好是上汝今所言唯道學下有何意答曰佛法是勝上不用下者為汝喻說譬如世人種菜欲得好菜必須屎糞而得生長大堪人食用癡人見之便作是言菜是人食若用糞屎云何可食名聲可惡欲得好菜應用金銀七瑤寶等糞現相交好菜必勝上智者見之即皆訶言癡人不如是也何以故一切好菜皆從屎糞而得生長若道現相大惡用七寶泥得好菜者无有是處七寶雖好體同瓦石不潤物云何糞菜若欲糞菜必殺於菜不能增長嫌於下行學上法亦復如是如經說高原陸地不生蓮華卑漯淤泥乃生此華上好佛法不生於道下惡佛法乃有道生一種相似問曰夫學佛法者皆悉度生自利利他若學普法得兼已不答曰不得以喻說可解譬如瓦坏未燒不堪覆舍若欲覆舍值雨即壞燒熟已去雨不能壞用覆舍者不在其限下根眾生亦復如是未得出世自是凡夫具有煩惱若欲利生不免還從緣起惡未得法忍已來唯學自利不學利他得法忍已去緣不能轉欲利他者不在其限更作一喻譬如有人沒落人國與他奴若走向家會須藏身晝隱夜行可至本國若唐公顯在路而行即被他捉不到本國顛倒眾生亦復如是求生淨度須息一切緣事不與邪善道俗親友往來專學普敬認惡空觀七一五不忓佛法者可生淨法土一種相似問曰敬他善得自見善得見自善不見自身惡得見他惡不答曰不合以自他相對故猶見自徹惡即見他善徹若自他俱見善即自見惡不徹若自他俱見惡即敬他善不徹譬如兩國共戰必須別自國軍眾着黃他國軍眾着赤由國國軍眾別有記識鬪戰用力即齊可有勝劣若兩國軍眾其相一種不別自許軍眾衣半黃半赤他國軍眾衣亦半黃半赤即不任鬪戰何以故彼此相同故又明上來五門觀分時學法位判一日作如來藏等四佛觀乞食來住作認盲及應佛觀入家次第乞食作普親觀入家未食已前作食不淨觀日沒初夜作空无相觀臥時作无常觀半夜已後先作不淨五門觀等次作認多惡觀始終常定五觀次弟第章門從首至末十四日十五日緣一遍始終常定三佛為一門觀一果德滿足即是真佛二佛性佛三形像佛二佛性佛義當度法界眾生盡三形像佛者義當亦能度法界眾生盡何以故一切眾生但使有心敬者皆得五眼淨亦永滅一切法界惡盡第八斷片无盡藏法畧說无盡藏法畧說第八斷片大英博物館藏氏蒐集燉煌出土本第百九十號屬首部破爛末文无盡藏法畧說竟十一段義以三階教特有无盡藏法畧說本斷片十一段義中初五義闕大乘无盡藏法釋第九斷片併略十一段義要領知得本書末部信行遺文第七斷片首部同尚第二部六二无盡藏法五義相對並十一段義六二四六三三第二部四三普行五三五五第一部五現存三階教籍斷片特附圖九參照常樂第五各三義不具者長短不定三者進退三義具足者是常一者廣大如日不斷盡未來際三者不退乃至命盡第六明法界行修成難易者常樂我淨无盡藏少處可成多處難辨苦空无常无盡藏隨處多少皆得普同第七明法界行大小相者若能常樂苦空等兩種具行盡者是大乘若唯偏行苦空不盡常樂者判屬小乘第八明現學多少者明法雖塵沙總說十六若總別具明則卅有餘施者亦有兩種一者唯能及總日別施錢十六分二者總別具行日別施錢卅分總別之相已下廣出一者學供養佛无盡禮佛等是二者學供養法无盡轉經等是三者學供養僧无盡莫問持戒犯戒普供養者是四者學供養眾生无盡亦莫問有行无行六道眾生一種普供養六道者一天二人三脩羅四地獄五畜生六餓鬼五者總明離一切惡无盡六者總明脩一切善无盡七者學施香无盡八者學施光明无盡燈燭是九者學施洗浴无盡十者學施音聲无盡鐘唄等是十一者學施衣服无盡十二者學施房舍无盡十三者學施床坐无盡十四者學施食器无盡十五者學施炭火无盡十六者學施飲食无盡食无盡者事別多種一者粳米二者燸米三者麵四者油脂五者粟米六者小豆七者大豆八者柴九者作食人十者塩酢十一者蜜十二者薑椒十三者胡麻十四者酪十五者𦬔菜諸雜菓等此十六種无盡法總別具出竟或有布施者於上十六法或有總施或有別施普告施主所有施者莫問總別皆作普用意或廻或減佛法僧分作餘十三種用乃至食等或廻或減十五通用亦如是如十六既通乃至法界行盡或廻或減亦如是又常樂苦空二種无盡藏互用法亦如是於二種无盡藏法行之多少亦須具知所施財物莫問多少會待常樂无盡藏得成相續然後餘用終不得廢脩常樂先行苦空若於十六法一一別施不聽互用者願更隨緣作功德一向不得共通用者一處又普告一切施主各各以此无盡善根令一切眾生自然具足十六種无盡果第九明所度眾生得益淺深者位判有五一者同行人得十六法无盡二者隨喜人得十六法无盡三者見人得十六法无盡四者聞人得十六法无盡五者受供養人得十六法无盡第十明无盡藏種子多少者法別有兩一者田无盡所謂供養佛法僧及眾生日日常不斷是二者種子无盡此明能施人日日布施相續不盡是无盡藏第十一明作无盡藏人進退有罪无罪義者於內有兩子段一者明別功德作者唯得進不得退何以故別功德不通自他所以與奪有罪二者明普功德隨人進退進者得福退者无罪何以故普功德體通自他所以退者一向无罪唯除退菩提心雖退猶勝本不作又所捨之物若自不用轉與他人別有兩失一者捨常樂入苦空失二者復有違信之𠎝此十一段義文裏唯明有義不出空文然解義之徒見有達空並知不少普別義亦如是唯明諸大乘經裏普行法不出其別普法者如摩訶衍經四攝等廣明普施法別法者普遍一切脩多羅略明少分或說善惡一處損益多少法明持戒之人與破戒者同其事業二俱不免地獄或噵持戒人不得與破戒人共一河飲水或噵持戒人不得向破戒人禮拜如涅槃經說或明遠惡近善遲疾法教眾生遠惡知識如怖怨賊近善知識一者苦樂同二者身命財等不惜三者眷屬不惜如阿含經說或明遠惡近善遠近法有四法當急走避之去百由旬一由旬四十里百由旬四千里四法者一者惡友二者惡眾三者或多語或戲咲四者或瞋或鬪何以故釋出罪相輕重義寧斫截三千世界眾生不於初發心菩薩所起瞋心或明不得與說出家人等過者往來如方等經三十五種護戒法廣說又寶雲經不聽向破戒家乞食又法華經四安樂行品教佛去世後末法法師說法法於內明遠惡近善法義最具足總而言之如諸經律戒品廣說又末法凡夫學捨邪入正涅槃最顯捨惡入善捨小入大十輪經最顯无盡藏法略說竟第九斷片大乘法界无盡藏法釋大乘法界无盡藏法釋第九斷片大英博物館藏氏蒐集燉煌出土本第七百二十一號屬首尾破爛失題斷片其內容第一第二辨名第三立義第四釋文四門依大乘法界无盡藏法註釋仍假題大乘法界无盡藏法釋尚第二部四三普行五五五一第二部六二无盡藏法五義相對並十一段義六二三四第一部五現存三階教籍斷片就中附圖九參照債主次輕者受牛馬驢騾等身擔重挽車蹄劈領穿以償地債最輕者為人奴婢衣不蓋形食不充口鞭胷打背着鉗印面身償他力故地獄傳云負他一錢餘報一生作人奴婢身償他力即其義也如是宿債且計一生一家眷屬互相養活追求錢財或因官斷事憑恃威力枉法取財或市易興生輕稱小計行濫誑逼取他利潤或作農夫焚燒山澤溉灌陸田耕耩磨破他巢穴漫放牛驢損他苗稼繰絲剝繭熏蜂取蜜殺麝求香或作工師抄經寫像偷減佛金竊經紙墨少功高價節日參師食僧厨供侵損三寶如是宿債不能不有設欲別償隔生難識設使知處詶補叵充若不因作无盡藏陪无始已來百生千生百劫千劫天生上爾許債負何由可了行者今因无盡藏施无始宿債一時頓停不畏債主更為障道業障報障一時頓滅父母兄弟六親眷屬頓出三塗豈非大益問无盡藏法日捨一分錢或一合粟一年不過卅六錢三斗六升粟云何頓陪无始債了離苦解脫答譬如貧人負他千貫每被債主欲來掣奪貧人媿懼詣長者所首過要期願恕我罪貧无得處日別客作若得一錢即還長者長者聞已歡喜恕過更不牽掣即免枷禁豈非小施即除大難无盡藏施亦復如是第二云何發菩提心同菩薩行作得度因緣者謂共信行禪師及一切國界一乘菩薩同其一行作得度因緣但一切國界一乘菩薩於念念中有福德智慧二行滿足成佛放光召集有緣假使自身造罪墮三惡趣下至阿鼻地獄由同此无盡藏一行與諸佛菩薩有緣故蒙佛光照拔出三塗生人天中受化生身聞法得果利益者是如釋迦如來說大般若經及涅槃經放光照三惡趣下至阿鼻地獄眾生皆聞法得益者是故華嚴經賢首菩薩品偈說隨其本行得光明宿世同行有緣者所修行業有同者及行隨喜功德分聞見菩薩清淨行彼人得見此光明即是其義為此二意故須作无盡藏第二辯名者言大以寬長深遠不退為義乘以運載為名小乘法中唯明自利大乘法內自利利他是故菩薩依大悲心立无盡藏法六波羅蜜檀度為初四攝行中布施為首上同諸佛內應法身外利眾生窮盡法界眾生界盡此藏乃盡法身无盡施行无窮由境界常行相續故立无盡名究竟深廣含蘊一切故名為藏藏有軌儀復名為法故曰大乘无盡藏法第三立義者傳禪師說略有五義一上下相對二普別相對三自他相對四常无常相對五因果相對第一上下相對者上謂敬田下謂悲田准依華嚴經說又放光名示現寶令諸貧乏得寶藏以无盡藏施三寶因此得成示示寶既言以无盡藏施三寶即是敬田又維摩經說諸有貧窮者現作无盡藏因以勸道之令發菩提心准此以明即是悲田此有兩義一以无盡藏物施貧下眾生由數得施故勸發善心即易可得二教貧窮人以少財物同他菩薩无盡藏施令其漸發菩提之心華嚴經云為貧窮者演說正法令得菩薩諸清淨藏上來二經明悲敬二田故名上下相對第二普別相對者准依勝鬘經說世尊我從今日乃至菩提不自為己受畜財物凡有所受悉為成熟貧苦眾生此義即是普別相對捨別取普也不因凡夫无始以來所畜財物但為己身及己親屬設復施他或為人情報恩憑力不為成熟貧苦眾生今无盡藏菩薩行施不觀三代貴賤善惡邪正大小怨親平等普施一切何以故由貴賤等三代不定故乃至怨親一一廣說又維摩經云法施會者一時供養一切眾生若施主等心施一最下乞人猶如如來福田之相无所分別等于大悲不求果報是則名曰具足法施第三自他相對者如地持論說種性菩薩於諸事業廢我成彼言事業者即是无盡藏功德事業廢己同他故像法決疑經云若復有人多饒財物獨行布施從生至老其福甚少不如復有眾多人眾不問貧富貴賤若道俗共相勸化各出少財聚集一處隨宜布施貧窮孤老惡疾重病困厄之人其福甚大假使不施念念之中施功常生无有窮盡如後廣說又何以故自利行狹而短由自身不遍法界為身所作永无遍義利他行寬而長由眾生遍法界為生所作十六事業皆有普遍義又自利行損損有多過在家破家在寺破寺在國破國在道破菩提心何以故自利行者好事自取惡事與他所以在在處處破壞又長惡无窮何以故由奪他好自屬己己好不與他所以長貪无窮推己惡與他他惡不肯受所以長瞋无窮利他行益翻上即是第四常无常相對者准依涅槃經說若修常施是則名為檀波羅蜜若時時施是名為施非波羅蜜言常施者謂相續常非常住凝然所以得知由時時施不日日相續對修常施故知相續波羅蜜者名到彼岸如度河水或從東岸到彼西岸名到彼岸言波羅蜜到彼岸者謂將行者從生死此岸到涅槃彼岸故曰波羅蜜也第五因果相對者於中有六一求不得因果二求得因果三自然因果四成熟因果五相似因果六具足因果第一求不得因果者他來乞求不肯施他於未來生求官覓財皆不能得是名求不得因果第二求得因果者涅槃經說見有乞者然後乃與是名為施非波羅蜜若无乞者開心自施是則名為檀波羅蜜若他來乞然始布施來生要須少用功力方獲財位是名求得因果第三自然因果者見他功德有不辨處即將无盡藏物隨喜助成來生衣報不待規求自然而得如轉輪王及天帝釋梵天王等衣食自然七寶宮殿隨念皆得是名自然因果第四成熟因果者如有乞求布絹等物欲作衣裳將无盡藏現成衣施或索米麵欲作飲食即將成熟餅飯等施來生不假營求感他成熟衣食供給供養故名成熟因果第五相似因果者於中略明有十六種无盡因還感十六種无盡果如下廣說第六具足因果者云何不具足而言具足者謂如有人長壽无病端正聰明貧无衣食是名具不足或有衣食短命多病醜陋頑嚚亦是不具足設得好身命智慧念有衣食无三寶境亦不具足設有三寶不蒙攝受不得供養親近承事斷惡修善亦不具足設得供養有香无燈有燈无香乃至十六種有一闕多有多闕一類應廣說名不具足言具足者謂從生死前際以來於身身上常分感得十六種相似果即具足因果義此有兩種一者感內身八具足果一色具足二力具足三壽命具足四信言具足五眷屬具足六財寶具足七威力具足八智慧具足二者復招外寶具足果如華嚴經明法寶周羅長者具足果報經云時彼長者執善財手將歸家善男子且觀我家爾時善財遍觀舍宅悉閻浮檀金色七寶為墻周遍圍繞瑠璃莊嚴車𤦲為柱敷赤真珠寶為師子座建師子寶幢張瑠璃寶帳如意珠網羅覆其上阿僧祇寶而莊嚴之馬瑙寶池八功德水盈滿其中一切寶樹周匝圍繞其宅廣大十重八門爾時善財見最下重設眾餚饍慧施一切見第二重施雜寶衣見第三重施惠一切寶莊嚴具見第四重施內眷屬悉履善行巧於語言見第五重乃至十住菩薩雲集其中結集正法離世間樂出一切論諸陀羅尼三昧法印分別三昧智惠光明見第六重得般若波羅蜜菩薩充滿其中具甚深智得寂靜明智惠藏地无礙法門超出三有境界无礙念不二法結集般若波羅蜜門分別解說般若波羅蜜門彼菩薩眾不可說莊嚴而莊嚴之見第七重嚮忍菩薩充滿其中出方便智惠悉能聞持諸佛法雲見第八重常住菩薩充滿其中具諸神通遍一切剎照一切眾生一切法界具足法身詣一切佛无所障礙悉能受持一切佛法見第九重補處菩薩充滿其中見第十重一切如來充滿其中從初發心修菩薩行超出生死滿足大願神力自在一切佛剎及其眷屬轉淨法輪化度眾生顯現住持爾時善財見如是等奇特事已白言大聖我未曾見如是清淨大眾昔於何處種諸善根今得如是勝妙果報長者答言善男子我憶過去无量光明法界普莊嚴王如來出興之時彼佛入城我以香花伎樂而供養已持此善根廻向三處謂滅除貧苦常見諸佛菩薩及善知識恒聞正法故獲斯報准此文驗則是具足因果義也從生死後際以去分得內外具足果至佛圓滿內具足果略說佛有三十二相或八萬四千相或說有十蓮華藏國界海微塵數佛大人相於諸支節種種妙寶以為莊嚴復有八十種好或說一一相各有八萬四千隨形好其十蓮華藏國界海微塵數佛大人相一一相各有隨形好多少可知十力四无畏大悲三念處三不護等佛百四十不共法等功德无量无邊今且略說福德智慧二種莊嚴言福德莊嚴者准无上依經明若十方一切眾生俱行十善所有功德更增百倍等佛一毛相福德又佛一切毛相福德更增百倍等佛一隨形好福德又佛一切隨形好福德更增百倍等佛一大人相福德一切大人相福德更增千倍等佛白毫相福德又佛白毫相福德更增百千倍等佛无見頂相福德以佛无見頂相福德更增億百千倍等佛梵音相福德佛因此相以一音聲遍滿十方无邊世界說法利生隨類各解言智慧莊嚴者如大集經說若三千大千國土眾生所成就智比一信行人智百分不及一千分不及一乃至算數譬喻所不能及假使三千大千國土悉如信行人所成就智等一法行人智如是校量大千國土法行人智等一八人智如是大千國土八人智等一須陀洹智乃至斯陀含阿那含阿羅漢辟支佛展轉相比亦如是假使三千大千國土悉如辟支佛智等一百劫菩薩智得忍菩薩不退菩薩補處菩薩智展轉校量亦如是百分不及一千分不及一乃至算數譬喻所不能及若无量无邊世界眾生悉如補處菩薩所成就智以比如來處非處智百分不及一千分不及一乃至算數譬喻所不能及上來校量智慧分數多少是為諸佛智慧莊嚴如前所說福德智慧多少惣名內報具足外報具足者如華嚴經說普賢菩薩願所得清淨國三世莊嚴剎悉現於此中則是其外報具足義又華嚴經總說佛功德多少具足義一切十方諸眾生皆悉一時成正覺彼諸正覺一一有不可稱說淨妙身彼淨妙身一一有不可稱說如來頭彼如來頭一一有不可稱說廣長舌彼廣長舌一一有无量清淨妙音聲以彼一一妙音聲不可說刧歎諸佛不可稱說一切刧宣揚讚歎佛功德不可說刧猶可盡歎佛功德无窮盡上來至此頭第六具足因果竟自下第四釋文本云就裏有十一段義如文廣列不煩具錄本云第一明初起行人者信行是釋曰是即一乘根機菩薩此具三義一解真二行深三病輕言解真者謂識別相似空有大小染淨違順邪正善惡六度等乃至法界相似法亦如是是為解真言行深者謂行善調柔應斷者能斷徹應修者能修徹是為行深言病輕者謂聞十惡五畏三病或聞相似邪解行淺深或聞疑執損益或聞判邪正多少或聞法錯分齊或聞如此迷心輕重等惡聞即永斷或於少利處聞即能捨於多利處聞即能行是為病輕問如今化作无盡藏人皆未有解真行深病輕三義若為相應答但施无盡藏者悉應教云人信行禪師法界普无盡藏又非直共信行禪師同行亦共一切過去未來現在十方虛空法界等一切國土一切一乘菩薩同此一行由信行禪師等一切菩薩正故但同行隨喜見聞等四階人並正如蛇入竹筒筒直蛇亦直然共信行禪師等同此无盡藏行故由所同正故能同亦正不畏邪錯又无盡藏陪償宿債如現在負債償他豈畏邪償即便枑拒本云第二行行時節者願從今身乃至成佛釋曰據解无盡藏排法為長短相對義但以從无始已來所學所行短促根性今發心共他菩薩同行除去短促取於長時乃至成佛本云第三明所為寬狹者普為一切釋曰此名寬狹相對由无始已來所作狹劣或唯為一身不為他人或為父母妻子親屬不為踈人或為順情朋友知識不為違情怨家債主或為貴勝憑恃威力不為貧窮邊地下賤不遍法界名為狹劣故今行者除去狹劣怨親平等普為一切法界眾生本云第四明法界行多少分齊者大判有兩一者常樂我淨无盡藏二者苦空无常无盡藏釋曰次下文具釋本云第五明法界行常无常所由者於法界行各各三義不具足者是无常一者寬狹不定二者長短不定三者進退不定於法界法各各三義具足者是常一者廣大如法界二者日日不斷盡未來際三者不退乃至命盡釋曰此中三義亦得名為寬長深義由捨身命財盡畢竟不退故得名深如是三義准攝大乘論說義當四修一廣大法界即當論說无餘修是謂塵沙萬行无一不修二究竟如虛空即當論說恭敬修是謂一一行如皆窮理究源殷勤徹到竭力盡命不避苦惡非婆婆心修三盡未來際即論所明長時修是謂一一行皆經三大劫阿僧祇劫四无有休息即論所說无間修是謂其心相續未曾間斷但一一行具上三義四種修者名為常樂我淨行亦名一乘大乘行若不具足三義四修者名為苦空无常行亦名三乘小乘行本云第六明法界行修成難易者常樂我淨无盡藏少處可成多處不辨苦空无盡藏隨處多少皆得普同釋曰其常樂无盡藏上同諸佛成真身行攝要須具足三義四修是故少處可成多處不辨所以名難要在京城化度寺大處由人是處當具十六種事方可辨不畏邪錯以同禪師相續真故苦空无常无盡藏下同眾生成應身行攝不具足三義四修是故隨處多少皆得普同所以名易即七月十五日盂蘭盆等是所在州縣造功德處皆得普超隨喜助成不必要須送化度寺本云第七明法界行大小自去若能常樂苦空等兩種具行盡者是大乘若唯偏行苦空不盡常樂者判屬小乘釋曰此中大能含小故具二行小不容大故局苦空如聲聞戒即是菩薩三聚戒中律儀戒攝本云第八現學多少者明法雖塵沙總說十六若總別具明則卅有餘施者亦有兩種一者唯能及總日別施錢十六分二者總別具行日別施錢卅分總別之相已下廣出釋曰准依華嚴經明法界皆行是无盡藏義彼經略說信戒聞施慚愧等十種无盡藏法行依大集經明八十无盡藏法義從因至果說故名法界行並是无盡藏義此中由行十六種无盡因故還感得十六種无盡果以下廣說本云一者學供養佛无盡禮佛等是釋曰此中資給禮佛正是所為修塔像等兼是所營就營塔像先修故盡然後造新是故經云造新者不如修故其福甚多又云但能修故不假造新其人功德不可思義議由此藏故即得頓償无始以來侵損一切佛物塔物障見佛罪盡復得未來親覲諸佛亦成一切眾生禮佛行故未來即得從一佛國至一佛國供養諸佛教化眾生嚴淨佛土乃至成佛微如妙色身放无盡光利益一切故華嚴經賢首品偈說又放光名寶莊嚴彼光覺悟一切眾得勝寶藏不可盡以此供養諸世尊以寶獻佛及塔廟兼施一切諸貧乏以眾珍奇供最勝因是成寶莊嚴光又放光明名歡喜彼光覺悟一切眾歡喜愛樂佛菩提發心樂求无師寶建立如來大慈像相好具足坐蓮華讚歎最勝諸功德因是得成喜光明又放光名身根淨諸根毀壞令具足禮拜諸佛及塔寺因是得成身淨光本云二者學供養法无盡轉經等是釋曰寫經等亦是先修故經後造新者由此藏故即得頓償无始身來侵損一切法物及障法罪盡未來復得親聞佛說十二部經少聞多解繫念思惟如說修行利益眾生或得聞持陀羅尼果一聞領解永不忘失如賢愚經說阿難往昔曾作長者供養誦經沙彌由此今得親傳佛法一无遺漏如瓶寫水置之異器即其義也乃至成佛常放光故賢首偈云又放光明名樂法彼光覺悟一切眾聽法講說及書寫於正法中常愛樂佛法欲滅能護持令求法者意充滿精勤修習佛正法因是得成樂法光又放光名法自在彼光覺悟一切眾陀羅尼藏不可盡能持如來一切法恭敬供養持法者防衛守護眾賢聖以无量法施眾生因是得成自在光本云三者學供養僧无盡莫問持戒犯戒普供養者是釋曰不但持戒破戒一時普供養准大集月藏分經亦須先供養破戒无戒傳禪師導檀越設供先納突會僧後供踈請僧何以故突會僧不依戒律義當破戒故若施主不肯納突會僧行佛法者即超去若欲受檀越請應當先問容突會不若不言不能莫受踈請明供養法自有三門一明請僧法二明營供法三明奉施法第一明請僧法者復有三重一明別請損二明普請益三明延請法一者明別請損有十種一盜取僧物二減施主福三是外道法四不順孝道五速滅佛法六現障四聖果七當來不見佛八不消信施九鬼神十賢聖訶責如梵網經說若佛子一切不得受別請利養入已即取十方僧物若別請者是外道法七經云兵奴為比丘受別請法知識比福如外道都非吾法當知爾時弟子有受別請者是人定失檀越供養人不得國刧不見佛第四斷片七階佛名經七階佛名大英博物館藏氏蒐集燉煌出土本中第五十九號第二百三十六號第千三百六號第二千三百六十號等數本或七階佛名經或禮懺文或禮佛懺悔文又或六時發願法等云其內容序次亦多少相違皆悉三階教勤行法屬中開寶太平興國後記有宋寫本七階佛名禮懺燉煌地方在遙宋代及證其異本一例附圖十讓詳細他日期尚第二部四四七階禮懺五一二五三六第一部四三階教性質三十四三十五第一部五現存三階教籍斷片特附圖十十一參照
