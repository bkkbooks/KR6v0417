body:
  text: 一切恭敬敬禮常住三寶是諸衆等人各䠒跪嚴持香花如法供養願此香花雲遍滿十方界供養一切佛化佛并菩薩無數聲聞衆受此香花雲以為光明臺廣於無邊界無邊無量作佛事供養以一切恭敬普誦如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我歸依敬禮常住三寶嘆佛功德如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊佛有如是功德無量無邊不可窮盡以此嘆佛善根已集當集現集一切善根資益法界衆生悉得離苦解脫捨邪歸正發菩提心永除三障常見一切諸佛菩薩及善知識恆聞正法福智具足一時作佛南無東方須彌燈光明如來十方佛等一切諸佛南無毗婆施如來過去七佛等一切諸佛南無普光如來五十三佛等一切諸佛南無普光佛南無普明佛南無普淨靜佛南無多摩羅跋旃檀香佛南無旃檀光佛南無摩尼憧幢佛南無歡喜藏摩尼寶積佛南無一切世間樂見上大精進佛南無摩尼憧幢燈光佛南無惠炬照佛南無海德光明佛南無金剛窂強普散金光佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛南無旃檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛南無金華光佛南無寶蓋照空自在王佛南無虛空寶華光佛南無琉璃莊嚴王佛南無普現色身光佛南無不動智光佛南無降伏諸魔王佛南無財才光明佛南無智慧勝佛南無彌勒仙光佛南無世靜光佛南無善寂月音妙尊智王佛南無龍種上尊王佛南無日月光佛南無日月珠光佛南無慧憧幢勝王佛南無師子吼自在力王佛南無妙音勝佛南無常光幢佛南無觀世燈佛南無慧威燈王佛南無法勝王佛南無須彌光佛南無須曼那華光佛南無優鉢羅華殊勝王佛南無大慧力王佛南無阿閦毗歡喜光佛南無無量音聲王佛南無財才光佛南無金海光佛南無山海慧自在通王佛南無大通光佛南無一切法常滿王佛乃是過去久遠舊住娑婆世界成熟衆生而般涅槃若有善男子善女人及餘一切衆生得聞是五十三佛名者是人於百千万億阿僧祇劫不墮惡道若復有人能稱是五十三佛名生生之處常得值遇十方諸佛若復有人能至心敬禮五十三佛者除滅四重五逆及謗方等經皆悉清淨以是佛本誓願故於念念中即得除滅如上諸罪南無東方善德如來十方佛等一切諸佛南無拘那提如來賢劫千佛等一切諸佛南無釋迦牟尼如來三十五佛等一切諸佛南無釋迦牟尼佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛南無寶火佛南無寶月光佛南無現無愚佛南無寶月佛南無無垢佛南無離垢佛南無勇施佛南無清淨佛南無清淨施佛南無婆留那佛南無水天佛南無堅德佛南無旃檀功德佛南無無量掬光佛南無光德佛南無無憂德佛南無那羅延佛南無功德華佛南無蓮華光遊戲神通佛南無財功德佛南無德念佛南無善遊步功德佛南無善名稱功德佛南無紅焰幢王佛南無鬪戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛藥王藥上經空有目而無名號此三十五佛出決定毗尼經已上七階佛依藥王藥上經文次第已下別依餘部經等疏出南無東方阿閦如來一万五千佛等一切諸佛南無寶集如來二十五佛等一切諸佛南無寶集佛南無寶勝佛南無成就盧舍那佛南無盧舍那鏡像佛南無盧舍那光明佛南無不動佛南無火光明佛南無無量聲如來三禮南無阿彌陀劬沙佛南無大稱佛南無寶光明佛南無得大無畏佛南無燃燈火佛南無實聲佛南無無邊無垢佛南無月聲佛南無無邊稱佛南無日月光明世尊三禮南無無垢光明佛南無清淨光明佛南無日月光明佛南無無邊寶佛南無華勝佛南無妙身佛南無法光明清淨開敷蓮華佛此二十五佛名出佛名經第八卷南無虛空功德清淨微塵等目端正功德相光明華波頭摩琉璃光寶體香最上香供養訖種種莊嚴頂髻無量無邊日月光明願力莊嚴變化莊嚴法界出生無障礙王如來若善男子善女人犯四重五逆誹謗三寶及犯四波羅夷是人罪重假使如閻浮履地變為微塵一一微塵成於一劫是人有若千劫罪稱是一佛名號禮拜悉得消滅況復晝夜受持讀誦憶念不忘者是人功德不可思議南無豪相日月光明華寶蓮華堅如金剛身毗盧遮那無障礙眼圓滿十方放光照一切佛剎相王如來此二十五後二佛名號出十二佛名神呪校量功德除障罪經南無過現未來十方三世一切諸佛前歸命懺悔南無佛南無法南無一切賢聖比丘僧如是等一切世界諸佛世尊常住在世是諸世尊當慈念我當憶念我證知我若我此生若我前生從無始生死已來所作衆罪若自作若教他作見作隨喜若塔若僧若取四方僧物若自取若教他取見喜取隨喜或作五逆無間重罪若自作若教他作見作隨喜十不善道自作教他作見作隨喜所作罪障或有覆藏或無覆藏應墮地獄餓鬼畜生及諸惡趣邊地下賤及彌戾車如是等處所作罪障今皆懺悔今諸佛世尊當證知我當憶念我我復於諸佛世尊前作如是言若我此生若於餘生曾行布施或守淨戒乃至施與畜生一揣之食或修淨行所有善根成就衆生所有善根修行菩提所有善根及無上智所有善根一切合集校計籌量皆悉回向阿耨多羅三藐三菩提如是過去未來現在諸佛所作回向我亦如是回向衆罪皆懺悔諸福盡隨喜及請佛功德願成無上智去來現在佛於衆生最勝無量功德海歸依合掌禮一切誦如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我歸依降伏心過惡及與身四種已到難伏地是故今敬禮敬禮過稱量敬禮無比類敬禮無邊法敬禮難思哀愍覆護我令法種增長此世及後生願佛常攝受南無摩訶般若波羅蜜是大神呪是大明呪是無上呪是無等等呪梵唄文處世界如虛空如蓮花不著水心清淨超於彼稽首禮無上尊説偈文願以此功德普及於一切我等與衆生皆共成佛道一切恭敬自歸依佛當願衆生體解大道發無上意自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙願諸衆生諸惡莫作諸善奉行自淨其意是諸佛教和南一切賢聖無常偈諸行無常是生滅法生滅滅已寂滅為樂如來證涅槃永斷於生死若能至心聽常得無量樂黃氏昏偈此日已過命漸減少當觀此身念念衰老一念之間云何可保是諸衆等勤心行道初夜無常偈煩惱深無底生死海無邊度苦船未立云何樂睡眠睡已當覺悟勿令睡覆心汝等勤精進菩提道自然日午無常偈人生不精進喻若樹無根採花置日中能得幾時鮮花亦不久鮮色亦非常好人命如剎那須臾難可保是故諸衆等勤求無上道十方佛名南無清淨法身毗盧遮那佛南無圓滿報身盧舍那佛南無千百億化身釋迦牟尼佛南無東方阿閦佛南無東南方持地佛南無南方普滿佛南無西南方那羅延佛南無西方無量壽佛南無西北方月光面佛南無北方難勝佛南無東北方寂諸根佛南無上方無量勝佛南無下方實行佛南無當來下生彌勒尊佛懺悔文唯願十方諸大慈尊證知護念我今懺悔不復更造願我及一切衆生速得除滅無量劫來十惡四重五逆顛倒謗毀三寶一闡提罪復應思惟如是罪但從虛妄顛倒心起無有定實如可得者本惟空寂願我及一切衆生速達本心永滅罪根懺悔已歸命禮三寶衆罪皆懺悔諸福盡隨喜及請佛功德願成無上智去來現在佛於諸衆生最勝無量功德海歸依合掌禮至心發願願諸衆等生生值諸佛世世恆聞解脫音弘誓平等度衆生畢竟速成無上道發願已歸命禮三寶寅朝禮懺文敬禮毗盧遮那佛敬禮盧舍那佛敬禮釋迦牟尼佛敬禮東方善德佛敬禮東南方無憂德佛敬禮南方旃檀德佛敬禮西南方寶施佛敬禮西方無量明佛敬禮西北方花德佛敬禮北方相德佛敬禮東北方三乘行佛敬禮上方廣衆德佛敬禮下方明德佛敬禮當來下生彌勒尊佛敬禮過現未來三世一切諸佛敬禮舍利形像無量寶塔敬禮十二部尊經甚深法藏敬禮諸大菩薩摩訶薩衆敬禮聲聞緣覺一切賢聖為天龍八部諸善神王敬禮常住三寶為過現諸師恆為道首敬禮常住三寶為皇帝聖化無窮敬禮常住三寶為太子諸王福延萬葉敬禮常住三寶為師僧父母及善知識敬禮常住三寶為十方施主六度圓滿敬禮常住三寶為三途八難受苦衆生速令離苦解脫敬禮常住三寶為國土安寧法輪常轉敬禮常住三寶為法界有情禮佛懺悔至心懺悔十方無量佛所知無不盡我今悉於前發露懺悔諸惡三三合九種從三煩惱今身若前身有罪盡懺悔懺悔已歸命禮三寶至心勸請十方一切佛現在成道者我請轉法輪安樂諸衆生十方一切佛若欲捨授命我今頭面禮勸請令久住勸請已歸命禮三寶至心隨喜所有布施福持戒修禪慧從身口意生去來今所有習學三乘人具足三乘者無量人天福衆等皆隨喜隨喜已歸命禮三寶至心回向我所作福業一切皆和合為度群生故正回向佛道罪應如是懺勸請隨喜福回向於善道回向已歸命禮三寶至心發願願諸衆生等悉發菩提心繫心常思念十方一切佛復願諸衆生永破諸煩惱了了見佛性猶如妙德等發願已歸命禮三寶白衆等聽説寅朝清淨偈欲求寂滅樂當學沙門法衣食之身命精粗隨衆等今日寅朝清淨各記六念第一念佛佛為衆生無上慈父第二念法法為衆生無上良藥第三念僧僧為衆生無上福田第四念戒戒能斷除一切諸惡第五念施施能利益一切衆生第六念天天能常得無量樂一切恭敬自歸依佛當願衆生體解大道發無上意自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙願諸衆生諸惡莫作諸善奉行自淨其意奉持佛教和南一切賢聖第五斷片惟心觀第一信行口集真如實觀起序卷第一第六斷片普法四佛信行口集真如實觀起序卷第一第五斷片首尾破爛斷片中假中間題目取本寫本名大英博物館藏氏燉煌搜集本一斷片首部法不可識入道不同明第一部五現存三階教籍斷片第二部一三正像末三時觀引文二二一參照本寫本千九百十六年六月二十一日第六百七十七號筆寫編者手寫本有再渡歐際再原寫本接機會得從重校便失卷子本寫本外部破爛不堪四字恐氏助手加筆普法四佛第六斷片編者假題本寫本內容三階教普佛一如來藏佛佛性佛當來佛佛想佛詳説以本寫本厚紙三葉表裏筆寫密嚴經引用依後期製作證第一部五現存三階教籍斷片第二部三二普真普正佛第三部一三第六斷片就參照原寫本大英博物館藏氏搜集燉煌本一其並副本俱大正十二年九月一日震火災罹烏有歸僅哲學雜志第三百六十九號大正六年十一月第三百七十三四號大正七年三月四月引用文茲之收録能染污耳根耳亦不能染不能迭相染污心性清淨形相猶如虛空不可染污眼見色假五緣眼不獨見成見不得空時亦不成見見者眼無知不言見色亦見空空亦不言我能見四緣五者百千億沙豈有油也一緣不日見包衆多盲人亦復不共成當知緣法無心成見此是緣見耳鼻舌身意所對處亦復如境界亂相心性不住包角牛法之中不聞不住東西南北四維上下不涅槃之中此即名為無所住心所住名入智惠海何以故心體無心體自然無形相一切萬法去處一切萬法實不可見雖可見正以似名為見何以故不可見故一切萬法無形故不可見相故不可見一切萬法皆是心作心體無相故不可見假令諸佛一切菩薩亦不能見名為見法憎愛得失往來分別皆是無明癡惑相一心作故問曰法可解不答曰法不可解名為解法無形相不可以形相解法無處所不可以處所解法無善惡不可以善惡解法若能知法無名無相無知無解名為解法聞門問曰法可識不答曰若如如可識即非真如以不識故是名真如正以不識為識不知為知不覺為覺不得為得為解法無形相云何何可識若法有相可見識者即見顛倒者即是大患法實無相故不可識法無實相亦不可見乃至諸佛及諸菩薩亦不能見以不可見名為正見一切萬法無不寂滅一切諸法如水中月不水中住時人謂水中心亦如是似鏡中覩其面像實面不入在鏡中住鏡亦不來在面中住面鏡各自本處不相往來入在心中住各各住於本處不動無有往來相心迷或惑時謂有來去一切諸法非內非外不在中間東西南北四維上下求不可見亦不可得當起愛時即是心愛心性不動亦無所依復無處所無形無相名解脫相圓滿不動空如如相若覺心空名入空門更無思相門心性起無作門知心無礙本非繫縛名解脫門心寂滅名涅槃門心無變異名真如門空無禮名禪定門此一心法隨義立名無住無本若能知心體性空寂是名菩薩入智惠海譬如水動不見面像心亦如是攀緣不住不知法空若心停住少時方始得知一切諸法皆悉空寂亦如濁水由風動轉停住少時其亦如是境風所動紛紜不住若覺心空信無外境即是寂靜入涅槃界無分別即是空智一切無心名為聖道無心法中妄起分別是名煩惱菩提者胡語漢言空無相道心無念故是名道心無形相故是名道心波若者胡語漢言智惠發菩提心者正發空無相道心勤修無相名為修道非宜持齋禮佛讀誦名為修道常覺善惡無名無相説名修道覺貪瞋癡無形無相是名菩薩胡言涅槃漢言寂滅亦亦名無為亦名解脫亦名第一義諦胡言菩薩漢言無相大道心也佛者胡言一切覺法平等道先自覺空無相無作亦能覺悟一切衆生自覺覺他稱之為佛覺知五陰本來空寂寂然無住本非生滅名之為佛何名如來三世如如即眼色如乃至意如六道衆生同是一體無異無別皆同一如覺如成道故名如來問曰何名菩薩畢竟淨智答曰眼所見處是名菩薩畢竟淨智本來無造自體淨淨即是菩薩畢竟淨智若見一切諸法是有名凡夫智若見一切諸法是無名聲聞智不見一切諸法有無名菩薩智又亦定譬如有人善解賊智是名賊智解善法智名善法智解空法智是空法智解無相智是無相智解菩薩法智是菩薩法智解道法智是名道法智隨心解處得名為智聲聞之人斷却欲眼不用見好美色耳不用聽好音聲鼻不用嗅好香氣舌不用嘗好美味身不用貪好妙觸聲聞之人妄起畏心本無塵境何須除斷是故不得畢竟淨智菩薩眼見女色之時智照染本性清淨耳聞音聲如空谷嚮響必畢竟無實鼻嗅香時一切香臭體性空寂舌受味時一切諸味性是寂滅身對欲時觀自心性畢境竟本無菩薩之人於五欲中無心取捨無聽而聽無覺所覺心無去來如火燒草無心燒而燒亦如明鏡無心照而照亦如虛空無心受萬物無心捨萬物菩薩亦如是觀五陰空為為空為欲成就一切衆生雖然常受了知衆生如幻如化一切諸法亦復如是問曰何名入道答曰道無出入就衆生根機説有出入復問云何大乘入道小乘入道答曰大乘入道者解真如實相不生不滅一解之後更無退轉始終常一苦樂無變長生不欣朝死不滅觀生若倚覩死如歸諸惱所逼性若虛空我所之心畢竟不起身不傾動猶如大地得達此心名為菩薩摩訶薩行熾然精進無有懈怠種種施為教化衆生無疲極相是名大乘菩薩入道小乘入道者修空斷結不化衆生是懈怠人故名小乘聲聞入道菩薩大士觀淫怒癡體性空寂無淫怒癡如何不斷觀涅槃體而不可著縛解齊觀寂然一相正是大士至極遺道頭圓法天足方法地天有四時人有四支天有十二月人有十二大骨天有三百六十日人有大小骨三百六十骨天有十二時人身中大腸長丈二天有草四氣人有小腸長二丈四天有草八宿人有苦腸長二丈八天有九星人有九孔天有北斗七星兩星在陰山北不現太陽人有七孔在面兩孔在衣下天有雷電人有欣天有日月人有眼地生草木人生毛髮地有江津人有血脈地有岩石人有骨齒人有小指餘血髓作之眼主東方甲乙木口主南方丙丁火鼻主西方庚辛金耳主北方丑壬癸水舌主中央戊己土肝為肚藏其色青其時立春其甲乙配東方作木心為肚藏其色赤其時立夏其日丙丁配南方作火肺為肚藏其色白其時立秋其日庚辛配西方作金賢為肚藏其色黑其時立冬其日丑壬癸配北方作水氷凍眼是肝家倠口是心家倠鼻是肺家倠舌是脾家倠人身配天地五行頭是金髮菩薩耳是聲明菩薩舌是靈相菩薩食是藥王菩薩口是出入氣虛空菩薩衣是瓔珞菩薩手是力士菩薩兩腳是雙林菩薩骨是金幢菩薩血脈是流光菩薩身是地藏菩薩心是大自在王阿彌陀佛處中作佛身裏有八萬四千戶蟲即是一境界衆生亦名八萬四千波羅蜜心王經云轉外境入真如照明三昧佛從眼三昧安詳而起音聲佛從耳根三昧安詳而出香積如來佛從鼻根之勝安詳而出智明如來佛從身根三昧安詳而出法喜如來佛從三昧安詳而出法明如來佛從心根三昧安詳而出大自在王心性清淨故各各自有微塵菩薩以為眷屬教化衆生行頭陀法佛性海藏經云佛告除疑大士善男子眼為徵明耳為神鼻為坐注主舌為傅裘身為喪車意為雄智為雌徵明為性惟衛佛神祐為式坐主為隨葉佛傅裘府為拘樓佛喪車為那含牟尼佛雄為迦葉佛雌為釋迦牟尼佛是心因四大運轉六根成身之性地水火風皆入如實之際衆生妄見有實不能離於生老病死苦文殊波若經云捨一切攀緣相唯念一佛行一智般若波羅蜜念念相續即是念佛三昧五陰山中有一塔蔓陀羅華為周匝芬陀利華繞四邊龍華三會一時合五陰山中有一池四傍九琉璃種種好華間雜生將知佛法難思議染玉何曾著研珠轉益本來無分別火宅相不忓五陰藂林下多饒無量壽所以求不得都心外走五陰藂林下多饒智惠力斬却無明根得見真彌勒五陰藂林下多穢垢塞願入香谷池却煩惱賊受記經云慧明法水以洗心除却身中煩惱垢修清神淨凡口身無礙智無弊蔽惟心觀一卷貌門佛性觀兼成心觀兼三重體相行盲觀法身觀菩薩觀四境觀三佛觀極果觀心王觀空無相觀已上九重觀合為一卷釋迦如來癸未年七月七日夜託蔭摩耶以甲申年四月八日夜現生左右脅壬寅年二月八日夜踰城出家癸丑年正月八日除無明睡朗然大悟故號為佛力世雄三明獨決至辛丑年二月十五日夜現滅拘尸依中國法迦唯羅國記通代相承書堂戶側作如是自釋迦滅度已來至今庚寅年以經二百七十三年告諸四部衆等依時行道禮拜供養應如是白諸大德無上慈尊滅度分遠佛法住柱日日不等有心之從徒宜各加意勤心自勵慎莫放逸但聖法彌遠悲哀戀慕者當來彌勒下可得龍花三會不存此見者永泛生死傳囑後代諸行者等年年抄寫加其一歲勿使廢忘脫錯者也千年已前淨土生好時好世界釋迦如來四十九年説法教化度衆生正見成就衆生如十方大地土邪見顛倒衆生如指甲上土別佛別法度何故得名別佛別佛法度當為真身近滅正法由存過後五百年餘像法初起正像同持千載真正邪善並行佛法久以慈悲少化多生益正見者者能生淨土論若大地塵沙邪見者計亦無多論若甲中之土爾時衆生異度得刑形像而成引正像法過多時重受定皆差錯以見之住體專取表像為宗佛以正法攝邪所以別法度千年已後五濁惡世界衆生是正見成就衆生如指甲上土邪見顛倒衆生如十方大地土普法度何故得名普佛普法度即時衆生垢重煩惱習氣廣多五濁漸惡末代凡夫詐奪像時人法行者錯行他法致使信意不全信不具足之徒是闡提賊若欲頓修大利莫過收體敬真簡相併業行成觀塵沙而同性住心圓圓觀敬法界而得周若欲作普收真須辨真解是以覺知大聖受異類而群生相貌難越不同境三因之一以辨三因是普無別衆生可觀既是一體真如六道員同一性是故普佛能救三界苦內惡人普外別覓免門必畢竟終無覔路是以諸佛慈慜愍遣大體真如斷惡至淨法身歸普定登十地見體佛等實無邊若見相佛是空相佛實成空相若論大地諸行實亦無常塵沙法性共同觀普自然得度第一階人執邪何故得名執次邪其第階久純是菩薩身身所作處自成普正何故菩之名遍薩之名普遍十方菩薩身力住正法行當六度為宗唯見三寶淨不見衆生相果當示之時正法內懈怠以復普法四佛第六斷片別不同亦一亦異非一非異離諸執著然法界真作法界妄妄依真故然真不獨立常依妄故妄不孤起必依真故又如來藏與一切生死體相常同如金與莊嚴具體相常同又如來藏與法界名相體相常別如微塵與燥濕常別然非異非不異經言若於無量煩惱藏所纏如來藏不疑惑者於出無量煩惱藏法身亦無疑惑又勝鬘經説生死依如來藏以如來藏故説本際不可知始以有如來藏故説生死是名善説世間言説故有生死非如來藏有生死如來藏者是法界藏是法身藏出世間上上藏自性清淨藏唯一寂滅是真究竟恆離一切妄想顛倒而法界妄依法界真實住言法界名相依如來藏住如一切波依於水故由有如來藏故有法界名相如由有水有一切波然如來藏有生死相生者新名相起死者舊名相滅如水與波同起同滅然水無起亦復無滅波相依水有起有滅新波起時舊波滅故其法界名相即是如來藏體相外無別體故如一切波即是其水波外無水故但法界名相由一切善惡業生不由如來藏起如一切波正由風生不由水起又如來藏功德作用亙周法界與一切名相作依持建立本如一切水功能體用遍一切波與一切波作依處故然如來藏異於一切名相唯藏是體名相非體故如水體異一切波唯水是水波非水故又如來藏體性真實於一切名相作而不作如水體澄清於一切波作而不作故亦名阿賴耶識故密嚴經下卷云佛説如來藏以為阿賴耶惡惠不能知藏即賴耶識此就理心二本説藏即理世識即心也藏為真也識為俗也又亦名無作四聖諦苦集雖滅滅無所滅滅道雖證證無所證由無滅無證故常無增減亦名一諦無滅無證究竟真實故亦名一依法界解行最勝依故亦名如如平等無二故亦名法界不增不減故亦名藏識蘊積諸法故此如來藏約緣就相無始無終真妄相依不離不脫故楞伽經云譬如巨海浪斯由猛風起洪波故名鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生或翻真以成妄如伎兒伎量或覆妄以成真如金莊嚴具正因緣因同異乳酪醍醐真興與妄長所由如海水波浪一乘三乘同別如阿耨池與八河種種因緣譬喻具如經説言如來藏約緣就用能長因成果變小成大轉凡成聖總是如來藏佛之功力也第二佛性佛者或有理性或有行性或有因性或有果性今此明者唯依涅槃經第三十八卷説但明正因佛性言一切法界衆生通凡及聖皆有此性一切諸佛菩薩亦同有此性從極果立名故名佛性然此佛性非因非果在因名因在果名果共前如來藏眼目異名約緣義少有差別佛性義者與法界常果收法界常因故名佛性從佛果向因總收盡故名佛性佛準涅槃經云第三十六卷説佛性者不名一法十法百法千法萬法乃至未得阿耨多羅三藐三菩提以來一切善惡無記悉名佛性佛性具四種得所謂真常真樂真我真淨常恆不變故清涼無惱故真實自在故煩惱不染故隨緣轉變不染而染若在凡夫身即雜煩惱如雜血乳性聲聞如乳緣覺如酪菩薩之人如生熟蘇諸佛如來猶如醍醐言凡聖大小行位雖殊就正因之性一而無二即自性住佛性性無自性即空是有即有是空不斷不常非一非異離能取所取絶四句八非故涅槃經第二十八卷師子吼菩薩問以何義故名為佛性佛答云一切諸佛阿耨菩提中道種子名為佛性又經云佛性者名第一義空第一義空者名為智惠所言空者不見空與不空智者見空及與不空空者謂一切生死不空者謂大涅槃見一切空不見不空不名中道我無我等亦復如是言中道者名為佛性以是義故佛性常恆無有變易故涅槃經云聲聞緣覺唯見於空不見不空不名中道亦名第一義諦常住不變故亦名第一義空離諸名相故亦名智惠亦名光明離諸愚暗故不可捉持不可繫縛而亦可見若有説言不可見者如是之人所不應依亦名金剛三昧不可阻壞故亦名涅槃不生不滅故亦名為佛性覺了故亦名為法性軌持故亦名為僧理無違故經云是人雖信佛法僧寶不信三寶同一性相是則名為信不具又亦名真空非菟角故亦名妙有異虛空故又花嚴經名無相無礙智慧在於衆生身中故亦名心真如門本來無變故亦名不生不滅色心真緣真相性常住故亦名自性住佛性本覺之性非緣起故亦名自性涅槃本來寂靜故亦名自性波若自性清淨離無明故亦名實際性體真實不虛假故亦名真如契理之性無變異故非陰界入不離陰果界入非衆生不離衆生非常非無常常無常具足故亦名微妙藥王能除衆生煩惱病故亦名衆生寶藏故涅槃經云譬如長者於飢饉世財難得時乃出寶藏而共用之諸佛亦爾於娑婆世界像法之中衆生顛倒白法盡時五無間業極惡增長邪見競興二十種顛倒衆生處處充滿如此嶮法之時乃出此佛法寶藏而共用之所謂正因佛性言一切法界衆生通凡及聖皆有此性唯除草木墻壁瓦礫此對非佛性説有佛性故經文道非佛性者謂土木瓦石離此無情之物悉名佛性但以無明所覆不能得見金欲見者須以人空法空遣人我法我定惠平等寂照分明理事俱融染達體相將心從境廢己同他聞其不聞見其不見即可見也體起成緣約緣行行皆是如來藏行皆是佛性行以本攝苗以真收妄皆是一乘普菩薩行行滿足故得成果佛以如來藏佛佛性佛在纏中故在因位故當來得作佛故名當來佛準依法華經説不輕菩薩禮拜四衆身中同有如來藏佛性真實體故云汝等皆行菩薩道當得作佛故名當來佛佛想佛者由一切法界衆生同是如來藏佛性佛當來佛故相同真佛名佛想佛準華嚴經云第八卷明法品説等是衆生上下皆類皆如佛想言衆生品類雖復不同若就體論俱是如來藏佛性佛當來佛故敬皆如佛想又準依十輪經第四卷説敬一切無戒破戒及以持戒三種比丘作真佛想言持戒破戒雖復不同然如來藏即佛性當來佛一而無二故故等敬之如真佛想故名佛想佛此四佛一佛義就八種佛法中此四種佛是約體明竟第十斷片如來身藏論第十三斷片失題第一明惡法第十七斷片失題第二明説就衆生多類種別不同第十斷片大英博物館藏氏搜集燉煌出土古寫本第五百七十六號屬首部破爛一斷片過如來身藏論一卷尾題存其內容推測恐後期三階僧筆成行文巧多少禪家口吻帶珍尚第一部五現存三階教籍斷片參照第十三斷片大英博物館藏氏搜集燉煌出土古寫本第五百二十六號當首尾破爛一零片過其文意筆體推測恐三階教籍中一斷片更第一部五現存三階教籍斷片參照本寫本則天文字使用地埊人人作今悉通字改第十七斷片巴里國民圖書館藏氏搜集燉煌出土寫本第三千四百十三號前後脫落僅二紙零片過重重無盡關係三階教罪惡觀敘述第一部五現存三階教籍斷片參照
