body:
  text: 人集録明一切第三皆階佛法內唯除一切最大鈍根衆生兩種啞羊僧已外一切利根衆生皆悉普是一切利根空見有見衆生何以故明如大般涅槃經説文當世間之義為一切第三階佛法內一切利根空見有見斷一切善根皆悉普盡一闡提衆生説以此文驗所以得知一者明如迦葉經説文當千佛不能回得一切利根空見有見衆生二者明如佛藏經説文當百千萬億佛不能回得一切利根空見有見衆生三者明如摩訶衍經佛藏經思益經等三部經明一切利根空見有見衆生文義最大廣最大具足文當無量無邊諸佛菩薩等不能回得一切利根空見有見衆生四者明如大方廣十輪經大集月藏分經與雜阿含經同等説文當一切諸佛菩薩皆悉普不能回得一切利根空見有見衆生五者明如大般涅槃經説文當一切經皆悉普不能回得一切利根空見有見衆生何以故明從千佛乃至一切佛一切經等皆悉普不能回得一切利根空見有見衆者生文當義當唯由一切解行病等轉轉多故如上所引經等説又於經文內文當或唯單就一切利根空見衆生説或唯單就一切利根有見衆生説義或當莫問空有一種相似如餘卷內廣説亦名一切利根空見有見邪見成就九種人如大般涅槃經迦葉經佛藏經大方廣十輪經等説亦名一切利根空見有見九十五種道如大集月藏分經與雜阿含經同大方廣十輪經等説亦名一切利根空見有見九十六種道如摩訶摩耶經説何以故明文當佛滅度五百年已後文當千佛不能得度得一切衆生時有四部經説一部經名為惡賊名為狗菩薩一部經名為增上慢衆生一部經名為惡魔一部經名為九十六種道竟競興滅一切佛法以此文驗所以得知如迦葉經法花經大般涅槃經摩訶摩耶經等説亦名一切利根空見有見世間根機衆生如大般涅槃經説亦名一切利根空見有見邪見成就衆生如大方廣十輪經説亦名一切利根空見有見顛倒衆生如下第二大段內説亦名一切利根空見有見行壞體壞衆生如大方廣十輪經説亦名一切利根空見有見阿鼻地獄衆生亦名一切利根空見有見誹謗一切正法毀呰一切賢聖衆生亦名一切利根空見有見煩惱牢固猶如舍利衆生如大集月藏分經等説與雜阿含經同亦名一切利根空見有見邪見成就顛倒行壞體壞一切二三乘根機衆生何以故文當由從無如始世界未得聞佛法已前已少分有及得聞佛法已來於一切世間內於一切三階佛法內一者明常偏遍學一切空見法一切有見法二者明常自諱己一切惡常返見他一切惡三者明常不見自身一切惡以一切善從一切惡常見自身一切善以一切惡從一切善四者明當常見他一切惡以一切善從一切惡常不見他一切善以一切惡從一切善五者明常不受佛道是一切凡夫一切合受惡一切合受苦常受不捨六者明常不捨佛導道是一切凡夫一切合捨好一切合捨樂常捨不受七者明常不覺學一切第三階佛法內一切草四段等一切最下下得惡得苦普真普正佛法僧衆生斷惡修善解行等常正常不錯常不誹謗一切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯唯純益無損佛法故亦名常一向唯純偏不遍因學一切生盲衆生佛法故八者明常唯學一切第一第二兩階佛法內一切七十種等所説一切最上上得好得樂別真別正佛法僧衆生斷惡修善解行等常邪常錯常謗佛常謗法通凡及聖文當常行誹謗語如下第二大段七種旃陀羅道俗法內説常一向唯純損無益佛法故唯除從墮無量無邊劫懺悔不可得滅阿鼻地獄等內得值一切諸佛菩薩等善知識捨邪歸正已去遠作一切菩提涅槃微少因緣不在其限亦名常一向唯純偏遍學一切有眼衆生佛法故唯除一切聖人一切利根真善正見成就凡夫不在其限如迦葉經佛藏經大般涅槃經大方廣十輪經大集月藏分經與雜阿含經同摩訶行衍經如下第第一大段內所説分八部經等説亦名非是一切三乘根機及涅槃善根衆生義常當非是一切根利根真善正見成就三乘根機及涅槃善根衆生如大方廣十輪經説亦名是一切利根空見有見一切三世諸佛怨家速滅一切佛法衆生如像法決疑經説與多部經義同亦名是一切利根空見有見一切世間天人中大賊衆生亦名是一切利根空見有見一切世間怨家衆生亦名是一切利根空見有見一切諸佛大賊衆生如佛藏經説亦名以前驗後説亦名是一切利根空見有見一切佛一切經皆悉普不能救得衆生如大方廣十輪經大般涅槃經等説亦名是一切利根空見有見擾亂一切諸佛衆生如大方廣十輪經説莫問一切善惡持戒破戒皆悉普名一切破戒衆生如下第一大段內釋莫問歸一切三寶度一切衆生斷一切惡學一切善解行等多少乃至未得法忍已來皆悉普常一向唯得經偏純遍學同一切世間內一切第三階佛法內一切最大鈍根衆生兩種啞羊僧常一向唯得淺分別一切草四段等一切最下下得惡得苦普真普正佛法僧衆生斷惡修善解行等常正常不錯常不誹謗一切正切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯純益無損佛法亦名常一向唯純偏學一切生盲衆生佛法如下第二大段末第一何以故一切草四段等一切普真普正佛法內説常一向唯純偏不得學同一切世間內一切第一第二兩階佛法內一切聖人一切利根真善正見成就凡夫常一向唯得深分別一切七十種等所説一切最上上得好得樂別真別正佛法僧衆生斷惡修善解行等常邪常邪常錯常謗佛常謗法通凡及聖文當常行誹謗語如下第二大段七種旃陀羅道俗法內説常一向唯純損無益佛法餘如此段上記亦名常一向唯純偏學一切有眼衆生佛法唯除一切聖人一切利根真善正見成就凡夫不在其限如下第二大段末第二何以故一切草四段等一切別真別正佛法內説所由義法一卷第一大段明驗一切第三階佛法內一切利根空見有見衆生多少分齊義一者明文當義當一切利根空見有見衆生與十方世界所有地土多少分齊一種相似文當唯就一切利根空見斷一切善根皆悉普盡一闡提一人以明多少分齊常一向唯純偏學歸一切三寶度一切衆生斷一切惡修一切善解行等一切利根有見衆生亦與十方世界所有地土多少分齊一種相似何以故明以一切利根空見衆生多少分齊驗一切種利根有見衆生多少分齊義當一種相似如大般涅槃經説如上兩種一切種利根空見有見衆生多少分齊既爾餘一切利根空見有見惡賊一切利根空見有見物佛菩薩一切利根空見有見六師外道一切利根空見有見惡惡魔一切利根空見有見旃陀羅一切利根空見有見無慚愧僧一切利根空見有見以驢唯狗驢菩薩等多少分齊亦如是類以可知如上説如下所説八部經等説又已上文當義當唯皆悉普就一切五濁最大惡世界亦多唯皆悉普就一切娑婆最大惡世界內一切凡聖善惡邪善正善等一切衆生以明一切利根空見有見衆生多少分齊已下文當義當就佛滅度後時節分齊以明一切利根空見有見衆生多少分齊何以故以惡多善少驢驗之所以得知二者明文當義當佛滅度一千年已後有八部經文當義當一種相似皆悉普道佛滅度一千年已後一切聖人一切利根真善正見成就凡夫皆悉普滅盡唯有一切利根空見有見衆生在又於一切利根空見有見衆生內莫問一切善惡持戒破戒皆悉普名破戒不破見正見成就凡夫一切三乘根機衆生在如上如下此段內釋多少分齊如扴上土如此段初説喻如一切偽寶內猶有真寶在一種相似喻如金銀七寶及鍮石等一切真無價寶皆悉普盡唯有一切偽寶為無價寶在唯有一切赤白銅鐵白鑞鉛錫為無價寶在一種相似如摩訶摩耶經最妙勝定經與多部經義同像法決疑經與多部經義同雜阿含經明難當卷內説大集月藏分經與雜阿含經同已上五部經文當佛滅度一千年已後佛藏經薩遮尼乾子經大方廣十輪經已上三部經文當佛滅度後義當佛滅度或一千年已後或一千五百年已後如下第二大段內説又文當義當佛滅度一千年已後一千五百年已前一切利根戒見俱不破正見成就衆生唯有兩人在如摩訶摩耶經説唯有兩人三人一人在如化藏經説又文當義當佛滅度一千百年已後如下第二大段內説於一切利根衆生內一切利根戒見俱不破真善正見成就衆生莫問一切凡聖皆悉普滅盡乃至一人亦無有唯有一切利根空見有見衆生莫問一切善惡持戒破戒皆悉普名一切破戒衆生在何以故一者明文當一切諸佛菩薩不能救得唯除一切利根空見有見衆生已外更無有一切諸佛菩薩不能救得者明唯為一切破戒比丘作一切寺舍等時如大方廣十輪經説二者明唯有一切破戒無戒兩種衆生在如此段下説四者明一切多聞時已過唯有一切福德時在如大集月藏分經説與雜阿含經同五者明文當義當一切正法不行時文當義當唯有一切三種顛倒衆生時如大薩遮尼乾子經説以此文驗所以得知又文當佛滅度後義當佛滅度一千五百年已後如下第二大段內説唯除於一切最大鈍根衆生兩種啞羊僧僧內猶有少分不為求一切名聞不為求一切利益不為求一切勝地他等故學一切佛法正真善真正於戒人在者不在其限文當遣最大鈍根衆生勸化營理僧事與出家人作和上阿闍梨學習誦等如大方廣十輕輪經説文當福德時如大集月藏分經説與雜阿含經同又文當佛滅度二一千年已後一切道俗莫問一切利根鈍根皆悉普名邪見顛倒盡亦名皆悉普破或戒盡唯有一切破戒無戒兩種衆生在如大集月藏分經説與雜阿含經同唯除與佛頂佛牙佛鉢及餘殘功德等有緣或從十方來或從天上來暫起得道即滅者不在其限未自親見經文準經義推説又明唯除一切行法行王如大薩遮尼乾子經説亦名一切國王亦名一切灌頂剎利王如大方廣十輪經大般涅槃經大薩遮尼乾子經等説亦名一切人王如佛藏經大集月藏分經與雜阿含經同等説不定若能得常一向唯純偏依一切第三階佛法內一切草四段等一切最下下得西惡得苦普真普正佛法僧衆生斷惡修善解行等常正常不錯常不誹謗一切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯純益無損佛法亦名常一向唯純偏學一切生盲衆生佛法住持一切三寶住持一切國土利益一切衆生不在其限如大薩遮尼乾子經大方廣十輪經等説等第二大段明驗一切第三階佛法內佛滅度後時節分齊義一者明文當佛滅度五百年已後文當千佛不能得度得一切衆生時如迦葉經説二者明文當佛滅度後千年以後文當百千萬億佛不能得度得一切衆生時以上佛多少次第驗之義當佛滅度一千年已後如佛藏經説三者明文當於末世時義當佛滅度後文當義當一切正法不行時文當義當唯有一切三種顛倒衆生時如大薩遮尼乾子經説文當義當一向唯純偏為一切破戒比丘作一切寺舍等時一向不為一切持戒比丘作一切寺舍等時唯瞋唯罵唯打唯殺文當一切佛皆悉普不能得度得一切衆生時如大方廣十輪經説兼依餘經説文當義當一切利根空見有見衆生由偏學一切多聞智惠故一者明能得增長一切種種惡皆悉普盡時以後驗前説亦名以善驗惡説二者明能滅一切四乘善根善皆悉普盡時唯除一切利根真善正見成就凡夫返上即是不在其限如大集月藏分經説與雜阿含經同三部經俱明最大富貴俱明最大利根俱明最大多聞俱明道俗俱明滅三寶俱明滅國土