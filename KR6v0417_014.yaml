切利根空見有見衆生作一切五逆罪犯一切四重罪誹謗一切正法毀呰一切賢聖亦起一切空見有見等惡破戒不破見少分正見成就凡夫一切三乘根機衆生由利根故或墮地獄餓鬼畜生暫入即得出又由利根故雖墮地獄餘餓鬼畜生亦得聞佛法亦得為一切衆生説佛法又由利根故得道最疾初時不信佛後時回心即得道如大方廣十輪經説如上第四子段説上來五階最少唯如抓上土如大般涅槃經等説六者明常有莫問一切善惡持戒破戒皆悉普名一切破戒衆生如上第一大段內釋又一切利根空見有見衆生由利根故得值一切無量無邊三寶亦能度得一切無量無邊衆生亦能斷得一切無量無邊惡亦能學得一切無量無邊解行等猶不免誹謗一切正法毀呰一切賢聖如摩訶經衍經佛藏經大集月藏分經與雜阿含經同大方廣十輪經大般涅槃經等説又從阿鼻地獄等得出已後於無量無邊劫無量無邊佛所學當已一切出世間根機藥病一切正解一切正行等多者皆悉普得徹到成就但使受生即不免常生一切六師外道等一切邪見家何以故明由一切餘習果未盡初時不信佛後時回心即得道者皆悉普是文當義當知佛初成道時所度一切利根空見有見六師外道等皆悉普是如一切三階佛法所説經等説此一階最多如十方界所有地土多少分齊一種相似如大般涅槃經等説又此段亦名出一切利根空見有見衆生從無始世界乃至未得法忍已來於一切世間內於一切三階佛法內常是顛倒所由義如下第二大段末第二何以故一切草四段等一切別真別正佛法內説又明一切利根空見有見衆生由從無始世界得聞佛法已來乃至得值無量無邊三寶等已來常唯認上一切利根六階正見成就衆生一切利根正見成就果由利根故莫問聖邪正但使得見佛聞法回心即得道常一向不認一切第六階一切利根空見有見衆生一切邪見成就因由利根故一切惡斷不可得一切阿鼻地獄等苦受不可盡一切當已根機藥病一切正解一切正行學不可得成就如餘卷第一大段第十五子段內五部經等説又明有三部經等廣明一切顛倒法一者明如大薩遮尼乾子經説文當於末世時義當佛滅度後文當一切正法不行時文當唯有一切三種顛倒時已上人語引經説已下三段初各除已下三外餘者唯是經文説一者明云何名樂於非法貪心答言大王於十不善惡業道中生於樂心是名樂於非法貪心二者明云何名為顛倒貪心自己手力得諸資生依時節得依正法得依如法得不生足心更求他則財如是名為顛倒貪心三者明王言大師云何為邪法羅納網之所纏心答言大王於諸外道非義論中起義想論想於無益論生利益想於非法中生是法想於末世時非是智者所作論中以為正論生於信心董修邪見以為福德是名邪法羅納網纏心已上人語引經説二者明如大般涅槃經説已上人語引經已下唯是經文説若有衆生我見無我無我見我常見無常無常見常樂見無樂無樂見樂淨見不淨不淨見淨不滅見滅滅見不滅罪見非罪非罪見罪輕罪見重重罪見輕乘見非乘非乘見乘道見非道非道見道實是菩提見非菩提實非菩提謬見菩提苦見非苦集見非集滅見非滅實見非實非實見實是世諦見第一義諦第一義諦見是世部諦諦見非諦非諦見諦以真佛語名為魔語實是魔語以為佛語如是之時諸佛乃説大涅槃經已上人語引經説三者明如勝鬘經過半卷已後説文當若過若不及餘義如經又此段總明一切顛倒餘卷第一大段內十三部經等別明一切顛倒又明一切十二部經內一切佛法等不定者皆悉普道戒破戒者義當是不定語如大方廣十輪經第三卷末廣説又明文當義當佛滅度後文當義當一切正法不行時文當義當唯有一切三種顛倒衆生時教一切行法行王治罰一切道俗罪輕重淺深分廣齊法餘義如經説第一段明教一切行法行王治罰一切俗人內返羊逆衆生罪輕重淺深分齊一者明自返反二者明教他返反三者明與王毒藥四者明奪王資生五者明破王所應作事六者明侵奪王妻宮女七者明違王命八者明出王密語九者明覘伺國土十者明罵王十一者明毀呰王文當除不斷命不壞諸根得繫閇牢獄枷鎖打縛奪其資生驅儐擯他處第二段一切行法行王治罰一切破戒出家人罪輕重淺深分齊兼依餘經説莫問犯罪輕重一種相似文當不得斷命不得割壞一切諸根不得囚問閉不得樔枷鎖不得撾打不得脫袈裟不得奪其資生之物得呵嘖得驅擯如大薩遮尼乾子經説已下兼依餘經説或驅出等或驅出聚落或驅出國如大集月藏分經説與雜阿含經同第三段明為一切行法行王辨一切道俗邪正分齊一者明王請一切道俗邪正分齊文當已上人語引經説已下唯是經文説王言大師若彼國王暗鈍無智國內多諸沙門婆羅門所行各異互相是非各各自言我是沙門修正道者能利衆生我是福田應受供者如是各各互相是非云何得知是真沙門非真沙門是正道是邪道是如法語非法語已下人語引經説二者明唯有一切佛弟子出家人是真沙門文當已上人語引經説已下唯是經文説大王當知有大沙門斷釋迦子出家為道得神通證有大名稱如來應正遍知彼諸弟子比丘比丘尼於彼瞿曇法中住者是真沙門能行正道利益衆生是福田者能知正法是如法語者已下人語引經説三者明義當一切在家人皆悉普是一切邪見衆生皆悉普非是真沙門文當已上人語引經説已下唯是經文説大王當知除沙門瞿曇法外除餘諸一切婆羅門等是名邪道非實沙門非法語者不應取語何以故大王當知彼無正法云何能得如法之語已下人語引經説如大薩遮尼乾子經説又明已下兼依餘經説文當義當就一切出家人普真普正剃頭或名著染衣或名者著袈裟邊説何以故明文當已上人語引經説已下唯是經文説亦是過去未來現在諸佛大悲力故為欲利益一切衆生有二種護持第一為欲紹三寶種令不斷絶出家修道剃除鬚髮而著袈裟第二説應四諦趣向三乘如是二種如來護持非聲聞辟支佛所能持也乃至百千帝釋梵天亦不能持百千那由他轉輪聖王亦不能持已下人語引經説如大方廣十輪經説又於上兩種住持一切三寶等不滅內義當佛滅度一千年已後説應四諦趣向三乘一種住持一切三寶住持一切國土利益一切衆生等不滅一切聖人一切利根真善正見成就凡夫一切最上上得好得樂別真別正佛法僧衆生斷惡修善解行等悉普滅盡如上第一大段內所説八部經前五部經文當佛滅度一千年已後説後三部經義當佛滅度一千年已後説乃至一切佛法皆悉普滅盡已來唯有一切利根空見有見衆生一切普真普正剃頭或名著染衣或名著袈裟僧住持一切普真普正形像佛住持一切普真普正十二部經經卷經文法住持一切國土利益一切衆生不滅在何以故明一切普真普正形像佛一切普真普正十二部經經卷經文法唯由一切普真普正剃頭或名著染衣或名著袈裟僧感得所以一切普真普正剃頭或名著染衣或名著袈裟僧最是住持一切三寶等根本大主所以一切道俗一向唯純遍禮供養守護一切普真普正剃頭或名著染衣或名著袈裟僧者一者明得滅一切罪障最疾二者明得一切出世間聖道果最疾三者明得生一切淨土最疾此一段唯上唯下義推説四者明得常不離一切三寶乃至成佛等最疾又於一切第三階佛法正與一切利根空見有見衆生過去一切出世間正善根機相當現在一切出世間正善藥病相當佛法內隨阿種佛法皆悉普無有與等者何況一切第一第二兩階不與一切利根空見有見衆生過去一切出世間正善根機相當現在一切出世間正善藥病相當佛法等如大集月藏分經與雜阿含經同法花經大方廣十輪經等説第四段明治罰作惡國王法一者明唯遣自治罰如經説二者明唯遣出家人治罰文説當已上人語引經説已下唯是經文説若王無智不能如是自思惟者應於國內處處推求有大智惠善知王論常行正法能如實語諸沙門等王應自往彼沙門所若不自往當遣大臣王子貴人人所重者詣彼沙門宣王渴仰尊重之心將至王所若彼來者王應迎逆禮拜問訊盡恭敬心盡尊重心問沙門言何等善行何等惡行行何等法能有利益行何等法無有利益我心暗鈍無有智惠願為我説已上人語引經説次下經文義常當出有大智惠沙門大知智惠多少淺深分齊唯明教一切行法行王不殺生不偷盜不邪淫不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見即名行法行王更不説餘法如大薩遮尼乾子經説經説第五段明一切行法行王若遣一切出家人還俗若打一切出家人若殺一切出家人得罪輕重淺深分齊文當於一切出家人莫問一切善惡持戒皆悉破戒皆悉普一種相似若驅一切出家人還俗若打一切出家人若殺一切出家人一者明文當攝在惡逆衆生分中上品治罰何以故作根本極重罪故二者明文當與破壞塔寺焚燒經像取一切三寶財物一種相似三者明文當與誹謗一切三乘法一種相似四者明文當與惡心殺父母殺阿羅漢破和合僧出佛身血一種相似五者明文當趣大地獄受無間苦無間者義當即是阿鼻地獄如大薩遮尼乾子經説又明義當乃至一切出家人若遣一切出家人還俗若打一切出家人若殺一切出家人亦如是類以可知何以故明如上第二大段內説文當一切出家家人與一切諸貴十四種俱明義同一種相似無別故以此文驗所以得知又如大集月藏分經説與雜阿含同文當打一切破戒比丘得罪過於出一萬億佛身面血何況打一切持戒比丘何以故明不就一切悲敬兩就由種田厚薄説亦不就一切能敬心淺深説唯就一切損益多小少説明出佛身西血莫問多少皆悉普不能得滅一切佛身法等盡所以得罪經明打一切出家人不免皆悉普滅一切佛法等盡所以得罪重又廣明一切損益多少所由義如下兩段何以故一切草四段等一切普真普正別真別正佛法內説唯除一切行法行王乃至一切行法行官府等得打一切返反逆俗人得打一切作則賊俗人等不在其限又已下引經證佛滅度一千年已後一切道俗等皆悉普不得打一切出家人所由義已上人語引經説已下唯是經文説善男子未來世中一切俗官不信罪福稅奪衆僧物或稅畜生穀米乃至一豪毫之物或驅使三寶奴婢或乘三寶牛馬一切俗人不得撾打三寶奴婢畜生乃至不得受三寶奴婢禮拜皆得殃咎何況驅策撾打告諸俗官若有禁防剗邏輪稅之處慎莫令比丘輪稅若稅出家人者得罪無量已下人語引經説如像法決疑經説與多部經義同是可損持戒破戒兩種福田內亦就一切福田厚薄説如上説文當何況打一切持戒比丘是又明若就一切根機説一者明唯除一切第一階佛法內一切利根真聖真善正見成就凡夫一切一乘根機菩薩莫問凡聖一種相似為住持一切佛法等故俱得驅一切破戒比丘還俗俱得打一切道俗乃至亦得殺一切修道人如大般涅槃經淨度三昧經等説二者明一切第二階佛法內一切利根真聖真善正見成就凡夫一切三乘根機衆生莫問凡聖一種相似唯得驅一切破戒比丘還俗皆悉普不得打一切出家人亦不得殺一切修道人如大般涅槃經十號內及大般涅槃四種近困因初下近因內律文等説三者明一切第三階佛法內一切利根空見有見衆生一向不得驅一切出家人還俗亦不得打一切出家人亦不得殺一切出家人唯除得用五種輕治罰一切出家人法治罰一切出家人或驅出寺或驅出聚落或驅出國等不在其限唯除得打一切俗人不在其限如大集月分藏分經與雜阿含經同大薩遮尼乾子經大方廣十輪經等説又唯有此上下兩子段於一切三階佛法莫問文義俱廣説餘卷第一大段內亦如是餘段有者略説又明若就佛在世及佛滅度後一切時節分齊説一者明文當佛滅度後文當末世時義當佛滅度後又義當佛滅度後一千年已前猶得用一切第一第二兩階佛法內一切重治罰一切道俗法治罰一切道俗如大般涅槃經淨度三昧經等説二者明文當義當佛滅度一千年已後一切第一第二兩階佛法內一切重治罰一切道俗法皆悉普不得用之一向唯得用一切第三階佛法內一切輕治罰一切道俗法治罰一切道俗如大集月藏分經與雜阿含經同大薩遮尼乾子經大方廣十輪經等説何故明文當佛滅度後一千年已前由多有一切聖人一切利根真善正見成就凡夫在不滅故所以猶得用一切第一第二兩階佛法內一切重治罰一切道俗法治罰一切道俗如最妙勝定經與多部經義同摩訶摩耶經加迦葉經等説文當義當佛滅度一千年已後一切聖人一切利根真善正見成就凡夫皆悉普滅盡如上第一大段內説唯有一切第一階佛法內一切內利根空見有見破戒不破見正見正見成就凡夫一切三乘根機衆生在多少分齊唯如㧓上土一種相似亦名唯有一切利根空見有見邪見成就顛倒行壞體壞一切三乘根機衆生在多少分齊如十方世界所有地土一種相似所以唯得用一切第三階佛法內一切輕治罰一切道俗法治罰一切道俗如上第一大段內所説八部經等説交了本邦所傳三階佛法卷第二本邦所傳三階佛法卷第二法隆寺本底本聖語藏本興聖寺本首部闕迭並釋淨土群疑論探要記集録引文以校異冠注對校聖聖語藏本興興聖寺本要釋淨土群疑論探要記所引集録本文略稱
