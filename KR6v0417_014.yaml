body:
  text: 人集錄明一切第三皆階佛法內唯除一切最大鈍根眾生兩種瘂羊僧已外一切利根眾生皆悉普是一切利根空見有見眾生何以故明如大般涅槃經說文當世間之義為一切第三階佛法內一切利根空見有見斷一切善根皆悉普盡一闡提眾生說以此文驗所以得知一者明如迦葉經說文當千佛不能廻得一切利根空見有見眾生二者明如佛藏經說文當百千萬億佛不能廻得一切利根空見有見眾生三者明如摩訶衍經佛藏經思益經等三部經明一切利根空見有見眾生文義最大廣最大具足文當无量无邊諸佛菩薩等不能廻得一切利根空見有見眾生四者明如大方廣十輪經大集月藏分經與雜阿含經同等說文當一切諸佛菩薩皆悉普不能廻得一切利根空見有見眾生五者明如大般涅槃經說文當一切經皆悉普不能廻得一切利根空見有見眾生何以故明從千佛乃至一切佛一切經等皆悉普不能廻得一切利根空見有見眾者生文當義當唯由一切解行病等轉轉多故如上所引經等說又於經文內文當或唯單就一切利根空見眾生說或唯單就一切利根有見眾生說義或當莫問空有一種相似如餘卷內廣說亦名一切利根空見有見邪見成就九種人如大般涅槃經迦葉經佛藏經大方廣十輪經等說亦名一切利根空見有見九十五種道如大集月藏分經與雜阿含經同大方廣十輪經等說亦名一切利根空見有見九十六種道如摩訶摩耶經說何以故明文當佛滅度五百年已後文當千佛不能得度得一切眾生時有四部經說一部經名為惡賊名為狗菩薩一部經名為增上慢眾生一部經名為惡魔一部經名為九十六種道竟競興滅一切佛法以此文驗所以得知如迦葉經法花經大般涅槃經摩訶摩耶經等說亦名一切利根空見有見世間根機眾生如大般涅槃經說亦名一切利根空見有見邪見成就眾生如大方廣十輪經說亦名一切利根空見有見顛倒眾生如下第二大段內說亦名一切利根空見有見行壞體壞眾生如大方廣十輪經說亦名一切利根空見有見阿鼻地獄眾生亦名一切利根空見有見誹謗一切正法毀呰一切賢聖眾生亦名一切利根空見有見煩惱牢固猶如舍利眾生如大集月藏分經等說與雜阿含經同亦名一切利根空見有見邪見成就顛倒行壞體壞一切二三乘根機眾生何以故文當由從无如始世界未得聞佛法已前已少分有及得聞佛法已來於一切世間內於一切三階佛法內一者明常偏徧學一切空見法一切有見法二者明常自諱己一切惡常返見他一切惡三者明常不見自身一切惡以一切善從一切惡常見自身一切善以一切惡從一切善四者明當常見他一切惡以一切善從一切惡常不見他一切善以一切惡從一切善五者明常不受佛道是一切凡夫一切合受惡一切合受苦常受不捨六者明常不捨佛導道是一切凡夫一切合捨好一切合捨樂常捨不受七者明常不覺學一切第三階佛法內一切廿四段等一切最下下得惡得苦普真普正佛法僧眾生斷惡修善解行等常正常不錯常不誹謗一切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯唯純益无損佛法故亦名常一向唯純偏不徧因學一切生盲眾生佛法故八者明常唯學一切第一第二兩階佛法內一切七十種等所說一切最上上得好得樂別真別正佛法僧眾生斷惡修善解行等常邪常錯常謗佛常謗法通凡及聖文當常行誹謗語如下第二大段七種㫋陀羅道俗法內說常一向唯純損无益佛法故唯除從墮无量无邊刧懺悔不可得滅阿鼻地獄等內得值一切諸佛菩薩等善知識捨邪歸正已去遠作一切菩提涅槃微少因緣不在其限亦名常一向唯純偏徧學一切有眼眾生佛法故唯除一切聖人一切利根真善正見成就凡夫不在其限如迦葉經佛藏經大般涅槃經大方廣十輪經大集月藏分經與雜阿含經同摩訶行衍經如下第第一大段內所說分八部經等說亦名非是一切三乘根機及涅槃善根眾生義常當非是一切根利根真善正見成就三乘根機及涅槃善根眾生如大方廣十輪經說亦名是一切利根空見有見一切三世諸佛怨家速滅一切佛法眾生如像法決疑經說與多部經義同亦名是一切利根空見有見一切世間天人中大賊眾生亦名是一切利根空見有見一切世間怨家眾生亦名是一切利根空見有見一切諸佛大賊眾生如佛藏經說亦名以前驗後說亦名是一切利根空見有見一切佛一切經皆悉普不能救得眾生如大方廣十輪經大般涅槃經等說亦名是一切利根空見有見擾亂一切諸佛眾生如大方廣十輪經說莫問一切善惡持戒破戒皆悉普名一切破戒眾生如下第一大段內釋莫問歸一切三寶度一切眾生斷一切惡學一切善解行等多少乃至未得法忍已來皆悉普常一向唯得經偏純徧學同一切世間內一切第三階佛法內一切最大鈍根眾生兩種瘂羊僧常一向唯得淺分別一切廿四段等一切最下下得惡得苦普真普正佛法僧眾生斷惡修善解行等常正常不錯常不誹謗一切正切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯純益无損佛法亦名常一向唯純偏學一切生盲眾生佛法如下第二大段末第一何以故一切廿四段等一切普真普正佛法內說常一向唯純偏不得學同一切世間內一切第一第二兩階佛法內一切聖人一切利根真善正見成就凡夫常一向唯得深分別一切七十種等所說一切最上上得好得樂別真別正佛法僧眾生斷惡修善解行等常邪常邪常錯常謗佛常謗法通凡及聖文當常行誹謗語如下第二大段七種㫋陀羅道俗法內說常一向唯純損无益佛法餘如此段上記亦名常一向唯純偏學一切有眼眾生佛法唯除一切聖人一切利根真善正見成就凡夫不在其限如下第二大段末第二何以故一切廿四段等一切別真別正佛法內說所由義法一卷第一大段明驗一切第三階佛法內一切利根空見有見眾生多少分齊義一者明文當義當一切利根空見有見眾生與十方世界所有地土多少分齊一種相似文當唯就一切利根空見斷一切善根皆悉普盡一闡提一人以明多少分齊常一向唯純偏學歸一切三寶度一切眾生斷一切惡修一切善解行等一切利根有見眾生亦與十方世界所有地土多少分齊一種相似何以故明以一切利根空見眾生多少分齊驗一切種利根有見眾生多少分齊義當一種相似如大般涅槃經說如上兩種一切種利根空見有見眾生多少分齊既爾餘一切利根空見有見惡賊一切利根空見有見物佛菩薩一切利根空見有見六師外道一切利根空見有見惡惡魔一切利根空見有見㫋陀羅一切利根空見有見无慚愧僧一切利根空見有見以驢唯狗驢菩薩等多少分齊亦如是類以可知如上說如下所說八部經等說又已上文當義當唯皆悉普就一切五濁最大惡世界亦多唯皆悉普就一切娑婆最大惡世界內一切凡聖善惡邪善正善等一切眾生以明一切利根空見有見眾生多少分齊已下文當義當就佛滅度後時節分齊以明一切利根空見有見眾生多少分齊何以故以惡多善少驢驗之所以得知二者明文當義當佛滅度一千年已後有八部經文當義當一種相似皆悉普道佛滅度一千年已後一切聖人一切利根真善正見成就凡夫皆悉普滅盡唯有一切利根空見有見眾生在又於一切利根空見有見眾生內莫問一切善惡持戒破戒皆悉普名破戒不破見正見成就凡夫一切三乘根機眾生在如上如下此段內釋多少分齊如扴上土如此段初說喻如一切偽寶內猶有真寶在一種相似喻如金銀七寶及鍮石等一切真无價寶皆悉普盡唯有一切偽寶為无價寶在唯有一切赤白銅鐵白𨭛鉛錫為无價寶在一種相似如摩訶摩耶經最妙勝定經與多部經義同像法決疑經與多部經義同雜阿含經明難當卷內說大集月藏分經與雜阿含經同已上五部經文當佛滅度一千年已後佛藏經薩遮尼乾子經大方廣十輪經已上三部經文當佛滅度後義當佛滅度或一千年已後或一千五百年已後如下第二大段內說又文當義當佛滅度一千年已後一千五百年已前一切利根戒見俱不破正見成就眾生唯有兩人在如摩訶摩耶經說唯有兩人三人一人在如化藏經說又文當義當佛滅度一千百年已後如下第二大段內說於一切利根眾生內一切利根戒見俱不破真善正見成就眾生莫問一切凡聖皆悉普滅盡乃至一人亦无有唯有一切利根空見有見眾生莫問一切善惡持戒破戒皆悉普名一切破戒眾生在何以故一者明文當一切諸佛菩薩不能救得唯除一切利根空見有見眾生已外更无有一切諸佛菩薩不能救得者明唯為一切破戒比丘作一切寺舍等時如大方廣十輪經說二者明唯有一切破戒无戒兩種眾生在如此段下說四者明一切多聞時已過唯有一切福德時在如大集月藏分經說與雜阿含經同五者明文當義當一切正法不行時文當義當唯有一切三種顛倒眾生時如大薩遮尼乾子經說以此文驗所以得知又文當佛滅度後義當佛滅度一千五百年已後如下第二大段內說唯除於一切最大鈍根眾生兩種瘂羊僧僧內猶有少分不為求一切名聞不為求一切利益不為求一切勝地他等故學一切佛法正真善真正於戒人在者不在其限文當遣最大鈍根眾生勸化營理僧事與出家人作和上阿闍梨學習誦等如大方廣十輕輪經說文當福德時如大集月藏分經說與雜阿含經同又文當佛滅度二一千年已後一切道俗莫問一切利根鈍根皆悉普名邪見顛倒盡亦名皆悉普破或戒盡唯有一切破戒无戒兩種眾生在如大集月藏分經說與雜阿含經同唯除與佛頂佛牙佛鉢及餘殘功德等有緣或從十方來或從天上來暫起得道即滅者不在其限未自親見經文准經義推說又明唯除一切行法行王如大薩遮尼乾子經說亦名一切國王亦名一切灌頂剎利王如大方廣十輪經大般涅槃經大薩遮尼乾子經等說亦名一切人王如佛藏經大集月藏分經與雜阿含經同等說不定若能得常一向唯純偏依一切第三階佛法內一切廿四段等一切最下下得西惡得苦普真普正佛法僧眾生斷惡修善解行等常正常不錯常不誹謗一切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯純益无損佛法亦名常一向唯純偏學一切生盲眾生佛法住持一切三寶住持一切國土利益一切眾生不在其限如大薩遮尼乾子經大方廣十輪經等說等第二大段明驗一切第三階佛法內佛滅度後時節分齊義一者明文當佛滅度五百年已後文當千佛不能得度得一切眾生時如迦葉經說二者明文當佛滅度後千年以後文當百千萬億佛不能得度得一切眾生時以上佛多少次第驗之義當佛滅度一千年已後如佛藏經說三者明文當於末世時義當佛滅度後文當義當一切正法不行時文當義當唯有一切三種顛倒眾生時如大薩遮尼乾子經說文當義當一向唯純偏為一切破戒比丘作一切寺舍等時一向不為一切持戒比丘作一切寺舍等時唯瞋唯罵唯打唯殺文當一切佛皆悉普不能得度得一切眾生時如大方廣十輪經說兼依餘經說文當義當一切利根空見有見眾生由偏學一切多聞智惠故一者明能得增長一切種種惡皆悉普盡時以後驗前說亦名以善驗惡說二者明能滅一切四乘善根善皆悉普盡時唯除一切利根真善正見成就凡夫返上即是不在其限如大集月藏分經說與雜阿含經同三部經俱明最大富貴俱明最大利根俱明最大多聞俱明道俗俱明滅三寶俱明滅國土俱明殺眾生俱明治罰一切破戒比丘俱明不得瞋罵打縛一切出家人若瞋罵打縛一切出家人莫問持戒破戒一種相似皆悉普不免墮阿鼻地獄等俱明不得遣一切出家人還俗若遣一切出家人還俗莫問一切善惡持戒破戒一種相似皆悉普不免墮阿鼻地獄等俱明聖人出國而去俱明一切善鬼大力諸不護其國俱明㫋陀羅此一俱明內唯一部經文少不足以十三種俱明驗之義同一種相似俱明一切正善佛法皆悉普盡唯有一切邪善佛法在餘有種種義如經內說以上佛多少次第驗之義當佛滅度一千五百年已後如大集月藏分經與雜阿含經同大薩遮尼乾子經大方廣十輪經經等說又如大集月藏分經說與雜阿含經同文當彌勒菩薩義當明一切菩薩皆悉普不能得度得一切眾生時驗前一切諸佛皆悉普不能得度一切眾生亦是義當佛滅度一千年已後又大方廣十輪經內明作五逆四重誹謗正法毀呰賢聖眾生若未出家不得出家若已出家還儐擯出者不遣還俗唯遣儐擯出寺外聚落外國土外何以故明以上十四種俱明驗之所以得知又上十四種俱明經文雖少有少不同一種相似又明如大般涅槃經說文當已上人語引經說已下唯是經文說十一部經明則有壞滅方等經典无有壞滅善男子若我弟子受持讀誦書寫解說方等經典恭敬供養尊重讚嘆當知爾時佛法不滅又已下唯是人語引經釋何以故一者明文當義當由一切十一部經內唯明一切第二階佛法悉普盡不明一切第一階佛法一切第三階佛法皆悉普盡所以上經文不聽依所以上經文不聽依所以此段經文復導有壞滅如四阿含經律文等說二者明文當義當由一切方等經典內皆悉普具足明一切三階佛法盡故於大般涅槃經一部內文義最大具足乃至餘部等亦如是又文當義當一切三階佛法皆悉普唯由有一切利根戒見俱不破正見成就聖人一切利根真善戒見俱不破正見成就凡夫一切利根破戒不破見正見成就凡夫一切一乘根機諸佛菩薩與作根本故所以皆悉普得常住不滅如一切三階佛法內所有一切薩菩薩學一切菩薩行而復與一切第二第三兩階佛法內一切道俗同而不同者義當是一切利根正見成就一乘根機菩薩如一切三階佛法所說經等等說又何以故明唯有一切利根一乘根機諸佛菩薩能得住持一切三階佛法所由義如大方廣佛花嚴經大般涅槃經摩訶衍經等說又明由學一切第一階佛法內一切甚深大乘佛法故一切佛法皆悉普得當常住不滅者一者明文當義當為一切等第一階佛法內一切利根戒見俱不破正見成就聖人一切利根真善戒見俱不破正見成就凡夫一切利根破戒不破見正見成就凡夫一切一乘根機菩薩說二者明文當義當為一切第二階佛法內一切利根戒見俱不破正見成就聖人一切利根真善戒見俱不破正見成就凡夫一切利根破戒不破見正見成就凡夫一切三乘根機眾生生說如一切第一階佛法內一切甚深大乘經等說明同得聞甚深大乘經一切菩薩一切聲聞緣覺當時即得道一切利根空見有見六師外道等初時不信佛後時𢌞心即得道等者皆悉普是三者明文當義當一切利根戒見俱破空見有見眾生若學一切第三階佛法內一切小乘佛法即得住持一切佛法唯除學一切小乘徹倒到成就不退已後學一切第一第二兩階佛法不在其限四者明文當義當一切利根戒見俱破空見有見眾生若學一切第一階佛法內一切甚深大乘佛法即不免滅一切佛法皆悉普盡五者明義當以上三卷經文次第驗之不聽一切說法菩薩等為一切利根戒見俱破空見有見眾生亦名十惡眾生說一切第一階佛法內一切甚深大乘佛法唯首為說一切第三階佛法內一切最大多惡一切最大多苦生死流轉法如大方廣十輪經乃至為一切利根空見有見邪見成就凡九種人所說經兼依大般涅槃經等說以此文驗所以得知一切第一第二兩皆階眾生唯由學一切第一階佛法內一切甚深大乘佛法故得住持一切佛法常住不滅一切第三階眾生唯由學一切第三階佛法內一切大乘佛法一切小乘佛法故得住持一切佛法不滅不又明一切利根正見成就眾生常有一切六階一者明常有一切利根戒見俱不破正見成就聖人或作一切利根聖人或作一切利根真善正見成就凡夫與一切利根正見成就眾生作一切起教軌則法故或作一切利根空見有見六師外道等與一切利根空見有見眾生作一切起教軌則法故由利根故得道最疾如一切三階佛法所說經等說二者明常有一切利根真善戒見俱不破正見成就凡夫一切利根一乘根機菩薩由利根故得道最疾已上就一切自利行說已下就一切利他行說亦作一切利根聖人亦作一切利根真善正見成就凡夫亦作一切利根空見有見六師外道等如大般涅槃經乃至如一切第一階佛法內一切甚深大乘經等說三者明常有一切利根不作一切利根不作一切六師外道等不作一切五逆罪不誹謗一切正法不毀呰一切賢聖不起一切空見有見等惡一切四重罪或犯多或犯少不破戒不破見正見成就凡夫一切利根一乘根機菩薩由利根故或墮地獄餓鬼畜生暫入即得出又由利根故雖墮地獄餓鬼畜生亦得聞佛法亦得為一切眾生說佛法又由利根故得道最疾如大方廣佛花嚴經文常當明刧盡火中菩薩地持論文當明種性菩薩未免入地獄未曾有經文當明畜生說法乃至於一切地獄等內得聞諸佛菩薩說法者亦皆悉普是得聞佛法攝四者明常有一切利根真善少分戒見俱不破少分正見成就凡夫一切三乘根機眾生由利根故得道最疾知如四阿含經律文等說如一切三階佛法內一切三乘根機眾生得聞佛說法即得道者亦皆悉普是五者明常有一切利根空見有見眾生作一切五逆罪犯一切四重罪誹謗一切正法毀呰一切賢聖亦起一切空見有見等惡破戒不破見少分正見成就凡夫一切三乘根機眾生由利根故或墮地獄餓鬼畜生暫入即得出又由利根故雖墮地獄餘餓鬼畜生亦得聞佛法亦得為一切眾生說佛法又由利根故得道最疾初時不信佛後時𢌞心即得道如大方廣十輪經說如上第四子段說上來五階最少唯如抓上土如大般涅槃經等說六者明常有莫問一切善惡持戒破戒皆悉普名一切破戒眾生如上第一大段內釋又一切利根空見有見眾生由利根故得值一切无量无邊三寶亦能度得一切无量无邊眾生亦能斷得一切无量无邊惡亦能學得一切无量无邊解行等猶不免誹謗一切正法毀呰一切賢聖如摩訶經衍經佛藏經大集月藏分經與雜阿含經同大方廣十輪經大般涅槃經等說又從阿鼻地獄等得出已後於无量无邊刧无量无邊佛所學當已一切出世間根機藥病一切正解一切正行等多者皆悉普得徹到成就但使受生即不免常生一切六師外道等一切邪見家何以故明由一切餘習果未盡初時不信佛後時𢌞心即得道者皆悉普是文當義當知佛初成道時所度一切利根空見有見六師外道等皆悉普是如一切三階佛法所說經等說此一階最多如十方界所有地土多少分齊一種相似如大般涅槃經等說又此段亦名出一切利根空見有見眾生從无始世界乃至未得法忍已來於一切世間內於一切三階佛法內常是顛倒所由義如下第二大段末第二何以故一切廿四段等一切別真別正佛法內說又明一切利根空見有見眾生由從无始世界得聞佛法已來乃至得值无量无邊三寶等已來常唯認上一切利根六階正見成就眾生一切利根正見成就果由利根故莫問聖邪正但使得見佛聞法𢌞心即得道常一向不認一切第六階一切利根空見有見眾生一切邪見成就因由利根故一切惡斷不可得一切阿鼻地獄等苦受不可盡一切當已根機藥病一切正解一切正行學不可得成就如餘卷第一大段第十五子段內五部經等說又明有三部經等廣明一切顛倒法一者明如大薩遮尼乾子經說文當於末世時義當佛滅度後文當一切正法不行時文當唯有一切三種顛倒時已上人語引經說已下三段初各除已下三外餘者唯是經文說一者明云何名樂於非法貪心答言大王於十不善惡業道中生於樂心是名樂於非法貪心二者明云何名為顛倒貪心自己手力得諸資生依時節得依正法得依如法得不生足心更求他則財如是名為顛倒貪心三者明王言大師云何為邪法羅納網之所纏心答言大王於諸外道非義論中起義想論想於无益論生利益想於非法中生是法想於末世時非是智者所作論中以為正論生於信心董修邪見以為福德是名邪法羅納網纏心已上人語引經說二者明如大般涅槃經說已上人語引經已下唯是經文說若有眾生我見无我无我見我常見无常无常見常樂見无樂无樂見樂淨見不淨不淨見淨不滅見滅滅見不滅罪見非罪非罪見罪輕罪見重重罪見輕乘見非乘非乘見乘道見非道非道見道實是菩提見非菩提實非菩提謬見菩提苦見非苦集見非集滅見非滅實見非實非實見實是世諦見第一義諦第一義諦見是世部諦諦見非諦非諦見諦以真佛語名為魔語實是魔語以為佛語如是之時諸佛乃說大涅槃經已上人語引經說三者明如勝鬘經過半卷已後說文當若過若不及餘義如經又此段摠明一切顛倒餘卷第一大段內十三部經等別明一切顛倒又明一切十二部經內一切佛法等不定者皆悉普道戒破戒者義當是不定語如大方廣十輪經第三卷末廣說又明文當義當佛滅度後文當義當一切正法不行時文當義當唯有一切三種顛倒眾生時教一切行法行王治罰一切道俗罪輕重淺深分廣齊法餘義如經說第一段明教一切行法行王治罰一切俗人內返羊逆眾生罪輕重淺深分齊一者明自返反二者明教他返反三者明與王毒藥四者明奪王資生五者明破王所應作事六者明侵奪王妻宮女七者明違王命八者明出王密語九者明覘伺國土十者明罵王十一者明毀呰王文當除不斷命不壞諸根得繫閇牢獄枷鏁打縛奪其資生驅儐擯他處第二段一切行法行王治罰一切破戒出家人罪輕重淺深分齊兼依餘經說莫問犯罪輕重一種相似文當不得斷命不得割壞一切諸根不得囚問閉不得樔枷鏁不得撾打不得脫袈裟不得奪其資生之物得呵嘖得驅擯如大薩遮尼乾子經說已下兼依餘經說或驅出等或驅出聚落或驅出國如大集月藏分經說與雜阿含經同第三段明為一切行法行王辨一切道俗邪正分齊一者明王請一切道俗邪正分齊文當已上人語引經說已下唯是經文說王言大師若彼國王闇鈍无智國內多諸沙門婆羅門所行各異互相是非各各自言我是沙門修正道者能利眾生我是福田應受供者如是各各互相是非云何得知是真沙門非真沙門是正道是邪道是如法語非法語已下人語引經說二者明唯有一切佛弟子出家人是真沙門文當已上人語引經說已下唯是經文說大王當知有大沙門斷釋迦子出家為道得神通證有大名稱如來應正遍知彼諸弟子比丘比丘尼於彼瞿曇法中住者是真沙門能行正道利益眾生是福田者能知正法是如法語者已下人語引經說三者明義當一切在家人皆悉普是一切邪見眾生皆悉普非是真沙門文當已上人語引經說已下唯是經文說大王當知除沙門瞿曇法外除餘諸一切婆羅門等是名邪道非實沙門非法語者不應取語何以故大王當知彼无正法云何能得如法之語已下人語引經說如大薩遮尼乾子經說又明已下兼依餘經說文當義當就一切出家人普真普正剃頭或名着染衣或名者着袈裟邊說何以故明文當已上人語引經說已下唯是經文說亦是過去未來現在諸佛大悲力故為欲利益一切眾生有二種護持第一為欲紹三寶種令不斷絕出家修道剃除鬚髮而着袈裟第二說應四諦趣向三乘如是二種如來護持非聲聞辟支佛所能持也乃至百千帝釋梵天亦不能持百千那由他轉輪聖王亦不能持已下人語引經說如大方廣十輪經說又於上兩種住持一切三寶等不滅內義當佛滅度一千年已後說應四諦趣向三乘一種住持一切三寶住持一切國土利益一切眾生等不滅一切聖人一切利根真善正見成就凡夫一切最上上得好得樂別真別正佛法僧眾生斷惡修善解行等悉普滅盡如上第一大段內所說八部經前五部經文當佛滅度一千年已後說後三部經義當佛滅度一千年已後說乃至一切佛法皆悉普滅盡已來唯有一切利根空見有見眾生一切普真普正剃頭或名着染衣或名着袈裟僧住持一切普真普正形像佛住持一切普真普正十二部經經卷經文法住持一切國土利益一切眾生不滅在何以故明一切普真普正形像佛一切普真普正十二部經經卷經文法唯由一切普真普正剃頭或名着染衣或名着袈裟僧感得所以一切普真普正剃頭或名着染衣或名着袈裟僧最是住持一切三寶等根本大主所以一切道俗一向唯純徧禮供養守護一切普真普正剃頭或名着染衣或名着袈裟僧者一者明得滅一切罪障最疾二者明得一切出世間聖道果最疾三者明得生一切淨土最疾此一段唯上唯下義推說四者明得常不離一切三寶乃至成佛等最疾又於一切第三階佛法正與一切利根空見有見眾生過去一切出世間正善根機相當現在一切出世間正善藥病相當佛法內隨阿種佛法皆悉普无有與等者何況一切第一第二兩階不與一切利根空見有見眾生過去一切出世間正善根機相當現在一切出世間正善藥病相當佛法等如大集月藏分經與雜阿含經同法花經大方廣十輪經等說第四段明治罰作惡國王法一者明唯遣自治罰如經說二者明唯遣出家人治罰文說當已上人語引經說已下唯是經文說若王无智不能如是自思惟者應於國內處處推求有大智惠善知王論常行正法能如實語諸沙門等王應自往彼沙門所若不自往當遣大臣王子貴人人所重者詣彼沙門宣王渴仰尊重之心將至王所若彼來者王應迎逆禮拜問訊盡恭敬心盡尊重心問沙門言何等善行何等惡行行何等法能有利益行何等法无有利益我心闇鈍无有智惠願為我說已上人語引經說次下經文義常當出有大智惠沙門大知智惠多少淺深分齊唯明教一切行法行王不殺生不偷盜不邪婬不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見即名行法行王更不說餘法如大薩遮尼乾子經說經說第五段明一切行法行王若遣一切出家人還俗若打一切出家人若殺一切出家人得罪輕重淺深分齊文當於一切出家人莫問一切善惡持戒皆悉破戒皆悉普一種相似若驅一切出家人還俗若打一切出家人若殺一切出家人一者明文當攝在惡逆眾生分中上品治罰何以故作根本極重罪故二者明文當與破壞塔寺焚燒經像取一切三寶財物一種相似三者明文當與誹謗一切三乘法一種相似四者明文當與惡心殺父母殺阿羅漢破和合僧出佛身血一種相似五者明文當趣大地獄受无間苦无間者義當即是阿鼻地獄如大薩遮尼乾子經說又明義當乃至一切出家人若遣一切出家人還俗若打一切出家人若殺一切出家人亦如是類以可知何以故明如上第二大段內說文當一切出家家人與一切諸貴十四種俱明義同一種相似无別故以此文驗所以得知又如大集月藏分經說與雜阿含同文當打一切破戒比丘得罪過於出一萬億佛身面血何況打一切持戒比丘何以故明不就一切悲敬兩就由種田厚薄說亦不就一切能敬心淺深說唯就一切損益多小少說明出佛身西血莫問多少皆悉普不能得滅一切佛身法等盡所以得罪經明打一切出家人不免皆悉普滅一切佛法等盡所以得罪重又廣明一切損益多少所由義如下兩段何以故一切廿四段等一切普真普正別真別正佛法內說唯除一切行法行王乃至一切行法行官府等得打一切返反逆俗人得打一切作則賊俗人等不在其限又已下引經證佛滅度一千年已後一切道俗等皆悉普不得打一切出家人所由義已上人語引經說已下唯是經文說善男子未來世中一切俗官不信罪福稅奪眾僧物或稅畜生糓米乃至一豪毫之物或驅使三寶奴婢或乘三寶牛馬一切俗人不得撾打三寶奴婢畜生乃至不得受三寶奴婢禮拜皆得殃咎何況驅策撾打告諸俗官若有禁防剗邏輪稅之處慎莫令比丘輪稅若稅出家人者得罪无量已下人語引經說如像法決疑經說與多部經義同是可損持戒破戒兩種福田內亦就一切福田厚薄說如上說文當何況打一切持戒比丘是又明若就一切根機說一者明唯除一切第一階佛法內一切利根真聖真善正見成就凡夫一切一乘根機菩薩莫問凡聖一種相似為住持一切佛法等故俱得驅一切破戒比丘還俗俱得打一切道俗乃至亦得殺一切修道人如大般涅槃經淨度三昧經等說二者明一切第二階佛法內一切利根真聖真善正見成就凡夫一切三乘根機眾生莫問凡聖一種相似唯得驅一切破戒比丘還俗皆悉普不得打一切出家人亦不得殺一切修道人如大般涅槃經十號內及大般涅槃四種近困因初下近因內律文等說三者明一切第三階佛法內一切利根空見有見眾生一向不得驅一切出家人還俗亦不得打一切出家人亦不得殺一切出家人唯除得用五種輕治罰一切出家人法治罰一切出家人或驅出寺或驅出聚落或驅出國等不在其限唯除得打一切俗人不在其限如大集月分藏分經與雜阿含經同大薩遮尼乾子經大方廣十輪經等說又唯有此上下兩子段於一切三階佛法莫問文義俱廣說餘卷第一大段內亦如是餘段有者略說又明若就佛在世及佛滅度後一切時節分齊說一者明文當佛滅度後文當末世時義當佛滅度後又義當佛滅度後一千年已前猶得用一切第一第二兩階佛法內一切重治罰一切道俗法治罰一切道俗如大般涅槃經淨度三昧經等說二者明文當義當佛滅度一千年已後一切第一第二兩階佛法內一切重治罰一切道俗法皆悉普不得用之一向唯得用一切第三階佛法內一切輕治罰一切道俗法治罰一切道俗如大集月藏分經與雜阿含經同大薩遮尼乾子經大方廣十輪經等說何故明文當佛滅度後一千年已前由多有一切聖人一切利根真善正見成就凡夫在不滅故所以猶得用一切第一第二兩階佛法內一切重治罰一切道俗法治罰一切道俗如最妙勝定經與多部經義同摩訶摩耶經加迦葉經等說文當義當佛滅度一千年已後一切聖人一切利根真善正見成就凡夫皆悉普滅盡如上第一大段內說唯有一切第一階佛法內一切內利根空見有見破戒不破見正見正見成就凡夫一切三乘根機眾生在多少分齊唯如㧓上土一種相似亦名唯有一切利根空見有見邪見成就顛倒行壞體壞一切三乘根機眾生在多少分齊如十方世界所有地土一種相似所以唯得用一切第三階佛法內一切輕治罰一切道俗法治罰一切道俗如上第一大段內所說八部經等說交了本邦所傳三階佛法卷第二本邦所傳三階佛法卷第二法隆寺本底本聖語藏本興聖寺本首部闕迭並釋淨土群疑論探要記集錄引文以校異冠註對校聖聖語藏本興興聖寺本要釋淨土群疑論探要記所引集錄本文略稱
