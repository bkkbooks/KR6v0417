普真普正佛法已外歸一切別真別正三寶度一切別真別正衆生斷一切別真別正惡修一切別真別正善解行等一名為惡欲二邪惡三惡知識四謗佛五助六師外道法六亦為他人説邪道法七不不聽受一飲水以自供養八增上慢教九順行魔教十乃至少言語亦名邪見十一乃至讀經誦經亦名不淨説法十二乃至分別一切佛法是非邪正長短名不淨説法得罪過於殺三千大千世界滿內衆生惡欲如迦葉經説餘者如佛藏經説所以如餘卷第一大段第九子段內十三部經等記説一者文當明一切道俗亦名一切利根空見有見衆生由分別真別正佛法內一切惡一切善佛法故常起一切貪瞋煩惱無量無邊若更分別一切別真別正佛法內一切善佛法轉更增長一切貪瞋煩惱喻如一切噎病及一切大小便不通衆生返更多食多飲漿水一種相似又讀經誦經雖無邪錯謗佛謗法通凡及聖惡亦能得生一切貪瞋煩惱復不能得與一切無名相法相應所以乃至讀經誦經亦名不淨説法二者文當義當明一切道俗亦名一切利根空見有見衆生由分別一切別真別正佛法故唯偏將一切利根空見有見衆生一切邪善佛法作是一切利根真聖及凡夫正見成就九種人一切正善佛法作非唯瞋唯罵唯打唯殺等者皆悉普是若更分別一切別真別正佛法內一切惡一切善佛法轉更增長一切邪錯謗佛謗法凡及聖喻如一切生盲衆生學一切盡書盡作一切田種作一切工污巧作一切興生販賣及一切征陳等一種相似如餘卷第一大段第九乃至第十四六子段末就説四種喻文當義當明一切道俗亦名一切利根空見有見衆生於一切佛法一向畢竟永不識一偈一句一字一分一豪毫邪正分齊之義與一切生盲衆生一種相似法內廣説唯除一切聖人一切利根正見成就凡夫一切最大鈍根衆生兩種啞羊僧不在其限如一切第一第二兩階佛法內所説經大方廣十輪經等説何以故明文當義當佛滅度一千年已後一切道俗名字與一切利根空見有見衆生九種人名字一種無別唯有綺五語説之不同耳又明一切道俗亦名一切利根空見有見衆生乃至未得法忍已來於一切別真別正佛法內一切惡唯得不作一切惡僧寶一切惡衆生唯得不與共住又於一切惡僧寶一切惡衆生唯除與共濡語乃至禮足供養守護等不在其限又亦不得深分別一切別真別正佛法是非邪正長短亦不得與深分別一切別真別正佛法是非邪正長短一切邪善僧寶一切邪善衆生唯得不與共住唯除與共濡語乃至禮足供養守護等不在其限如佛藏經大薩遮尼乾子經大集月藏分經與雜阿含經同大方廣十輪經大方等陀羅尼經等説又明一切道俗亦名一切利根空見有見衆生乃至未得法忍已來若法分別一切別真別正佛法是非邪正長短名為一切邪善佛法所由義如餘卷第一大段第九子段內十三部經説唯除學一切草四段等一切普真普正佛法不在其限如上何以故內説又明何以故明一切第三階佛法內一切利根空見有見衆生乃至未得法忍已來莫問一切善惡持戒破戒皆悉普名一切破戒衆生如上第一大段內釋莫問一切利根鈍根有知解無知解歸一切三寶度一切衆生斷一切惡修一切善解行等多少但使常一向唯純偏學一切世間內一切第一第二兩階佛法內一切七十種等所説一切最上上得好得樂別真別正佛法僧衆生斷惡修善解得行等常邪常錯常謗佛常謗法通凡及聖文當常行誹謗語如上第二大段七種旃陀羅道俗法內説常一向唯純損無益佛法餘如上卷初段內説亦名常一向唯純偏學一切有眼衆生佛法唯除一切聖人一切利根真善正見成就凡夫不在其限皆悉普名聞暗鈍無智惠常行邪法常能妄諸沙門等皆悉普名旃陀羅王皆悉普名愚癡破戒比丘皆悉普名剎利旃陀羅羅皆悉普名輔相旃陀羅少於善根不肯信向諂典曲愚癡自稱多知智皆生憍慢不畏後世惡業果報離善知識乃至趣向阿鼻地獄等皆悉普名剎利旃陀羅皆悉普名婆羅門旃陀羅皆悉普名沙門旃陀羅皆悉普名大臣旃陀羅先修善根令悉消滅乃至墮於阿鼻地獄等所由義如上第二大段七種旃陀羅道俗法內説如下草四段法內説一者明常增長一切上下所生一切邪空有一切邪三毒一切邪我見一切邪自高輕他一切邪自是非他等無量無邊二者明常增長一切謗佛謗法通凡及聖無量無邊如餘卷第一大段第九子段內十三部經等説三者明常增長一切十惡一切四重惡一切五逆惡一切草六種一切阿鼻地獄惡等無量無邊如佛藏經大方廣十輪經等説四者明常增長一切利根正見成就九種人內一切利根空見有見衆生無量無邊如上第一大段內所説八部經等説五者明常增長一切不信佛法一切惡天龍八部一切惡鬼神一切惡夜叉羅剎一切惡魔等無量無邊如大集經大集月藏分經與離雜阿含經同灌頂經雜類神呪經大般涅槃經大方廣十輪經摩訶摩耶經法花經迦葉經等説六者明滅一切正善三寶一切正善衆生一切正善斷惡行一切正善修善修解行等內一切無名相法皆悉普滅盡無名相法雖不可滅由人不行故名之為滅七者明常不與己一切有緣佛法相當如此段下段段內廣明滅一切有緣佛法僧衆生斷惡修善解行等有皆悉普是八者明滅一切惡僧寶一切惡衆生內一切佛性佛皆悉普滅盡佛性雖不可滅由人不行故名之為滅此段以惡驗善説九者明滅一切惡僧寶一切惡衆生內一切菩薩行皆悉普滅盡由自身不行由復不肯敬所以名之為滅此段以惡驗善説十者明滅一切惡僧寶一切惡衆生內一切當來佛皆悉普滅盡當來佛雖不可滅由人不行故名之為滅此段以惡驗善説十一者明滅一切惡僧寶一切惡衆生即是一切真佛想佛皆悉普滅盡由人不行故名之為滅此段以惡驗善説十二者明滅一切惡僧寶一切惡僧寶一切惡衆生內翻一切惡作一切善翻一切邪善作一切正善敬一切正善作一切六波羅蜜一切十二頭陀等具足決定得一切菩提涅槃果想皆悉普滅盡由人不行故名之為滅此段以惡驗善説十三者明滅一切惡僧寶一切惡衆生一切六弊惡等內一切餘殘不盡善皆悉普滅盡此段以惡驗善説十四者明滅一切惡僧寶一切惡衆生一切六度邪善解行等內一切餘殘不盡正善皆悉普滅盡此段準依次上十三段説十五者明滅一切剃頭或名著染衣或名著袈裟僧皆悉普滅盡如上第一大段內所説八部經餘卷第一大段第九子段內十三部經等説十六者明滅一切利根空見有見衆生內一切利根正見成就九種人一切三階佛法皆悉普滅盡十七者明滅常一向唯純偏求一切最上上別好名聞一切最上上別好利養一切最上上別好寺舍一切最上上別好僧正及一切最上上別好法主等一切最上上別好師僧一切最上上別好弟子一切最上上別好徒衆一切最上上別好檀越等八種一切最大邪好道俗內一切利根正見成就九種人一切三階佛法皆悉普滅盡十八者明滅一切五逆一切四重一切誹謗正法一切毀呰賢聖一切十一種等一切最大邪惡道俗內一切利根正見成就九種人一切三階佛法皆悉普滅盡十九者明滅一切六道衆生內一切利根正見成就九種人一切三階佛法皆悉普滅盡草者明滅一切六親眷屬內一切利根正見成就九種人一切三階佛法皆悉普滅盡準依大方廣十輪經明一切四重五逆誹謗正法毀呰賢聖等聖內有正見成就三乘衆生準依大般涅槃經明一切聖人作一切六道身等驗之所以得知草一者明滅一切利根正見成就九種人內一切六道衆生內一切六親眷屬皆悉普滅盡準依像法決疑經其與多部經義同觀佛三昧經等説亦名以惡驗善説草二者明滅一切信佛法一切正善天龍八部一切正善鬼神一切正善夜叉羅剎一切正善魔五及一切魔王眷屬等皆悉普滅盡如大方廣十輪經大集月藏分經與雜阿含經同大薩遮尼乾子等經等説草三者明滅一切諸佛菩薩等一切最上上果報威力等一切次上上果報威力等一切最下下果報威力等皆悉普滅盡如大集月藏分經説與雜阿含經同亦名以惡驗善説草四者明滅一切同自他一切道俗作一切功德等皆悉普滅盡如像法決疑經與多部經義同餘從無始世界乃至未得法忍已來等如上前何以故一切草四段等法內説又亦名返上即是又明不當一切利根空見有見衆生過去一切出世間根機現在一切出世間藥病一切邪善亦名一切惡亦名一切破戒亦名一切邪持戒如上第一大段內釋乃至未能得滅一國土內佛上法乃至百千萬國土因內佛法已來位制判常得受一切世間人天果報唯除暫墮三塗不在其限從能得滅一國土因內佛法乃至百千萬國土內佛法已去始墮無量無邊劫懺悔不可得滅阿鼻地獄等準依餘卷第一大段第十五子段內五部經等廣説亦名以人驗法説本邦所傳三階佛法卷第三本邦所傳三階佛法卷第三聖語藏本首部多闕底本興聖寺本首部少闕並釋淨土群疑論探要記集録引文以校異但卷首少闕興聖寺本以多闕聖語藏本補冠注對校興興聖寺本指要釋淨土群疑論探要記所引集録本文標前卷例如
