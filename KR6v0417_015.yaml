body:
  text: 第六段明一切行法行王若能得依一切第三階佛法內一切鬪戰法共他鬪乃至殺唯得一切最大輕罪現在少分懺悔即得畢竟永滅盡不受一切三塗惡果報文當已上人語引經説已下唯經文説王言大師成就如是十種功德而得名為行法行王者若其國內有逆賊主具四種兵與法行王鬪諍國土及外國王來相侵奪欲與大鬪集四部丘兵一切現前行法行王云何彼與彼而共鬪戰答言大王行法行王當應思惟於三時中出三方便入陳鬪戰何等三時謂初入時中入時後入時大王當知初欲入時作方便者行法行王若見逆主爾時復作三種思惟一者思惟此返反逆主所有兵馬為與我等為當勝我若與我等共鬪戰者俱損無益若其勝我彼活我死如是念已應覓逆王所有親友及善知識當令和解滅此鬪諍二者行法行王見彼逆王與己平等及勝己力者心自思惟不應與戰當與其物求滅鬪諍三者若見逆王多有士衆眷屬朋黨象馬車步四兵力勝行法行王士衆雖少能以方便現大勇健難敵之相令彼逆王生驚畏心以滅鬪諍如是名為於初時中思惟三種方便之用大王當知若以親友與物驚怖如此三事不能滅彼鬪諍事者行法行王爾時復起三種思惟入陳鬪戰何等三種一者思惟此返反逆王無慈悲心自殺衆生餘人殺者亦不遮護我今不令如此相殺此是初心護諸衆生二者思惟當以方便降伏逆王士馬兵衆不與鬪戰三者思惟當以方便活繫縛取不作殺害生此三種慈悲心已然後莊嚴四種兵衆分布士馬唱説號令簡選丘兵衆分作三品於上品中有上中下以上品中下勇猛者列在於前次列第二中品健者次列上品最揵健兵馬分在兩葙令護步衆不生畏心行法行王處在軍中與最上品上品象馬車步猛衆健衆俱如是入鬪何以故有五種事能令大軍竟進不退何等為五一者慚愧王二者畏王三者取王三者取王意四者令衆背後無畏五者令念報國王恩如力如分不生退轉能勇戰鬪大王當知行法行王設是方便入陳鬪戰爾時雖復殺害衆生而彼王得輕微少罪決定受懺悔能滅何以故彼法行行法行王為欲入戰先生三種慈悲心故雖作此惡得罪輕微非決定受大王當知彼法行王為令衆生為護沙門護沙門法為護妻子族姓知識能捨自身及資生物作如是業因此事故彼法行王得無量福大王當知若為護國養活人民興兵鬪戰彼時國王應當先發如上三心敕令主將一依王教如是鬪者有福無罪如大薩遮尼乾子經説又明已下猶是上第四段義未盡由文廣故所以回之在後又已下亦名明一切利根空見有見衆生一切最大正見智惠義一切最大邪見愚癡義文當於末世時義當佛滅度後文當義當一切正法不行時文當唯義當唯有一切三種顛倒衆生時義當佛滅度或一千年已後或一千五百年已後如上第二大段內説文當義當教一切行法行王於國內處處推求有大智惠常行正法能如實語諸沙門等如大薩遮尼乾子經説又文當義當一向唯純偏為一切破戒比丘作一切寺舍時一向不為一切持戒比丘作一切寺舍等時唯瞋唯罵唯打唯殺文當一切佛皆悉普不能得度得一切衆生時義當佛滅度或一千年已後或一千五百年已後如大方廣十輪經説如上第二大段內説又兼依餘經説文當義當一切利根空見有見衆生由遍學一切多聞智惠故一者明能得壞增長一切種種惡皆悉普盡時以後驗前説亦名以善驗惡説二者明能滅一切四乘善根皆悉普盡時唯除一切聖人一切利根真善正見成就凡夫返上即是不在其限文當法滅盡品之時文當彌勒菩薩等義當一切菩薩皆悉普不能度得一切衆生時文當義當佛滅度一千年已後時如大集月藏分經説與雜阿含經同如上第二大段內説文當遣一切多聞持戒五德具足比丘輕呵嘖一切門徒弟子於一切如和僧衆內五種輕治罰一切破戒比丘文當義當教一切真善剎利一切真善輔相大臣一切真善沙門一切真善婆羅門一切真善居士持戒清淨有功德者供養恭敬聽受言教於聲聞辟支佛法皆悉普守護諦聽受持守護大乘如聞信受住大乘者持戒多聞言辭清辨與如此人對相歡娛則心悅樂咨門問義論敬受教悔誨等如大方廣十輪經説與上大薩遮尼乾子經説文當義當佛滅度後文當義當一切正法不行時文當義當唯有一切三種顛倒衆生時教一切行法行王於國內處處推求有大智惠常行正法能如實語諸沙門等一種相似又明一切道俗莫問貴賊賤一種相似文當義當若能得與一切第三階佛法相當終身能得教敬一切普真普正剃頭或名著染衣或名著袈裟僧莫問一切善惡持戒破戒一切正善邪善一切利根鈍根一切有知解無知解皆悉普敬作已上人語引經説已下唯是經文説是真沙門能行正道利益衆生是福田者能知正法是如法語者已下人説引經説皆悉普共濡語皆悉普禮足皆悉普供養皆悉普守護乃至終身常能得不作一切十惡一切草六種一切阿鼻地獄惡等者莫問一切善惡持戒破戒一切邪善正善一切利根鈍根一切有知解無知解莫問斷一切惡修一切善懺悔一切罪等多少皆悉普名有大智惠當常行正法能如實語諸沙門等皆悉普名行法行王皆悉普名多聞持戒五德具足比丘皆悉普名真善剎利皆悉普名真善輔相大臣皆悉普名真善沙門皆悉普名真善婆羅門皆悉普名真善居生士皆悉普名持戒清淨有功德者皆悉普名住大乘者皆悉普名持戒多聞言辭清辨皆悉普名與如此人對相歡娛則則心悅樂咨門問義論敬受教悔等何以故一者明一切佛弟子一切出家人比丘比丘尼皆悉普名已下上人語引經説已下唯是經文説是真沙門能行正道利益衆生是福田者能知正法是如法語者已下人語引經説如大薩遮尼乾子經説二者明文當若有禪士雖復持戒不能具足禪法不同未得三昧是人於禪若坐若行初夜得後夜得與禪定相應而住則能除斷無量業障能令多億那由他百千衆生悉得歸信成就菩提種種善根福德之聚況具持戒得真法三昧等者如大集月藏分經説與雜阿含經同三者明文當遣一切啞羊僧勸事與一切出家人作和上阿闍梨乃至遣令學習誦等四者明文當若復有人不成就波羅提木叉戒名為依止第一義僧乃至淨僧以此文驗所以得知如大方廣十輪經説又明一切道俗莫問貴賤一種相似文當義當若不能得與一切第三階佛法相當不能得終身常敬一切普真普正剃頭或名著染衣或名著袈裟僧莫問一切善惡持戒破戒正善邪善利根鈍根有知解無知解皆悉普敬作已上人語引經説已下唯是經文説是真沙門能行正道利益衆生是福田者能知正法是如法語者已上人語引經説不能得皆悉普共濡語不能得皆悉普供養不能得皆悉普守護乃至不能得終身常斷一切十惡一切草六種一切阿鼻地獄惡等而而常一阿向唯純遍學分別一切世間內一切第一第二兩階佛法內一切七十種等所説一切最上上得好得樂別真別正佛法僧衆生斷惡修善解行等一切上下一切凡聖一切善惡一切一切大乘小乘一切世間出世間一切利根鈍根一切有知解無知解一切邪正空有一切邪正多欲少欲一切邪正自利利他等者莫問一切善惡持戒破戒一切正善邪善一切利根鈍根一切有知解無知解莫問斷一切惡修一切善懺悔一切罪等多少唯除一切聖人一切利根真善正見成就凡夫不在其限已外外因一切利根空見有見衆生一者明正返上有大智惠常行正法能如實語諸沙門等皆悉普名闍暗鈍無智惠常行邪法常能妄語諸沙門等如下此段説二者明正返上行法行王皆悉普名旃陀羅王如下此段説三者明正返上多聞持戒五德具足比丘皆悉普名愚癡破戒比丘如下此段説四者明正返上真善剎利真善輔相大臣真善沙門真善婆羅門真善居士持戒清淨有功德者住大乘者持戒多聞言辭清辨與如此人對相歡娛則心悅樂咨問義論敬受教誨等皆悉普名義當是旃陀羅比丘如下此段説文當造惡行比丘實有過罪而恃白衣一切勢力或恃巨富則財物等力或恃多聞或恃辭辨或持恃弟子如是等力次下經文説文當剎利旃陀羅五者明皆悉普名文當輔相旃陀羅少於善根不肯信向諂曲愚癡自稱多知皆生憍慢不畏後世惡業果報離善知識乃至趣向阿鼻地獄六者明悉普名文當於未來世剎利旃陀羅乃至婆羅門旃陀羅善根微少無有信心欺詐諂典曲是諸愚癡現智惠相不隨善知識語實是愚癡現為知智惠心常疑悔不畏後世而無禁戒作諸殺生乃至邪見欺誑於他於諸世間當常行誹謗語剎利旃陀羅婆羅門旃陀羅壞亂佛法於我法中而得出家常毀破戒作諸惡行而剎利婆羅門盡心供養七者明一切利根空見有見衆生莫問一切道俗遺貴賤皆悉普名旃陀羅皆悉普名文當佛滅度後文當義當不信一切聖人持戒比丘皆悉普盡時文當義當不信一切伽藍聚落外一切學十二頭陀持戒比丘皆悉普盡時文當義當不信一切伽藍聚落內一切少欲知足省事持戒比丘皆悉普盡時文當義當一向唯純偏信一切破戒比丘一向唯純偏説一切破戒比丘好一向唯純偏供養一切破戒比丘一向唯純偏守護一切破戒比丘一向唯純偏為一切破戒比丘作一切寺舍等時文當義當一向不信一切聖人持戒比丘及一切凡夫內一切持戒比丘一向唯説一切人聖人持戒比丘及一切凡夫內一切持戒比丘惡一向不供養一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不守護一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不為一切聖人持戒比丘及一切凡夫內一切持戒比丘作一切寺舍等時唯瞋唯罵唯打唯殺又三念卷經從卷初發首明文當剎利旃陀羅婆羅門旃陀羅沙門旃陀羅大臣旃陀羅由一向唯純偏信一切破戒比丘等一向不信一切持戒比丘等故文當先修善根今悉消滅乃至墮於阿鼻地獄等如大方廣十輪經説又明何以故明一切第三階佛法內一切利根空見有見衆生乃至未得法忍已來莫問一切善惡持戒破戒皆悉普名破戒莫問一切利根鈍根有知解無知解歸一切三寶度一切衆生斷一切惡修一切善解行等多少但使常一向唯純偏學一切世間內一切第三階佛法內一切草四段等一切最下下得惡得苦普真普正佛法僧衆生斷惡修善解行等常正常不錯常不誹謗一切正法常不毀呰一切賢聖乃至一切凡夫等常一向唯純益無損佛法亦名常一向唯純偏學一切生盲衆生佛法皆悉普名有大智惠常行正法能如實語諸沙門等皆悉普名行法行王皆悉普名多聞持戒五德具足比丘皆悉普名真善剎利皆悉普名真善輔相大臣皆悉普名真善沙門皆悉普名真善婆羅門皆悉普名真善居士皆悉普名持戒清淨有功德者皆悉普名住大乘者皆悉普名持戒多聞言辭清辨皆悉普名與如此人對相歎歡娛則心悅樂咨問義論敬受教誨等所由義如上第四段由文廣故回之在後法內説如下草四段法內説一者明得頓滅從無始世界乃至未得法忍已來一切世間內一切三階佛法內一切上下所生一切邪見空見有見一切邪三毒一切邪我見一切邪自高輕他一切邪自是非他等皆悉普得滅盡不起故如下草三段法內説二者明得頓滅從無始世界乃至未得法忍已來一切世間內一切三階佛法內一切謗佛謗法通凡及聖皆悉普得滅盡不起故如此段上下草三段法內説三者明得頓滅從無始世界乃至未得法忍已來一切十惡一切四重一切五逆一切草六種一切阿鼻地獄