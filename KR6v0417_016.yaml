在在處處講説經律隨文取義不知如來隱覆祕密已下人語引經説次下經文説已上人語引經説已下唯是經文説像法之中諸惡比丘不解我意執己所見宣説十二部經隨文取義作決定説當知此人三世諸佛怨家速滅我法善男子諸佛説法常依二諦説世諦法時不違第一義諦指近以樹標遠立像表玄諸惡比丘於此義中不能解了誹謗不信隨相取義曆歷劫受殃是諸比丘亦復自稱我是法師我是律師我是禪師此三種學人能滅我法更非餘人此三種人造迭相説過造迭相毀呰此三種又人入於地獄猶如箭射已下人語引經説如像法決疑經與多部經義同滅減半卷已前説又明如最妙勝定經説與多部經義同文當佛滅度一千年已後文當法師解説佛語萬不著一文當義當一切道俗皆悉普不識聖人皆悉普於佛一切十二部經內抄前著後抄後著前滅一切十二部經內一切正法一切正義皆悉普盡喻如一切盲人指天上日若大若小若寬若狹一種相似喻如一切䪭聾人自言我聞天上説法之音一種相似即如上經文説明十三部經沒入於地者是準依大方廣十輪經説一切出家人準唯有剃頭或名著染衣或名著袈裟真僧住持一切三寶等不滅驗之於一切十二部經內亦準唯有一切真經卷一切真經文不滅在於一切佛內亦唯有一切真形像佛在已上人語引經説已下唯是經文説此諸比丘亦復如是世有文殊大迦葉等現入其中竟競共打罵驅逐令出不令得住亦如師子居香山中一切蟲狩皆不來迎師子去後百狩毒蟲共相鳴呼入香山中取其甘果飲其流泉皆令枯涸香山神仙不復擁護便生毒草食者命終吾滅度後一切比丘取我十二部經競共讀誦以上者著中以中著下以下著上中著前經後非義言義義言非義亦如外道各言我是已下人語引經説如最妙勝定經與多部經義同過半卷已後説又明如大薩遮尼乾子經第三卷過半已後説文當於末世時義當佛滅度後文當正法不行邪法競興衆生心惡趣起三種過文當義當一切正法不行時唯有一切三種顛倒衆生時何以故明與此段上下十三部經內多部經千年已後同如餘卷第二大段內廣説已上人語引經説已下有二子段一一段初各除三家學字已外餘者唯是經文説一者明云何名為樂於非法貪心答言大王於十不善惡業道中生於樂心是名樂於非法貪心二者明云何名為顛倒貪心自己手力得諸資生依時節得依正法得依如法得不生足心更求他財如是名為顛倒貪心三者明王言大師云何名為邪法罪納羅網之所纏心答言大王於諸外道非義論中起義論想於無益論生利益想於非法中生是法想於末世時非是智者所作論中以為正論生於信心薰修邪見以為福德是名邪法羅納網纏心已下語人人語引經説又大薩遮尼乾子經文當義當佛滅度一千年已後以下雜阿含經文當佛滅度一千年已後文當十善悉壞驗之與大薩遮尼乾子經佛滅度後正法不行時唯有一切三種顛倒衆生時第一顛倒文當於十不善惡業道中生於樂心文義具足一種相似又明如雜阿含經第草五卷近初説文當佛滅度一千年已後已上人語引經説已下為唯是經文説過千年後我教法滅時當有非法出於世間十善悉壞閻浮提中惡風暴起水雨不時世多飢饉雨則災雹江河消滅花果果不成人無光澤蟲村鬼村悉皆河消滅花果不成人無光澤蟲持磨滅飲食失味珍寶沈沒人民眼服食庶草木時已下人語引經説又此部經內上文當佛滅度後一千年已後佛導噵我教法滅非時當有非法出於世間十善悉壞與上大薩遮尼乾子經説於末世時正法不行邪法競興於十不善道中生於樂心文義具足一種相似又大集月藏分經文當法滅盡品文當四方惡王一時俱起破壞塔寺殺害比丘難著王與雜阿含經文當佛滅度一千年已後佛導噵我教法滅時四方惡王一時俱起破壞塔寺殺害比丘難當王同是一注法文義具足一種相似又明如摩訶摩耶經第二卷文當佛滅度一千年已後説一者明文當出家人袈裟變因白不受染色義當一切出家人袈裟變白不受染色準依大方廣十輪經第五卷過半已後説一切出家人有兩種又一切出家人既有兩種一切袈裟色亦有兩種一者初明一切剃頭著染衣袈裟僧出家人乃至一切佛法未皆悉普滅盡已未來當在不滅人既常在不滅一切袈裟青黑木蘭色亦當在常不變白常受染色不滅如大集月藏分經與雜阿含經同第九卷近初説文當佛滅度二千年已後明剃頭著染衣袈裟僧不滅乃至向後唯噵不滅未出滅之時節以此文驗所以得知二者後明一切應四諦趣向三乘僧出家人上下十三部經等內多部經説文當佛滅度一千年已後一切聖人一切利根真善正見成就凡夫僧皆悉普滅盡一切十二部經內一切正法一切正義亦皆悉普滅盡於一切十二部經內唯有一切真經卷一切真經文不滅在唯準依大方廣十輪經第五卷過半已後説與一切出家人內唯有剃頭著染衣袈裟僧不滅在一種相似於一切佛內亦唯有一切真形像不滅在一種相似人既滅盡一切袈裟亦變白不受染色類以可知二者明一切經藏皆悉普入龍王宮盡亦是一切經藏內一切正法一切正義皆悉普入龍王宮盡唯有一切真經藏一切真經卷一切真經文猶在不滅準依大方廣十輪經第五卷過半已後説與一切出家人剃頭著染衣袈裟僧不滅在一種相似於一切佛內亦唯有一相真形像不滅在一種相似又摩訶摩耶經內亦破壞塔寺殺害比丘又摩訶摩耶經內就家廢與廢興滅明佛滅度一千年已後時滅不就佛滅度一千年已時後後時滅明處廢廢興滅何以故明與上下十二部經內多部經同以此文驗所以得知又明如佛藏經説文當佛滅度後文當百千萬億佛不能得度得一切衆生時義當佛滅度一千年已後如餘卷第二大段初廣説已上人語引經説已下唯是經文説舍利弗如是惡人覆藏假瑕疵多欲多求以財自活惡魔知心為作方便令其卒乖異各共散壞一味僧寶分為五部既有五部則生諍訟立互相是非論説過共失舍利弗如今比丘互相教化互相恭敬同心共行隨順佛説爾時比丘不相教化不相恭敬見作惡者畏而捨去不能以法共相教誨或時雖有多聞深智猶懷憍慢輕賤餘人各以所是自立其論不喜相見況能受教舍利弗如來在世三寶一味我滅度後分為五部舍利弗惡魔於今猶尚隱身佐助調達破我法僧如來大智現在世故弊魔不能成其大惡當來之世惡魔變身作沙門形又入於僧中種種邪説令多衆生入於邪見為説邪法已下人語引經説次下經文説已上人語引經説已下唯是經文説爾時惡魔説如是等邪貪著事如是事者非諸佛及佛弟子所説爾時惡人為魔所迷各執所見我是彼非舍利弗如來豫見未來世中有如是等破法事故説是深經悉斷惡魔諸所執著舍利弗當爾之時閻浮提內多是增上慢人已下人説語引經説如佛藏經第二卷滅減半已前過半已後説又分一切五部戒律等別唯除一切聖人一切利根正見成就凡夫不在其限如律文等説已上人語引經説已下唯是經文説爾時增上慢人偏執者多惡魔有後又復迷惑在家出家者心令執非法説正法若者少於拔援助則便散壞不復得立已下人語引經説又初先明一切利根空見有見邪見成就顛倒增上慢人徒侶喜樂難問推求佛法第一實義後明一切利根正見成就衆生喜樂問難推求佛法第一實義又一切正見成就衆生雖復得説正佛法由徒侶至少行坐無處唯除得一切天王人王與作授護者不在其限已上人語引經説已下唯是經文説諸天間聞此皆大歡喜稱揚讚嘆是利根者喜樂問難各皆成就無生法忍如是人等令合集一處共為徒侶人衆既劣少勢力亦弱舍利弗爾時我諸真子於文父種族尚無受語況得供養經正住止塔寺舍利弗汝汝且觀之爾時如來便為輕微我滅度後我諸子等成就善字寂無所得忍時亦輕賤我以是故於無數劫摧諸怨敵化諸一切天王人王令心清淨所以爾者令我諸子得安文父位已上人語引經説次下經文就喻説明一切利根正見成就衆生為學一切無名相法故乃至被殺如佛藏經第二卷過半已後説文當不淨説法者有五過失又通上及下説義當明一切利根空見有見衆生分別一切佛法是非邪正長短者有五過失文當一者自言盡知佛法義當於一切經律論等部部能得從首至末差別是非邪正長短盡者與自言盡知佛法相當已上人語引經説已下唯是經文説舍利弗不淨説法者有五過失何等為五一者自言盡知佛法二者説佛經時出諸經中相違過失三者於諸法中心疑不信四者自以所知非他經法五者以利益養故為人説法舍利弗如是説者我語説此人當墮地獄不至涅槃復次舍利弗説法比丘處在大衆信樂法者為敷高坐捨佛正法而説外道嚴飾文辭我久勤苦求是法寶而此惡人捨置不説但心以經中相違語義互相是非不順正法於聖法中高心自大隨竟意而説為求利養舍利弗若比丘説法雜外道義有善比丘勤求道者應從座去何以故舍利弗有信白衣敷置高坐不應演説外道語義若不去者非善比丘亦復不名隨佛教者舍利弗説法甚難如是説者我説此人名為外道尼揵弟子非佛弟子是説法者命終之後當生尼揵子道何等是尼揵子道邪見是尼揵子道何等為邪見謂是地獄畜生餓鬼何以故舍利弗身不證法而在高坐身自不知而教人者法必墮地獄舍利弗如是因緣如來悉知我諸弟子以種種門利種利種因緣種種諸見滅我正法已下人語引經説文當義當明一切利根空見有見衆生分別一切佛法是非邪正長知短自誑誑他一切道俗喻如一切誑人誑他一切生盲衆生墮坑而死一種相似又文當義當明於一切道俗內唯除兩人三人已外餘者一切皆悉普是一切利根空見有見衆生分別一切佛法是非邪正長短自誑誑他一切道俗喻如一切誑人誑他一切生盲衆生墮坑而死一種相似何以故明以本攝末故又文當義當明於一切道俗內唯除兩人三人讀誦佛經已外餘者一切皆悉普唯讀一切六師外道經法已上人語引經説已下於唯是經文説舍利弗當來比丘好讀外經當説法時莊校文辭令衆歡樂惡魔爾時時助惑衆人障礙善法若有貪著音聲語言巧飾文辭若復有人好讀外道經者魔皆迷惑命令心安隱若有比丘修佛法者令生疑惑滅咸使衆人不復供養或有比丘若二若三已讀佛經便使命令求外道經法先自看者讚言善好是諸人等為魔所惑覆障惠眼深貪利養看諸外道書猶如群盲為誑所欺皆使令墮深坑而死舍利弗諸生盲人即是比丘捨佛無上道求外道經盡書誑人是惡魔深坑是邪道以上人語引經説又已下猶是上經文次第未盡已上文當義盡當就一切十二部經法辨邪正多少分齊已下就一切衣食等辨邪正多少分齊文當義當於一切道俗內實實不求一切好衣好食等者唯除兩人三人已外餘者一切皆悉普求一切好衣好食等盡為一切好衣好食等所誑墮於阿鼻大地獄等喻如一切盲人為誑人所誑墮坑而死一種相似已上人語引經説已下唯是經文説舍利弗如群盲人捨所得物欲詣大施而墮深坑我諸弟子亦復如是捨衣惡食而函逐大施求好供養以世利故失大智惠而墮深坑阿鼻地獄已下人語引經説又已下猶是上經文次第未盡已下上人語引經説已下準唯是經文説舍利弗是名佛法第一義門謂無憶想分別無此無彼而是癡人在大衆中説於邪見自以憶想分別教人此是佛法此是聖道如是癡人則為誹謗過去未來現在諸佛如是癡人名惡知識不名善知識舍利弗怨雖奮奪命但失一身如是癡人不淨説法千萬億劫為諸衆生作大衰惱是人癡冥覆佛菩提本心貪著還復熾盛相續不斷以貪著故往來五道無善徑路生死不斷是故舍利弗不淨説法者得罪極多亦為衆生作惡知識亦謗過去未來今佛舍利弗置此閻浮提衆生若人悉奪三千大千世界衆生命不淨説法罪多於此何以故是人皆破諸佛轉阿耨多羅三藐三菩提為助魔事亦便使下衆生於百千萬世受諸衰惱但能作傳縛不能令解當知是人於諸衆生為惡知識為是妄語於大衆中謗毀諸佛以是因緣墮大地獄教多衆生以邪見事是故名為惡邪見者已下人語引經説是故當知是人寧自以利刀割舌不應衆中大不淨説法如佛藏經第三卷減半已前説又明如大方廣十輪經第二卷滅減半已前文當佛滅度後第四卷過半已前文當一切諸佛皆悉普不能得度得一切衆生時義當佛滅度或一千年已後或一千五百年已後如餘卷第二大段初廣説文當已上人語引經説已下唯是經文説於諸世間當常行誹謗語剎利旃陀羅婆羅門旃陀羅壞亂佛法於我法中如而得出家常毀破戒作諸惡行而剎利婆羅門盡心供養已下人語引經説文當義當一切道俗莫問貴賤一種相似皆悉普不信一切聖人持戒比丘皆悉普盡時文當義當不信一切伽藍聚落外一切學十二頭陀持戒比丘皆悉普盡時文當義當不信一切伽藍聚落內一切少欲知足省事持戒比丘皆悉普盡時文當義當一向準唯純偏信一切破戒比丘一向準唯純偏説一向破戒比丘好一向準唯純偏供養一切破戒比丘一向準唯純偏守護一切破戒比丘一切向準唯純偽偏為一切破戒比丘作一切寺舍等時文當義當一向不信一切聖人持戒比丘及一切凡夫內一切持戒比丘一向準唯説一切聖人持戒比丘及一切凡夫內一切凡夫內一切持戒比丘惡一向不供養一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不守護一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不為一切聖人持戒比丘及一切凡夫內一切持戒比丘作一切寺舍等時唯瞋唯罵準唯打準唯殺又三卷經從卷初發首明文當剎利旃旃陀羅婆羅門施旃陀羅沙門旃陀羅大臣旃陀羅由一向準唯純偏信一切破戒比丘等一向不信一切持戒比丘等故文當先修善根今悉消滅乃至墮於阿鼻地獄等如大方廣十輪經第四卷過半已前説又明如大集月藏分經與雜阿含經難當王文當佛滅度一千年已後同第十卷內説文當法滅盡品文當義當由一切道俗説一切利根真聖及正見成就凡夫等是非好惡長短故令一切聖人一切利根正見成就凡夫皆悉普向他方盡準唯有不信一切佛法一切惡鬼神一切惡夜叉羅剎等在遍滿世界殺害衆生乃至下經文説文當四方惡王一時俱起破壞塔寺殺害比丘等者亦由不信一切佛法一切惡神一切惡夜叉羅剎等助之故又已上十二部經等十三段廣説竟又明何以故明文當義當一切利根空見有見衆生唯偏將一切剎利根空見有見衆生一切邪善佛法僧衆生斷思惡修善解行等作是一切利根真聖諸佛菩薩聲聞緣覺一切利根正見成就凡夫一切正善佛法僧衆生斷惡修善解行等作非唯瞋唯罵唯打唯殺等者皆悉普是何以故明一切利根空見有見衆生於一切七十種等所説一切佛法內莫問佛導一切凡聖俱得學不得學常一向準唯純偏選取順己情多順一切道俗情佛法學之但佛不順己情多不順一切道俗情佛法一切皆悉普不學之多者皆悉普稱一切道俗情所以得不被瞋不被罵不被打不被殺以前驗後説亦名以後正驗前邪説一切聖人一切利根正見成就凡夫但使佛導一切凡夫聖俱得學佛法莫問順己情不順己情順一切道俗情不順一切道俗情一切皆悉普學之多者皆悉普不稱一切道俗情所以準唯被瞋唯被罵準唯被被打唯被殺如上十三部經等説如大般涅槃經通上及下第卅一卷過半已後第卅三卷減半已前大方廣佛花嚴經十住品第六經住第七住十回向品第一回向等説又莫問一切請諸佛菩薩行位上下一切因果雖別會有少分相似義同以上驗下所以得知又亦名以一切違順多少所由果驗一切違順多少所由因説又上十三部經等亦名出一切利根空見有見衆生不解一切佛法邪正分齊一偈一句一字一分一豪毫之義又上十三部經等亦名法説已下喻説有三部經就四種喻説文當義當明一切道俗皆悉普不識一切佛法邪正分齊一偈一句一字一分一豪毫之義一部經説文當佛滅度一千年已後文當法師解説佛語萬不著一文當義當明一切道俗分別一切佛法是非邪正長短喻如一切盲人指天上日若大若小若寬若狹一種相似文當義當明一切道俗分別一切佛法是非邪正長短喻如一切聾人自言我聞天上説法之音一種相似文當不識聖人競共打罵驅遂逐令出不令得住如最如妙勝定經與多部經義同過半卷已後説一部經説文當義當佛滅度一千年已後如餘卷第二大段內廣説明一切道俗分別一切佛法是非邪正長長短自誑誑他一切道俗喻如一切誑人誑他一切盲人墮坑而死一種相似如佛藏經第三卷減半已前説一部經説義當佛滅度或一千年已後或一千五百年已後如餘卷第二大段內廣説文當義當明一切道俗分別一切佛法是非邪正長短喻如遣一切盲人識一切七寶同異一種相似如大方廣十輪經通上及下第五卷過半已後説乃至一切甚深大乘經破其偏空偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內説亦名以人驗法説又明此第九字子段與下第十子段相成第九子段由第十子段成第十子段由第九子段成所以第九子段內亦廣明第十子段內所説法又明何以故文當義當明一切邪見成就顛倒道俗內亦名一切利根空見有見衆生內或有人造經者或有人改他經文及義者或有真是佛經不上經餘録者或有真是是佛經導道非是佛經者所以若依經部唯得依大部經多部經説大部經多部經各各盡一部義同若依經品唯得依大部經內品多品經説大部經內品多經各各盡一品義同若依經段唯得依大部經內段多段經説大部經內段多段經段各各盡一段義同不得依小部經少部經説各各或一句或兩句或三句説不盡一部義同不得依少部經內品少品經各各或一句或兩句或三句説不盡一品義同不得依少部經內段少段經説各各或一句或兩句或三句説不盡一段義同一者明如大般涅槃經第九卷過半已後説文當佛涅槃後諸惡比丘抄略是經分作多分能滅正法又下經文説恆河第一人文當不信大般涅槃經二者明如佛藏經第二卷滅減半已前説文當於説法者心多不信得聞如是佛所説經違逆不受而作是言此非佛説教語餘人第三卷滅半已前説文當三者於諸法中心疑不信大雲經第五卷內説文當不信大雲經以此文驗所以得知又於此段文義俱同內明不得慶廢大依小廢廢多依少若無大無多但使導道是佛經莫問大小多少俱唯得如説修行又明復須就所為衆生所依處説之時節驗之若多為一切利根空見有見衆生説若多就一切娑婆世界處亦名一切五淨滓世界處亦名一切五濁諸惡世界處説若多在佛滅度五百年已後佛滅度一千年已後時説又明若驗一切諸佛菩薩一切聖人一切正見成就凡夫返上即是十者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似唯見他一切惡以他一切善從一切惡皆悉普作惡解不肯唯見他一切善以他一切惡從一切善皆悉普作善解打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等説十一者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似唯偏或為自身或為一切出家在家眷屬等佛導道是一切凡夫一切令合受惡一切令合受苦皆悉普不肯自受之打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等説又明一切凡夫菩薩一切令合受惡一切令合受苦滅兩紙經文當菩薩發願受他打受他殺發願在於六師外道家生為他邪見不習其道等所以得不退菩提心次下第卅三卷滅減半已前文當具足煩惱未有斷者義當即是凡夫菩薩自驗自知有不退菩提心以不以種種苦行自驗如大般涅槃經説文顯易識又文當暴勢極惡義當即是十惡未斷菩薩不食香八萬四千劫空燒具肉身供養佛始得佛與受菩薩草四戒等者皆悉普是一切凡夫菩薩一切令合受惡一切令合受苦如大方等陀羅尼經説文顯易識唯除不得受一切六師外道苦行法不在其限又明一切凡夫及一切凡夫菩薩一切令合受惡一切令合受苦如文當佛滅度後文當千佛百千萬億佛一切佛一切經一切菩薩皆悉普不能得度得一切利根空見有見衆生時文當菩薩聖人利根正見成就凡夫向他方及死後時一部經説文當有五百比丘自知犯戒不令受他信施返戒還俗從此已後常得值佛乃至得道如寶梁經説文顯易識一部經通上及下説文當五百比丘自知莫問一切善惡持戒破戒歸一切三寶等少氣多少常是惡賤極賊狗菩薩不令受他信施返戒還俗文殊菩薩讚難歎汝等不可數歸俗去心已定即得道如迦葉經説文顯易識一部經通上及下説文當義當佛道莫問一切善惡持戒破戒歸一切三寶等多多少常是謗佛謗法等一切惡魔出家人不在佛法內出家受他信施令其返戒還俗故如佛藏經説文顯易識一部經通上及上下説第三卷過半已後説盡第六卷文最廣説文當義當佛導噵莫門問一切善惡持戒破戒歸一切三寶等多少常是一切無慚愧僧等不能為説一切甚深大乘佛法唯遣為説一切生死流轉法如大方廣十輪卷經第七卷內説又明兩部經説文當出家破戒遠作出家得道因緣近復即得四部經説一倍返而復不道因緣近復即得一切三世諸佛大涅槃印之所印也與上四部經説一倍返而復不違何以故一者明由返戒還俗故得免受他一切信施乃至一切禮拜供養守護等罪二者明由出家復作得道因緣兩種普並行亦還俗亦出家即得具足與經文相當復是與己唯化純善無惡兩法相當如摩訶衍經論文當就蓮華色比丘尼説大集月藏分經與雜阿含經同第八卷滅減半已前説唯除得受一切道俗禮敬供養作當來佛者唯純得善無罪唯有打罵者得罪如法華經不輕菩薩品説又有道俗畏罪不受他一切道俗禮拜供養等者得羅罪轉多何以故由滅佛法故如佛藏經説文顯易識而復難識要須解出始知又有道俗畏食用衆僧飲食財物得罪相教普布施令其一切道俗俱得共用無罪者得罪轉多何以故明滅一切道俗於一切三寶各各別布施一切畏罪境界法皆悉普滅盡故如律文等説明此寺僧物不得彼寺僧用等者皆悉普是十二者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似唯偏或為自身或為一切出家在家眷屬等佛導道是一切凡夫一切令合捨好一切令合捨樂皆悉普不肯捨與他打他殺他乃至被打被殺不退餘如上第一字子段內第九子段內十三部任經等説又明一切凡夫及一切凡夫菩薩一切合捨好一切合捨樂文當若多受名利疾滅佛法文當義當若捨一切麁衣惡食而逐大施會求一切好衣好食等者皆悉普不免隨墮阿鼻地獄深坑唯除一切聖人一切利根正見成就凡夫不在其限文當乞食比丘乞得麁衣惡食若覺有貪心亦不得受之如佛藏經第三卷滅減半已前第四卷過半已前等説又文當義當菩薩由發願不受一切現在樂等故所以得不退菩提心如大般涅槃經説文顯易識又文當發願寧以利力曰刀自割其舌不為他不淨説法如佛藏經第三卷滅減半已前説又文當義當利根衆生乃至未得法忍已來一者願不受一切身二者願不作一切種種人主三者願不作一切不下賤衆生四者願不作一切斷事人若作足是等必當不免墮阿鼻大地獄等如大方廣十輪經第六卷末説唯除一切行法行王亦名一切國王亦名一切灌頂剎利王亦名一切人王如餘卷第一大段內廣説不定若能得依一切第三階佛法住持一切三寶住持一切國土利益一切衆生不在其限如大薩遮尼乾子經第三卷過半已後大方廣十輪經第六卷末等説十三者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一切種相似唯偏不學唯偏將一切七十種等所説一切別惡佛法一切七十種等所説一切別邪善佛法作非打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等説十四者明一切第三階佛法內一切利根空見見有見衆生莫問一切大乘小乘一種相似唯偏學唯偏將一切七十種等所説一切別好佛法一切七十種等所説一切別正善佛法作是打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等説十五者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似於內有三義一種相似一義唯偏歸一切三寶偏度一切衆生偏斷一切惡偏修一切善解行等無量無邊多少淺深寬狹長短一種相似其見佛學解行等多少分齊驗之所以得知一義明謗佛謗法通凡夫及聖多少淺深輕重寬狹長短一種相似以其受阿鼻地獄等苦時節多少分齊驗之所以得知一義明當當已一切出世間根機藥病一切惡斷不可得一切善學不可得成就一種相似以其斷惡修善見佛多少分齊劫數多少分齊驗之所以得知一者明通上及下一部經及依餘經等説文當義尚當明利根空見衆生已得見佛已能讀得十二部經已能誦得十二部經文當分別解説義當已能講得十二部經已能斷得欲界煩惱已能坐得四禪猶不識佛不識正法猶捨一切空見不能得猶不免謗佛謗法通凡及聖墮阿鼻大地獄等又於一切利根空見衆生內一切破戒不破見正見成就空見一切一闡提初入地獄即能得還生善根多少分齊準唯如扴上士土一種相似一切戒見俱破邪見成就空見一闡提臨欲得出地獄始能得還生善根多少分齊如十方世界所有地土一種相似以一切利根空見衆生驗一切利根有見衆生邪正多少分齊亦如是類以可知準依大般涅槃經大方等陀羅尼經等説文顯易識復準依大方廣十輪經第五卷減半已前等説如下一切第三階佛法內説亦名以果驗因説二者明通上及下一部經及依餘經等説文當義當明利根有見衆生文當從初發心已來文當菩薩摩訶薩多見諸佛若無量無邊百千萬億即於爾許佛所學布施持戒忍辱精進禪定智慧等猶不識佛不識正法猶捨一切有見不能得猶不免謗佛謗法通凡及聖墮阿鼻大地獄等八大地獄於一一地獄內各各滿三千六百萬億成歲此方劫盡復更轉向十方八大地獄十方一方劫盡復轉向一方十方劫盡次第遍謗佛謗法罪猶不盡不免還復轉向此方八大地獄此方劫盡復至十方他世界生畜生中受破法罪業苦如地獄中説唯除佛已外一切聲聞緣覺更無有能得知其受地獄苦時節多少分齊者以一切利根有見衆生驗一切利根空見衆生亦如是類以可知如摩訶衍經泥梨品兼依下佛藏經少分一句兩句等説三者明文當義當明利根有見衆生從衆眷屬已滿六百四萬億猶不識聖人不識正法猶捨一切有見不能得猶不免謗聖人謗法墮阿鼻大地獄等八大地獄於一一地獄內各各滿三千六百萬億歲此方劫盡復更轉向十方八大地獄十方劫盡遍謗聖人謗法罪猶不得滅還更不免轉入此方八大地獄此方劫盡復至十方他世界畜生中受破法罪業苦如地獄中説唯除佛已外一切聲聞緣覺更無有能得知其受地獄苦時節多少分齊從地獄出得受人身五百世常從生而盲從盲身從後得值佛十方万億歲晝夜六時如救頭然懺悔謗聖人謗法通凡及聖罪猶不得滅不免還墮阿鼻大地獄等從此已後次第復更得值九十億佛始得免墮地獄猶未得順忍何況道果始佛藏經第三卷滅減半已後兼依上摩訶衍經少分一句兩句等説四者明文當義當明利根有見衆生從得免一切三除塗已得後學當當學已一切出世間根機藥病學斷一切惡學修一切善復於無盡量無量邊諸佛斷菩薩所學捨一切有見猶不能得學一切空解猶不能得成就從此已得後復後於無量無邊聖人及於無量無邊利根真善正見成就凡夫所學捨一切有見猶不能得學一切空解猶不能得成就從此已後復就無量無邊劫以數無量無邊諸佛菩薩及數無量無邊聖人等復於爾許無量無邊諸佛菩薩及於爾許無量無邊聖人等所學捨一切有見猶不能得學一切空解猶不能得成就以一切利根有見衆生驗一切利根空見衆生亦如是類以可知如佛藏經第三卷過半已後大方廣十輪經第六卷滅減半已前思益經文顯易識等説五者明文當義當利根有見衆生一切大乘法聚一切小乘法聚各各以能誦得八萬猶不識真學十二頭陀比丘不識正法猶捨一切有見不能得猶不免瞋他學十二頭陀比丘文當墮地獄義當墮阿鼻大地獄等從地獄出已後復受羅剎身乃至賢劫千佛出世盡始得免受羅剎身如大集月藏分經説與雜阿含經同文顯易識又此段內一切利根空見有見衆生文當義當就相作不定者説所以得相作亦如上如下段説不同上初段內一切利根空見有見衆生或暫相作位判當常不相作輕重常別不得相作亦唯上得相作亦義推説十六者明一切第三階佛法內一切利根空見有見衆生作行壞體壞戒見俱破顛倒九種人一切十七種等最大惡文當義當一切三乘根機衆生莫問一切大乘小乘一種相似皆悉普常一向唯純普學一切空有普歸一切三寶普度一切衆生普斷一切惡普修一切善解行等八種最大善具足於四天下無與等者猶是佛所不攝衆生已上人語引經説已下唯是經文説除此已外皆名行道亦名惡福田依止無慚愧僧於佛法中亦名死尸是可棄者於僧大海亦名不成法器彼非我弟子我亦非彼師復有不成法器者已下人語引經説亦是次第經文説文當義當大敬信三寶大持戒大不自是非他大有解行大發菩提心大懺悔大斷惡大度衆生以能度得九十五種異學六師外道回心向於涅槃非一轉輪聖王所有一切功德之所能及以一轉輪聖王所有一切功德不及故所以得知於四天下內無有與等者已上就一切普善衆生説已下就一切別惡衆生説如經説如大方廣十輪經第五卷滅減半已前説何以故明八種最大善具足衆生由不被他滅己佛法不被他打不被他殺等故所以能得不滅他佛法不打他不殺他得學佛法至爾許但使破他滅己佛法被打被殺不能得不滅他佛法不能得不打他不能得不殺他等故所以不免亦常是一切阿鼻地獄衆生構攝此段以善驗惡善而有惡以惡驗善惡而有善等説亦名以人驗法説又明於上一切十六子段等內初十五子段於一切別真別正佛法內一向條然別根機喻如一切山谷高下常別常起一切兩重惡一者明常起一切貪瞋煩惱等無量無邊喻如一切噎病及一切大小便不通衆生常學多食多飲𫌏漿水一種相似二者明常起一切謗佛謗法通凡及聖邪見煩惱等無量無邊喻如常遣一切生盲衆生學一切盡書作一切田種作一切工功與巧興生敗冥販買及征陳等一種相似後一子段於一切於別真別正佛法內一向普根機喻如一切地上一切衆生一切草木等各別不同常起一切兩重惡一者明常起一切貪瞋煩惱等無量無邊喻如一切噎病及一切大小便不通衆生常學多食多飲𫌏漿水一種相似二者明常起一切謗佛謗法通凡聖及及聖邪見煩惱等無量無邊喻如常遣一切生盲衆生學一切書盡作一切田種作一切工功與巧興生敗販買及征陳等一種相似如上一切十六子段內所説經及十三部經等説又明於上一切十五子段一向別根機內第一第第二第三子段若就一切外緣一切內因説唯是一段第五子段明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似一者明莫問一切大乘小乘於阿鼻地獄等已前作一切惡多少分齊一種相似二者明莫問一切大乘小乘從阿鼻地獄等得出已後於一切出世間正解正行俱學不可得徹到成就一種相似又第十五子段內第十六子段內唯明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似一者明從初發心已來唯偏歸一切別真別正三寶唯偏度一切別真別正衆生唯偏斷一切別真別正惡唯偏修一切別真別正善解行等無量無邊多少淺深寬狹長短分齊二者明從初發心已來唯偏歸一切別真別正佛法內一切普真普正佛法三者明上第十五第十六兩子段內一切惡者非是明作一切十惡一切四重五逆等惡唯是明一切別真別正佛法內一切邪錯不學不知惡多少淺深寬狹長短分齊又明一切第三階佛法內一切利根空見有見衆生行壞體壞戒見俱破轉倒九種人一切十七種等一切最大惡衆生莫問一切大乘小乘一種相似從無始世界未得聞佛法已前已有少分以果驗因説從得聞佛法已來一者明常唯欲得學一切利他行如上第十五第十六兩子段內五部經等説二者明常唯欲得重治罰一切道俗及一切衆生瞋他罵他打他殺他如上第九子段內十三部經等説又如阿育王經説文顯易識乃至唯欲得學一切羅剎王重治罰一切衆生法治罰一切衆生三者明常唯欲得不受一切惡一切苦唯欲得受一切好一切樂如上第四第十一第十二第十三第十四五子段內説何以故一者明一切最上上別好名聞利養一切最上上別好寺舍一切最上上別好僧正一切最上上別好法王等一切最上上別好師僧一切最上上別好弟子一切最上上別好從徒衆一切最上上別好檀越等唯田由上一切利他行唯由上能得重治罰一切道俗唯由上能得唯偏捨一切惡一切苦唯偏受一切好一切樂等故所以得之知乃至一切在家人亦如是類以可知二者明唯由識一切七十種等所説一切惡佛法一切邪善佛法所以得唯簡劫却一切惡等盡所由義三者明唯由識一切七十種等所説一切好佛法一切正善佛法所以得唯選取一切好等盡所由義又上十六子段訖盡比盡此段皆悉普名為廣明一切利根空見有見衆生行壞體壞戒見俱破顛倒九種人一切才七十種等一切最大惡衆生乃至未得法忍已來唯得學一切等第三階佛法內一切無名相法坐禪一切佛性佛想一切菩薩行想一切當來佛想一切真佛想等不在其限所由義如餘卷第二大段末第一何以故一切草四段等一切普真普正佛法內説一交了本邦所傳三階佛法卷第四本邦所傳三階佛法卷第四聖語藏本底本興聖寺本並釋淨土群疑論探要記集録引文以校異冠注對校興興聖寺本指興釋淨土群疑論探要記所引集録本文略符前卷例如
