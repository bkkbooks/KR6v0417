body:
  text: 一切惡俗貴賤利根鈍普唯將作惡不將作善所以重不當一切利根空見有見衆生一切出世間根機藥病一切邪善業一切衆生莫問一切道俗貴賤利根鈍根有知解解皆悉普唯時作善不時作惡所驗法説二者明若就一切三世因果竪説以明損益多少分齊於一切惡業則輕於不當一切利根空見有見衆生一切出世間根機藥病一切邪善業則重何以故一者明一切惡業位判唯有於一切暗地得滅一切三寶等於一切人前皆悉不能得滅一切三寶等位判唯有於一切惡人得滅一切三寶等於一切善人內皆悉普不得滅一切三寶等二者明一切惡業一切衆生莫問一切凡聖邪正道俗貴賤利根鈍根有知解無知解皆悉普識知是惡盡所以一向不得皆悉普滅一切三寶等盡乃至成一切三災等所以得罪輕三者明不當一切利根空見有見衆生一切出世間根機藥病一切邪善業唯除一切聖人一切利根正見成就凡夫衆生已外一切利根正見未成就凡夫衆生一切利根邪見成就凡夫衆生莫問一切道俗貴賤利根鈍根有知解無知解皆悉普不識知是惡而復返更將作上別真別正出世間善所以得莫問於一切人前暗地皆悉普得滅一切三寶等盡所以得莫問於一切善人惡人內皆悉普得滅一切三寶等盡乃至成一切三災等所以得罪重如佛藏經第一卷初減半大方廣十輪經第四卷初減半摩訶衍經泥黎品等三部經俱明得罪重五逆四重等罪乃至成一切三災等如長阿含經第六卷內説何以故明一切利根空見有見衆生從無始世界已來一者明常以一切世間空有兩法作身二者明常在一切世間空有兩法內行往臥等三者明若作一切人內衆生常世間有法多若作一切人外衆一切世間空法多四者明若學一切佛法一切第一階佛法內一切甚深大乘佛法於一切世間法內於一切出世間法內皆悉普無有與等者最大最勝最上最深最寬最長大不可思議最大不可思議部從道至未皆悉普廣明一切空所以若作一切最大多惡若作一切最大深慈若作一切最大長惡等者唯由學一切空有兩法最多故若學一切最大多善若學一切最大寬善若學一切最大長善等者唯由學一切空有兩法最大多故所以乃至明一切善惡等輕重亦唯就一切空有兩法説從此已下餘卷內有文説大般涅槃經一當一部上下廣説又一人義當一部所説一切最多惡一切最多邪善皆悉普是迦葉經文當惡賊狗菩薩第一卷內説惡賊略説狗菩薩廣説又兩人義當一部所説一切最多惡一切最多邪善皆悉普是佛藏經文當惡賊第二卷經等卷經等廣説餘略説餘部廣略當增上慢衆生第二卷減半已後廣説餘卷略説餘部廣略不定文當六師外道第三卷滅減半已前廣略説餘卷毗略説餘部廣略不定文當惡魔第四卷過半已後廣説餘卷略説餘部廣略不定又四人義當一部所説一切最多惡一切最皆普是大方廣十輪經文當旃陀羅第四卷初減半已前廣説餘卷略説餘部廣略不定文當無慚愧僧第五卷過半已前廣説餘部廣略不定文當以顯驢唯狗驢菩薩第五卷過半已後廣説又三人義當第三卷過半已後第四卷第五卷第六卷強三卷半經廣説通上及下略説一一切最多惡一切最多邪善皆悉普是大集月藏分經與雜阿含經同文當九十五種道第八卷過半已後略説大方廣十輪經文當九十五種道第五卷減半已前略説摩訶摩耶經文當九十六種道文顯易識摩訶衍經論文當九十六種道第三卷減半已前説灌頂經雜類神呪經廣説又九十六種道五部經等所説一切最多惡一切最多邪善皆悉普是迦葉經第一卷內説文當佛滅度五百年已後文當千佛不能得度得一切衆生時文當義當一切惡賊一切狗菩薩競興滅一切佛法法華經不輕菩薩品説文當像法內增上慢比丘有大勢力時義當佛滅度五百年已後義當千佛不能得度得一切衆生時義當增上慢衆生競興滅一切佛法大般涅槃經增上慢衆生競興滅一切佛法大般涅槃經文顯易識文當佛滅度七百年已後義當千佛不能得度得一切衆生時文當義當一切惡魔競興滅一切佛法或作四衆身或作聖人身乃至或作佛身等摩訶摩耶經第一卷內説文當佛滅度六百年已後義當千佛不能得度得一切衆生時文當義當一切九十六種道興滅一切佛法大般涅槃經文顯易識文當就六種喻廣説世間之義説勝鬘經文當人天卷初滅減半已前略説大方廣十經輪輪經文當邪見成就第四卷滅減半已後説明一切佛皆悉普不能回得所以得知邪見成就大薩遮尼乾子經文當明顛倒文顛顯易識如餘卷第二大段內廣説大方廣十輪經文當行壞體壞第五卷減半已前略説大集月藏分經與雜阿含經同文當阿鼻地獄文當誹謗一切正法毀呰一切賢聖文當煩惱牢固猶如金剛第十卷內一切偈頌已後略説大方廣十輪經文當行壞體壞一切三乘根機通上及下一部皆悉第六卷近初文當明一切三乘根機衆生作惡多少分齊一種相似通上及下説文當墮阿鼻大地獄等障道受苦時節多少分齊一種相似文當從地獄出已後一切惡斷不可得一切當已一切出世間根機藥病一切出世間正善學不可得成就一種相似如餘卷內廣説如下第一大段內説又一切阿鼻地獄等位判雖復同是當受一切無間苦以因驗果於內亦得常有兩階一者明從無始世界一切諸佛菩薩等有緣已來莫間問一切善惡等皆悉普常不信盡一向無緣者於一切阿鼻地獄等內莫間問一切善惡等皆悉普常不信盡一向無緣者於一切阿鼻地獄等內莫問一切諸佛菩薩等多少皆悉普不能得令其暫得心苦者明從無始世界與一切諸佛菩薩等有緣已來於一切諸佛菩薩等一切種種行內但使得有信一行兩行等者即得以其與一切諸佛菩薩等有緣行等邊威力加護令其暫得止苦教其捨邪歸正不在其限如大方廣佛華嚴經賢首菩薩品明得見光明所由由過去同行隨喜見聞等因同故所以得見光明法內説亦名以因驗果説大方廣十輪經文當非是三乘器第五卷過半已前略説文當非是涅槃善根第七卷內略説像法決疑經與多部經義同文當三世諸佛怨家減半卷已後説佛藏經文當一切世間天人中大賊一切世間怨家諸佛大賊等第四卷減半已前大方廣十輪經文當一切佛第四卷過半已前説大般涅槃經文當一切經第九卷草種喻內説大方廣十輪經文當擾亂一切諸佛衆生第五卷過半已後説第一大段明驗一切第三階佛法內一切利根空見有見衆生多少分齊與十方世界所有地土有地土一種相似義如餘卷第一大段內廣説又從已下説盡一切三階佛法內一切三階根機衆生已來餘卷內無文説又明如大般涅槃經第卅四卷近初説明一切善人惡人多少分齊唯應就一切修道衆生説未必皆悉普就一切衆生説何以故一者明從惡向善説乃至得道二者明從捨善向惡説乃至不得道三者明若就一切修道衆生説明多少分齊唯與孤上下抓上土一種相似得與佛滅度一千年已後如餘卷第一段內八部經此段下第九子段內十三部經等所説相當若皆悉普説就一切衆生説一切人道衆生諸根具足者無量無邊即不得與佛滅度一千年已後如上八部經十三部經等所説相當四者明犯四重罪作五逆罪衆生多少分齊與十方世界所有地土一種相似亦不與佛滅度一千年已後如上八部經等相當明一切道俗作五逆罪人至少故又亦不與上八部經等義相違何以故明一切道俗但使食用一切三寶餘飲食財物等者亦皆悉普是一切犯四重罪作五逆罪衆生攝何以故明一切三寶福田最上位判皆悉普是一切四重五逆罪境界故如大方廣十輪經第三卷過半已來後諸説五者明用僧諸物多少分齊與十方世界所有地土一種相似正與佛滅度一千年已後如上八部經等相當明一切道俗乃至被打被殺不肯食衆僧飲食財物者唯與抓上土一種相似不肯受打受殺用衆僧物者多少分齊與十方世界所有地土一種相似六者以明明以空見驗有見明一切利根空見衆生多少分齊與十方世界所有地土一種相似亦不與佛滅度一千年已後如上八部經十三部經等相當不相違何以故一者明一切利根空見衆生與一切利根有見衆生常相似不定如大般涅槃經第九卷草種喻內説此段就現在緣驗二者明一切利根空見衆生無衆生可度無惡可斷無善可修應不見三寶應不能斷得惡應無解行而善星比丘空見佛斷惡學解行等多少分齊與一切利根有見衆生一種相似此段就因果驗以此文驗所以得知一切利根空見衆生與一切利根根有見衆生常相似不定唯除一世多得名利朋黨至多不相似者不在其限亦名以人驗法説又明一切利根空見一闡提依經文次第説莫問一切善惡具足不具足不久能斷一切善根驗之明莫問得人身不得人身諸根具足不具足生邊地不生邊地犯四重罪不犯四重罪作五逆罪不作五逆罪用衆僧物不用衆僧物信佛法不信佛法不久會是不得人身不久會是諸根不具足不久會是生於邊地不久會是犯四重罪不久會是作五逆罪不久會是用衆僧物不久會是不信佛法以空見驗有見乃至餘卌五種等一切邪見成就衆生如是類以可知明卌五種等一切邪見成就衆生如餘卷內廣説第一段明一切第三階佛法內一切利根空見有見衆生內位判常唯一種衆生莫問一切善惡持破戒戒破戒歸一切三寶度一切衆生斷一切惡修一切善解行等多等少少等餘名一空見有見衆生二九種人三九十六種道四世間根機五邪見成就六顛倒七阿鼻地獄八誹謗正法毀呰賢聖九煩惱牢固猶如金剛十行壞體壞三乘根機十一非是三乘器及涅槃善根十二是三世諸佛怨家速滅佛法十三一切世間天人中大賊十四一切世間怨家十五一切諸佛大賊十六一切佛一切經皆悉普不能救得十七擾亂一切諸佛如上初段內説又明一切利根空見有見衆生亦名非是佛弟子亦名是佛所不攝衆生亦名佛所不攝衆生亦名佛不聽在於一切佛法內出家衆生亦名佛不肯為説一切法衆生如佛藏經通上及下數説第三卷過半已後文最廣説大方廣十輪經第三卷過半已後第五卷減半已前等説又明一切利根空見有見衆生莫問一切善惡持戒破戒歸一切三寶度一切三寶度一切衆生斷一切惡修一切善解行等多少皆悉普是一切佛所不攝衆生如下第十六子段內大方廣十輪經具足廣説又明一切利根空見有見衆生於一切佛法內唯除一切剃頭或名著染衣或名著袈裟邊是佛子攝不在其限如大方廣十輪經第五卷過半已後大薩遮尼乾子經第三卷末等説又明一切利根空見有見衆生於一切佛法內唯除於一切現在世中雖無別益以憐愍故為生後世諸善種子不在其限如大般涅槃經説文顯易識又明一切利根空見有見衆生皆悉普名一切利根一切空見有見一切行壞體壞一切戒見俱破一切顛倒一切一種衆生何以以故一者明以後一切第一第二兩階佛法內有一切戒見俱不破有一切破戒不破見兩種正見成就衆生驗之所以得知一切第三階佛法內唯有一切行壞體壞戒見俱破顛倒一切一種衆生又已上一段就一切佛法邪正有無法分齊驗之二者明以空見多少驗有見多少明一切利根空見有見衆生多少分齊與十方世界所有地土一種相似準依大般涅槃經大方等陀羅尼經等説文顯易識三者明文當佛滅度一千年已後文當一切衆生莫問一切道俗貴賤皆悉普輕賤一切佛法薄淡一切三寶無有真實雖作衆善求利求勝他故無有一念作出世心如像法決疑經與多部經義同近卷初説四者明文當佛滅度後文當一切佛皆悉普不能得度得一切衆生時唯供養一切破戒比丘乃至為作一切寺舍等時大方廣十輪經第四卷減半已前説五者明文當佛滅度二千年已後唯有一切破戒無兩種比丘在如大集月藏分經與雜阿含經難當王文當佛滅度一千年已後同第九卷初減半已前説又已上四段一切人邪正多少分齊驗之已下一段就一切惡多少分齊驗之六者明莫問一切善惡持戒破戒歸一切三寶度一切衆生斷一切惡修一切善解行等多少皆悉普謗佛謗法通凡及聖墮無量無邊劫受苦不得脫阿鼻大地獄等如下第十五子段內五部經等説以此文驗所以得知已上引經證知是非所由義已下引經釋知是非所由義又明何以故明於下十六子段內一一段內各各有三義一義釋唯是一切利根空見有見衆生所由義一義釋一切第二第三兩階佛法內一切大乘一切少小乘同而不同義同者十六子段義同一種相似無別故名之為同而後常有一切六度十二因緣四諦大乘小乘不同故名之為異一義釋一切第二第三兩階佛法內一切利根邪見正見三乘根機衆生與一切第一階佛法內一切利根正見一乘根機菩薩同而不同義明一切如來藏一切福德智慧二種莊嚴體性無別故名之為同而復常有一切三乘一乘不同故名之為異喻如阿耨大池與八河水體常無別故名之為同而復常有阿耨大池與八河別故名之為異一種相似如下十六子段內所説經等説又明一切第一階佛法唯有大乘名字無小乘名字一切第二階佛法亦有大乘名字亦有小乘名字一切第三階佛法一者明有世間名字二者明有人天名字三者明有大乘小乘名字如下第四大段內廣説一者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似唯受應身少分純與己同邊或作所見佛同或説法解法同或出家眷屬同或作在家眷屬同或斷惡修善解行等同何以故一者明以一切真應兩種身得道緣驗二者明以一切一乘三乘兩種根機得道因驗因果法內説即如下説者是唯偏用一切順己情惡魔等語不用他一切違己情道俗語淺深分齊於一切三寶等唯除自心所見長已外於他所歸一切三寶等莫問一切凡聖一種相似一向畢竟永無有一偈一句一字一分一豪毫長可信可解可學可受行者如佛藏經第二卷內增上慢衆生第三卷過半已前摩訶衍經泥黎品等説唯偏執朋黨諍訟如勝鬘經減半卷已前佛藏經第二卷內等説乃至如一切甚深大乘經等説莫問一切凡聖一種相似但使破其一切偏空偏有病等者皆悉普是名以驗法説二者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似但不免被破故法華經第一卷過半已後説文當如來但以一佛乘故為衆生説法無有餘乘若二若三文當義當乃至一切十方三世諸佛亦一種相似亦常以一佛乘故為一切衆生説法無有一切餘乘若二若三又復以上十六子段等莫問一切大乘小乘一切解行病皆悉普一種相似以法驗之所以得知乃至一切甚深大乘經破其偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內説亦名以人驗法説三者明一切第三階佛法內一切利根空見有見衆生莫問一切大小乘一種相似俱是一切火宅根機明不能得捨得一切三界所由義明唯得為作一切利根空見有見衆生惡魔等所由義明唯得為説一切空見有見法所由義唯由用己見唯由用順己情佛僧衆生語一門狹小故俱是一切窮子根機明不能得受一切聖人一切利根正見成就凡夫所説一切正善佛法所由義唯由唯用己見唯由用順己情佛僧衆生語一門狹小故俱是一切化城根機明唯歸一切一身別三寶唯度一切一身別衆生唯斷一切一身別惡唯修一切一身別善解行等世世各別唯有一切短緣一切短因不歸一切普三寶不度一切普衆生不斷一切普惡不修一切普善解行等世世常同無別一切長緣一切長因所由義由用己見唯由用順己情佛僧衆生語一門狹小故如大般涅槃經第卅一卷過半已後明菩薩應作一切三塗塗衆生應作一切利根空見有見衆生等摩訶衍經泥黎品佛藏經第二卷過半已後明一切惡魔等教一切出家人分張五部戒律別各各相是非第三卷減半已前唯信一切惡魔等語徹到成就等者皆悉普是如下十三部經等説若就一切第二階佛法內一切利根正見成就三乘根機衆生説莫問一切大乘小乘俱是一切火宅根機俱是一切窮子根機俱是一切化城根機於一切三界內及一切三乘佛法內唯用一切己見學捨學受唯用一切利根三乘真聖諸佛菩薩聲聞緣覺一切利根正見成就凡夫語不用一切利根一切利根一乘真聖諸佛菩薩一切利根正見成就凡夫語如法華經火宅品窮子品化城品大般涅槃經文當廣明一乘十號義當略明一乘十號大般涅槃四種近因初明文當唯得用一種語義當即是四種下近因義當即是三乘後明文當得具足用三種語義當即是上近因義當即是一乘憍陳如品已下文當義當唯信阿難等聲聞不信菩薩大方廣佛華嚴經十地品第一卷樂小乘衆生聞一乘佛法生疑不信乃至餘一切甚深大乘經等説四者明一切第三階佛法內一切利根空見有見衆生莫問一切大乘小乘一種相似皆悉普是一切諱惡衆生一者明一切破戒比丘諱惡二者明持戒歸三寶度衆生斷惡修善解行等一切增上慢人諱惡三者明分別一切佛法是非邪正長短一切不淨説法人諱惡四者明一切人見衆生諱惡五者明一切命見衆生諱惡六者明一切我見衆生諱惡如佛藏經通上及下説第一卷念佛品第二卷十憂惱箭破戒比丘與增上慢人並説第三卷近卷初説又明一切利根空見有見衆生畢竟不能得自見己惡徹到又由自惡見故謂他亦惡已上人語引經文説已下唯是經文説如來於今説如是經爾時癡人猶尚不信何況能信所説罪報阿難法應爾自自身是惡謂餘亦惡如今第一懈怠比丘爾時第一精進比丘所不能及又明一切利根空見有見衆生雖在佛法內出家去出法遠近分齊如隔百千億三千大千世界如出家一法既爾乃至學餘一切佛法等亦如是類以可知已上人語引經説已下唯是經文説譬如阿難百千億三千大千世界中間曠遠此弊惡人遠沙門法猶尚如是況得順忍況得涅槃又明一切利根空見有見衆生諱惡淺深分齊又一切利根空見有見衆生皆悉普是諱惡返更作惡衆生又此段諱己一切惡淺深分齊即是後段求己一切好淺深分齊又後段求己一切如好道俗多少分齊即是此段諱己一切惡道俗多少分齊何以故明但使諱己一切惡即是求己一切好但使求己一切好即是諱己一切惡何以故明下經文內佛以世間喻佛法所以人語説者亦須以世間法與佛法並説已上人語引經説已下唯是經文説阿難若人誦持是經所得功德無量無邊所以者何破戒比丘尚不能信誦讀教人況於是中得歡喜心何以故阿難譬如如惡賊於王大臣不敢自現盜他物者不自言賊如是阿難破戒比丘成就非門法尚不自言是惡況能向餘人説自言罪人阿難如是經者破戒比丘隨得聞時能降伏則有慚愧已下亦是次第經文少有隔越惡魔及諸眷屬皆大憂惱如墮十六種大坑大啼哭言瞿曇沙門知我覺我常長夜願佛滅後破持戒者助破戒者欲令諸惡比丘不知佛法但知讀誦我欲於佛法中破安隱心語言此非佛法無有義趣已下人語引經説從此段初過一段後又明已來經文前人語引經説者如佛藏經通上及下説及依餘部經等説唯是經文説者如佛藏經第四卷過半已後説又明文當佛滅度一千年已後文當一切衆生文當一切道俗皆悉普求名求利求勝他盡已上人語引經説已下唯是經文説一切衆生勤苦修行不會正理作福彌積獲報甚微善男子未來世中比丘比丘尼優婆塞優婆夷國王大臣長者居士婆羅門等輕賤我法薄淡三寶無有真實雖作衆善求名利求勝他故無一念求作出世心已下人語引經説衆生內邪正並有喻如一切為實偽寶內真實為實寶偽寶並有一切行壞見不壞正見成就衆生多少分齊唯與抓上土一種相似一切行見俱壞唯純邪無正邪見成就衆生多少分齊與十方世界所有地土一種相似準依大般涅槃經大方等陀羅尼經等説文顯易識又明已上佛藏經一部説明一切利根空見有見惡魔唯偏教一切修道人破戒唯偏教一切修道人學一切利善佛法如摩訶衍經泥黎品説明惡魔唯教一切有見衆生學一切別善佛法謗佛謗法如大般涅槃經邪正品説明惡魔亦能得作出家人亦得能得作在家人亦能得作聖人亦能得作佛等如佛藏經第二卷過半已後第三卷減佛等如説惡魔等唯教一切出家人分張五部戒律等別各各相是非一切別善佛法以此文驗明一切惡魔遍滿十方世界無處不有有所以一切肉眼凡夫乃至未得法忍已來自知不能得識一切衆生生邪正分齊者乃至未得法忍已來願不用一切人語願不自用一切己見如下十三部經等説明一切利根空見有見衆生唯偏將一切利根空見有見衆生一切別邪善佛法作是一切利根真聖諸菩薩等一切別正善佛法作唯瞋唯罵唯打唯殺等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如大般涅槃經四依品説唯遣依一切正四依不聽依一切邪四依者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如佛藏經第三卷減半已前説明一切肉眼凡夫分別一切佛法是非邪正長短名為不淨説法得罪過於殺三千大千世界滿內衆生發願寧自以利刀割舌不應衆中不淨説法等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如大方廣十輪經説明利根衆生發願乃至來未得法忍已來一者願不受身二者願不作種種人至主三者願不作下賤人四者願不作斷事人若作是等處必當不免墮於阿鼻地獄等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義唯除一切行法行王亦名一切國王亦名一切灌頂剎利王亦名一切人王如餘卷等第一大段內廣説不定若能得依一切第三階佛法住持一切三寶住持一切國土利益一切衆生不在其限如大方廣十輪經第六卷過半已後大薩遮尼乾子經第三卷過半已後等説五者明一切第三階佛法內一切利根空空見有見衆生莫問一切大乘小乘一種相似俱自高輕他自是非他謗佛謗法通凡及聖已上人語引經説已下唯經文説爾時衆會無量百千聲聞無量百千菩薩摩訶薩從坐而起自歸向佛發露懺悔我等皆於過去無量諸佛法中若任法器及不任者諸聲聞衆多起譏呵自舉輕他誹謗毀罵揚惡遏善以是業障墮三惡道具受苦痛雖復供養過去諸佛及大菩薩摩訶薩衆乃至懺悔受持禁戒得聞佛法自學教他但以誹謗餘業障故不能得趣寂滅涅槃及禪定樂已下人語引經説如大方廣十輪經通上及下第六卷近初説如下第十五子段內五部經等説乃至一切甚深大乘經破其偏空偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內説又此段與下第十五子段義無別唯為明引經證一切第三階佛法因莫問一切大乘小