body:
  text: 一切惡俗貴賤利根鈍普唯將作惡不將作善所以重不當一切利根空見有見眾生一切出世間根機藥病一切邪善業一切眾生莫問一切道俗貴賤利根鈍根有知解解皆悉普唯時作善不時作惡所驗法說二者明若就一切三世因果竪說以明損益多少分齊於一切惡業則輕於不當一切利根空見有見眾生一切出世間根機藥病一切邪善業則重何以故一者明一切惡業位判唯有於一切闇地得滅一切三寶等於一切人前皆悉不能得滅一切三寶等位判唯有於一切惡人得滅一切三寶等於一切善人內皆悉普不得滅一切三寶等二者明一切惡業一切眾生莫問一切凡聖邪正道俗貴賤利根鈍根有知解无知解皆悉普識知是惡盡所以一向不得皆悉普滅一切三寶等盡乃至成一切三災等所以得罪輕三者明不當一切利根空見有見眾生一切出世間根機藥病一切邪善業唯除一切聖人一切利根正見成就凡夫眾生已外一切利根正見未成就凡夫眾生一切利根邪見成就凡夫眾生莫問一切道俗貴賤利根鈍根有知解无知解皆悉普不識知是惡而復返更將作上別真別正出世間善所以得莫問於一切人前闇地皆悉普得滅一切三寶等盡所以得莫問於一切善人惡人內皆悉普得滅一切三寶等盡乃至成一切三災等所以得罪重如佛藏經第一卷初減半大方廣十輪經第四卷初減半摩訶衍經泥黎品等三部經俱明得罪重五逆四重等罪乃至成一切三災等如長阿含經第六卷內說何以故明一切利根空見有見眾生從无始世界已來一者明常以一切世間空有兩法作身二者明常在一切世間空有兩法內行往臥等三者明若作一切人內眾生常世間有法多若作一切人外眾一切世間空法多四者明若學一切佛法一切第一階佛法內一切甚深大乘佛法於一切世間法內於一切出世間法內皆悉普无有與等者最大最勝最上最深最寬最長大不可思議最大不可思議部從道至未皆悉普廣明一切空所以若作一切最大多惡若作一切最大深慈若作一切最大長惡等者唯由學一切空有兩法最多故若學一切最大多善若學一切最大寬善若學一切最大長善等者唯由學一切空有兩法最大多故所以乃至明一切善惡等輕重亦唯就一切空有兩法說從此已下餘卷內有文說大般涅槃經一當一部上下廣說又一人義當一部所說一切最多惡一切最多邪善皆悉普是迦葉經文當惡賊狗菩薩第一卷內說惡賊略說狗菩薩廣說又兩人義當一部所說一切最多惡一切最多邪善皆悉普是佛藏經文當惡賊第二卷經等卷經等廣說餘略說餘部廣略當增上慢眾生第二卷減半已後廣說餘卷略說餘部廣略不定文當六師外道第三卷滅減半已前廣略說餘卷毘略說餘部廣略不定文當惡魔第四卷過半已後廣說餘卷略說餘部廣略不定又四人義當一部所說一切最多惡一切最皆普是大方廣十輪經文當㫋陀羅第四卷初減半已前廣說餘卷略說餘部廣略不定文當无慚愧僧第五卷過半已前廣說餘部廣略不定文當以顯驢唯狗驢菩薩第五卷過半已後廣說又三人義當第三卷過半已後第四卷第五卷第六卷強三卷半經廣說通上及下略說一一切最多惡一切最多邪善皆悉普是大集月藏分經與雜阿含經同文當九十五種道第八卷過半已後略說大方廣十輪經文當九十五種道第五卷減半已前略說摩訶摩耶經文當九十六種道文顯易識摩訶衍經論文當九十六種道第三卷減半已前說灌頂經雜類神呪經廣說又九十六種道五部經等所說一切最多惡一切最多邪善皆悉普是迦葉經第一卷內說文當佛滅度五百年已後文當千佛不能得度得一切眾生時文當義當一切惡賊一切狗菩薩競興滅一切佛法法華經不輕菩薩品說文當像法內增上慢比丘有大勢力時義當佛滅度五百年已後義當千佛不能得度得一切眾生時義當增上慢眾生競興滅一切佛法大般涅槃經增上慢眾生競興滅一切佛法大般涅槃經文顯易識文當佛滅度七百年已後義當千佛不能得度得一切眾生時文當義當一切惡魔競興滅一切佛法或作四眾身或作聖人身乃至或作佛身等摩訶摩耶經第一卷內說文當佛滅度六百年已後義當千佛不能得度得一切眾生時文當義當一切九十六種道興滅一切佛法大般涅槃經文顯易識文當就六種喻廣說世間之義說勝鬘經文當人天卷初滅減半已前略說大方廣十經輪輪經文當邪見成就第四卷滅減半已後說明一切佛皆悉普不能𢌞得所以得知邪見成就大薩遮尼乾子經文當明顛倒文顛顯易識如餘卷第二大段內廣說大方廣十輪經文當行壞體壞第五卷減半已前略說大集月藏分經與雜阿含經同文當阿鼻地獄文當誹謗一切正法毀呰一切賢聖文當煩惱牢固猶如金剛第十卷內一切偈頌已後略說大方廣十輪經文當行壞體壞一切三乘根機通上及下一部皆悉第六卷近初文當明一切三乘根機眾生作惡多少分齊一種相似通上及下說文當墮阿鼻大地獄等障道受苦時節多少分齊一種相似文當從地獄出已後一切惡斷不可得一切當已一切出世間根機藥病一切出世間正善學不可得成就一種相似如餘卷內廣說如下第一大段內說又一切阿鼻地獄等位判雖復同是當受一切无間苦以因驗果於內亦得常有兩階一者明從无始世界一切諸佛菩薩等有緣已來莫間問一切善惡等皆悉普常不信盡一向无緣者於一切阿鼻地獄等內莫間問一切善惡等皆悉普常不信盡一向无緣者於一切阿鼻地獄等內莫問一切諸佛菩薩等多少皆悉普不能得令其暫得心苦者明從无始世界與一切諸佛菩薩等有緣已來於一切諸佛菩薩等一切種種行內但使得有信一行兩行等者即得以其與一切諸佛菩薩等有緣行等邊威力加護令其暫得止苦教其捨邪歸正不在其限如大方廣佛華嚴經賢首菩薩品明得見光明所由由過去同行隨喜見聞等因同故所以得見光明法內說亦名以因驗果說大方廣十輪經文當非是三乘器第五卷過半已前略說文當非是涅槃善根第七卷內略說像法決疑經與多部經義同文當三世諸佛怨家減半卷已後說佛藏經文當一切世間天人中大賊一切世間怨家諸佛大賊等第四卷減半已前大方廣十輪經文當一切佛第四卷過半已前說大般涅槃經文當一切經第九卷廿種喻內說大方廣十輪經文當擾亂一切諸佛眾生第五卷過半已後說第一大段明驗一切第三階佛法內一切利根空見有見眾生多少分齊與十方世界所有地土有地土一種相似義如餘卷第一大段內廣說又從已下說盡一切三階佛法內一切三階根機眾生已來餘卷內无文說又明如大般涅槃經第卅四卷近初說明一切善人惡人多少分齊唯應就一切脩道眾生說未必皆悉普就一切眾生說何以故一者明從惡向善說乃至得道二者明從捨善向惡說乃至不得道三者明若就一切脩道眾生說明多少分齊唯與孤上下抓上土一種相似得與佛滅度一千年已後如餘卷第一段內八部經此段下第九子段內十三部經等所說相當若皆悉普說就一切眾生說一切人道眾生諸根具足者无量无邊即不得與佛滅度一千年已後如上八部經十三部經等所說相當四者明犯四重罪作五逆罪眾生多少分齊與十方世界所有地土一種相似亦不與佛滅度一千年已後如上八部經等相當明一切道俗作五逆罪人至少故又亦不與上八部經等義相違何以故明一切道俗但使食用一切三寶餘飲食財物等者亦皆悉普是一切犯四重罪作五逆罪眾生攝何以故明一切三寶福田最上位判皆悉普是一切四重五逆罪境界故如大方廣十輪經第三卷過半已來後諸說五者明用僧諸物多少分齊與十方世界所有地土一種相似正與佛滅度一千年已後如上八部經等相當明一切道俗乃至被打被殺不肯食眾僧飲食財物者唯與抓上土一種相似不肯受打受殺用眾僧物者多少分齊與十方世界所有地土一種相似六者以明明以空見驗有見明一切利根空見眾生多少分齊與十方世界所有地土一種相似亦不與佛滅度一千年已後如上八部經十三部經等相當不相違何以故一者明一切利根空見眾生與一切利根有見眾生常相似不定如大般涅槃經第九卷廿種喻內說此段就現在緣驗二者明一切利根空見眾生无眾生可度无惡可斷无善可脩應不見三寶應不能斷得惡應无解行而善星比丘空見佛斷惡學解行等多少分齊與一切利根有見眾生一種相似此段就因果驗以此文驗所以得知一切利根空見眾生與一切利根根有見眾生常相似不定唯除一世多得名利朋黨至多不相似者不在其限亦名以人驗法說又明一切利根空見一闡提依經文次第說莫問一切善惡具足不具足不久能斷一切善根驗之明莫問得人身不得人身諸根具足不具足生邊地不生邊地犯四重罪不犯四重罪作五逆罪不作五逆罪用眾僧物不用眾僧物信佛法不信佛法不久會是不得人身不久會是諸根不具足不久會是生於邊地不久會是犯四重罪不久會是作五逆罪不久會是用眾僧物不久會是不信佛法以空見驗有見乃至餘卌五種等一切邪見成就眾生如是類以可知明卌五種等一切邪見成就眾生如餘卷內廣說第一段明一切第三階佛法內一切利根空見有見眾生內位判常唯一種眾生莫問一切善惡持破戒戒破戒歸一切三寶度一切眾生斷一切惡脩一切善解行等多等少少等餘名一空見有見眾生二九種人三九十六種道四世間根機五邪見成就六顛倒七阿鼻地獄八誹謗正法毀呰賢聖九煩惱牢固猶如金剛十行壞體壞三乘根機十一非是三乘器及涅槃善根十二是三世諸佛怨家速滅佛法十三一切世間天人中大賊十四一切世間怨家十五一切諸佛大賊十六一切佛一切經皆悉普不能救得十七擾亂一切諸佛如上初段內說又明一切利根空見有見眾生亦名非是佛弟子亦名是佛所不攝眾生亦名佛所不攝眾生亦名佛不聽在於一切佛法內出家眾生亦名佛不肯為說一切法眾生如佛藏經通上及下數說第三卷過半已後文最廣說大方廣十輪經第三卷過半已後第五卷減半已前等說又明一切利根空見有見眾生莫問一切善惡持戒破戒歸一切三寶度一切三寶度一切眾生斷一切惡脩一切善解行等多少皆悉普是一切佛所不攝眾生如下第十六子段內大方廣十輪經具足廣說又明一切利根空見有見眾生於一切佛法內唯除一切剃頭或名着染衣或名着袈裟邊是佛子攝不在其限如大方廣十輪經第五卷過半已後大薩遮尼乾子經第三卷末等說又明一切利根空見有見眾生於一切佛法內唯除於一切現在世中雖无別益以憐愍故為生後世諸善種子不在其限如大般涅槃經說文顯易識又明一切利根空見有見眾生皆悉普名一切利根一切空見有見一切行壞體壞一切戒見俱破一切顛倒一切一種眾生何以以故一者明以後一切第一第二兩階佛法內有一切戒見俱不破有一切破戒不破見兩種正見成就眾生驗之所以得知一切第三階佛法內唯有一切行壞體壞戒見俱破顛倒一切一種眾生又已上一段就一切佛法邪正有无法分齊驗之二者明以空見多少驗有見多少明一切利根空見有見眾生多少分齊與十方世界所有地土一種相似准依大般涅槃經大方等陀羅尼經等說文顯易識三者明文當佛滅度一千年已後文當一切眾生莫問一切道俗貴賤皆悉普輕賤一切佛法薄淡一切三寶无有真實雖作眾善求利求勝他故无有一念作出世心如像法決疑經與多部經義同近卷初說四者明文當佛滅度後文當一切佛皆悉普不能得度得一切眾生時唯供養一切破戒比丘乃至為作一切寺舍等時大方廣十輪經第四卷減半已前說五者明文當佛滅度二千年已後唯有一切破戒无兩種比丘在如大集月藏分經與雜阿含經難當王文當佛滅度一千年已後同第九卷初減半已前說又已上四段一切人邪正多少分齊驗之已下一段就一切惡多少分齊驗之六者明莫問一切善惡持戒破戒歸一切三寶度一切眾生斷一切惡脩一切善解行等多少皆悉普謗佛謗法通凡及聖墮无量无邊刧受苦不得脫阿鼻大地獄等如下第十五子段內五部經等說以此文驗所以得知已上引經證知是非所由義已下引經釋知是非所由義又明何以故明於下十六子段內一一段內各各有三義一義釋唯是一切利根空見有見眾生所由義一義釋一切第二第三兩階佛法內一切大乘一切少小乘同而不同義同者十六子段義同一種相似无別故名之為同而後常有一切六度十二因緣四諦大乘小乘不同故名之為異一義釋一切第二第三兩階佛法內一切利根邪見正見三乘根機眾生與一切第一階佛法內一切利根正見一乘根機菩薩同而不同義明一切如來藏一切福德智慧二種莊嚴體性无別故名之為同而復常有一切三乘一乘不同故名之為異喻如阿耨大池與八河水體常无別故名之為同而復常有阿耨大池與八河別故名之為異一種相似如下十六子段內所說經等說又明一切第一階佛法唯有大乘名字无小乘名字一切第二階佛法亦有大乘名字亦有小乘名字一切第三階佛法一者明有世間名字二者明有人天名字三者明有大乘小乘名字如下第四大段內廣說一者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似唯受應身少分純與己同邊或作所見佛同或說法解法同或出家眷屬同或作在家眷屬同或斷惡脩善解行等同何以故一者明以一切真應兩種身得道緣驗二者明以一切一乘三乘兩種根機得道因驗因果法內說即如下說者是唯偏用一切順己情惡魔等語不用他一切違己情道俗語淺深分齊於一切三寶等唯除自心所見長已外於他所歸一切三寶等莫問一切凡聖一種相似一向畢竟永无有一偈一句一字一分一豪毫長可信可解可學可受行者如佛藏經第二卷內增上慢眾生第三卷過半已前摩訶衍經泥黎品等說唯偏執朋黨諍訟如勝鬘經減半卷已前佛藏經第二卷內等說乃至如一切甚深大乘經等說莫問一切凡聖一種相似但使破其一切偏空偏有病等者皆悉普是名以驗法說二者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似但不免被破故法華經第一卷過半已後說文當如來但以一佛乘故為眾生說法无有餘乘若二若三文當義當乃至一切十方三世諸佛亦一種相似亦常以一佛乘故為一切眾生說法无有一切餘乘若二若三又復以上十六子段等莫問一切大乘小乘一切解行病皆悉普一種相似以法驗之所以得知乃至一切甚深大乘經破其偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內說亦名以人驗法說三者明一切第三階佛法內一切利根空見有見眾生莫問一切大小乘一種相似俱是一切火宅根機明不能得捨得一切三界所由義明唯得為作一切利根空見有見眾生惡魔等所由義明唯得為說一切空見有見法所由義唯由用己見唯由用順己情佛僧眾生語一門狹小故俱是一切窮子根機明不能得受一切聖人一切利根正見成就凡夫所說一切正善佛法所由義唯由唯用己見唯由用順己情佛僧眾生語一門狹小故俱是一切化城根機明唯歸一切一身別三寶唯度一切一身別眾生唯斷一切一身別惡唯脩一切一身別善解行等世世各別唯有一切短緣一切短因不歸一切普三寶不度一切普眾生不斷一切普惡不脩一切普善解行等世世常同无別一切長緣一切長因所由義由用己見唯由用順己情佛僧眾生語一門狹小故如大般涅槃經第卅一卷過半已後明菩薩應作一切三塗塗眾生應作一切利根空見有見眾生等摩訶衍經泥黎品佛藏經第二卷過半已後明一切惡魔等教一切出家人分張五部戒律別各各相是非第三卷減半已前唯信一切惡魔等語徹到成就等者皆悉普是如下十三部經等說若就一切第二階佛法內一切利根正見成就三乘根機眾生說莫問一切大乘小乘俱是一切火宅根機俱是一切窮子根機俱是一切化城根機於一切三界內及一切三乘佛法內唯用一切己見學捨學受唯用一切利根三乘真聖諸佛菩薩聲聞緣覺一切利根正見成就凡夫語不用一切利根一切利根一乘真聖諸佛菩薩一切利根正見成就凡夫語如法華經火宅品窮子品化城品大般涅槃經文當廣明一乘十號義當略明一乘十號大般涅槃四種近因初明文當唯得用一種語義當即是四種下近因義當即是三乘後明文當得具足用三種語義當即是上近因義當即是一乘憍陳如品已下文當義當唯信阿難等聲聞不信菩薩大方廣佛華嚴經十地品第一卷樂小乘眾生聞一乘佛法生疑不信乃至餘一切甚深大乘經等說四者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似皆悉普是一切諱惡眾生一者明一切破戒比丘諱惡二者明持戒歸三寶度眾生斷惡修善解行等一切增上慢人諱惡三者明分別一切佛法是非邪正長短一切不淨說法人諱惡四者明一切人見眾生諱惡五者明一切命見眾生諱惡六者明一切我見眾生諱惡如佛藏經通上及下說第一卷念佛品第二卷十憂惱箭破戒比丘與增上慢人並說第三卷近卷初說又明一切利根空見有見眾生畢竟不能得自見己惡徹到又由自惡見故謂他亦惡已上人語引經文說已下唯是經文說如來於今說如是經爾時癡人猶尚不信何況能信所說罪報阿難法應爾自自身是惡謂餘亦惡如今第一懈怠比丘爾時第一精進比丘所不能及又明一切利根空見有見眾生雖在佛法內出家去出法遠近分齊如隔百千億三千大千世界如出家一法既爾乃至學餘一切佛法等亦如是類以可知已上人語引經說已下唯是經文說譬如阿難百千億三千大千世界中間曠遠此弊惡人遠沙門法猶尚如是況得順忍況得涅槃又明一切利根空見有見眾生諱惡淺深分齊又一切利根空見有見眾生皆悉普是諱惡返更作惡眾生又此段諱己一切惡淺深分齊即是後段求己一切好淺深分齊又後段求己一切如好道俗多少分齊即是此段諱己一切惡道俗多少分齊何以故明但使諱己一切惡即是求己一切好但使求己一切好即是諱己一切惡何以故明下經文內佛以世間喻佛法所以人語說者亦須以世間法與佛法並說已上人語引經說已下唯是經文說阿難若人誦持是經所得功德无量无邊所以者何破戒比丘尚不能信誦讀教人況於是中得歡喜心何以故阿難譬如如惡賊於王大臣不敢自現盜他物者不自言賊如是阿難破戒比丘成就非門法尚不自言是惡況能向餘人說自言罪人阿難如是經者破戒比丘隨得聞時能降伏則有慚愧已下亦是次第經文少有隔越惡魔及諸眷屬皆大憂惱如墮十六種大坑大啼哭言瞿曇沙門知我覺我常長夜願佛滅後破持戒者助破戒者欲令諸惡比丘不知佛法但知讀誦我欲於佛法中破安隱心語言此非佛法无有義趣已下人語引經說從此段初過一段後又明已來經文前人語引經說者如佛藏經通上及下說及依餘部經等說唯是經文說者如佛藏經第四卷過半已後說又明文當佛滅度一千年已後文當一切眾生文當一切道俗皆悉普求名求利求勝他盡已上人語引經說已下唯是經文說一切眾生勤苦脩行不會正理作福彌積獲報甚微善男子未來世中比丘比丘尼優婆塞優婆夷國王大臣長者居士婆羅門等輕賤我法薄淡三寶无有真實雖作眾善求名利求勝他故无一念求作出世心已下人語引經說眾生內邪正並有喻如一切為實偽寶內真實為實寶偽寶並有一切行壞見不壞正見成就眾生多少分齊唯與抓上土一種相似一切行見俱壞唯純邪无正邪見成就眾生多少分齊與十方世界所有地土一種相似准依大般涅槃經大方等陀羅尼經等說文顯易識又明已上佛藏經一部說明一切利根空見有見惡魔唯偏教一切脩道人破戒唯偏教一切脩道人學一切利善佛法如摩訶衍經泥黎品說明惡魔唯教一切有見眾生學一切別善佛法謗佛謗法如大般涅槃經邪正品說明惡魔亦能得作出家人亦得能得作在家人亦能得作聖人亦能得作佛等如佛藏經第二卷過半已後第三卷減佛等如說惡魔等唯教一切出家人分張五部戒律等別各各相是非一切別善佛法以此文驗明一切惡魔遍滿十方世界无處不有有所以一切肉眼凡夫乃至未得法忍已來自知不能得識一切眾生生邪正分齊者乃至未得法忍已來願不用一切人語願不自用一切己見如下十三部經等說明一切利根空見有見眾生唯偏將一切利根空見有見眾生一切別邪善佛法作是一切利根真聖諸菩薩等一切別正善佛法作唯瞋唯罵唯打唯殺等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如大般涅槃經四依品說唯遣依一切正四依不聽依一切邪四依者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如佛藏經第三卷減半已前說明一切肉眼凡夫分別一切佛法是非邪正長短名為不淨說法得罪過於殺三千大千世界滿內眾生發願寧自以利刀割舌不應眾中不淨說法等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義如大方廣十輪經說明利根眾生發願乃至來未得法忍已來一者願不受身二者願不作種種人至主三者願不作下賤人四者願不作斷事人若作是等處必當不免墮於阿鼻地獄等者亦是為明一切肉眼凡夫乃至未得法忍已來不得用一切人語不得用一切己見所由義唯除一切行法行王亦名一切國王亦名一切灌頂剎利王亦名一切人王如餘卷等第一大段內廣說不定若能得依一切第三階佛法住持一切三寶住持一切國土利益一切眾生不在其限如大方廣十輪經第六卷過半已後大薩遮尼乾子經第三卷過半已後等說五者明一切第三階佛法內一切利根空空見有見眾生莫問一切大乘小乘一種相似俱自高輕他自是非他謗佛謗法通凡及聖已上人語引經說已下唯經文說爾時眾會无量百千聲聞无量百千菩薩摩訶薩從坐而起自歸向佛發露懺悔我等皆於過去无量諸佛法中若任法器及不任者諸聲聞眾多起譏呵自擧輕他誹謗毀罵揚惡遏善以是業障墮三惡道具受苦痛雖復供養過去諸佛及大菩薩摩訶薩眾乃至懺悔受持禁戒得聞佛法自學教他但以誹謗餘業障故不能得趣寂滅涅槃及禪定樂已下人語引經說如大方廣十輪經通上及下第六卷近初說如下第十五子段內五部經等說乃至一切甚深大乘經破其偏空偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內說又此段與下第十五子段義无別唯為明引經證一切第三階佛法因莫問一切大乘小乘俱作多惡等經文文義具足在於此段所以說之耳六者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似俱不解一切第一階佛法內一切一乘佛法如勝鬘經通上及下過半卷已後說文當如來藏者一切阿羅漢辟支佛大力菩薩本所不見本所不得何況一切第三階佛法內一切利根空見有見眾生行壞體壞戒見俱破顛倒九種人亦名一切十七種等一切最大惡一切三乘根機眾生餘如上第一子段內說又明一切利根空見有見眾生莫問一切大乘小乘一種相似以果驗因以因驗果從无始世界已來於一切十二部經內唯有文解无義解於一切佛一切僧一切眾生一切斷惡行一切修善解行等內唯學一切別真別正佛法不學一切普真普正佛法亦名唯歸一切三寶度一切眾生斷一切惡修一切善解行等一切如來藏一切相佛法不學一切如來藏一切體佛法以下十三部經等驗之所以得知七者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似俱學一切空見有見不可迴得如上初段明一切空有同異法內如下第十五子段內五部經等說餘如上第一子段內說又已上七子段亦有打他殺他乃至被打被殺不退以此文先无故所以不說之已下以見先有故所以說之八者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似唯偏自諱己一切惡唯偏返見他一切惡一切廿六種等一切阿鼻地獄惡打他殺他乃至被打被殺不退如下第三大段內一段說者是餘如上第一子段內如下第九子段內等說九者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似不肯唯偏見自身一切惡以一切善從一切惡皆悉普作惡解唯偏見自身一切善以一切惡從一切善皆悉普作善解打他殺他乃至被殺不退何以故明文當佛滅度後文當千佛百千萬億佛一切佛一切經一切菩薩皆悉普不能得度得一切眾生時文當菩薩聖人及利根真善正見成就凡夫向他方及死後時文當廣明一切利根空見一闡提一切利根有見增上慢眾生惡賊狗菩薩六師外道惡魔㫋陀羅无慚愧僧以驢唯狗驢菩薩亦名一切十七種等一切最大惡眾生競興滅一切佛法時又明如寶梁經說文顯易識文當菩薩聖人及利根真善正見成就凡夫向他方及死後時大方廣十輪經第四卷滅減半已前大集月藏分經與雜阿含經第十卷偈頌內大薩遮尼乾子經第四卷過半已前等說皆明聖人及利根正見成就凡夫等向他方又明知如月燈經說文顯易識文當遣為佛滅度後眾生說文當義廣當明一切无明相法文當增上慢眾生將聖人作文當殺聖人又明如法華經方便品不輕菩薩品說方便品文當五百增上慢皆比丘唯信佛說三乘佛法不信佛說一乘佛法不輕菩薩品內文當佛滅度後文當正法滅後文當像法時文當增上慢比丘有大勢力時文當增上慢四眾比丘比丘尼優婆塞優婆夷皆悉普不信不輕菩薩唯瞋唯罵唯打又明如迦葉經第一卷內說文當佛滅度五百年已後文當千佛不能得度得一切眾生時通下第二卷內說文當四天下一切出家人皆悉普不信達摩善法二菩薩比丘又明如大般涅槃經第九卷過半已後說文當於我滅後義當於佛滅度後次下經文說文當唯諸菩薩摩訶薩等能於是經取真實義不着文字已上人語引經說已下唯經文說善男子我涅槃後正法未滅餘八十年爾時是經於閻浮提當廣流布是時當有諸比丘抄略是經分作多分能滅正法色香美味是諸惡人雖復讀如是經典滅除如來深密要義安置世間莊嚴文飾无義之語抄前着後抄後着前後着中着前後當知如是諸惡比丘是魔伴侶已下人語引經說次下經文說文當義當由於佛經內多安人語故令佛經內一切正法一切正義皆悉普滅盡正法正義在者唯如蚊子澤准依大方廣十輪經說一切出家人唯有剃頭或名着染衣或名着袈真裟僧不滅住持一切三寶等不滅驗文之於一切十二部經內亦唯有一切真經卷一切真經文不滅如蚊子澤一種相以似於一切內亦唯有一切真形像佛在又蚊子澤者如上經文記說即蚊子尿水是已上人語引經說已下唯是經文說復次善男子如蚊子澤不能令此大地沾洽當來之世此經流布亦復如是如彼蚊子澤正法欲滅是經先當促於此地知當知即是正法衰相已下人語引經說又於大般涅槃一部經內所有不信佛及殺聖人等者皆悉普是又明如大般涅槃經第九卷末說文當明於佛大乘經內增加人語至滿八分猶勝小乘經一千倍者文當義當就一切第一第二兩階佛法內一切利根破戒不破見正見成就凡夫說何以故文當明以空見驗有見明一切第三階佛法內佛法內一切利根空見有見眾生行壞體壞戒見俱破顛倒九種人亦名一切十七種等一切最大惡眾生若先學一切小乘佛法令其出世間善根成就訖然後學一切甚深大乘佛法莫間問一切大乘小乘佛法俱得具足成就若先學一切甚深大乘佛法莫間問一切大乘小乘佛法俱不免滅壞如大方廣十輪經第五卷過半已後說以此文驗所以得知大般涅槃經內說者唯是為一切利根破戒不破見正見成就凡夫說不為一切利根空見有見眾生說又明如像法決疑經說與多部經義同文當佛滅度一千年已後文當一切眾生文當一切道俗並說皆悉普求名求利求勝他盡已上人語引經說已下唯是經文說一切眾生勤苦修行不會正理作福彌積獲報甚微善男子未來世中比丘比丘尼優婆塞優婆夷國王大臣長者居士婆羅門等輕賤我法薄淡三寶无有真實雖作眾善求利求勝他故无一念作出世心已下人語引經說決次下經文說已上人語引經說已下唯是經文說善男子未來世中諸惡比丘在在處處講說經律隨文取義不知如來隱覆秘密已下人語引經說次下經文說已上人語引經說已下唯是經文說像法之中諸惡比丘不解我意執己所見宣說十二部經隨文取義作決定說當知此人三世諸佛怨家速滅我法善男子諸佛說法常依二諦說世諦法時不違第一義諦指近以樹標遠立像表玄諸惡比丘於此義中不能解了誹謗不信隨相取義曆歷劫受殃是諸比丘亦復自稱我是法師我是律師我是禪師此三種學人能滅我法更非餘人此三種人造迭相說過造迭相毀呰此三種又人入於地獄猶如箭射已下人語引經說如像法決疑經與多部經義同滅減半卷已前說又明如最妙勝定經說與多部經義同文當佛滅度一千年已後文當法師解說佛語萬不着一文當義當一切道俗皆悉普不識聖人皆悉普於佛一切十二部經內抄前着後抄後着前滅一切十二部經內一切正法一切正義皆悉普盡喻如一切盲人指天上日若大若小若寬若狹一種相似喻如一切䪭聾人自言我聞天上說法之音一種相似即如上經文說明十三部經沒入於地者是准依大方廣十輪經說一切出家人准唯有剃頭或名著染衣或名著袈裟真僧住持一切三寶等不滅驗之於一切十二部經內亦准唯有一切真經卷一切真經文不滅在於一切佛內亦唯有一切真形像佛在已上人語引經說已下唯是經文說此諸比丘亦復如是世有文殊大迦葉等現入其中竟競共打罵驅逐令出不令得住亦如師子居香山中一切虫狩皆不來迎師子去後百狩毒虫共相鳴呼入香山中取其甘果飲其流泉皆令枯涸香山神仙不復擁護便生毒草食者命終吾滅度後一切比丘取我十二部經競共讀誦以上者著中以中著下以下著上中著前經後非義言義義言非義亦如外道各言我是已下人語引經說如最妙勝定經與多部經義同過半卷已後說又明如大薩遮尼乾子經第三卷過半已後說文當於末世時義當佛滅度後文當正法不行邪法競興眾生心惡趣起三種過文當義當一切正法不行時唯有一切三種顛倒眾生時何以故明與此段上下十三部經內多部經千年已後同如餘卷第二大段內廣說已上人語引經說已下有二子段一一段初各除三家學字已外餘者唯是經文說一者明云何名為樂於非法貪心答言大王於十不善惡業道中生於樂心是名樂於非法貪心二者明云何名為顛倒貪心自己手力得諸資生依時節得依正法得依如法得不生足心更求他財如是名為顛倒貪心三者明王言大師云何名為邪法罪納羅網之所纏心答言大王於諸外道非義論中起義論想於无益論生利益想於非法中生是法想於末世時非是智者所作論中以為正論生於信心薰修邪見以為福德是名邪法羅納網纏心已下語人人語引經說又大薩遮尼乾子經文當義當佛滅度一千年已後以下雜阿含經文當佛滅度一千年已後文當十善悉壞驗之與大薩遮尼乾子經佛滅度後正法不行時唯有一切三種顛倒眾生時第一顛倒文當於十不善惡業道中生於樂心文義具足一種相似又明如雜阿含經第廿五卷近初說文當佛滅度一千年已後已上人語引經說已下為唯是經文說過千年後我教法滅時當有非法出於世間十善悉壞閻浮提中惡風暴起水雨不時世多飢饉雨則災雹江河消滅花菓果不成人无光澤虫村鬼村悉皆河消滅花果不成人无光澤虫持磨滅飲食失味珍寶沈沒人民眼服食庶草木時已下人語引經說又此部經內上文當佛滅度後一千年已後佛導噵我教法滅非時當有非法出於世間十善悉壞與上大薩遮尼乾子經說於末世時正法不行邪法競興於十不善道中生於樂心文義具足一種相似又大集月藏分經文當法滅盡品文當四方惡王一時俱起破壞塔寺殺害比丘難著王與雜阿含經文當佛滅度一千年已後佛導噵我教法滅時四方惡王一時俱起破壞塔寺殺害比丘難當王同是一注法文義具足一種相似又明如摩訶摩耶經第二卷文當佛滅度一千年已後說一者明文當出家人袈裟變因白不受染色義當一切出家人袈裟變白不受染色准依大方廣十輪經第五卷過半已後說一切出家人有兩種又一切出家人既有兩種一切袈裟色亦有兩種一者初明一切剃頭着染衣袈裟僧出家人乃至一切佛法未皆悉普滅盡已未來當在不滅人既常在不滅一切袈裟青黑木蘭色亦當在常不變白常受染色不滅如大集月藏分經與雜阿含經同第九卷近初說文當佛滅度二千年已後明剃頭着染衣袈裟僧不滅乃至向後唯噵不滅未出滅之時節以此文驗所以得知二者後明一切應四諦趣向三乘僧出家人上下十三部經等內多部經說文當佛滅度一千年已後一切聖人一切利根真善正見成就凡夫僧皆悉普滅盡一切十二部經內一切正法一切正義亦皆悉普滅盡於一切十二部經內唯有一切真經卷一切真經文不滅在唯准依大方廣十輪經第五卷過半已後說與一切出家人內唯有剃頭着染衣袈裟僧不滅在一種相似於一切佛內亦唯有一切真形像不滅在一種相似人既滅盡一切袈裟亦變白不受染色類以可知二者明一切經藏皆悉普入龍王宮盡亦是一切經藏內一切正法一切正義皆悉普入龍王宮盡唯有一切真經藏一切真經卷一切真經文猶在不滅准依大方廣十輪經第五卷過半已後說與一切出家人剃頭着染衣袈裟僧不滅在一種相似於一切佛內亦唯有一相真形像不滅在一種相似又摩訶摩耶經內亦破壞塔寺殺害比丘又摩訶摩耶經內就家癈與廢興滅明佛滅度一千年已後時滅不就佛滅度一千年已時後後時滅明處癈廢興滅何以故明與上下十二部經內多部經同以此文驗所以得知又明如佛藏經說文當佛滅度後文當百千萬億佛不能得度得一切眾生時義當佛滅度一千年已後如餘卷第二大段初廣說已上人語引經說已下唯是經文說舍利弗如是惡人覆藏假瑕疵多欲多求以財自活惡魔知心為作方便令其卒乖異各共散壞一味僧寶分為五部既有五部則生諍訟立互相是非論說過共失舍利弗如今比丘互相教化互相恭敬同心共行隨順佛說爾時比丘不相教化不相恭敬見作惡者畏而捨去不能以法共相教誨或時雖有多聞深智猶懷憍慢輕賤餘人各以所是自立其論不喜相見況能受教舍利弗如來在世三寶一味我滅度後分為五部舍利弗惡魔於今猶尚隱身佐助調達破我法僧如來大智現在世故弊魔不能成其大惡當來之世惡魔變身作沙門形又入於僧中種種邪說令多眾生入於邪見為說邪法已下人語引經說次下經文說已上人語引經說已下唯是經文說爾時惡魔說如是等邪貪著事如是事者非諸佛及佛弟子所說爾時惡人為魔所迷各執所見我是彼非舍利弗如來豫見未來世中有如是等破法事故說是深經悉斷惡魔諸所執著舍利弗當爾之時閻浮提內多是增上慢人已下人說語引經說如佛藏經第二卷滅減半已前過半已後說又分一切五部戒律等別唯除一切聖人一切利根正見成就凡夫不在其限如律文等說已上人語引經說已下唯是經文說爾時增上慢人偏執者多惡魔有後又復迷惑在家出家者心令執非法說正法若者少於拔援助則便散壞不復得立已下人語引經說又初先明一切利根空見有見邪見成就顛倒增上慢人徒侶喜樂難問推求佛法第一實義後明一切利根正見成就眾生喜樂問難推求佛法第一實義又一切正見成就眾生雖復得說正佛法由徒侶至少行坐无處唯除得一切天王人王與作授護者不在其限已上人語引經說已下唯是經文說諸天間聞此皆大歡喜稱揚讚嘆是利根者喜樂問難各皆成就无生法忍如是人等令合集一處共為徒侶人眾既劣少勢力亦弱舍利弗爾時我諸真子於文父種族尚无受語況得供養經正住止塔寺舍利弗汝汝且觀之爾時如來便為輕微我滅度後我諸子等成就善字寂无所得忍時亦輕賤我以是故於无數劫摧諸怨敵化諸一切天王人王令心清淨所以爾者令我諸子得安文父位已上人語引經說次下經文就喻說明一切利根正見成就眾生為學一切无名相法故乃至被殺如佛藏經第二卷過半已後說文當不淨說法者有五過失又通上及下說義當明一切利根空見有見眾生分別一切佛法是非邪正長短者有五過失文當一者自言盡知佛法義當於一切經律論等部部能得從首至末差別是非邪正長短盡者與自言盡知佛法相當已上人語引經說已下唯是經文說舍利弗不淨說法者有五過失何等為五一者自言盡知佛法二者說佛經時出諸經中相違過失三者於諸法中心疑不信四者自以所知非他經法五者以利益養故為人說法舍利弗如是說者我語說此人當墮地獄不至涅槃復次舍利弗說法比丘處在大眾信樂法者為敷高坐捨佛正法而說外道嚴飾文辭我久勤苦求是法寶而此惡人捨置不說但心以經中相違語義互相是非不順正法於聖法中高心自大隨竟意而說為求利養舍利弗若比丘說法雜外道義有善比丘勤求道者應從座去何以故舍利弗有信白衣敷置高坐不應演說外道語義若不去者非善比丘亦復不名隨佛教者舍利弗說法甚難如是說者我說此人名為外道尼揵弟子非佛弟子是說法者命終之後當生尼揵子道何等是尼揵子道邪見是尼揵子道何等為邪見謂是地獄畜生餓鬼何以故舍利弗身不證法而在高坐身自不知而教人者法必墮地獄舍利弗如是因緣如來悉知我諸弟子以種種門利種利種因緣種種諸見滅我正法已下人語引經說文當義當明一切利根空見有見眾生分別一切佛法是非邪正長知短自誑誑他一切道俗喻如一切誑人誑他一切生盲眾生墮坑而死一種相似又文當義當明於一切道俗內唯除兩人三人已外餘者一切皆悉普是一切利根空見有見眾生分別一切佛法是非邪正長短自誑誑他一切道俗喻如一切誑人誑他一切生盲眾生墮坑而死一種相似何以故明以本攝末故又文當義當明於一切道俗內唯除兩人三人讀誦佛經已外餘者一切皆悉普唯讀一切六師外道經法已上人語引經說已下於唯是經文說舍利弗當來比丘好讀外經當說法時莊校文辭令眾歡樂惡魔爾時時助惑眾人障礙善法若有貪著音聲語言巧飾文辭若復有人好讀外道經者魔皆迷惑命令心安隱若有比丘修佛法者令生疑惑滅咸使眾人不復供養或有比丘若二若三已讀佛經便使命令求外道經法先自看者讚言善好是諸人等為魔所惑覆障惠眼深貪利養看諸外道書猶如群盲為誑所欺皆使令墮深坑而死舍利弗諸生盲人即是比丘捨佛无上道求外道經盡書誑人是惡魔深坑是邪道以上人語引經說又已下猶是上經文次第未盡已上文當義盡當就一切十二部經法辨邪正多少分齊已下就一切衣食等辨邪正多少分齊文當義當於一切道俗內實實不求一切好衣好食等者唯除兩人三人已外餘者一切皆悉普求一切好衣好食等盡為一切好衣好食等所誑墮於阿鼻大地獄等喻如一切盲人為誑人所誑墮坑而死一種相似已上人語引經說已下唯是經文說舍利弗如群盲人捨所得物欲詣大施而墮深坑我諸弟子亦復如是捨衣惡食而函逐大施求好供養以世利故失大智惠而墮深坑阿鼻地獄已下人語引經說又已下猶是上經文次第未盡已下上人語引經說已下准唯是經文說舍利弗是名佛法第一義門謂无憶想分別无此无彼而是癡人在大眾中說於邪見自以憶想分別教人此是佛法此是聖道如是癡人則為誹謗過去未來現在諸佛如是癡人名惡知識不名善知識舍利弗怨雖奮奪命但失一身如是癡人不淨說法千萬億刧為諸眾生作大衰惱是人癡冥覆佛菩提本心貪著還復熾盛相續不斷以貪著故往來五道无善逕路生死不斷是故舍利弗不淨說法者得罪極多亦為眾生作惡知識亦謗過去未來今佛舍利弗置此閻浮提眾生若人悉奪三千大千世界眾生命不淨說法罪多於此何以故是人皆破諸佛轉阿耨多羅三藐三菩提為助魔事亦便使下眾生於百千萬世受諸衰惱但能作傳縛不能令解當知是人於諸眾生為惡知識為是妄語於大眾中謗毀諸佛以是因緣墮大地獄教多眾生以邪見事是故名為惡邪見者已下人語引經說是故當知是人寧自以利刀割舌不應眾中大不淨說法如佛藏經第三卷減半已前說又明如大方廣十輪經第二卷滅減半已前文當佛滅度後第四卷過半已前文當一切諸佛皆悉普不能得度得一切眾生時義當佛滅度或一千年已後或一千五百年已後如餘卷第二大段初廣說文當已上人語引經說已下唯是經文說於諸世間當常行誹謗語剎利㫋陀羅婆羅門㫋陀羅壞亂佛法於我法中如而得出家常毀破戒作諸惡行而剎利婆羅門盡心供養已下人語引經說文當義當一切道俗莫問貴賤一種相似皆悉普不信一切聖人持戒比丘皆悉普盡時文當義當不信一切伽藍聚落外一切學十二頭陀持戒比丘皆悉普盡時文當義當不信一切伽藍聚落內一切少欲知足省事持戒比丘皆悉普盡時文當義當一向准唯純偏信一切破戒比丘一向准唯純偏說一向破戒比丘好一向准唯純偏供養一切破戒比丘一向准唯純偏守護一切破戒比丘一切向准唯純偽偏為一切破戒比丘作一切寺舍等時文當義當一向不信一切聖人持戒比丘及一切凡夫內一切持戒比丘一向准唯說一切聖人持戒比丘及一切凡夫內一切凡夫內一切持戒比丘惡一向不供養一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不守護一切聖人持戒比丘及一切凡夫內一切持戒比丘一向不為一切聖人持戒比丘及一切凡夫內一切持戒比丘作一切寺舍等時唯瞋唯罵准唯打准唯殺又三卷經從卷初發首明文當剎利㫋㫋陀羅婆羅門施㫋陀羅沙門㫋陀羅大臣㫋陀羅由一向准唯純偏信一切破戒比丘等一向不信一切持戒比丘等故文當先修善根今悉消滅乃至墮於阿鼻地獄等如大方廣十輪經第四卷過半已前說又明如大集月藏分經與雜阿含經難當王文當佛滅度一千年已後同第十卷內說文當法滅盡品文當義當由一切道俗說一切利根真聖及正見成就凡夫等是非好惡長短故令一切聖人一切利根正見成就凡夫皆悉普向他方盡准唯有不信一切佛法一切惡鬼神一切惡夜叉羅剎等在遍滿世界殺害眾生乃至下經文說文當四方惡王一時俱起破壞塔寺殺害比丘等者亦由不信一切佛法一切惡神一切惡夜叉羅剎等助之故又已上十二部經等十三段廣說竟又明何以故明文當義當一切利根空見有見眾生唯偏將一切剎利根空見有見眾生一切邪善佛法僧眾生斷思惡修善解行等作是一切利根真聖諸佛菩薩聲聞緣覺一切利根正見成就凡夫一切正善佛法僧眾生斷惡修善解行等作非唯瞋唯罵唯打唯殺等者皆悉普是何以故明一切利根空見有見眾生於一切七十種等所說一切佛法內莫問佛導一切凡聖俱得學不得學常一向准唯純偏選取順己情多順一切道俗情佛法學之但佛不順己情多不順一切道俗情佛法一切皆悉普不學之多者皆悉普稱一切道俗情所以得不被瞋不被罵不被打不被殺以前驗後說亦名以後正驗前邪說一切聖人一切利根正見成就凡夫但使佛導一切凡夫聖俱得學佛法莫問順己情不順己情順一切道俗情不順一切道俗情一切皆悉普學之多者皆悉普不稱一切道俗情所以准唯被瞋唯被罵准唯被被打唯被殺如上十三部經等說如大般涅槃經通上及下第卅一卷過半已後第卅三卷減半已前大方廣佛花嚴經十住品第六經住第七住十𢌞向品第一𢌞向等說又莫問一切請諸佛菩薩行位上下一切因果雖別會有少分相似義同以上驗下所以得知又亦名以一切違順多少所由果驗一切違順多少所由因說又上十三部經等亦名出一切利根空見有見眾生不解一切佛法邪正分齊一偈一句一字一分一豪毫之義又上十三部經等亦名法說已下喻說有三部經就四種喻說文當義當明一切道俗皆悉普不識一切佛法邪正分齊一偈一句一字一分一豪毫之義一部經說文當佛滅度一千年已後文當法師解說佛語萬不著一文當義當明一切道俗分別一切佛法是非邪正長短喻如一切盲人指天上日若大若小若寬若狹一種相似文當義當明一切道俗分別一切佛法是非邪正長短喻如一切聾人自言我聞天上說法之音一種相似文當不識聖人競共打罵驅遂逐令出不令得住如最如妙勝定經與多部經義同過半卷已後說一部經說文當義當佛滅度一千年已後如餘卷第二大段內廣說明一切道俗分別一切佛法是非邪正長長短自誑誑他一切道俗喻如一切誑人誑他一切盲人墮坑而死一種相似如佛藏經第三卷減半已前說一部經說義當佛滅度或一千年已後或一千五百年已後如餘卷第二大段內廣說文當義當明一切道俗分別一切佛法是非邪正長短喻如遣一切盲人識一切七寶同異一種相似如大方廣十輪經通上及下第五卷過半已後說乃至一切甚深大乘經破其偏空偏有偏學三乘偏執朋黨諍訟唯受應身少分純與己同邊順情惡魔等語不受違情他語他法等如上第一子段內說亦名以人驗法說又明此第九字子段與下第十子段相成第九子段由第十子段成第十子段由第九子段成所以第九子段內亦廣明第十子段內所說法又明何以故文當義當明一切邪見成就顛倒道俗內亦名一切利根空見有見眾生內或有人造經者或有人改他經文及義者或有真是佛經不上經餘錄者或有真是是佛經導道非是佛經者所以若依經部唯得依大部經多部經說大部經多部經各各盡一部義同若依經品唯得依大部經內品多品經說大部經內品多經各各盡一品義同若依經段唯得依大部經內段多段經說大部經內段多段經段各各盡一段義同不得依小部經少部經說各各或一句或兩句或三句說不盡一部義同不得依少部經內品少品經各各或一句或兩句或三句說不盡一品義同不得依少部經內段少段經說各各或一句或兩句或三句說不盡一段義同一者明如大般涅槃經第九卷過半已後說文當佛涅槃後諸惡比丘抄略是經分作多分能滅正法又下經文說恒河第一人文當不信大般涅槃經二者明如佛藏經第二卷滅減半已前說文當於說法者心多不信得聞如是佛所說經違逆不受而作是言此非佛說教語餘人第三卷滅半已前說文當三者於諸法中心疑不信大雲經第五卷內說文當不信大雲經以此文驗所以得知又於此段文義俱同內明不得慶廢大依小癈廢多依少若无大无多但使導道是佛經莫問大小多少俱唯得如說修行又明復須就所為眾生所依處說之時節驗之若多為一切利根空見有見眾生說若多就一切娑婆世界處亦名一切五淨滓世界處亦名一切五濁諸惡世界處說若多在佛滅度五百年已後佛滅度一千年已後時說又明若驗一切諸佛菩薩一切聖人一切正見成就凡夫返上即是十者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似唯見他一切惡以他一切善從一切惡皆悉普作惡解不肯唯見他一切善以他一切惡從一切善皆悉普作善解打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等說十一者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似唯偏或為自身或為一切出家在家眷屬等佛導道是一切凡夫一切令合受惡一切令合受苦皆悉普不肯自受之打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等說又明一切凡夫菩薩一切令合受惡一切令合受苦滅兩紙經文當菩薩發願受他打受他殺發願在於六師外道家生為他邪見不習其道等所以得不退菩提心次下第卅三卷滅減半已前文當具足煩惱未有斷者義當即是凡夫菩薩自驗自知有不退菩提心以不以種種苦行自驗如大般涅槃經說文顯易識又文當暴勢極惡義當即是十惡未斷菩薩不食香八萬四千刧空燒具肉身供養佛始得佛與受菩薩廿四戒等者皆悉普是一切凡夫菩薩一切令合受惡一切令合受苦如大方等陀羅尼經說文顯易識唯除不得受一切六師外道苦行法不在其限又明一切凡夫及一切凡夫菩薩一切令合受惡一切令合受苦如文當佛滅度後文當千佛百千萬億佛一切佛一切經一切菩薩皆悉普不能得度得一切利根空見有見眾生時文當菩薩聖人利根正見成就凡夫向他方及死後時一部經說文當有五百比丘自知犯戒不令受他信施返戒還俗從此已後常得值佛乃至得道如寶梁經說文顯易識一部經通上及下說文當五百比丘自知莫問一切善惡持戒破戒歸一切三寶等少氣多少常是惡賤極賊狗菩薩不令受他信施返戒還俗文殊菩薩讚難歎汝等不可數歸俗去心已定即得道如迦葉經說文顯易識一部經通上及下說文當義當佛道莫問一切善惡持戒破戒歸一切三寶等多多少常是謗佛謗法等一切惡魔出家人不在佛法內出家受他信施令其返戒還俗故如佛藏經說文顯易識一部經通上及上下說第三卷過半已後說盡第六卷文最廣說文當義當佛導噵莫門問一切善惡持戒破戒歸一切三寶等多少常是一切无慚愧僧等不能為說一切甚深大乘佛法唯遣為說一切生死流轉法如大方廣十輪卷經第七卷內說又明兩部經說文當出家破戒遠作出家得道因緣近復即得四部經說一倍返而復不道因緣近復即得一切三世諸佛大涅槃印之所印也與上四部經說一倍返而復不違何以故一者明由返戒還俗故得免受他一切信施乃至一切禮拜供養守護等罪二者明由出家復作得道因緣兩種普並行亦還俗亦出家即得具足與經文相當復是與己唯化純善无惡兩法相當如摩訶衍經論文當就蓮華色比丘尼說大集月藏分經與雜阿含經同第八卷滅減半已前說唯除得受一切道俗禮敬供養作當來佛者唯純得善无罪唯有打罵者得罪如法華經不輕菩薩品說又有道俗畏罪不受他一切道俗禮拜供養等者得羅罪轉多何以故由滅佛法故如佛藏經說文顯易識而復難識要須解出始知又有道俗畏食用眾僧飲食財物得罪相教普布施令其一切道俗俱得共用无罪者得罪轉多何以故明滅一切道俗於一切三寶各各別布施一切畏罪境界法皆悉普滅盡故如律文等說明此寺僧物不得彼寺僧用等者皆悉普是十二者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似唯偏或為自身或為一切出家在家眷屬等佛導道是一切凡夫一切令合捨好一切令合捨樂皆悉普不肯捨與他打他殺他乃至被打被殺不退餘如上第一字子段內第九子段內十三部任經等說又明一切凡夫及一切凡夫菩薩一切合捨好一切合捨樂文當若多受名利疾滅佛法文當義當若捨一切麁衣惡食而逐大施會求一切好衣好食等者皆悉普不免隨墮阿鼻地獄深坑唯除一切聖人一切利根正見成就凡夫不在其限文當乞食比丘乞得麁衣惡食若覺有貪心亦不得受之如佛藏經第三卷滅減半已前第四卷過半已前等說又文當義當菩薩由發願不受一切現在樂等故所以得不退菩提心如大般涅槃經說文顯易識又文當發願寧以利力曰刀自割其舌不為他不淨說法如佛藏經第三卷滅減半已前說又文當義當利根眾生乃至未得法忍已來一者願不受一切身二者願不作一切種種人主三者願不作一切不下賤眾生四者願不作一切斷事人若作足是等必當不免墮阿鼻大地獄等如大方廣十輪經第六卷末說唯除一切行法行王亦名一切國王亦名一切灌頂剎利王亦名一切人王如餘卷第一大段內廣說不定若能得依一切第三階佛法住持一切三寶住持一切國土利益一切眾生不在其限如大薩遮尼乾子經第三卷過半已後大方廣十輪經第六卷末等說十三者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一切種相似唯偏不學唯偏將一切七十種等所說一切別惡佛法一切七十種等所說一切別邪善佛法作非打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等說十四者明一切第三階佛法內一切利根空見見有見眾生莫問一切大乘小乘一種相似唯偏學唯偏將一切七十種等所說一切別好佛法一切七十種等所說一切別正善佛法作是打他殺他乃至被打被殺不退餘如上第一子段內第九子段內十三部經等說十五者明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似於內有三義一種相似一義唯偏歸一切三寶偏度一切眾生偏斷一切惡偏修一切善解行等无量无邊多少淺深寬狹長短一種相似其見佛學解行等多少分齊驗之所以得知一義明謗佛謗法通凡夫及聖多少淺深輕重寬狹長短一種相似以其受阿鼻地獄等苦時節多少分齊驗之所以得知一義明當當已一切出世間根機藥病一切惡斷不可得一切善學不可得成就一種相似以其斷惡修善見佛多少分齊刧數多少分齊驗之所以得知一者明通上及下一部經及依餘經等說文當義尚當明利根空見眾生已得見佛已能讀得十二部經已能誦得十二部經文當分別解說義當已能講得十二部經已能斷得欲界煩惱已能坐得四禪猶不識佛不識正法猶捨一切空見不能得猶不免謗佛謗法通凡及聖墮阿鼻大地獄等又於一切利根空見眾生內一切破戒不破見正見成就空見一切一闡提初入地獄即能得還生善根多少分齊准唯如扴上士土一種相似一切戒見俱破邪見成就空見一闡提臨欲得出地獄始能得還生善根多少分齊如十方世界所有地土一種相似以一切利根空見眾生驗一切利根有見眾生邪正多少分齊亦如是類以可知准依大般涅槃經大方等陀羅尼經等說文顯易識復准依大方廣十輪經第五卷減半已前等說如下一切第三階佛法內說亦名以果驗因說二者明通上及下一部經及依餘經等說文當義當明利根有見眾生文當從初發心已來文當菩薩摩訶薩多見諸佛若无量无邊百千萬億即於爾許佛所學布施持戒忍辱精進禪定智慧等猶不識佛不識正法猶捨一切有見不能得猶不免謗佛謗法通凡及聖墮阿鼻大地獄等八大地獄於一一地獄內各各滿三千六百萬億成歲此方刧盡復更轉向十方八大地獄十方一方刧盡復轉向一方十方刧盡次第遍謗佛謗法罪猶不盡不免還復轉向此方八大地獄此方刧盡復至十方他世界生畜生中受破法罪業苦如地獄中說唯除佛已外一切聲聞緣覺更无有能得知其受地獄苦時節多少分齊者以一切利根有見眾生驗一切利根空見眾生亦如是類以可知如摩訶衍經泥梨品兼依下佛藏經少分一句兩句等說三者明文當義當明利根有見眾生從眾眷屬已滿六百四萬億猶不識聖人不識正法猶捨一切有見不能得猶不免謗聖人謗法墮阿鼻大地獄等八大地獄於一一地獄內各各滿三千六百萬億歲此方刧盡復更轉向十方八大地獄十方刧盡遍謗聖人謗法罪猶不得滅還更不免轉入此方八大地獄此方刧盡復至十方他世界畜生中受破法罪業苦如地獄中說唯除佛已外一切聲聞緣覺更无有能得知其受地獄苦時節多少分齊從地獄出得受人身五百世常從生而盲從盲身從後得值佛十方万億歲晝夜六時如救頭然懺悔謗聖人謗法通凡及聖罪猶不得滅不免還墮阿鼻大地獄等從此已後次第復更得值九十億佛始得免墮地獄猶未得順忍何況道果始佛藏經第三卷滅減半已後兼依上摩訶衍經少分一句兩句等說四者明文當義當明利根有見眾生從得免一切三除塗已得後學當當學已一切出世間根機藥病學斷一切惡學脩一切善復於无盡量无量邊諸佛斷菩薩所學捨一切有見猶不能得學一切空解猶不能得成就從此已得後復後於无量无邊聖人及於无量无邊利根真善正見成就凡夫所學捨一切有見猶不能得學一切空解猶不能得成就從此已後復就无量无邊刧以數无量无邊諸佛菩薩及數无量无邊聖人等復於爾許无量无邊諸佛菩薩及於爾許无量无邊聖人等所學捨一切有見猶不能得學一切空解猶不能得成就以一切利根有見眾生驗一切利根空見眾生亦如是類以可知如佛藏經第三卷過半已後大方廣十輪經第六卷滅減半已前思益經文顯易識等說五者明文當義當利根有見眾生一切大乘法聚一切小乘法聚各各以能誦得八萬猶不識真學十二頭陀比丘不識正法猶捨一切有見不能得猶不免瞋他學十二頭陀比丘文當墮地獄義當墮阿鼻大地獄等從地獄出已後復受羅剎身乃至賢刧千佛出世盡始得免受羅剎身如大集月藏分經說與雜阿含經同文顯易識又此段內一切利根空見有見眾生文當義當就相作不定者說所以得相作亦如上如下段說不同上初段內一切利根空見有見眾生或暫相作位判當常不相作輕重常別不得相作亦唯上得相作亦義推說十六者明一切第三階佛法內一切利根空見有見眾生作行壞體壞戒見俱破顛倒九種人一切十七種等最大惡文當義當一切三乘根機眾生莫問一切大乘小乘一種相似皆悉普常一向唯純普學一切空有普歸一切三寶普度一切眾生普斷一切惡普修一切善解行等八種最大善具足於四天下无與等者猶是佛所不攝眾生已上人語引經說已下唯是經文說除此已外皆名行道亦名惡福田依止无慚愧僧於佛法中亦名死尸是可棄者於僧大海亦名不成法器彼非我弟子我亦非彼師復有不成法器者已下人語引經說亦是次第經文說文當義當大敬信三寶大持戒大不自是非他大有解行大發菩提心大懺悔大斷惡大度眾生以能度得九十五種異學六師外道迴心向於涅槃非一轉輪聖王所有一切功德之所能及以一轉輪聖王所有一切功德不及故所以得知於四天下內无有與等者已上就一切普善眾生說已下就一切別惡眾生說如經說如大方廣十輪經第五卷滅減半已前說何以故明八種最大善具足眾生由不被他滅己佛法不被他打不被他殺等故所以能得不滅他佛法不打他不殺他得學佛法至爾許但使破他滅己佛法被打被殺不能得不滅他佛法不能得不打他不能得不殺他等故所以不免亦常是一切阿鼻地獄眾生構攝此段以善驗惡善而有惡以惡驗善惡而有善等說亦名以人驗法說又明於上一切十六子段等內初十五子段於一切別真別正佛法內一向條然別根機喻如一切山谷高下常別常起一切兩重惡一者明常起一切貪瞋煩惱等无量无邊喻如一切噎病及一切大小便不通眾生常學多食多飲𫌏漿水一種相似二者明常起一切謗佛謗法通凡及聖邪見煩惱等无量无邊喻如常遣一切生盲眾生學一切盡書作一切田種作一切工功與巧興生敗冥販買及征陣等一種相似後一子段於一切於別真別正佛法內一向普根機喻如一切地上一切眾生一切草木等各別不同常起一切兩重惡一者明常起一切貪瞋煩惱等无量无邊喻如一切噎病及一切大小便不通眾生常學多食多飲𫌏漿水一種相似二者明常起一切謗佛謗法通凡聖及及聖邪見煩惱等无量无邊喻如常遣一切生盲眾生學一切書盡作一切田種作一切工功與巧興生敗販買及征陣等一種相似如上一切十六子段內所說經及十三部經等說又明於上一切十五子段一向別根機內第一第第二第三子段若就一切外緣一切內因說唯是一段第五子段明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似一者明莫問一切大乘小乘於阿鼻地獄等已前作一切惡多少分齊一種相似二者明莫問一切大乘小乘從阿鼻地獄等得出已後於一切出世間正解正行俱學不可得徹到成就一種相似又第十五子段內第十六子段內唯明一切第三階佛法內一切利根空見有見眾生莫問一切大乘小乘一種相似一者明從初發心已來唯偏歸一切別真別正三寶唯偏度一切別真別正眾生唯偏斷一切別真別正惡唯偏修一切別真別正善解行等无量无邊多少淺深寬狹長短分齊二者明從初發心已來唯偏歸一切別真別正佛法內一切普真普正佛法三者明上第十五第十六兩子段內一切惡者非是明作一切十惡一切四重五逆等惡唯是明一切別真別正佛法內一切邪錯不學不知惡多少淺深寬狹長短分齊又明一切第三階佛法內一切利根空見有見眾生行壞體壞戒見俱破轉倒九種人一切十七種等一切最大惡眾生莫問一切大乘小乘一種相似從无始世界未得聞佛法已前已有少分以果驗因說從得聞佛法已來一者明常唯欲得學一切利他行如上第十五第十六兩子段內五部經等說二者明常唯欲得重治罰一切道俗及一切眾生瞋他罵他打他殺他如上第九子段內十三部經等說又如阿育王經說文顯易識乃至唯欲得學一切羅剎王重治罰一切眾生法治罰一切眾生三者明常唯欲得不受一切惡一切苦唯欲得受一切好一切樂如上第四第十一第十二第十三第十四五子段內說何以故一者明一切最上上別好名聞利養一切最上上別好寺舍一切最上上別好僧正一切最上上別好法王等一切最上上別好師僧一切最上上別好弟子一切最上上別好從徒眾一切最上上別好檀越等唯田由上一切利他行唯由上能得重治罰一切道俗唯由上能得唯偏捨一切惡一切苦唯偏受一切好一切樂等故所以得之知乃至一切在家人亦如是類以可知二者明唯由識一切七十種等所說一切惡佛法一切邪善佛法所以得唯簡刧却一切惡等盡所由義三者明唯由識一切七十種等所說一切好佛法一切正善佛法所以得唯選取一切好等盡所由義又上十六子段訖盡比盡此段皆悉普名為廣明一切利根空見有見眾生行壞體壞戒見俱破顛倒九種人一切才七十種等一切最大惡眾生乃至未得法忍已來唯得學一切等第三階佛法內一切无名相法坐禪一切佛性佛想一切菩薩行想一切當來佛想一切真佛想等不在其限所由義如餘卷第二大段末第一何以故一切廿四段等一切普真普正佛法內說一交了本邦所傳三階佛法卷第四本邦所傳三階佛法卷第四聖語藏本底本興聖寺本並釋淨土群疑論探要記集錄引文以校異冠註對校興興聖寺本指興釋淨土群疑論探要記所引集錄本文略符前卷例如
