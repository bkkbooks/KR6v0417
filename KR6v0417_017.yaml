body:
  text: 第二段明一切第二階佛法內一切利根衆生位判常有一切兩種衆生一者明莫問一切凡聖一切大乘小乘一種相似皆悉普是一切一種戒見俱不破正見成就衆生何以故明如增一阿含經第草六卷説文當明一切釋種為護戒故寧受流離王殺不殺他等者皆悉普是又亦名已下此段從後破戒不破見經文驗之所以得知二者明莫問一切大乘小乘一種相似皆悉普是一切一種破戒不破見正見成就凡夫衆生何以故明知如大方廣十輪經第三卷過半已後廣説第五卷減半已前略説文當作五逆罪作四重罪誹謗正法毀呰賢聖十一種最大根本重罪唯在一身兩身懺悔即得罪滅即得三乘果文當破戒不破見又如大般涅槃經第九卷草種喻所喻法內明唯除一闡提已外餘一切作一切五逆罪作四重罪等但使得間得見大般涅槃經即得罪滅即能得發菩提心又五百婆罪羅門由不信由被殺墮地獄暫入即得生善處又利根空見一闡提暫入地獄即能得還生善根處又如一切大乘小乘經律論等説文當一切利根空見有見六師外道等初時不信佛謗佛謗法後時回心即得出世間聖道果又如佛名經等説文顯易識聞一一佛名即得減滅無量無邊罪或卌九日或草五日懺悔即得罪滅又如大方等陀羅尼經説文顯易識或七日或四十九日或百日懺悔即得罪滅即得多見無量無邊諸佛菩薩等又如寶雲經説文顯易識或一日或二日或三日或四日或五日或六日或七日心心相續念佛觀佛九種無窮無盡福德智惠善根威力即得見佛即得生淨土又如觀佛三昧經等説文顯易識未得自讀經見傳聞他説或食用三寶飲食財物或暫時觀佛或暫時懺悔即得罪滅又如大方廣十輪經第五卷滅減半已前説文當義當或一身或兩身或三身懺悔不斷相續即得羅罪滅即得三乘道果又如大般涅槃經説文顯易識摩訶衍經徑耳品等説但使得聞大乘經一徑耳者即得常一向畢竟永不生一切四惡趣等者一切皆悉普是一切破戒不破見正見成就凡夫衆生何以故一者明文當以上大方廣十輪經內少時懺悔斷惡即得罪滅即得出世間聖道果文當破戒不破見驗之所以得知餘一切少時懺悔斷惡即得羅罪滅少時在地獄即得出等者皆悉普是一切利根空見有見破戒不破見正見成就衆生二者明以輕驗重説文當利根一種相似空見一種相似初入地獄即能得還生善根餘一切惡等以輕驗重説亦如是三者明由利根從無始世界已來未得聞佛法已前已有少分及得聞佛法已來若得遇一切正見成就徹到緣即能得學一切正善不惜身命財等盡乃至被打被殺不退徹到成就若得遇一切邪善徹到成就緣即能得作一切邪善不惜身命財等盡乃至被打被殺不退徹到成就常一切邪正兩種根機並有何以故明莫問一切世間法及一切佛法皆悉普一種根以相似但使有所作業唯有能得捨一切身命財等盡乃至被打被殺不退者始是得興與作一切善惡等業徹到成就分齊相當一者明發願受他打受他殺始是得興與不退菩提心法相當如大般涅槃經滅兩紙發願不退菩提心法內説文顯易識二者明若能得七七日日食一胡麻一米一豆等不退如此無益之者苦尚能受之何況為求佛法文當具足煩惱未有斷者義當即是凡夫菩薩以能得為求佛法等故布施願頭自體目髓𮪱者始是能得不退菩提心略引一兩餘者如經説如大般涅槃經第卅三卷滅減半已前説三者明唯有能得捨一切身命財等盡始得與後際等如勝鬘經滅減半卷已前説四者明先遣捨命訖不死然後為説法即後得道如經律異相所引經説以此文驗所以得知一切利根空見有見衆生莫問善惡多少由常有邪正兩種徹到成就根機並有故所以亦得一切利根正見成就衆生攝所以亦得是一切利根邪見成就衆生攝如大般涅槃經文顯易識大方廣十輪經第五卷減半已前等説又明於上一切少時懺悔少時斷惡即得罪滅等內位判常有一切兩階一者明少時懺悔少時斷惡即得罪滅即得聖道果二者明唯得滅障一切人天果報罪滅故依經得證驗猶未是得滅一切謗佛謗法通凡及聖罪滅故依經得證驗此段以果驗因以因驗果説何以故明得滅一切謗佛謗法通凡及聖罪時節分齊一者明若準依佛藏經第三卷滅減半已後説唯有過十萬億歲在於佛所懺悔已後復得值九十九億佛已去方始得滅罪證驗二者明若準依大方廣十輪經第六卷過半已前説唯有得得法忍已去方始依經得滅罪證驗若準依大般涅槃經文顯易識唯有於凞連恆河沙佛所修道始得免謗佛謗法等亦如是類以可知又明已上少時懺悔少時斷惡修善即得罪滅或即得常生一切善處一切正見成就佛弟子家等或即得聖道果等一切破戒不破見正見成就凡夫夫衆生多少分齊準依大般涅槃經説文顯易識唯與扴上土一種相似又明已上以一切輕罪驗一切重罪所以得知一切輕罪者即是一切破戒不破見正見成就凡夫衆生一切重罪者即是一切戒見俱破邪見成就凡夫衆生何以故明一切利根一種明一切空見有見一種明作一切五逆罪作一切四重罪誹謗一切正法毀呰一切賢聖一種明墮一切阿鼻地獄等一種明得見一切三寶度一切衆生斷一切惡修一切善解行等多少分齊一種而得罪有易滅難滅不同所以得知一切罪易滅者即是一切破戒不破見正見成就凡夫衆生喻如夏天然大火莫問多少俱得熱徹倒到一切罪難滅者即是一切利根空見有見衆生行壞體壞戒見俱破顛倒九種人一切十七種等一切最大惡衆生喻如冬天盛寒一切六種冷具足衆生莫問然大火多少未可即得大熱徹倒到又已下以一切重罪驗一切輕罪返上即是類以可知又明一切道俗亦名一切利根空見有見衆生分別一切佛法是非好惡長短等者得罪過於殺三千大千世界滿內衆生如佛藏經第三卷減半已前説唯除一切聖人一切利根正見成就凡夫不在其限如摩訶薩摩耶經最妙勝定經與多部經義同文當佛滅度後一千年已前佛藏經第四卷第等説唯除最大鈍根衆生兩種啞羊僧不在其限如大方廣十輪經第二卷過半已後第五卷減半已前等説又明一切道俗亦名一切利根空見有見衆生與一切俗人共作齊講者唯有在一切俗人家作齊唯得善無罪若在寺上作齊莫問倍僧多少絡終久會是不免損僧何以故明已上人語引經説已下唯純是經文説善男子未來世中諸比丘等於所住處自共昌唱制防禁四方僧令作食限或一日十日或五四三日乃至一食是諸比丘命終墮地獄餓鬼畜生受苦無窮人語準經義推説明受苦無窮者如下此段內説復有比丘若沙彌以衆僧物如似己有隨意取用非時食敢噉或與親友是諸比丘沙彌乃至千佛出世永不聞法常在三塗無懺悔處若共此人同住居止羯磨布薩所作法事悉不得成皆當得罪善男子若有具犯四重五逆易救可懺悔若使侵損衆僧一豪毫一粟非時食敢噉自在取與永沈苦海終無出時人語唯準經義推説明永沈苦海終無出時者由受罪時節多故噵終無出時亦有得出時與大涅槃經第十卷文當明有餘義無餘義文當一切不定一切種相似現世得諸衰惱若共此人同住居止日夜得罪已下人語引經説如像法決疑經典與多部經義同過半已後説又明一切道俗亦名一切利根空見有見衆生打一切破戒比丘得罪過於出一萬億佛身血何況打一切持戒比丘如餘卷第二大段三階治罰一切道俗法內廣説如大集月藏分經與雜阿含經同第八卷過半已後説又明一切道俗亦名一切利根空見有見衆生以前法説驗後喻説唯為證知一切道俗並有就押由油殺蟲作喻白日別殺蟲五萬𭽎至滿千歲文當唯興與沽酒家一日一夜罪等乃至一切道俗餘酒罪亦如是類以可知一切出家人唯除常斷酒一切在家人唯除或能得常斷酒或能得月別有六介齊個齋日六日受八戒作齊不飲酒者於一切未來世亦常得一向畢竟永免一切飲酒罪又明一切道俗亦名一切利根空見有見衆生以前法説驗後喻説唯為説知一切道俗並有亦就押油殺蟲作喻日別殺蟲五十萬𭽎至滿十歲文當唯與淫女舍一日一夜罪等乃至一切道俗淫欲罪亦如是類以可知一切出家人唯除常斷淫欲一切在家人唯除或能得常斷淫欲或能得月別有六個齊日六日受八戒作齊不行淫欲者於一切未來世亦常得一向畢竟永免一切淫欲罪又明一切道俗亦名一切利根空見有見衆生以前法説驗後喻説唯為證知一切道俗並有亦就押油殺蟲作喻日別殺蟲五百萬斛至滿千歲文當唯與居屠兒舍一日一夜罪等乃至一切道俗殺生罪亦如是類以可知一切出家人唯除當斷殺生一切在家人唯除或能得常斷殺生或能得月別有六今個齊日六日受八戒作齊不殺生者於一切未來世亦常得一向畢竟永免一切殺生罪如大方廣十輪經第四卷過半已前説兼少分依餘一切經律論等説又明一切道俗亦名一切利根空見有見衆生一切出家人唯除呵貴嘖門徒第弟子一切在家人唯除呵貴嘖眷屬宮官府呵貴嘖百民已外一切道俗唯除於和僧衆內治罰一切破戒比丘已外莫問馬為住持佛法不為住持佛法有經文無經文但使説一切三寶説一切大乘小乘佛法是非好惡長短以前法説驗後喻説亦就押油殺蟲作喻日別殺蟲五千萬斛至滿千歲唯與一切道俗説一切三寶説一切大乘小乘佛法是非好惡長短一日一夜罪等如大方廣十輪經第四卷過半已前説又明一切道俗亦名一切利根空見有見衆生以前法説驗後喻説亦就押油殺蟲作喻日別殺蟲五千萬斛至滿千歲唯與一切道俗打一切出家人食用一切三寶飲食財物一日一夜罪等如大方廣十輪經第四卷過半已前説又明已上明一切道俗得罪多者唯就一切第三階佛法內一切利根空見有見衆生行壞體壞戒見但俱破顛倒九種人一切十七種等一切最夫大惡道俗説亦名唯就佛滅度一千年已後一切利根空見有見衆生行壞體壞戒見俱破顛倒九種人一切十七種等一切最大惡道俗説何以故則明由惡多復更作惡故喻如冬一天大盛寒六種險冷具足衆生復更受用一切冷物一種相似如像法決疑經與多部經義同大集月藏分經與雜阿含經同等兩部經文當佛滅度一千年已後大方廣十輪經文當佛滅度後文當一切佛不能得度得一切衆生時義當佛滅度一千年已後等説又明一切行法行王亦名一切國王亦名一切灌頂剎利王亦名一切人王如餘卷第一大段內廣説於一切國土所有一切征戰定之處常先遣官府典當一切寺舍莫聽一切軍衆損一切三寶所得功德無量無邊準依大方廣十輪經第四卷過半已後第六卷末大集月藏分經第八卷一卷通上及下説第十卷兩段偈頌等説三者明一切第二階佛法內一切利根戒見俱不破破戒不破見正見成就衆生莫問一切大乘小乘厭一切惡求一切好一種相似何以故一者明厭惡寧自殺身如律文等説文等説文顯易識二者明如增一阿含經第草六卷説文當明五百釋種女寧受流離王割截身體義當則是寧受流離王殺畢竟永不肯共賤生流離王活又明一切第二階佛法內一切利根正見成就一切小乘根機衆生唯學一切自利行何以故一者明一切利根正見成就衆生唯求一切出世間好不求一切世間好所以唯須常學一切利他行莫問一切自他唯純益無損二者明以得一切出世間因正解正行少分成就如勝鬘經過半已後説喻如七日嬰兒雖不能得見日輪