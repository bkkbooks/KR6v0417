取説文當佛滅度後一千年已前猶有得道人一千年已後無有得道人作證迦葉經第一卷減半已前文當佛滅度五百年已後第二卷四天下一切人皆悉普出家盡皆悉普學一切無名相法坐禪盡八部經等如餘卷內説第六段大薩遮尼乾子經第四卷減半已後説又明已下猶是上第四段義未盡由文廣故所以回之在後説如上第二大段內説者如餘卷第二大段初説大薩遮尼乾子經第三卷末説大方廣十輪經第四卷過半已前説如上第二大段內説者如餘卷第二大段初説又兼依餘經説者兼依餘卷第一大段內八部經等説一者明二者明大集月藏分經第一卷過半已後第十卷內等説如上第二大段內説者如餘卷第二大段初説大方廣十輪經第三卷過半已後第四卷過半已後説與上大薩遮尼乾子經第三卷末後説同又明一切道俗莫問貴賤一種相似從子注已下是真沙門一段經如大薩遮尼乾子經第三卷過半已後説子注已下皆悉普共濡語乃至禮足第等大方廣十輪經第三卷過半已後第四卷過半已後第五卷初偈頌內等説不作一切十惡如大薩遮尼乾子經第三卷末等説一切草六種一切阿鼻地獄惡等如上第三大段説者是從莫問一切善惡乃至何以故已來如大薩遮尼乾子經第三卷過半已後乃至卷末及第四卷等大方廣十輪經第三卷過半已後第四卷過半已後等説從何以故已下一者明大薩遮尼乾子經第三卷過半已後説二者明大集月藏分經第一卷過半已後説三者明四者明大方廣十輪經第二卷滅減半已後第五卷減半已前説又明一切道俗莫問貴賤一種相似此段返前段即是所以更不須引前段經文作證一者明二者明三者明四者明五者明六者明七者明大方廣十輪經第四卷過半已前文義具足説過半已後説盡第六卷已來説者皆悉普是又明上兩段一切道俗莫問貴賤一種相似大方廣十輪經七卷雖復明種種佛法非一唯是為明上兩種義故説之如餘卷上第一大段內八部經等説文當義當佛滅度一千年已後或盡一部説或不盡一部説或盡一卷等説或不盡一卷等説亦如是類以可知又明於佛在世及佛滅度後一千年已前或就根機説或就時説亦有或盡一部説或不盡一部説或盡一卷等説或不盡一卷等説多在一切甚深大乘經部內説文隱難解所以不説之文當義當佛滅度一千年已後多者與一切甚深大乘經別部説文顯易識所以偏説之又明何以故明一切第三階佛法內一切利根空見有見衆生如上第四段由文廣故回之在後法內説者如上兩段又明一切道俗莫問貴賤一種相似初段內説如下草四段法內説者如下一切草四段等一切普真普正佛法內説一者明二者明餘卷內説三者明大集月藏分經廣明離十惡文顯易識大薩遮尼乾子經第三卷末廣明離十惡大方廣十輪經離一切四重一切五逆第五卷減半已前經文略説唯道犯根本重罪出由懺悔得滅者是離一切十惡第七卷內廣説一切草六種一切阿鼻地獄惡等及佛藏經如上第三大段一段説者是四者明如餘卷內説五者明大集月藏分經第七第八第九卷通上及下多卷灌頂經雜類神呪經文顯易識等説舉非明是就返惡成善説六者明如迦葉經第二卷內明無名相法文義最廣佛藏經一部通上及下俱廣明一切無名相法第一卷內文義最廣説第四卷內略説不淨觀大方廣佛華嚴經於上不淨觀五種惡境界內一切四念處略説一切苦集二諦略説一切一十二因緣廣説如十地品內第四地第五地第六地第等説大般涅槃經於上不淨觀五種惡境界內一切苦集二諦一切七漏一切十想等俱廣説文顯易識七者明八者明如餘卷內説又於子注內明七識不受苦樂非涅槃自因唯有如來藏受苦樂是涅槃因喻如伎兒作種種伎量如楊楞伽經説文顯易識勝鬘經過半卷已後説文當於此六識及心法智等是九者明十者明如餘卷內説十一者明大方廣十輪經第三卷過半已後説大方廣佛華嚴經明法品初過一段長行及偈頌已後長行內説十二者明大方廣十輪經第三卷過半已後説寶雲經文顯易識十三者明大方廣十輪經第三卷過半已後説十四者明如餘卷內説十五者明大方廣十輪經第五卷過半已後説十六者明十七者明十八者明十九者明草者明已上五段大般涅槃通上及下第卅一卷過半已後第卅三卷減半已前大方廣十輪經第五卷減半已前等説俱導噵一切種種惡衆生內一切種種好衆生內多有一切菩薩摩訶薩作之多有一切三乘根機衆生或一身兩身得出世道果以此文驗所以得知又如此段上説學一切無名相法觀一切衆生作一切佛性作學一切菩薩行作一切當來佛作一切真佛想等經文內皆悉普不見導道滅一切種種惡衆生內一切種種好衆生內一切利根真聖及一切利根正見成就凡夫九種人一切正善佛法僧衆生斷惡修善解行等故以此文驗所以得知草一者明像法決疑經與多部經義同過半卷已後説説觀佛三昧經文顯易識草二者明大集月藏分經第八第九卷通上及下有多卷説一切三寶一切國土等皆悉普付囑一切天龍八部等遣守護之像法決疑經與多部經義同減半卷已前説文當布施畜生一口餘食勝過供養養十方諸佛等無量無邊何以故內一者明不識一切惡衆生一切善衆生不識一切邪善衆生內一切正善衆生一切善衆生內一切惡衆生一切正善衆生內一切邪善衆生如大方廣十輪經第五卷減半已前説莫問一切善惡持戒破戒皆悉普名一切破戒衆生亦名一切利根空見有見衆生如上第一大段內釋二者明如餘卷內説三者明四者明大集月藏分經第八卷過半已後第九卷減半已前説五者明如餘卷內説六者明如餘卷內説草三者明大集月藏分經及於大集月藏分經第十卷末一切偈頌已後長行內説大集月藏分經文當佛滅度後第二五百年禪定牢固迦葉經文當佛滅度後第二五百年四天下人一切皆悉普出家盡一切皆悉普學一切無相三昧坐禪盡大集月藏分經文當佛滅度後第三五百年多聞牢固何以故內一者明如餘卷第一大段內八部經此卷上第一大段第九子段內十三部經等説二者明如律文等説文顯易識三者明如增一阿含經木串子經等説文顯易識草四者明像法決疑經與多部經義同大集月藏分經如餘卷內説何以故已下像法決疑經與多部經義同過半卷已後説大般涅槃經第草六卷第八功德內説像法決疑經與多部經義同近卷初説大般涅槃經如餘卷內説文顯易識又明人集録亦名驗一切第三階佛法得通所由法一卷一者明由兩卷共作一卷故所以得少分稱一切道俗情盡得少分説一切第三階佛法文義具足盡所由義二者明由與一切道俗少分通難故所以得不滅所由義三者明由與一切道俗少分驗文驗義故所以得如説修行所由義四者明由出一切第三階佛法文義廣略不即不離同而不同所由義五者明由令一切道俗少分得識一切第三階佛法多少淺深寬狹長短分齊所由義又此上五義就一卷從首至末堅竪説段段內莫問有文説無文説俱有五義具足又此上五義就一卷從首至末橫説義別不同分齊任自依文驗取又明求一切善知識度一切衆生唯有常與一切衆生同行第一常隨喜第二常見第三常聞第四常求第五一者明與一切衆生八戒行等同行一日一夜身口意等一切不相捨離二者明與一切衆生五戒二百五十戒行等同行盡形身口意等一切不相捨離三者明與一切衆生菩薩戒行等同行乃至成佛三大阿僧祇却劫身口意等一切不相捨離如學持戒同行既爾乃至學餘一切行同行亦如是類以可知唯除同行衆法治罰使處別不同者不在其限又明常與一切衆生同行一切五戒因淺深分齊階別不同如大方廣佛華嚴經賢首菩薩品明得見一切諸佛菩薩光明所由義內説又明常與一切衆生同行乃至成佛三大阿僧祇却劫身口意等一切不相捨離多少淺深寬狹長短分齊文義具足如大方廣佛華嚴經十地品初地十大願第八願內説又明此一卷人集録經文內唯除減五十字是人語已外餘者皆悉普是經文或有人語引經説者或有唯是經文説者一交了
