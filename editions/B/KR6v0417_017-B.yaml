易識廣明捨上學下錯義當即一切第一第二兩階佛法是何以故明以一切第三階佛法內一切利根空見有見眾生捨下學上錯驗之所以得知如大方廣十輪經第五卷末第六卷初文當廣明一切利根空見有見行壞體壞戒見俱破顛倒一切三乘根機眾生捨下學上錯亦如此段前段內說又明一切三階佛法一者明一切第一階佛法唯見有大乘名字不見有小乘名字二者明一切第二階佛法經文說三乘名字者多如大般涅槃經第卅三卷過半已後大集月藏分經與雜阿含經同第十卷末第等說亦有三乘名字如阿含經迦葉比丘不肯受佛勸捨一切十二頭陀法卷內說三者明一切第三階佛法經文說世間名字者多如大如大般涅槃經第卅三卷過半已後文當世間之義為一闡提說者是又如勝鬘經減半卷已前說文當无聞非法眾生以人天善根而授與之者亦是亦有三乘名字如大方廣十輪經通上及下第六卷近初說又明一切三階根機眾生若學一切三階佛法一一階根機眾生各各皆悉普須學一切三階佛法盡若一切第一階根機眾生學一切三階佛法一切三階佛法皆悉普得最大深行之若一切第二階根機眾生學一切三階佛法一切三階佛法皆悉普得次深行之若一切第三階根機眾生學一切三階佛法一切三階佛法悉皆普唯得最大淺行之明一切上根普學如一切甚深大乘經等說文顯易識文當明一切真應俱行等者皆悉普是明一切下根普學如大方廣十輪經通上及下第二卷初減半已前說又明從此已下餘卷內有文說又明一切利根正見成就眾生常有一切六階一者明二者明一切第一階佛法內一切聖人菩薩能作種種身如法華經觀世音菩薩大方廣十輪經第一卷內地藏菩薩大般涅槃經第卅一卷過半已後等說文當明菩薩能得作種種身利益一切眾生等者皆悉普是三者明如大方廣佛華嚴經十地品初地文當刧盡火中菩薩地持論文當明種姓菩薩未免入地獄文顯易識未曾有經文當明畜生說法文顯易識於一切地獄內等得聞諸佛菩薩說法者如一切甚深大乘經等說文顯易識四者明如四阿含經戒律等說文顯易識如一切三階佛法內文顯易識五者明如大方廣十輪經第三卷過半已後廣說具足列出五逆四重誹謗正法毀呰賢聖十十一種根本重罪第五卷減半已前略說文當唯導道犯根本重罪六者明如摩訶衍經泥梨品佛藏經第三卷徃古品大集月藏分經大乘小乘各各已誦得八萬大方廣十輪經第五卷減半已前大般涅槃經善星比丘如上第一大段第十五子段內五部經第等說如一切三階佛法所說經等說者如彌勒佛初成佛三會說法所度眾生等者皆悉普是如餘卷第一大段明一切利根正見成就一切一乘根機菩薩法內法說大般涅槃經等說者等取大方等陀羅尼經又文顯易識大方等陀羅尼經所說一切惡一切邪善佛法多少分齊亦與大般涅槃經多少分齊一種相似又大般涅槃經總說大方等陀羅尼經別說又明從此已下餘卷內无文說又明上一切利根三乘根機眾生皆悉普道少分正見成就者喻如一切兔馬入水淺深分齊一種相似喻如一切七日嬰兒不見日輪一種相似如大般涅槃經說文顯易說識如勝鬘經過半卷已後等說又明一切利根空見有見眾生由從无始世界得聞佛法已來乃至得值无量无邊三寶等已來常唯認上一切利根六階正見成就眾生一切利根正見成就果由利根故莫問邪正但使得見佛聞法𢌞心即得道常一向不認一切第六階一切利根空見有見眾生一切邪見成就因由利根故一切惡斷不可得一切阿鼻地獄等苦受不可盡一切當已根機藥病一切正解一切正行學不可得成就如餘卷第一大段第十五子段內五部經等說又明從此已下餘卷內有文說又明有三部經等廣明一切顛倒眾生一切顛倒法一者明如大薩遮尼乾子經第三卷過半已後說二者明如大般涅槃經第十八卷過半已後說三者明如勝鬘經過半卷已後說又明十二部經內餘卷內自有文具足說之不須更說又明文當義當佛滅度後文當義當一切正法不行時如大薩遮尼乾子經第三卷過半已後說第一段第二段大薩遮尼乾子經第三卷過半已後說大集月藏分經第八卷過半已後說第三段大薩遮尼乾子經第三卷過半已後說又明已下兼依餘經說大方廣十輪經第五卷過半已後說如餘卷上第一段內所說八部經前五部經後三部經如餘卷上第一段廣出說一者明二者明三者明四者明大集月藏分經第八卷減半已前說法花經不輕菩薩品說大方廣十輪經第五卷過半已後第六卷末說第四段大薩遮尼乾子經第三卷末說第五段大薩遮尼乾子經第四卷減半已前說又明義當乃至一切出家人若遣一切出家人還俗引十四種俱明如餘卷第二大段初已廣出說大集月藏分經第八卷過半已後說像法決疑經與多部經義同文當佛滅度一千年已後過半卷已後說又於同是可損持戒破戒兩種福田內亦就一切福田厚薄說如上說文當何況打一切持戒比丘是者者是如此段上大集月藏分經說又明若說就一切根機說一者明大般涅槃經假使三子病杖而死唯有一子猶須苦治殺五百婆羅門淨度三昧經出家人得打破戒比丘文顯易識二者明大般涅槃經覺德比丘有德國王十號內及大般涅槃四種近因律文等說又文顯易識三者明大集月藏分經第八卷過半已後說大薩遮尼乾子經第三卷過半已後第四卷減半已前說大方廣十輪經第二卷減半已後說又明若就佛在世及佛滅度後一切時節分齊說一者明大般涅槃經淨度三昧經如上就根機法內說二者明大集月藏分經大薩遮尼乾子經大方廣十輪經如上就根機法內說最妙勝定經與多部經義同摩訶摩耶經取說文當佛滅度後一千年已前猶有得道人一千年已後无有得道人作證迦葉經第一卷減半已前文當佛滅度五百年已後第二卷四天下一切人皆悉普出家盡皆悉普學一切无名相法坐禪盡八部經等如餘卷內說第六段大薩遮尼乾子經第四卷減半已後說又明已下猶是上第四段義未盡由文廣故所以𢌞之在後說如上第二大段內說者如餘卷第二大段初說大薩遮尼乾子經第三卷末說大方廣十輪經第四卷過半已前說如上第二大段內說者如餘卷第二大段初說又兼依餘經說者兼依餘卷第一大段內八部經等說一者明二者明大集月藏分經第一卷過半已後第十卷內等說如上第二大段內說者如餘卷第二大段初說大方廣十輪經第三卷過半已後第四卷過半已後說與上大薩遮尼乾子經第三卷末後說同又明一切道俗莫問貴賤一種相似從子注已下是真沙門一段經如大薩遮尼乾子經第三卷過半已後說子注已下皆悉普共濡語乃至禮足第等大方廣十輪經第三卷過半已後第四卷過半已後第五卷初偈頌內等說不作一切十惡如大薩遮尼乾子經第三卷末等說一切廿六種一切阿鼻地獄惡等如上第三大段說者是從莫問一切善惡乃至何以故已來如大薩遮尼乾子經第三卷過半已後乃至卷末及第四卷等大方廣十輪經第三卷過半已後第四卷過半已後等說從何以故已下一者明大薩遮尼乾子經第三卷過半已後說二者明大集月藏分經第一卷過半已後說三者明四者明大方廣十輪經第二卷滅減半已後第五卷減半已前說又明一切道俗莫問貴賤一種相似此段返前段即是所以更不須引前段經文作證一者明二者明三者明四者明五者明六者明七者明大方廣十輪經第四卷過半已前文義具足說過半已後說盡第六卷已來說者皆悉普是又明上兩段一切道俗莫問貴賤一種相似大方廣十輪經七卷雖復明種種佛法非一唯是為明上兩種義故說之如餘卷上第一大段內八部經等說文當義當佛滅度一千年已後或盡一部說或不盡一部說或盡一卷等說或不盡一卷等說亦如是類以可知又明於佛在世及佛滅度後一千年已前或就根機說或就時說亦有或盡一部說或不盡一部說或盡一卷等說或不盡一卷等說多在一切甚深大乘經部內說文隱難解所以不說之文當義當佛滅度一千年已後多者與一切甚深大乘經別部說文顯易識所以偏說之又明何以故明一切第三階佛法內一切利根空見有見眾生如上第四段由文廣故𢌞之在後法內說者如上兩段又明一切道俗莫問貴賤一種相似初段內說如下廿四段法內說者如下一切廿四段等一切普真普正佛法內說一者明二者明餘卷內說三者明大集月藏分經廣明離十惡文顯易識大薩遮尼乾子經第三卷末廣明離十惡大方廣十輪經離一切四重一切五逆第五卷減半已前經文略說唯道犯根本重罪出由懺悔得滅者是離一切十惡第七卷內廣說一切廿六種一切阿鼻地獄惡等及佛藏經如上第三大段一段說者是四者明如餘卷內說五者明大集月藏分經第七第八第九卷通上及下多卷灌頂經雜類神呪經文顯易識等說舉非明是就返惡成善說六者明如迦葉經第二卷內明无名相法文義最廣佛藏經一部通上及下俱廣明一切无名相法第一卷內文義最廣說第四卷內略說不淨觀大方廣佛華嚴經於上不淨觀五種惡境界內一切四念處略說一切苦集二諦略說一切一十二因緣廣說如十地品內第四地第五地第六地第等說大般涅槃經於上不淨觀五種惡境界內一切苦集二諦一切七漏一切十想等俱廣說文顯易識七者明八者明如餘卷內說又於子注內明七識不受苦樂非涅槃自因唯有如來藏受苦樂是涅槃因喻如伎兒作種種伎量如楊楞伽經說文顯易識勝鬘經過半卷已後說文當於此六識及心法智等是九者明十者明如餘卷內說十一者明大方廣十輪經第三卷過半已後說大方廣佛華嚴經明法品初過一段長行及偈頌已後長行內說十二者明大方廣十輪經第三卷過半已後說寶雲經文顯易識十三者明大方廣十輪經第三卷過半已後說十四者明如餘卷內說十五者明大方廣十輪經第五卷過半已後說十六者明十七者明十八者明十九者明廿者明已上五段大般涅槃通上及下第卅一卷過半已後第卅三卷減半已前大方廣十輪經第五卷減半已前等說俱導噵一切種種惡眾生內一切種種好眾生內多有一切菩薩摩訶薩作之多有一切三乘根機眾生或一身兩身得出世道果以此文驗所以得知又如此段上說學一切无名相法觀一切眾生作一切佛性作學一切菩薩行作一切當來佛作一切真佛想等經文內皆悉普不見導道滅一切種種惡眾生內一切種種好眾生內一切利根真聖及一切利根正見成就凡夫九種人一切正善佛法僧眾生斷惡脩善解行等故以此文驗所以得知廿一者明像法決疑經與多部經義同過半卷已後說說觀佛三昧經文顯易識廿二者明大集月藏分經第八第九卷通上及下有多卷說一切三寶一切國土等皆悉普付囑一切天龍八部等遣守護之像法決疑經與多部經義同減半卷已前說文當布施畜生一口餘食勝過供養養十方諸佛等无量无邊何以故內一者明不識一切惡眾生一切善眾生不識一切邪善眾生內一切正善眾生一切善眾生內一切惡眾生一切正善眾生內一切邪善眾生如大方廣十輪經第五卷減半已前說莫問一切善惡持戒破戒皆悉普名一切破戒眾生亦名一切利根空見有見眾生如上第一大段內釋二者明如餘卷內說三者明四者明大集月藏分經第八卷過半已後第九卷減半已前說五者明如餘卷內說六者明如餘卷內說廿三者明大集月藏分經及於大集月藏分經第十卷末一切偈頌已後長行內說大集月藏分經文當佛滅度後第二五百年禪定牢固迦葉經文當佛滅度後第二五百年四天下人一切皆悉普出家盡一切皆悉普學一切无相三昧坐禪盡大集月藏分經文當佛滅度後第三五百年多聞牢固何以故內一者明如餘卷第一大段內八部經此卷上第一大段第九子段內十三部經等說二者明如律文等說文顯易識三者明如增壹阿含經木串子經等說文顯易識廿四者明像法決疑經與多部經義同大集月藏分經如餘卷內說何以故已下像法決疑經與多部經義同過半卷已後說大般涅槃經第廿六卷第八功德內說像法決疑經與多部經義同近卷初說大般涅槃經如餘卷內說文顯易識又明人集錄亦名驗一切第三階佛法得通所由法一卷一者明由兩卷共作一卷故所以得少分稱一切道俗情盡得少分說一切第三階佛法文義具足盡所由義二者明由與一切道俗少分通難故所以得不滅所由義三者明由與一切道俗少分驗文驗義故所以得如說修行所由義四者明由出一切第三階佛法文義廣略不即不離同而不同所由義五者明由令一切道俗少分得識一切第三階佛法多少淺深寬狹長短分齊所由義又此上五義就一卷從首至末堅竪說段段內莫問有文說无文說俱有五義具足又此上五義就一卷從首至末橫說義別不同分齊任自依文驗取又明求一切善知識度一切眾生唯有常與一切眾生同行第一常隨喜第二常見第三常聞第四常求第五一者明與一切眾生八戒行等同行一日一夜身口意等一切不相捨離二者明與一切眾生五戒二百五十戒行等同行盡形身口意等一切不相捨離三者明與一切眾生菩薩戒行等同行乃至成佛三大阿僧祇却劫身口意等一切不相捨離如學持戒同行既爾乃至學餘一切行同行亦如是類以可知唯除同行眾法治罰使處別不同者不在其限又明常與一切眾生同行一切五戒因淺深分齊階別不同如大方廣佛華嚴經賢首菩薩品明得見一切諸佛菩薩光明所由義內說又明常與一切眾生同行乃至成佛三大阿僧祇却劫身口意等一切不相捨離多少淺深寬狹長短分齊文義具足如大方廣佛華嚴經十地品初地十大願第八願內說又明此一卷人集錄經文內唯除減五十字是人語已外餘者皆悉普是經文或有人語引經說者或有唯是經文說者一交了
